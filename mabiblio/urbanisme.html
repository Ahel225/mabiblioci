<script>
const lawData = {
  title: "LOI n° 2020-624 du 14 août 2020 instituant Code de l'Urbanisme et du Domaine foncier urbain",
  subtitle: "Code de l'Urbanisme et du Domaine foncier urbain",
  chapters: [
    {
      title: "LIVRE PRELIMINAIRE: DISPOSITIONS GENERALES",
      articles: []
    },
    {
      title: "TITRE I: OBJET ET CHAMP D'APPLICATION",
      articles: [
        {
          id: "article1",
          title: "Article 1",
          content: "<p>La présente loi institue le << Code de l'Urbanisme et du Domaine foncier urbain >> en Côte d'Ivoire.</p>"
        },
        {
          id: "article2",
          title: "Article 2",
          content: "<p>Le Code de l'Urbanisme et du Domaine foncier urbain a pour objet d'organiser-et de réglementer les matières relevant de l'urbanisme et du domaine foncier urbain en Côte d'Ivoire.</p>"
        }
      ]
    },
    {
      title: "TITRE II: Définitions",
      articles: [
        {
          id: "article3",
          title: "Article 3",
          content: "<p>Au sens de la présente loi, on entend par:</p><ul><li><b>adjudication</b>, l'attribution d'un bien immeuble aux enchères par mise en concurrence;</li><li><b>aménagement foncier</b>, l'opération de topométrie et d'urbanisme visant le lotissement et la viabilisation des parcelles de terrain urbain;</li><li><b>antichrèse</b>, outre les dispositions du Code civil en la matière, le contrat par lequel un débiteur remet un immeuble à son créancier pour garantir le paiement de sa dette;</li><li><b>arrêté de concession définitive</b>, l'acte administratif par lequel le ministre chargé de l'Urbanisme ou le préfet transfère la propriété d'une parcelle de terrain urbain relevant du domaine privé de l'Etat à une personne physique ou morale;</li><li><b>certificat de conformité aux règles d'urbanisme</b>, le document délivré par l'autorité administrative compétente attestant la conformité des opérations topographiques au document d'urbanisme opérationnel approuvé;</li><li><b>certificat de mutation de propriété foncière</b>, l'acte administratif qui matérialise le transfert de propriété d'une personne à une autre d'un terrain urbain faisant déjà l'objet d'un arrêté de concession définitive ou d'un certificat de propriété foncière;</li><li><b>certificat d'urbanisme</b>, le document d'information délivré par l'administration compétente, qui présente les possibilités d'utilisation de construction sur un terrain, au regard des réglementations d'urbanisme qui lui sont applicables. Il précise les règles et servitudes d'urbanisme applicables à un terrain donné. Il informe sur la constructibilité du terrain, l'affectation du lot et les conditions de construction;</li><li><b>délimitation topographique</b>, la matérialisation du périmètre d'une parcelle en vue de la maîtrise de ses caractéristiques techniques;</li><li><b>documents d'urbanisme</b>, les outils de planification urbaine. On distingue les documents d'urbanisme opérationnels, prévisionnels et règlementaires;</li><li><b>documents d'urbanisme opérationnel</b>, les plans de lotissement, de morcellement, de restructuration, de rénovation, de remembrement et d'une manière générale, le détail des opérations d'urbanisme;</li><li><b>documents d'urbanisme prévisionnel ou plans d'urbanisme</b>, les outils de planification urbaine, à savoir le schéma directeur d'urbanisme, le plan d'urbanisme directeur, le schéma de structure et le Plan d'urbanisme de détail;</li><li><b>documents d'urbanisme réglementaire</b>, l'ensemble des règles et institutions établies pour discipliner la croissance urbaine et le développement urbain. Ce sont notamment, le certificat d'urbanisme, le règlement général ou particulier d'urbanisme, les règles générales d'occupation du sol, le permis de construire, l'accord préalable d'urbanisme, le certificat de conformité;</li><li><b>domaine foncier de la République de Côte d'Ivoire</b>, l'ensemble des biens immeubles détenus, sous forme de propriété, par l'Etat et les collectivités territoriales. Ils sont regroupés sous le vocable de \"biens domaniaux\";</li><li><b>domaine foncier urbain</b>, l'ensemble des terres du domaine privé ou public de l'Etat couvert par les documents d'urbanisme;</li><li><b>droit de propriété</b>, le droit de jouir et de disposer des choses de la manière la plus absolue, pourvu qu'on n'en fasse pas un usage prohibé par les lois ou par les règlements;</li><li><b>droits coutumiers</b>, les droits d'usage que détient une communauté villageoise, une famille ou toute autre personne sur une ou plusieurs parcelles relevant de la propriété de l'Etat;</li><li><b>droits réels immobiliers</b>, les droits privés, subjectifs et absolus, qui confèrent à leur titulaire un pouvoir immédiat, total ou partiel sur un immeuble;</li><li><b>emphytéose ou bail emphyteotique</b>, la convention de location d'immeuble de longue durée, comprise entre dix-huit ans et quatre-vingt-dix-neuf ans, qui confère au preneur ou l'emphy- téote, un droit réel immobilier susceptible d'hypothèque;</li><li><b>établissement humain</b>, un établissement qui reçoit du public;</li><li><b>extrait topographique</b>, le plan de parcelle issu soit d'une délimitation, soit d'un morcellement, soit d'une fusion indiquant de façon précise les coordonnées rectangulaires des sommets du polygone qui forme la parcelle;</li><li><b>foncier urbain</b>, l'ensemble des terres couvertes par les documents d'urbanisme;</li><li><b>ilot</b>, l'espace issu d'un lotissement qui est délimité soit par des rues, soit par des contraintes naturelles. Il existe d'un seul tenant ou regroupe plusieurs lots;</li><li><b>immeubles</b>, outre les définitions du code civil, par l'objet auquel ils s'appliquent :<ul><li>les droits réels immobiliers suivants :</li><li>la propriété des biens immeubles;</li><li>l'usufruit des mêmes biens;</li><li>les droits d'usage et d'habitation;</li><li>l'emphytéose;</li><li>le droit de superficie;</li><li>les servitudes et services fonciers;</li><li>l'antichrèse;</li><li>les privilèges et hypothèques.</li><li>les actions qui tendent à revendiquer ces mêmes droits réels.</li></ul></li><li><b>lot</b>, la parcelle constituant l'unité de subdivision d'un îlot;</li><li><b>lotissement</b>, l'opération d'urbanisme qui a pour objet ou pour effet la division volontaire en lots d'une ou plusieurs propriétés foncières, destinés à usage d'habitation, de jardin, d'établissement industriel ou commercial ou de tout autre équipement socio-collectif en vue de la vente;</li><li><b>maître d'ouvrage</b>, la personne physique ou morale désignée par ce terme dans les documents contractuels et pour le compte de qui les travaux ou ouvrages immobiliers sont effectués. Il est le propriétaire de l'ouvrage immobilier;</li><li><b>occupation anarchique</b>, toute construction édifiée au mépris des règles et normes d'urbanisme en vigueur;</li><li><b>parcelle</b>, l'espace de terre délimité par un polygone fermé et matérialisé par des limites fixes, bornes ou piquets scellés;</li><li><b>parti d'aménagement</b>, la détermination par l'urbaniste du choix d'une solution d'aménagement parmi plusieurs qui s'offrent à lui;</li><li><b>plan d'application des opérations d'urbanisme</b>, le plan définitif issu des travaux de réalisation de l'urbanisme opérationnel;</li><li><b>plan d'état des lieux</b>, le plan qui représente la situation planimétrique et altimétrique d'un espace donné;</li><li><b>plan d'occupation des sols</b>, le document d'urbanisme, en général à l'échelle de la ville, fixant les règles générales d'utilisation du sol qui s'imposent à tous;</li><li><b>plan d'urbanisme directeur</b>, l'outil de planification urbaine qui trace le cadre général et normatif de l'aménagement et du développement spatial de l'agglomération qu'il couvre. Il fixe les éléments essentiels, à savoir les principales structures de la ville et les principaux équipements structurants, établit une prévision à court, moyen et long terme sur la forme et les étapes du développement et de la modernisation de ladite agglomération;</li><li><b>plan d'urbanisme de détail</b>, l'outil de planification urbaine qui complète le schéma directeur d'urbanisme ou le plan d'urbanisme directeur en précisant, pour le secteur ou le quartier qu'il couvre, le détail de l'organisation urbaine et les règles d'utilisation du sol;</li><li><b>remembrement</b>, la réunion de différentes parcelles en un seul tenant afin d'effectuer une redistribution rationnelle pour l'aménagement urbain;</li><li><b>régie</b>, le mode de gestion d'un service public assuré par un tiers appelé régisseur n'en supportant pas les risques mais intéressé financièrement aux résultats de l'exploitation. C'est également le mode de gestion d'un service public assuré directement par la personne publique dont dépend ce service avec son personnel et ses moyens matériel et financier;</li><li><b>régularisation de lotissement</b>, l'opération d'urbanisme qui consiste à approuver un lotissement appliqué et habité;</li><li><b>règlement général d'urbanisme</b>, l'outil de planification urbaine qui fixe les règles générales et servitudes relatives à l'utilisation des sols et les règles particulières à certaines zones, notamment les servitudes relatives au domaine public, aux sites touristiques et culturels et aux sites à sauvegarder;</li><li><b>rénovation urbaine</b>, l'opération d'urbanisme qui consiste en l'aménagement d'un quartier ancien impliquant des immeubles situés dans le périmètre visé, leur démolition puis une reconstruction planifiée de l'ensemble;</li><li><b>réserves foncières</b>, les domaines fonciers constitués par l'autorité publique pour des besoins d'aménagement futurs;</li><li><b>restructuration urbaine</b>, l'opération d'urbanisme qui consiste en l'aménagement et en la modernisation ainsi qu'en l'équipement d'un quartier ou d'un secteur existant mais dont la configuration, la structuration et le niveau d'équipement ne répondent pas aux normes de l'urbanisme moderne;</li><li><b>restauration immobilière</b>, l'opération qui consiste à sauvegarder et à mettre en valeur des immeubles en ruine ou défectueux;</li><li><b>schéma directeur d'urbanisme</b>, l'outil de planification urbaine, à caractère prévisionnel et prospectif, qui trace sur une période déterminée, les perspectives de développement et les grandes orientations d'aménagement de l'espace urbain. Il définit les grands axes de développement et les principales structures de l'espace considéré. Le schéma directeur d'urbanisme couvre une ou plusieurs agglomérations contigües;</li><li><b>schéma de structure</b>, l'outil de planification urbain qui s'applique à une zone ou un quartier ou à un secteur non couvert par un plan d'urbanisme directeur;</li><li><b>servitude</b>, la charge qui grève un immeuble, obligeant son propriétaire soit à tolérer certains actes d'usage, soit à s'en abstenir lui-même ;</li><li><b>stellionat</b>, la manœuvre frauduleuse qui consiste à vendre un immeuble dont on n'est plus propriétaire ou à l'hypothéquer une seconde fois à l'insu du créancier précédent ou encore à le présenter comme libre d'hypothèque alors qu'il en est grevé;</li><li><b>stellionataire</b>, celui qui commet une fraude consistant à vendre un immeuble dont il n'est plus propriétaire ou à l'hypothéquer une seconde fois à l'insu du créancier précédent ou encore à le présenter comme libre d'hypothèque alors qu'il en est grevé;</li><li><b>sûreté</b>, la garantie offrant à un créancier un droit sur un bien, meuble ou immeuble, qui lui permet d'obtenir paiement de sa créance;</li><li><b>urbanisme</b>, l'acte de planification de la ville et de son développement. Il renvoie ainsi au besoin de planification du développement urbain. L'urbanisme recouvre toute action visant à concevoir, à organiser, à aménager ou à transformer la ville et l'espace urbain. C'est donc à la fois l'art urbain et la science de l'aménagement des villes;</li><li><b>zone non aedificandi</b>, la zone non constructible du fait des contraintes qui peuvent être urbanistiques, structurelles, architecturales ou militaires.</li></ul>"
        }
      ]
    },
    {
      title: "LIVRE I: DISPOSITIONS RELATIVES A L'URBANISME",
      articles: []
    },
    {
      title: "TITRE I: DISPOSITIONS GENERALES",
      articles: []
    },
    {
      title: "CHAPITRE 1: Principes généraux",
      articles: [
        {
          id: "article4",
          title: "Article 4",
          content: "<p>L'Etat et les collectivités territoriales ont le devoir de planifier et d'organiser l'utilisation du sol en vue d'assurer, sans discrimination défavorable, aux populations, des conditions durables et optimales de vie, d'habitat, de circulation et d'offres de services publics répondant à la diversité de leurs besoins.</p>"
        },
        {
          id: "article5",
          title: "Article 5",
          content: "<p>L'Etat et les collectivités territoriales ont également le devoir d'aménager le cadre de vie des populations sur le territoire national.</p>"
        },
        {
          id: "article6",
          title: "Article 6",
          content: "<p>Tout aménagement doit être fait de façon juste et équilibrée de manière à :</p><ul><li>garantir la sécurité et la salubrité publique;</li><li>gérer le sol de façon rationnelle;</li><li>réduire les consommations d'énergie;</li><li>économiser les ressources du sol et du sous-sol;</li><li>diversifier les sources d'énergie en vulgarisant les énergies alternatives;</li><li>préserver les milieux naturels, les espèces végétales et animales et la biodiversité;</li><li>protéger les milieux naturels et les paysages;</li><li>lutter contre l'effet de serre et le réchauffement climatique.</li></ul>"
        }

    {
      title: "CHAPITRE 2: Organes et institutions",
      articles: []
    },

      articles: [
        {
          id: "article7",
          title: "Article 7",
          content: "<p>Le ministère en charge de l'Urbanisme organise et gère l'activité d'urbanisme sur l'ensemble du territoire national.</p>"
        },
        {
          id: "article8",
          title: "Article 8",
          content: "<p>Les structures consultatives ci-après, sont créées par décret dans le domaine de la Construction, de l'Habitat et de l'Urbanisme:</p><ul><li>le Conseil national de la Construction, de l'Habitat et de l'Urbanisme;</li><li>les Commissions régionales de la Construction, de l'Habitat et de l'Urbanisme.</li></ul><p>Ces structures appuient les activités du ministère en charge de la Construction, de l'Habitat et de l'Urbanisme dans la mise en œuvre de la politique nationale de la Construction, de l'Habitat et de l'Urbanisme.</p>"

        {

      ]
    },
    {
      title: "CHAPITRE 3: Documents d'urbanisme prévisionnel",
      articles: [
        {
          id: "article10",
          title: "Article 10",
          content: "<p>Au titre de la présente loi, les documents d'urbanisme prévisionnel sont notamment :</p><ul><li>le schéma directeur d'urbanisme;</li><li>le plan d'urbanisme directeur;</li><li>le schéma de structure;</li><li>le plan d'urbanisme de détail.</li></ul>"

    {
      title: "Section 5. mesures de sauvegarde antérieures à l'approbation des plans d'urbanisme",
      articles: [
        {
          id: "article45",
          title: "Article 45",
          content: "<p>Les mesures de sauvegarde prévues à la présente section sont applicables jusqu'à la publication des actes d'approbation des plans d'urbanisme directeur ou de détail.</p>"
        },
        {
          id: "article46",
          title: "Article 46",
          content: "<p>Toute transaction immobilière s'effectuant sur des parties de territoire tenues d'avoir un plan d'urbanisme directeur ou de détail est soumise à l'autorisation du ministre chargé de la Construction et de l'Urbanisme.</p><p>Cette autorisation est donnée ou refusée après avis du service des Domaines du ministère en charge de l'Economie et des Finances.</p>"
        },
        {
          id: "article47",
          title: "Article 47",
          content: "<p>Le permis de construire doit être demandé dans les conditions et sous les sanctions prévues à la législation en vigueur.</p><p>Cette législation fixe les conditions suivant lesquelles il peut être sursis à statuer pour les constructions qui sont de nature à compromettre ou à rendre plus onéreuse l'exécution d'un plan d'urbanisme.</p>"
        },
        {
          id: "article48",
          title: "Article 48",
          content: "<p>Aucune exploitation de carrière, aucun affouillement ni exhaussement du sol de nature à modifier sensiblement l'état des lieux, ne peuvent être entrepris que vingt jours après le dépôt au ministère de la Construction et de l'Urbanisme d'une déclaration indiquant la nature des travaux projetés et accompagnée d'un plan de situation des terrains intéressés par lesdits travaux.</p><p>Le ministre chargé de l'Urbanisme ou son délégué peut, dans le même délai, décider qu'il sera sursis aux travaux projetés.</p>"
        },
        {
          id: "article49",
          title: "Article 49",
          content: "<p>Lorsque la création ou le développement de lotissement est de nature à compromettre ou à rendre plus onéreuse l'exécution du plan d'urbanisme, l'autorité habilitée à prendre une décision en la matière peut décider qu'il sera sursis à statuer sur la demande d'autorisation.</p>"
        },
        {
          id: "article50",
          title: "Article 50",
          content: "<p>Pour les mêmes motifs que ceux indiqués à l'article précédent, il peut être décidé qu'il sera sursis à statuer sur les demandes d'autorisation d'ouverture des établissements classés de première et deuxième classe, prévues par les prescriptions concernant les établissements dangereux, insalubres et incomodes.</p>"
        },
        {
          id: "article51",
          title: "Article 51",
          content: "<p>Les décisions de sursis à statuer, fondées sur les mesures de sauvegarde mentionnées au présent chapitre, doivent être motivées.</p><p>A dater de la décision par laquelle le plan d'urbanisme a été mis à l'enquête publique, les décisions de sursis ne peuvent être motivées que par des dispositions inscrites au plan.</p>"
        },
        {
          id: "article52",
          title: "Article 52",
          content: "<p>En aucun cas, le sursis à statuer ne peut excéder un an.</p><p>A l'issue de ce délai, une décision définitive doit, sur simple réquisition de l'intéressé par lettre recommandée, être prise par l'autorité chargée de la délivrance de l'autorisation dans les formes et délais requis en la matière.</p><p>L'autorisation ne peut être refusée pour des motifs tirés des prévisions du plan d'urbanisme non encore approuvé, à moins que celui-ci ait été soumis à l'enquête publique et aux dispositions qui s'opposent expressément à la réalisation du projet envisagé.</p>"
        },
        {
          id: "article53",
          title: "Article 53",
          content: "<p>Si aucune des dispositions du plan d'urbanisme approuvé n'est de nature à justifier le refus opposé dans les conditions prévues à l'article précédent, sur la base du plan mis à l'enquête publique, une indemnité peut être allouée au propriétaire intéressé.</p><p>Cette indemnité est fixée, à défaut d'accord amiable, par la juridiction administrative compétente.</p><p>Il n'est éventuellement tenu compte, pour la détermination du préjudice, que de la période écoulée depuis l'expiration du sursis.</p>"
        }

        {
          id: "article62",
          title: "Article 62",

        },
        {
          id: "article63",
          title: "Article 63",

        },
        {
          id: "article64",

        {

          title: "Article 65",

      title: "Sous-section 1 - la constitution des réserves foncières",
      articles: [

        {
          id: "article71",
          title: "Article 71",

          id: "article72",

        {
          id: "article73",

        },
        {
          id: "article75",
          title: "Article 75",
          content: "<p>Le projet d'aménagement ne peut être approuvé que s'il est conforme au plan d'urbanisme.</p>"

        {
          id: "article76",
          title: "Article 76",
          content: "<p>Les projets d'aménagement sont dressés par un urbaniste agréé et inscrit à l'Ordre national des urbanistes de Côte d'Ivoire.</p>"
        },
        {
          id: "article77",
          title: "Article 77",
          content: "<p>Toutefois, les projets d'aménagements initiés par l'Etat ou les collectivités territoriales peuvent être dressés par les urbanistes de l'Administration publique.</p><p>Le projet d'aménagement approuvé est appliqué par un géomètre expert agréé inscrit au tableau de l'Ordre des géomètres experts de Côte d'Ivoire, ou par les services compétents de l'Etat pour ce qui concerne les projets de l'Etat et des collectivités.</p>"
        },
        {
          id: "article78",
          title: "Article 78",
          content: "<p>Le projet d'aménagement approuvé appliqué et viabilisé fait l'objet d'un certificat de conformité délivré par le ministère en charge de l'Urbanisme.</p>"
        },
        {
          id: "article79",
          title: "Article 79",
          content: "<p>L'Etat et les collectivités territoriales peuvent concéder à un opérateur public ou privé, la mission d'aménager des terrains déterminés et délimités, préalablement libérés de tous droits et occupations antérieurs.</p><p>Le concessionnaire d'aménagement peut être appelé à participer financièrement à la purge des droits coutumiers.</p>"
        },

    {
      title: "CHAPITRE 1: Règles générales d'urbanisme",
      articles: [
        {
          id: "article123",
          title: "Article 123",
          content: "<p>Toutes les règles d'urbanisme sont applicables aux zones habitées et habitables à l'exclusion des plantations, champs, fermes et autres productions agricoles qui doivent être établis hors des agglomérations.</p><p>Elles concernent la localisation, la desserte, l'accessibilité, l'implantation, l'architecture des différentes constructions, le type de clôture, l'embellissement et la tenue décente des propriétés foncières, constructions et autres infrastructures.</p>"
        },
        {
          id: "article124",
          title: "Article 124",
          content: "<p>Les aménagements urbains se font à l'aide des documents d'urbanisme ci-après:</p><ul><li>le schéma directeur d'urbanisme;</li><li>le plan d'urbanisme directeur;</li><li>le schéma de structure;</li><li>le plan d'urbanisme de détail.</li></ul>"
        },
        {
          id: "article125",
          title: "Article 125",
          content: "<p>Les communes sont tenues de disposer d'un document d'urbanisme prévisionnel.</p><p>Tout projet d'urbanisme doit préciser le type d'opération à réaliser.</p>"
        },
        {
          id: "article126",
          title: "Article 126",
          content: "<p>Les aménagements et les constructions de toute nature doivent être localisés en fonction des orientations générales du schéma directeur d'urbanisme, du plan d'urbanisme directeur, du schéma de structure et celles du plan d'urbanisme de détail.</p>"
        },
        {
          id: "article127",
          title: "Article 127",
          content: "<p>Les constructeurs d'ouvrages sont tenus de créer ou conserver des perspectives urbaines conformes aux documents prévisionnels.</p>"
        },
        {
          id: "article128",
          title: "Article 128",
          content: "<p>Tout projet de réalisation ou d'aménagement d'équipements collectifs, d'équipements recevant du public, ou d'ensemble immobilier de constructions doit prévoir l'accessibilité pour les personnes à mobilité réduite et faire l'objet d'une étude préalable de sécurité publique.</p><p>L'étude préalable de sécurité publique ne peut faire l'objet de dérogation.</p>"
        },
        {
          id: "article129",
          title: "Article 129",
          content: "<p>Les casernes, camps et bases militaires doivent être clôturés.</p><p>La zone de protection des bâtiments militaires est d'au moins cinq cent mètres autour des limites desdites clôtures.</p>"
        },
        {
          id: "article130",
          title: "Article 130",
          content: "<p>Les zones préalablement déclarées zones de protection peuvent changer d'affectation par décret pris en Conseil des ministres, sur proposition du ministre chargé de l'Urbanisme à laquelle est annexée une étude préalable de sécurité publique sur la zone en cause.</p>"
        }
      ]

          id: "article139",

        {
          id: "article140",
          title: "Article 140",
          content: "<p>Les zones industrielles sont des espaces concentrant plusieurs entreprises ayant des activités industrielles.</p>"
        },
        {
          id: "article141",
          title: "Article 141",
          content: "<p>Les zones industrielles doivent être implantées en dehors des agglomérations, en périphérie des villes et de manière à ne pas compromettre la santé et la sécurité des populations.</p><p>Il peut toutefois y être dérogé par décret pris en Conseil des ministres.</p>"

          id: "article142",
          title: "Article 142",

      articles: [
 
        {
          id: "article143",
          title: "Article 143",
          content: "<p>Les documents d'urbanisme opérationnel tels que le plan d'urbanisme de détail, le plan d'aménagement foncier et le plan de lotissement doivent disposer de réserves foncières affectées aux sites et équipements commerciaux conformément à la grille d'équipement agréée ou celle en vigueur au ministère en charge de la Construction et de l'Urbanisme.</p>"
        },
        {
          id: "article144",
          title: "Article 144",
          content: "<p>L'implantation des commerces de toute nature est régie par les règlements particuliers d'urbanisme.</p>"
        },
        {
          id: "article145",
          title: "Article 145",
          content: "<p>Les espaces et emplacements des équipements et ouvrages à usage commercial et leurs conditions d'accès sont déterminés par décret pris en Conseil des ministres, sur proposition conjointe du ministre chargé de l'Urbanisme et du ministre chargé du Commerce.</p>"
        },
        {
          id: "article146",
          title: "Article 146",
          content: "<p>Il est institué, au sein du ministère en charge de l'Urbanisme, une Commission d'Urbanisme commercial regroupant plusieurs administrations.</p><p>Elle a une mission de surveillance générale de l'urbanisme commercial.</p><p>La composition, les missions, l'organisation et le fonctionnement de la Commission d'Urbanisme commercial sont déterminés par décret pris en Conseil des ministres.</p>"

        {
          id: "article147",
          title: "Article 147",
          content: "<p>La politique nationale d'aménagement du territoire et les plans d'urbanisme directeurs des collectivités territoriales doivent prévoir des réserves foncières spécifiques pour l'implantation des activités du secteur de l'artisanat en général et la création de centres artisanaux privés ou publics, en particulier.</p>"
        },
        {
          id: "article148",
          title: "Article 148",
          content: "<p>L'Etat et les collectivités territoriales sont tenus de construire et d'aménager, dans chaque région, des infrastructures pour le développement et la promotion de l'artisanat.</p><p>Des structures privées peuvent également construire et aménager des zones d'implantation de l'artisanat.</p><p>Les conditions d'occupation, d'aménagement et d'exploitation de ces zones sont déterminées par décret pris en Conseil des ministres.</p><p>L'Etat et les collectivités territoriales, en liaison avec les Chambres de Métiers et les organisations professionnelles d'artisans, définissent les règles en matière de normalisation, de labellisation, de codification et de commercialisation des produits de l'artisanat.</p>"
        }
      ]
    },
    {
      title: "Section 5. Les zones de développement et d'expansion touristique",
      articles: [
        {
          id: "article149",
          title: "Article 149",
          content: "<p>La politique nationale d'aménagement du territoire et les plans d'urbanisme directeurs des collectivités territoriales doivent tenir compte des zones de développement et d'expansion touristiques.</p>"
        },
        {
          id: "article150",
          title: "Article 150",
          content: "<p>L'Etat veille à la mise en place des zones de développement et d'expansion touristiques par :</p><ul><li>l'identification, la délimitation, l'aménagement et la protection des zones de développement et d'expansion touristiques;</li><li>la libération de ces zones de toute servitude;</li><li>la création des structures chargées de la gestion des zones de développement et d'expansion touristiques.</li></ul>"
        },
        {
          id: "article151",
          title: "Article 151",
          content: "<p>L'Etat veille à l'aménagement et à l'exploitation à des fins touristiques du littoral, des berges, des parcs nationaux et des réserves naturelles.</p>"
        },
        {
          id: "article152",

      title: "Sous-section 1 - L'immatriculation",
      articles: [
        {
          id: "article161",
          title: "Article 161",
          content: "<p>L'immatriculation est l'affectation d'un numéro à un bien immeuble, au terme d'une procédure administrative définie par le régime foncier.</p>"
        },
        {
          id: "article162",
          title: "Article 162",
          content: "<p>L'Etat, les collectivités territoriales, les personnes physiques ou morales doivent requérir l'immatriculation des immeubles au livre foncier.</p>"
        },
        
        {
          id: "article163",
          title: "Article 163",
          content: "<p>La procédure d'immatriculation d'un immeuble au nom de l'Etat est engagée par le conservateur de la Propriété foncière et des Hypothèques à la requête de l'autorité administrative compétente agissant d'office ou à la demande de toute personne physique ou morale ayant intérêt à se faire transférer la propriété de l'immeuble concerné.</p>"
        },
        {
          id: "article164",
          title: "Article 164",
          content: "<p>La procédure d'immatriculation d'un immeuble au nom d'une collectivité territoriale ou d'une personne physique ou morale est engagée par le conservateur de la Propriété foncière à la requête du ministère en charge du Domaine foncier urbain.</p>"
        },
        {
          id: "article165",
          title: "Article 165",
          content: "<p>Les frais d'immatriculation sont à la charge du requérant, sauf convention contraire.</p>"
        },
        {
          id: "article166",
          title: "Article 166",
          content: "<p>Les conditions et les procédures d'immatriculation sont précisées dans les textes relatifs au régime foncier.</p>"

      title: "Sous-section 2 - Les modalités de constitution ordinaires du domaine foncier urbain de l'Etat",
      articles: [
        {
          id: "article167",
          title: "Article 167",
          content: "<p>Les terres vacantes et sans maîtres appartiennent à l'Etat.</p><p>Il en va de même des terres ne faisant pas l'objet d'un titre de propriété définitif et celles sur lesquelles sont reconnus des droits coutumiers même si lesdits droits n'ont pas encore fait l'objet de purge.</p>"
        },
        {
          id: "article168",
          title: "Article 168",
          content: "<p>Les droits coutumiers sur les sols dans les centres urbains et leurs zones d'aménagement différé portent sur l'usage de ces sols.</p><p>Ils sont personnels à ceux qui les exercent et ne peuvent être cédés à quelque titre que ce soit.</p><p>Nul ne peut se porter cessionnaire desdits droits sur l'ensemble du territoire national.</p>"
        },
        {
          id: "article169",
          title: "Article 169",
          content: "<p>Les règles relatives à la purge des droits coutumiers sont déterminées par décret pris en Conseil des ministres.</p>"

        {
          id: "article170",
          title: "Article 170",
          content: "<p>L'Etat et les établissements publics peuvent acquérir des immeubles bâtis et non bâtis dans les mêmes conditions que les personnes privées.</p>"
        },
        {
          id: "article171",
          title: "Article 171",
          content: "<p>L'Etat peut accéder à la propriété d'immeubles par :</p><ul><li>l'acquisition ou la reprise de droits;</li><li>l'expropriation pour cause d'utilité publique;</li><li>l'exercice de son droit de préemption.</li></ul><p>L'Etat peut également recevoir des dons ou legs.</p>"
        },
        {
          id: "article172",
          title: "Article 172",
          content: "<p>L'Etat détermine au préalable les zones soumises à l'exercice du droit de préemption sur la base des prescriptions des documents d'urbanisme.</p>"

    {
      title: "Section 2. la constitution du domaine foncier urbain des collectivités territoriales",
      articles: [
        {
          id: "article173",
          title: "Article 173",
          content: "<p>Le domaine des collectivités territoriales est constitué ou acquis au moment de leur création ou ultérieurement par:</p><ul><li>acquisition d'immeubles bâtis ou non dans les mêmes conditions que les personnes privées, selon les règles de droit commun;</li><li>transfert ou cession de biens du domaine de l'Etat, situés dans les limites géographiques de cette collectivité, à titre onéreux ou gratuit.</li></ul><p>Lorsque le transfert ou la cession porte sur des biens destinés à faire partie du domaine public de la collectivité territoriale, il est effectué à titre gratuit par l'Etat;</p><ul><li>transfert ou cession des biens d'une autre collectivité territoriale, à titre onéreux ou gratuit.</li></ul><p>Lorsque le transfert ou la cession porte sur des biens destinés à faire partie du domaine public, les cessions consenties par les autres collectivités territoriales sont gratuites.</p><ul><li>dons et legs reçus et acceptés;</li><li>saisie ou confiscation au profit de la collectivité territoriale;</li><li>expropriation.</li></ul>"
        },
        {
          id: "article174",
          title: "Article 174",
          content: "<p>Le transfert ou la cession de biens domaniaux par l'Etat aux collectivités territoriales doit être autorisé par décret pris en Conseil des ministres, à l'initiative du ministre chargé du Domaine foncier urbain ou à la requête de la collectivité territoriale.</p>"
        },
        {
          id: "article175",
          title: "Article 175",
          content: "<p>Le décret autorisant le transfert ou la cession transmet également à la collectivité territoriale les crédits ouverts au budget de l'Etat au titre des biens domaniaux cédés ou transférés.</p><p>La loi de finances détermine en cas de besoin le montant à allouer à la collectivité territoriale pour compenser les charges résultant de la cession ou du transfert.</p>"
        },
        {
          id: "article176",
          title: "Article 176",

        },
        {
          id: "article177",
          title: "Article 177",
          content: "<p>Les biens domaniaux d'une collectivité territoriale doivent être inscrits au livre foncier à la requête de son Conseil.</p>"
        },
        {
          id: "article178",
          title: "Article 178",
          content: "<p>L'Etat peut passer avec les collectivités territoriales des conventions portant sur l'utilisation ou l'exploitation de ses biens situés dans les limites géographiques de celles-ci.</p><p>Une telle convention ne vaut pas transfert de propriété.</p>"

        {

          title: "Article 179",
          content: "<p>Le domaine foncier urbain comprend le domaine public et le domaine privé de l'Etat.</p>"
        },
        {
          id: "article180",
          title: "Article 180",
          content: "<p>Nonobstant les dispositions ci-après, la composition et les règles relatives au domaine public urbain sont définies par décret pris en Conseil des ministres.</p>"

    {
      title: "Sous-section 1 Les règles générales",
      articles: [
        {
          id: "article181",
          title: "Article 181",
          content: "<p>Le domaine public urbain est inaliénable et imprescriptible.</p>"
        },
        {
          id: "article182",
          title: "Article 182",
          content: "<p>Le domaine public de l'Etat peut faire l'objet d'occupation temporaire conformément aux textes en vigueur.</p>"
        },
        {
          id: "article183",
          title: "Article 183",
          content: "<p>Les biens du domaine privé de l'Etat et des collectivités territoriales sont régis principalement par les règles du droit administratif.</p>"
        },
        {
          id: "article184",
          title: "Article 184",
          content: "<p>La location, la concession de droits réels immobiliers, la vente et toutes autres transactions concernant les biens immeubles du domaine privé de l'Etat et des collectivités territoriales sont régies principalement par les règles susvisées et à défaut, par les règles de droit commun.</p><p>Les collectivités territoriales sont tenues d'informer leur ministre de tutelle et celui chargé du Domaine foncier urbain sur toutes les transactions effectuées sur leur domaine privé.</p>"
        },
        {
          id: "article185",
          title: "Article 185",
          content: "<p>Toute personne voulant aliéner un immeuble ou des droits réels immobiliers, à l'intérieur du périmètre de préemption doit, au préalable, procéder à une déclaration d'intention d'aliéner auprès du service compétent.</p>"
        },
        {
          id: "article186",
          title: "Article 186",
          content: "<p>Le titulaire du droit de préemption dispose d'un délai de deux mois, à compter de la date de déclaration d'intention d'aliéner, pour signifier sa décision d'exercer son droit de préemption.</p><p>L'absence de notification à l'expiration de ce délai équivaut à une renonciation à l'exercice du droit de préemption.</p>"
        },
        {
          id: "article187",
          title: "Article 187",
          content: "<p>Les acquisitions faites par voie de préemption ne peuvent faire l'objet d'aucune cession en l'état.</p>"
        },
        {
          id: "article188",
          title: "Article 188",
          content: "<p>Les litiges nés à l'occasion de l'exercice du droit de préemption sont soumis aux règles du droit public.</p>"
        }

        },
        {
          id: "article190",

        }

      title: "Section 2. les modalités de gestion du domaine foncier urbain de l'Etat",

      articles: [
        {

          title: "Article 191",

        {
          id: "article192",
          title: "Article 192",
          content: "<p>Un bien du domaine public artificiel peut faire l'objet d'un déclassement lorsqu'il ne correspond plus à son affectation initiale.</p>"
        },
        {
          id: "article193",

          id: "article194",

          title: "Article 197",

        {

        {
          id: "article203",
          title: "Article 203",

        {

          title: "Article 204",

        {
          id: "article209",
          title: "Article 209",
          content: "<p>L'achat ou l'échange portant sur des biens immobiliers est réalisé par acte administratif.</p>"
        },
        {
          id: "article210",
          title: "Article 210",
          content: "<p>Les biens du domaine privé des collectivités territoriales peuvent être vendus selon les règles de droit commun, après délibération de son Conseil.</p>"

        {
          id: "article211",
          title: "Article 211",

          id: "article220",
          title: "Article 220",
          content: "<p>La pleine propriété des terrains urbains immatriculés au nom de l'Etat est conférée par l'arrêté de concession définitive et délivré par le ministre chargé de la Construction et de l'Urbanisme dans les conditions ci-après :</p><ul><li>le dépôt auprès des services compétents du ministère en charge de la Construction et de l'Urbanisme d'une demande comportant un dossier technique par tout intéressé;</li><li>le paiement du prix de vente du terrain calculé suivant le tarif proposé par la commission consultative de fixation des prix de cession des terrains et immeubles;</li><li>le paiement d'une taxe d'établissement du titre foncier au taux en vigueur dans la loi de finances, calculée sur la base de la valeur vénale du terrain et libératoire des droits proportionnels d'enregistrement, d'immatriculation et de publicité foncière.</li></ul><p>Sont exonérées de la taxe d'établissement du titre foncier, les formalités accomplies au profit de l'Etat, des collectivités territoriales ou des entités bénéficiant des privilèges et immunités diplomatiques.</p><p>A l'exception des procédures engagées au profit de l'Etat, l'exonération ou l'accomplissement des formalités ne porte pas la taxe des conservations foncières.</p>"
        },
        {
          id: "article221",
          title: "Article 221",

        },
        {
          id: "article222",
          title: "Article 222",
          content: "<p>Tout bien immeuble objet d'un arrêté de concession définitive ou de tout autre titre de propriété définitif est hypothécable.</p>"
        },
        {
          id: "article223",
          title: "Article 223",
          content: "<p>Les parcelles sorties du domaine privé de l'Etat au moyen d'un arrêté de concession définitive ou tout autre acte de propriété, peuvent être cédées, morcelées ou fusionnées.</p><p>La cession des terrains ayant fait l'objet d'un arrêté de concession définitive se fait par acte authentique.</p><p>En cas de cession, morcèlement ou fusion, un certificat de mutation de propriété foncière est délivré à l'acquéreur ou au bénéficiaire de tout ou une partie de la parcelle par le conservateur de la Propriété foncière et des Hypothèques pour servir de preuve de la publication.</p><p>En cas de perte d'un arrêté de concession définitive, d'un certificat de mutation de propriété foncière ou d'un certificat de propriété foncière, il est délivré au propriétaire par l'autorité compétente, un duplicata dudit acte.</p><p>Le duplicata est délivré au vu d'une ordonnance rendue par le Président du tribunal après publication d'un avis de perte inséré dans deux numéros consécutifs du Journal officiel de la République de Côte d'Ivoire ou d'un journal d'annonces légales.</p><p>Les modalités de délivrance du certificat de mutation de la propriété foncière et du duplicata de l'arrêté de concession définitive sont déterminées par voie règlementaire.</p>"

        {
          id: "article224",
          title: "Article 224",
          content: "<p>L'arrêté de Concession définitive est délivré sur les lots issus d'un lotissement approuvé.</p><p>Toutefois, le ministre chargé de l'Urbanisme peut délivrer un arrêté de concession définitive sur une parcelle hors lotissement sur l'étendue du territoire national dans le cadre d'un projet privé important et conformément à la réglementation sur la purge des droits coutumiers.</p><p>Les conditions de délivrance de l'arrêté de concession définitive hors lotissement sont précisées par voie règlementaire.</p>"

          id: "article225",
          title: "Article 225",
          content: "<p>La procédure de délivrance de l'arrêté de concession définitive est précisée par décret.</p>"

          title: "Article 227",

        {
          id: "article228",
          title: "Article 228",
          content: "<p>Les terrains et bâtiments des propriétés privées sont soumis à toutes les servitudes de survol, de passage, d'implantation, d'appui et de circulation nécessitées par l'aménagement, l'exploitation, l'entretien des réseaux d'assainissement, de drainage et d'évacuation des eaux usées, d'adduction d'eau, d'éclairage public, de lignes, pylônes et dépendances de télécommunication, de dispositifs de protection des voies de communications, ou par l'établissement d'oléoducs ou pipeline.</p>"

      articles: [
        {
          id: "article238",
          title: "Article 238",
          content: "<p>L'expropriation pour cause d'utilité publique est la procédure par laquelle la puissance publique contraint toute personne physique ou morale à la cession forcée de ses droits de propriété sur un bien immobilier, moyennant une indemnisation juste et préalable.</p><p>L'expropriation d'immeuble, en tout ou partie, ou de droits réels immobiliers pour cause d'utilité publique s'opère entre la puissance publique et le propriétaire.</p>"

        {
          id: "article239",
          title: "Article 239",
          content: "<p>L'expropriation suppose l'existence déclarée et constatée d'une cause d'utilité publique.</p><p>L'expropriation pour cause d'utilité publique comprend une phase administrative et une phase judiciaire.</p>"

        {
          id: "article241",

          id: "article242",
          title: "Article 242",

        {
          id: "article244",
          title: "Article 244",
          content: "<p>Dès la publication du décret d'utilité publique, les ministres chargés de son exécution établissent, par arrêté conjoint, la liste exhaustive des parcelles ou des droits réels immobiliers à exproprier.</p>"

        {
          id: "article245",

        {
          id: "article247",

          title: "Article 248",

        {
          id: "article249",
          title: "Article 249",

          id: "article250",

        {

        {
          id: "article252",

          title: "Article 256",

          id: "article257",

          content: "<p>Le stellionat est puni d'un emprisonnement d'un à cinq ans et d'une amende de 300.000 à 3.000.000 de francs CFA, sans préjudice des peines complémentaires.</p><p>La tentative est punissable.</p><p>Les dispositions relatives au sursis et aux circonstances atténuantes ne sont pas applicables.</p>"

        {
          id: "article280",

function renderLaw(data){
  const wrapper = document.getElementById('mainWrapper');
  wrapper.innerHTML = '';
  const toc = document.getElementById('tocList');
  toc.innerHTML = '';
  const articleEls = [];

  if (Array.isArray(data.chapters)) {
    data.chapters.forEach((ch, ci) => {
      const sec = document.createElement('section');
      sec.className = 'group';
      const h2 = document.createElement('h2');
      h2.textContent = ch.title || `Chapitre ${ci+1}`;
      sec.appendChild(h2);

      (ch.articles || []).forEach((a, ai) => {
        const art = document.createElement('div');
        art.className = 'article';
        art.id = a.id || `art_${ci}_${ai}`;

        const header = document.createElement('div');
        header.className = 'article-header';
        const h3 = document.createElement('h3');
        h3.textContent = a.title || `Article ${ai+1}`;
        const fsBtn = document.createElement('button');
        fsBtn.className = 'open-fs';
        fsBtn.title = 'Plein écran';
        fsBtn.innerHTML = '<i class="fas fa-maximize"></i>';
        fsBtn.addEventListener('click', () => openFullscreenById(art.id));
        header.appendChild(h3);
        header.appendChild(fsBtn);

        const content = document.createElement('div');
        content.className = 'article-content';
        content.innerHTML = a.content || '';

        art.appendChild(header);
        art.appendChild(content);
        sec.appendChild(art);
        articleEls.push(art);
      });

      wrapper.appendChild(sec);

      const chapTitle = document.createElement('div');
      chapTitle.textContent = ch.title || `Chapitre ${ci+1}`;
      chapTitle.style.margin = '8px 0 4px';
      chapTitle.style.color = '#1a4177';
      chapTitle.style.fontWeight = '700';
      toc.appendChild(chapTitle);
      const sub = document.createElement('div');
      sub.className = 'toc-sub';
      (ch.articles||[]).forEach((a, ai) => {
        const link = document.createElement('a');
        const id = a.id || `art_${ci}_${ai}`;
        link.href = `#${id}`;
        link.textContent = a.title || `Article ${ai+1}`;
        link.addEventListener('click', closeToc);
        sub.appendChild(link);
      });
      toc.appendChild(sub);
    });
  } else {
    const sec = document.createElement('section');
    sec.className = 'group';
    const h2 = document.createElement('h2');
    h2.textContent = data.title || 'Texte intégral';
    sec.appendChild(h2);
    (data.articles || []).forEach((a, ai) => {
      const art = document.createElement('div');
      art.className = 'article';
      art.id = a.id || `article_${ai}`;
      const header = document.createElement('div');
      header.className = 'article-header';
      const h3 = document.createElement('h3');
      h3.textContent = a.title || `Article ${ai+1}`;
      const fsBtn = document.createElement('button');
      fsBtn.className = 'open-fs';
      fsBtn.title = 'Plein écran';
      fsBtn.innerHTML = '<i class="fas fa-maximize"></i>';
      fsBtn.addEventListener('click', () => openFullscreenById(art.id));
      header.appendChild(h3);
      header.appendChild(fsBtn);
      const content = document.createElement('div');
      content.className = 'article-content';
      content.innerHTML = a.content || '';
      art.appendChild(header);
      art.appendChild(content);
      sec.appendChild(art);
      articleEls.push(art);

      const link = document.createElement('a');
      link.href = `#${art.id}`;
      link.textContent = a.title || `Article ${ai+1}`;
      link.addEventListener('click', closeToc);
      document.getElementById('tocList').appendChild(link);
    });
    wrapper.appendChild(sec);
  }
  window.__articlesOrder = articleEls.map(el => el.id);
}

// TOC controls
const tocBtn = document.getElementById('tocFloatBtn');
const tocHeaderBtn = document.getElementById('tocHeaderBtn');
const tocPanel = document.getElementById('tocPanel');
const tocOverlay = document.getElementById('tocOverlay');
function openToc(){ tocPanel.classList.add('open'); tocOverlay.classList.add('show'); }
function closeToc(){ tocPanel.classList.remove('open'); tocOverlay.classList.remove('show'); }
tocBtn.addEventListener('click', openToc);
tocHeaderBtn.addEventListener('click', openToc);
tocOverlay.addEventListener('click', closeToc);

// Voice reading
const synth = window.speechSynthesis;
let speakingId = null;
const now = document.getElementById('nowReading');
function textFrom(el){ return el.querySelector('.article-content')?.innerText?.trim() || ''; }
function highlight(id, on){ const el = document.getElementById(id); if(!el) return; el.classList.toggle('reading', !!on); }
function speakById(id){
  const el = document.getElementById(id); if(!el) return;
  const text = textFrom(el); if(!text) return;
  stopSpeaking();
  const ut = new SpeechSynthesisUtterance(text); ut.lang='fr-FR'; ut.rate=1;
  ut.onend = () => { highlight(id,false); speakingId=null; now.textContent='Prêt'; };
  synth.speak(ut); speakingId=id; highlight(id,true);
  now.textContent = 'Lecture : ' + (el.querySelector('.article-header h3')?.textContent || '');
}
function pauseSpeaking(){ if(synth.speaking && !synth.paused) synth.pause(); }
function resumeSpeaking(){ if(synth.paused) synth.resume(); }
function stopSpeaking(){ if(synth.speaking){ synth.cancel(); } if(speakingId){ highlight(speakingId,false); speakingId=null; } }
document.getElementById('vPlay').addEventListener('click', () => { const visible = findMostVisibleArticleId() || window.__articlesOrder?.[0]; if(visible) speakById(visible); });
document.getElementById('vPause').addEventListener('click', () => { if(synth.paused) resumeSpeaking(); else pauseSpeaking(); });
document.getElementById('vStop').addEventListener('click', stopSpeaking);
function findMostVisibleArticleId(){ const arts = Array.from(document.querySelectorAll('.article')); let best=null, bestArea=0; const vh = window.innerHeight; arts.forEach(a=>{ const r=a.getBoundingClientRect(); const ov=Math.max(0, Math.min(vh,r.bottom)-Math.max(0,r.top)); if(ov>bestArea){ bestArea=ov; best=a; } }); return best?.id || null; }

// Fullscreen
const fsOverlay = document.getElementById('fsOverlay');
const fsTitle = document.getElementById('fsTitle');
const fsBody = document.getElementById('fsBody');
const fsPrev = document.getElementById('fsNavPrev');
const fsNext = document.getElementById('fsNavNext');
const fsClose = document.getElementById('fsClose');
let fsCurrentIndex = -1;
function openFullscreenById(id){
  const order = window.__articlesOrder || []; const idx = order.indexOf(id); if(idx === -1) return;
  fsCurrentIndex = idx;
  const el = document.getElementById(id);
  fsTitle.textContent = el.querySelector('.article-header h3')?.textContent || 'Article';
  fsBody.innerHTML = el.querySelector('.article-content')?.innerHTML || '';
  fsOverlay.classList.add('show'); fsOverlay.setAttribute('aria-hidden','false');
  updateFsNav();
}
function closeFullscreen(){ fsOverlay.classList.remove('show'); fsOverlay.setAttribute('aria-hidden','true'); }
function updateFsNav(){ const order = window.__articlesOrder || []; fsPrev.style.display = fsCurrentIndex > 0 ? 'grid' : 'none'; fsNext.style.display = fsCurrentIndex < order.length - 1 ? 'grid' : 'none'; }
fsClose.addEventListener('click', closeFullscreen);
fsPrev.addEventListener('click', () => { const order = window.__articlesOrder || []; if(fsCurrentIndex > 0) openFullscreenById(order[fsCurrentIndex - 1]); });
fsNext.addEventListener('click', () => { const order = window.__articlesOrder || []; if(fsCurrentIndex < order.length - 1) openFullscreenById(order[fsCurrentIndex + 1]); });

// Init
renderLaw(lawData);
</script>
