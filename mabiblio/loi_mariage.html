<script>
const lawData = {
  title: "Loi relative au mariage Loi N° 2019-570 du 26 juin 2019", 
  subtitle: "Loi N° 2019-570 du 26 juin 2019",
  chapters: [
    {
      title: "CHAPITRE 1 - Dispositions générales",
      articles: [
        {
          id: "article1",
          title: "Article 1",
          content: "<p>Le mariage est l’union d’un homme et d’une femme célébrée par devant l’officier de l’état civil.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 2 - Des conditions à réunir pour pouvoir contracter mariage",
      articles: []
    },
    {
      title: "Section 1",
      articles: [
        {
          id: "article2",
          title: "Article 2",
          content: "<p>L’homme et la femme avant dix-huit ans révolus ne peuvent contracter mariage.</p>"
        },
        {
          id: "article3",
          title: "Article 3",
          content: "<p>Nul ne peut contracter un nouveau mariage avant la dissolution du précédent constatée soit par une décision devenue définitive, soit par un acte de décès. Au cas où le mariage est dissous par le divorce ou annulé, une nouvelle union ne peut être contractée avant l’accomplissement des formalités de mention en marge de l’acte de mariage et des actes de naissance des époux, du dispositif du jugement ou de l’arrêt qui prononce le divorce ou l’annulation du mariage.</p>"
        },
        {
          id: "article4",
          title: "Article 4",
          content: "<p>Chacun des futurs époux doit consentir personnellement au mariage. Le consentement n’est pas valable s’il a été extorqué par la violence ou s’il n’a été donné que par suite d’une erreur sur l’identité physique ou civile de la personne. Le consentement n’est pas non plus valable, si celui qui l’a donné ignorait l’incapacité physique de consommer le mariage ou l’impossibilité de procréer de l’autre époux, connue par ce dernier avant le mariage.</p>"
        },
        {
          id: "article5",
          title: "Article 5",
          content: "<p>L’homme et la femme consentent seuls à leur mariage.</p>"
        }
      ]
    },
    {
      title: "Section 2 - Des empêchements au mariage",
      articles: [
        {
          id: "article6",
          title: "Article 6",
          content: "<p>La femme ne peut se remarier qu’à l’expiration du délai de viduité de trois cent jours à compter de la dissolution du précédent mariage. Toutefois, le président du tribunal du lieu de son domicile ou de sa résidence peut, par ordonnance sur requête, après conclusions écrites du ministère public, abréger le délai de viduité, lorsqu’il résulte des circonstances que depuis trois cent jours, le précédent mari n’a pas cohabité avec la femme ou lorsqu’il est établi par un médecin que la femme n’est pas en état de grossesse. La décision du président du tribunal est susceptible d’appel. Ce délai prend fin en cas d’accouchement.</p>"
        },
        {
          id: "article7",
          title: "Article 7",
          content: "<p>Est prohibé le mariage entre :</p><p>1) en ligne directe, les ascendants et descendants et les alliés dans la même ligne ;</p><p>2) en ligne collatérale, frère et sœur, oncle et nièce, neveu et tante et entre alliés au degré de beau-frère et belle-sœur, lorsque le mariage qui produisait l’alliance a été dissous par le divorce ;</p> <p>3) l’homme et la femme qui l’a nourri au sein ;</p> <p>4) l’homme et la fille de son ancienne épouse née d’une autre union ;</p> <p>5) la femme et le fils de son ancien époux né d’une autre union ;</p> <p>6) l’homme et l’ancienne épouse de ses ascendants en ligne directe et collatérale ;</p> <p>7) la femme et l’ancien époux de ses ascendantes en ligne directe et collatérale ;</p> <p>8) l’adoptant et l’adopté ;</p> <p>9) l’adopté et les enfants de l’adoptant ;</p> <p>10) l’adopté et le conjoint de l’adoptant et réciproquement entre l’adoptant et le conjoint de l’adopté ;</p> <p>11) les enfants adoptifs de la même personne. Néanmoins, le procureur de la République, saisi par toute personne intéressée, peut lever les prohibitions pour causes graves entre alliés en ligne directe et en ligne collatérale au degré de beau-frère et de belle-sœur, lorsque la personne qui a créé l’alliance est décédée.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 3 - Des oppositions au mariage",
      articles: [
        {
          id: "article8",
          title: "Article 8",
          content: "<p>Lorsqu’un fait, susceptible de constituer un empêchement au mariage, est porté à la connaissance de l’officier de l’état civil compétent pour procéder à la célébration, il doit surseoir à celle-ci et en aviser, dans les quarante-huit heures, le procureur de la République lequel peut, soit lui demander de passer outre, soit s’opposer au mariage. Le procureur de la République peut également former opposition au mariage lorsqu’un empêchement est porté directement à sa connaissance.</p>"
        },
        {
          id: "article9",
          title: "Article 9",
          content: "<p>Le ministère public notifie l’opposition par voie administrative à l’officier de l’état civil qui en dresse acte. Celui-ci notifie l’opposition aux futurs époux et les renvoie à se pourvoir devant le tribunal compétent.</p>"
        },
        {
          id: "article10",
          title: "Article 10",
          content: "<p>Mainlevée de l’opposition peut être demandée par les futurs époux qui adressent à cet effet requête au tribunal dans le ressort duquel le mariage doit être célébré. La juridiction saisie statue dans les dix jours. La cour statue dans le mois de l’appel des futurs époux ou du ministère public.</p>"
        },
        {
          id: "article11",
          title: "Article 11",
          content: "<p>Nulle autre opposition, pour la même cause, ne peut être faite à un mariage lorsqu’il a été donné mainlevée d’une première opposition.</p>"
        },
        {
          id: "article12",
          title: "Article 12",
          content: "<p>L’officier de l’état civil saisi de l’opposition ne peut procéder à la célébration du mariage tant que la mainlevée n’en a pas été prononcée. Lorsque la décision de mainlevée est devenue irrévocable, elle est notifiée à l’officier de l’état civil, par le procureur de la République, en la forme administrative, ou par les intéressés, par acte extrajudiciaire.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 4 - Formalités du mariage",
      articles: [
        {
          id: "article13",
          title: "Article 13",
          content: "<p>Le mariage est obligatoirement célébré par un officier de l’état civil.</p>"
        },
        {
          id: "article14",
          title: "Article 14",
          content: "<p>Seul le mariage célébré par un officier de l’état civil a des effets légaux.</p>"
        }
      ]
    },
    {
      title: "Section 1 - Des formalités préléminaires",
      articles: [
        {
          id: "article15",
          title: "Article 15",
          content: "<p>Dix jours francs au moins avant la date fixée pour la célébration du mariage, chacun des futurs époux doit remettre à l’officier de l’état civil compétent pour y procéder :</p><p>1) un extrait de son acte de naissance ou une copie du jugement supplétif en tenant lieu datant de moins de trois mois ; </p><p>2) la copie des actes accordant des dispenses, dans les cas prévus par la loi ;</p><p>3) toutes autres pièces qui pourraient lui être réclamées et propres à établir que les conditions du mariage sont réunies.</p>"
        },
        {
          id: "article16",
          title: "Article 16",
          content: "<p>Lorsque les futurs époux se présentent devant l’officier de l’état civil, comme il est dit à l’article précédent, pour y déposer leurs actes de naissance, celui-ci doit leur demander la présentation soit de l’acte de décès du précédent conjoint, soit l’expédition du jugement déclaratif d’absence, soit la preuve de l’accomplissement des formalités prévues à l’article 3 alinéa 2, s’ils ont déjà été mariés.</p>"
        },
        {
          id: "article17",
          title: "Article 17",
          content: "<p>L’officier de l’état civil doit, en outre, interpeler les futurs époux d’avoir à déclarer s’ils optent pour le régime de la communauté de biens ou celui de la séparation de biens, ou s’ils ont conclu un contrat de mariage. Si les époux ont convenu des règles relatives à leur régime matrimonial par acte notarié, l’officier d’état civil reçoit l’acte. L’officier de l’état civil donne acte aux futurs époux de leur choix.</p>"
        },
        {
          id: "article18",
          title: "Article 18",
          content: "<p>Un mois avant la célébration du mariage, l’officier de l’état civil fait une publication par voie d’affichage au siège de la circonscription de l’état civil du lieu de célébration du mariage et de celui de la résidence de chacun des futurs époux.</p>"
        },
        {
          id: "article19",
          title: "Article 19",
          content: "<p>Avant de procéder à la célébration du mariage, l’officier de l’état civil s’assure que les conditions de fond et de forme exigées par la loi sont remplies. S’il constate qu’elles ne le sont pas, il refuse de célébrer le mariage et procède comme il est dit à l’article 8.</p>"
        },
      ]
    },
    {
      title: "Section 2 - Célébration du mariage",
      articles: [
        {
          id: "article20",
          title: "Article 20",
          content: "<p>Le mariage est célébré publiquement au siège de la circonscription ou du centre d’état civil du domicile ou de la résidence de l’un des futurs époux. La résidence est établie par un mois au moins d’habitation continue, à la date de la célébration. Le procureur de la République du domicile ou de la résidence de l’un des futurs époux peut toutefois, s’il y a de justes motifs, autoriser la célébration du mariage par l’officier de l’état civil dans un lieu de sa circonscription ou du centre d’état civil autre que ceux mentionnés à l’alinéa premier. L’autorisation est notifiée administrativement, par le magistrat qui l’a ordonnée, à l’officier de l’état civil chargé de procéder à la célébration, et copie en est remise aux futurs époux. Lecture de cette autorisation doit être faite au début de la célébration et mention de cette autorisation doit en être faite dans l’acte de mariage.</p>"
        },
        {
          id: "article21",
          title: "Article 21",
          content: "<p>En cas d’empêchements graves, le procureur de la République peut requérir l’officier de l’état civil de se transporter au domicile ou à la résidence de l’un des futurs époux, situé dans le ressort territorial de la circonscription ou du centre d’état civil, pour célébrer le mariage. Lecture de cette réquisition doit être faite au début de la célébration et mention de la réquisition doit en être faite dans l’acte de mariage.</p>"
        },
        {
          id: "article22",
          title: "Article 22",
          content: "<p>En cas de péril imminent de mort de l’un des futurs époux, dûment constaté par un certificat médical, l’officier de l’état civil, après en avoir avisé le procureur de la République, peut : </p><p>1) se transporter avant toute réquisition ou autorisation du procureur de la République, au domicile ou à la résidence de l’un des futurs époux ou en tout autre lieu, pour y célébrer le mariage ; </p><p>2) procéder à cette célébration, même dans le cas où la résidence n’est pas établie par un mois d’habitation continue. Il fait parvenir, dans les quarante-huit heures, au procureur de la République, copie de l’acte de mariage et de toutes pièces justifiant que les conditions et formalités exigées pour le mariage sont remplies.</p>"
        },
        {
          id: "article23",
          title: "Article 23",
          content: "<p>Le jour fixé pour la célébration du mariage, l’officier de l’état civil en présence de deux témoins majeurs, parents ou non, fait lecture aux futurs époux, personnellement présents, du projet d’acte de mariage, du régime matrimonial choisi si les époux n’ont pas fait de contrat de mariage, ainsi que des articles 45, 51, 52 et 56. Il reçoit de chacun d’eux, l’un après l’autre, la déclaration qu’ils se prennent pour mari et femme. Il déclare, au nom de la loi qu’ils sont unis par le mariage et il en dresse acte sur-le-champ.</p>"
        },
        {
          id: "article24",
          title: "Article 24",
          content: "<p>Il est délivré aux époux un livret de famille et un certificat de célébration civile établi conformément aux dispositions réglementaires en vigueur. Ces documents sont remis à celui d’entre eux désignés par les époux.</p>"
        }
      ]
    },
    {
      title: "Section 3 - Des mariages contractés en pays étranger",
      articles: [
        {
          id: "article25",
          title: "Article 25",
          content: "<p>Le mariage contracté en pays étranger entre ivoiriens ou entre un ivoirien et un étranger est valable s’il a été célébré dans les formes usitées dans le pays considéré, à condition que l’ivoirien n’ait point contrevenu aux dispositions de fond exigées par la loi ivoirienne.</p> <p>Il en est de même du mariage contracté en pays étranger entre ivoiriens ou entre un ivoirien et un étranger s’il a été célébré par les agents diplomatiques ou les consuls de la Côte d’Ivoire conformément à la loi ivoirienne.</p>"
        },
    ]
    },
    {
      title: "CHAPITRE 5 - Des nullités du mariage",
     articles:[]
    },
    {
      title: "Section 1 - Nullité absolue",
      articles: [
        {
          id: "article26",
          title: "Article 26",
          content: "<p>Doivent être annulés, les mariages célébrés :</p> <p>1) au mépris des règles fixées par les articles 1, 2, 3 alinéa 1, 4 alinéa 1 et 7 ;</p> <p>2) en violation de l’article 20.</p>"
        },
        {
          id: "article27",
          title: "Article 27",
          content: "<p>L’action en nullité fondée sur les dispositions de l’article précédent est exercée :</p> <p>1) par les époux eux-mêmes ;</p> <p>2) par toute personne qui y a intérêt ;</p><p>3) par le ministère public. Dans tous les cas, le ministère public ne peut agir que du vivant des époux.</p>"
        },
        {
          id: "article28",
          title: "Article 28",
          content: "<p>Le mariage atteint d’une nullité absolue ne peut se confirmer ni expressément, ni tacitement, non plus que par l’écoulement d’un laps de temps.</p>"
        },
        {
          id: "article29",
          title: "Article 29",
          content: "<p>Nonobstant son caractère absolu, la nullité est couverte :</p> <p>1) en cas de violation de l’article 2, lorsque l’époux ou les époux ont atteint l’âge requis ;</p> <p>2) en cas de violation de l’article 20, lorsque les époux ont la possession d’état continue d’époux et qu’ils représentent un acte de célébration du mariage devant l’officier de l’état civil.</p>"
        },
      ]
    },
    {
      title: "Section 2 - Des nullités relatives",
      articles: [
        {
          id: "article30",
          title: "Article 30",
          content: "<p>Peuvent être annulés les mariages célébrés au mépris des règles fixées par l’article 4</p>"
        },
        {
          id: "article31",
          title: "Article 31",

        {

function renderLaw(data){
  const wrapper = document.getElementById('mainWrapper');
  wrapper.innerHTML = '';
  const toc = document.getElementById('tocList');
  toc.innerHTML = '';
  const articleEls = [];

  if (Array.isArray(data.chapters)) {
    data.chapters.forEach((ch, ci) => {
      const sec = document.createElement('section');
      sec.className = 'group';
      const h2 = document.createElement('h2');
      h2.textContent = ch.title || `Chapitre ${ci+1}`;
      sec.appendChild(h2);

      (ch.articles || []).forEach((a, ai) => {
        const art = document.createElement('div');
        art.className = 'article';
        art.id = a.id || `art_${ci}_${ai}`;

        const header = document.createElement('div');
        header.className = 'article-header';
        const h3 = document.createElement('h3');
        h3.textContent = a.title || `Article ${ai+1}`;
        const fsBtn = document.createElement('button');
        fsBtn.className = 'open-fs';
        fsBtn.title = 'Plein écran';
        fsBtn.innerHTML = '<i class="fas fa-maximize"></i>';
        fsBtn.addEventListener('click', () => openFullscreenById(art.id));
        header.appendChild(h3);
        header.appendChild(fsBtn);

        const content = document.createElement('div');
        content.className = 'article-content';
        content.innerHTML = a.content || '';

        art.appendChild(header);
        art.appendChild(content);
        sec.appendChild(art);
        articleEls.push(art);
      });

      wrapper.appendChild(sec);

      const chapTitle = document.createElement('div');
      chapTitle.textContent = ch.title || `Chapitre ${ci+1}`;
      chapTitle.style.margin = '8px 0 4px';
      chapTitle.style.color = '#1a4177';
      chapTitle.style.fontWeight = '700';
      toc.appendChild(chapTitle);
      const sub = document.createElement('div');
      sub.className = 'toc-sub';
      (ch.articles||[]).forEach((a, ai) => {
        const link = document.createElement('a');
        const id = a.id || `art_${ci}_${ai}`;
        link.href = `#${id}`;
        link.textContent = a.title || `Article ${ai+1}`;
        link.addEventListener('click', closeToc);
        sub.appendChild(link);
      });
      toc.appendChild(sub);
    });
  } else {
    const sec = document.createElement('section');
    sec.className = 'group';
    const h2 = document.createElement('h2');
    h2.textContent = data.title || 'Texte intégral';
    sec.appendChild(h2);
    (data.articles || []).forEach((a, ai) => {
      const art = document.createElement('div');
      art.className = 'article';
      art.id = a.id || `article_${ai}`;
      const header = document.createElement('div');
      header.className = 'article-header';
      const h3 = document.createElement('h3');
      h3.textContent = a.title || `Article ${ai+1}`;
      const fsBtn = document.createElement('button');
      fsBtn.className = 'open-fs';
      fsBtn.title = 'Plein écran';
      fsBtn.innerHTML = '<i class="fas fa-maximize"></i>';
      fsBtn.addEventListener('click', () => openFullscreenById(art.id));
      header.appendChild(h3);
      header.appendChild(fsBtn);
      const content = document.createElement('div');
      content.className = 'article-content';
      content.innerHTML = a.content || '';
      art.appendChild(header);
      art.appendChild(content);
      sec.appendChild(art);
      articleEls.push(art);

      const link = document.createElement('a');
      link.href = `#${art.id}`;
      link.textContent = a.title || `Article ${ai+1}`;
      link.addEventListener('click', closeToc);
      document.getElementById('tocList').appendChild(link);
    });
    wrapper.appendChild(sec);
  }
  window.__articlesOrder = articleEls.map(el => el.id);
}

// TOC controls
const tocBtn = document.getElementById('tocFloatBtn');
const tocHeaderBtn = document.getElementById('tocHeaderBtn');
const tocPanel = document.getElementById('tocPanel');
const tocOverlay = document.getElementById('tocOverlay');
function openToc(){ tocPanel.classList.add('open'); tocOverlay.classList.add('show'); }
function closeToc(){ tocPanel.classList.remove('open'); tocOverlay.classList.remove('show'); }
tocBtn.addEventListener('click', openToc);
tocHeaderBtn.addEventListener('click', openToc);
tocOverlay.addEventListener('click', closeToc);

// Voice reading
const synth = window.speechSynthesis;
let speakingId = null;
const now = document.getElementById('nowReading');
function textFrom(el){ return el.querySelector('.article-content')?.innerText?.trim() || ''; }
function highlight(id, on){ const el = document.getElementById(id); if(!el) return; el.classList.toggle('reading', !!on); }
function speakById(id){
  const el = document.getElementById(id); if(!el) return;
  const text = textFrom(el); if(!text) return;
  stopSpeaking();
  const ut = new SpeechSynthesisUtterance(text); ut.lang='fr-FR'; ut.rate=1;
  ut.onend = () => { highlight(id,false); speakingId=null; now.textContent='Prêt'; };
  synth.speak(ut); speakingId=id; highlight(id,true);
  now.textContent = 'Lecture : ' + (el.querySelector('.article-header h3')?.textContent || '');
}
function pauseSpeaking(){ if(synth.speaking && !synth.paused) synth.pause(); }
function resumeSpeaking(){ if(synth.paused) synth.resume(); }
function stopSpeaking(){ if(synth.speaking){ synth.cancel(); } if(speakingId){ highlight(speakingId,false); speakingId=null; } }
document.getElementById('vPlay').addEventListener('click', () => { const visible = findMostVisibleArticleId() || window.__articlesOrder?.[0]; if(visible) speakById(visible); });
document.getElementById('vPause').addEventListener('click', () => { if(synth.paused) resumeSpeaking(); else pauseSpeaking(); });
document.getElementById('vStop').addEventListener('click', stopSpeaking);
function findMostVisibleArticleId(){ const arts = Array.from(document.querySelectorAll('.article')); let best=null, bestArea=0; const vh = window.innerHeight; arts.forEach(a=>{ const r=a.getBoundingClientRect(); const ov=Math.max(0, Math.min(vh,r.bottom)-Math.max(0,r.top)); if(ov>bestArea){ bestArea=ov; best=a; } }); return best?.id || null; }

// Fullscreen
const fsOverlay = document.getElementById('fsOverlay');
const fsTitle = document.getElementById('fsTitle');
const fsBody = document.getElementById('fsBody');
const fsPrev = document.getElementById('fsNavPrev');
const fsNext = document.getElementById('fsNavNext');
const fsClose = document.getElementById('fsClose');
let fsCurrentIndex = -1;
function openFullscreenById(id){
  const order = window.__articlesOrder || []; const idx = order.indexOf(id); if(idx === -1) return;
  fsCurrentIndex = idx;
  const el = document.getElementById(id);
  fsTitle.textContent = el.querySelector('.article-header h3')?.textContent || 'Article';
  fsBody.innerHTML = el.querySelector('.article-content')?.innerHTML || '';
  fsOverlay.classList.add('show'); fsOverlay.setAttribute('aria-hidden','false');
  updateFsNav();
}
function closeFullscreen(){ fsOverlay.classList.remove('show'); fsOverlay.setAttribute('aria-hidden','true'); }
function updateFsNav(){ const order = window.__articlesOrder || []; fsPrev.style.display = fsCurrentIndex > 0 ? 'grid' : 'none'; fsNext.style.display = fsCurrentIndex < order.length - 1 ? 'grid' : 'none'; }
fsClose.addEventListener('click', closeFullscreen);
fsPrev.addEventListener('click', () => { const order = window.__articlesOrder || []; if(fsCurrentIndex > 0) openFullscreenById(order[fsCurrentIndex - 1]); });
fsNext.addEventListener('click', () => { const order = window.__articlesOrder || []; if(fsCurrentIndex < order.length - 1) openFullscreenById(order[fsCurrentIndex + 1]); });

// Init
renderLaw(lawData);
</script>
