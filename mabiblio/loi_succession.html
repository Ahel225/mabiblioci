<script>
const lawData = {
    title: "Relative à la succession",
    subtitle: "Loi N° 2019-573 du 26 juin 2019",
    chapters: [
    {
      title: "CHAPITRE 1",
      articles: [
        {
          id: "article1",
          title: "Article 1",
          content: "<p>La succession s’ouvre par la mort ou par la\ndéclaration judiciaire de décès en cas d’absence ou de disparition.</p>"
        },
        {
          id: "article2",
          title: "Article 2",
          content: "<p>La succession s’ouvre au jour de la mort.</br></br>\nEn cas de disparition ou d’absence, la date d’ouverture est fixée\nau jour du prononcé du jugement déclaratif de décès.</p>"
        },
        {
          id: "article3",
          title: "Article 3",
          content: "<p>L'ordre de succéder entre les héritiers est réglé par\nles présentes dispositions. A leur défaut, les biens passent à l'Etat.</p>"
        },
        {
          id: "article4",
          title: "Article 4",
          content: "<p>Les héritiers sont saisis de plein droit sous l'obligation\nd'acquitter toutes les charges de la succession.</br></br>\nLes légataires et donataires universels sont saisis dans Ics\nconditions prévues par la loi relative aux donations entre vifs et\ntestaments.</br></br>\nL'Etat doit se faire envoyer en possession.</p>"
        },
        {
          id: "article5",
          title: "Article 5",
          content: "<p>La succession s'ouvre au dernier domicile du défunt\n\npour l'ensemble des biens. Pour les cas où le dernier domicile ne\nserait pas connu, la succession s’ouvre à la dernière résidence.</br></br>\nSont portées devant le juge de ce domicile ou de cette résidence\nles actions en nullité ou en réduction des dispositions du défunt,\nl'action en partage et l'action en pétition d'hérédité.</br></br>\nDans le cas de partage d'une même succession entre des cohéritiers étrangers et ivoiriens, ceux-ci prélèvent sur les biens situés\nen Côte d'Ivoire une portion égale à la valeur des biens situés en\npays étranger dont ils seraient exclus, à quelque titre que ce soit,\nen vertu des lois et coutumes locales.</p>"
        },
        {
          id: "article6",
          title: "Article 6",
          content: "<p>Est nulle et de nul effet toute convention ayant pour\nobjet une succession non encore ouverte,qu’il s’agisse de convention sur la succession d’autrui ou de convention sur sa propre\nsuccession, sauf dans les cas prévus par la loi.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 2",
      articles: [
        {
          id: "article7",
          title: "Article 7",
          content: "<p>Pour succéder, il faut exister à l'instant de la succession.</br></br>\nSont donc incapables de succéder :</br>1) celui qui n'est pas encore conçu ;</br>2) l'enfant qui n'est pas né vivant.</p>"
        },
        {
          id: "article8",
          title: "Article 8",
          content: "<p>Lorsque deux personnes, dont l’une avait vocation à\nsuccéder à l'autre, périssent dans un même événement, l'ordre des\ndécès est établi par tous moyens.</br></br>\nSi cet ordre ne peut être déterminé, la succession de chacune\nd'elles est dévolue sans que l'autre y soit appelée.</br></br>\nToutefois, si l'un des co-décédés laisse des descendants, ceux-ci peuvent représenter leur auteur dans la succession de l'autre\nlorsque la représentation est admise.</p>"
        },
        {
          id: "article9",
          title: "Article 9",
          content: "<p>Est indigne de succéder, celui qui a été condamné en\ntant qu'auteur, ou complice, pour avoir volontairement donné ou\ntenté de donner la mort ou porté des coups mortels au défunt.</br></br>\nPeut être déclaré indigne de succéder :</br>\n1)celui qui s’est rendu coupable envers le défunt, de sévices,\ndélits ou injures graves ;</br>2)celui qui a gravement porté atteinte à l'honneur, à la considération ou aux intérêts patrimoniaux du défunt ou de sa famille ;</br></br>Ceiui qui a commis les faits mentionnés à l’alinéa 1 du présent\narticle et à l’égard de qui l’action publique n’a pu être exercée.</br>3) L'action en déclaration d’indignité est ouverte à tous les\nsuccessibles, jusqu’au partage.</br></br>\nLe pardon accordé par le défunt fait cesser l'indignité.</br></br>La preuve du pardon peut être faite par tous moyens.</p>"
        },
        {
          id: "article10",
          title: "Article 10",
          content: "<p>L’indignité est personnelle. Les descendants de l'indigne succèdent comme si leur auteur était prédécédé.</br></br>\nL’indigne ne peut réclamer sur les biens de cette succession,\nl’usufruit que la loi accorde aux père et mère sur les biens de\nleurs enfants, ni en être l’administrateur.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 3",
      articles: []
    },
    {
      title: "Section 1",
      articles: [
        {
          id: "article11",
          title: "Article 11",
          content: "<p>Les successions sont déférées aux enfants et autres\ndescendants du défunt, à ses ascendants, à ses parents collatéraux\net à son conjoint survivant dans l'ordre et suivant les règles ciaprès déterminées.</p>"
        },
        {
          id: "article12",
          title: "Article 12",
          content: "<p>La qualité d’héritier est constatée par un jugement\nrendu par le tribunal du lieu d’ouverture de la succession.</p>"
        },
        {
          id: "article13",
          title: "Article 13",
          content: "<p>La masse successorale ne peut comprendre que des\nbiens et droits appartenant au défunt.</p>"
        },
        {
          id: "article14",
          title: "Article 14",
          content: "<p>Toute succession ou partie de succession échue à\ndes ascendants ou à des collatéraux, se divise en deux parts\négales, l'une pour les parents de la ligne paternelle, l'autre pour\nles parents de la ligne maternelle.</br></br>\nLes parents utérins ou consanguins ne sont pas exclus par les\ngermains mais ils ne prennent part que dans leur ligne. Les germains prennent part dans les deux lignes.</br></br>\nIl ne se fait de dévolution d'une ligne à l'autre que lorsque la\nloi en a ainsi disposé.</p>"
        },
        {
          id: "article15",
          title: "Article 15",
          content: "<p>Sous réserve de ce qui est dit de la représentation,\nla division opérée entre les lignes paternelle et maternelle, il ne\nse fait plus de division entre les diverses branches. La moitié dévolue à chaque ligne appartient à l'héritier ou aux héritiers les\nplus proches en degré. En cas de concours d'héritiers au même\ndegré dans une ligne, ils partagent par tête et par égales portions.</p>"
        },
        {
          id: "article16",
          title: "Article 16",
          content: "<p>La proximité de parenté s'établit par le nombre de\ngénérations ; chaque génération s'appelle un degré.</p>"
        },
        {
          id: "article17",
          title: "Article 17",
          content: "<p>La suite des degrés forme la ligne. On appelle ligne\ndirecte la suite des degrés entre personnes qui descendent l'une\nde l'autre, ligne collatérale la suite des degrés entre personnes qui\nne descendent pas les unes des autres mais qui descendent d'un\nauteur commun.</br></br>\nOn distingue la ligne directe en ligne directe descendante et en\nligne directe ascendante.</br></br>\nLa première est celle qui lie le chef avec ceux qui descendent\nde lui, la deuxième est celle qui lie une personne avec ceux dont\nelle descend.</p>"
        },
        {
          id: "article18",
          title: "Article 18",
          content: "<p>En ligne directe, on compte autant de degrés qu'il y\na de générations. Ainsi le fils est à l'égard du père au premier\ndegré, le petit-fils au second et réciproquement du père et de\nl'aïeul à l'égard des fils et petits-fils.</p>"
        },
        {
          id: "article19",
          title: "Article 19",
          content: "<p>En ligne collatérale, les degrés se comptent par les\ngénérations, depuis l'un des parents jusque et non compris l'auteur\ncommun et depuis celui-ci jusqu'à l'autre parent.</br></br>\nAinsi deux frères sont au deuxième degré, l'oncle et le neveu\nau troisième degré, les cousins germains au quatrième, ainsi de\nsuite.</p>"
        }
      ]
    },
    {
      title: "Section 2",
      articles: [
        {
          id: "article20",
          title: "Article 20",
          content: "<p>La représentation consiste à faire entrer les représentants dans la place, dans le degré et dans les droits du représenté.</br></br>On ne représente pas les personnes vivantes mais seulement\ncelles qui sont mortes. On peut représenter celui à la succession\nduquel on a renoncé.</p>"
        },
        {
          id: "article21",
          title: "Article 21",
          content: "<p>La représentation a lieu à l'infini dans la ligne directe\nascendante.</br></br>\nElle est admise dans tous les cas, soit que les enfants du défunt\nconcourent avec les descendants d'un enfant prédécédé, soit que\ntous les enfants du défunt étant morts avant lui, les descendants\ndesdits enfants se trouvent entre eux en degrés égaux ou inégaux.</p>"
        },
        {
          id: "article22",
          title: "Article 22",
          content: "<p>La représentation n'a pas lieu en faveur des ascendants. Le plus proche dans chacune des deux lignes exclut toujours le plus éloigné.</p>"
        },
        {
          id: "article23",
          title: "Article 23",
          content: "<p>En ligne collatérale, la représentation est admise en\nfaveur des enfants et des descendants des frères et sœurs du\ndéfunt, soit qu'ils viennent à sa succession concurremment avec\ndes oncles ou tantes, soit que tous les frères et sœurs du défunt\nétant prédécédés, la succession se trouve dévolue à leurs descendants en degrés égaux ou inégaux.</p>"
        },
        {
          id: "article24",
          title: "Article 24",
          content: "<p>Dans tous les cas où la représentation est admise, le\npartage s'opère par souche.</br></br>\nSi une même souche a produit plusieurs branches, la subdivision se fait aussi par souche dans chaque branche et les membres\nde la même branche partagent entre eux par tête.</p>"
        },
        {
          id: "article25",
          title: "Article 25",
          content: "<p>Est désigné par :</br>1) souche, l’auteur commun de plusieurs descendants ;</br>2) branche, la ligne directe des parents issus d’une même\nsouche.</p>"
        }
      ]
    },
    {
      title: "Section 3",
      articles: [
        {
          id: "article26",
          title: "Article 26",
          content: "<p>Les enfants ou leurs descendants et le conjoint survivant succèdent au défunt. Les trois quarts de la succession sont\ndévolus aux enfants ou leurs descendants et un quart au conjoint\nsurvivant.</br></br>\nA défaut de conjoint survivant, les enfants ou leurs descendants\nsuccèdent seuls au défunt.</p>"
        },
        {
          id: "article27",
          title: "Article 27",
          content: "<p>A défaut d’enfants et de descendants d’eux, une moitié de la succession est dévolue aux père et mère du défunt, l’autre moitié au conjoint survivant.</br></br>\nA défaut de conjoint survivant, une moitié de la succession est\ndévolue aux père et mère, l’autre moitié aux frères et sœurs du\ndéfunt.</br></br>\nA défaut de père et mère, une moitié de la succession est\n\ndévolue au conjoint survivant, l’autre moitié aux frères et sœurs\ndu défunt.</br></br>\nA défaut de conjoint survivant et de père et mère, la succession\nest dévolue aux frères et sœurs du défunt.</br></br>\nA défaut de conjoint survivant et de frères et sœurs du défunt,\nla succession est dévolue aux père et mère du défunt.</br></br>\nA défaut de père et mère et de frères et sœurs du défunt, la succession est dévolue au conjoint survivant.</br></br>\nA défaut de conjoint survivant, de père et mère et de frères et\nsœurs du défunt, la succession est dévolue aux autres ascendants\net autres collatéraux jusqu’au sixième degré.</p>"
        }
      ]
    },
    {
      title: "Section 4",
      articles: [
        {
          id: "article28",
          title: "Article 28",
          content: "<p>Les enfants ou leurs descendants succèdent à leurs\npère, mère, aïeuls, aïeules ou autres ascendants, sans distinction\nde sexe ni de primogéniture et encore qu'ils soient issus de différents mariages ou nés hors mariage.</br></br>\nIls succèdent par égales portions et par tête, quand ils sont tous\nau premier degré et appelés de leur chef. Ils succèdent par souche\nlorsqu'ils viennent tous ou en partie par représentation.</p>"
        }
      ]
    },
    {
      title: "Section 5",
      articles: [
        {
          id: "article29",
          title: "Article 29",
          content: "<p>Les père et mère partagent entre eux également la\nportion qui leur est déférée.</p>"
        },
        {
          id: "article30",
          title: "Article 30",
          content: "<p>La portion dévolue aux ascendants se divise par moitié entre\nles ascendants de la ligne paternelle et les ascendants de la ligne\nmaternelle. L'ascendant qui se trouve au degré le plus proche,\nrecueille la totalité de la portion affectée à sa ligne, à l'exclusion\nde tous autres.</p>"
        },
        {
          id: "article31",
          title: "Article 31",
          content: "<p>Les ascendants au même degré succèdent par tête\net par égales portions.</p>"
        },
        {
          id: "article32",
          title: "Article 32",
          content: "<p>A défaut d'ascendants dans une ligne, la portion qui\nleur aurait été dévolue se réunit à la part déférée aux ascendants\nde l'autre ligne.</p>"
        }
      ]
    },
    {
      title: "Section 6",
      articles: [
        {
          id: "article33",
          title: "Article 33",
          content: "<p>En cas de succession déférée aux frères et sœurs, ils\n\nsuccèdent ou de leur chef ou par représentation.</p>"
        },
        {
          id: "article34",
          title: "Article 34",
          content: "<p>Le partage de la succession ou de la part de succession dévolue aux fréres et sceurs s'opére entre eux par égales portions s'ils sont tous du méme lit. S'ils sont de lits différents, la\ndivision se fait par moitié entre les deux lignes paternelle et maternelle du défunt.</br></br>\nLes germains prennent part dans les deux lignes et les utérins\nou consanguins chacun dans leur ligne seulement.</br></br>\nS'il n’y a de frères ou sœurs que d'un côté, ils succèdent à la\ntotalité à l'exclusion de tous autres parents de l'autre ligne.</br></br>\nA défaut de parents au degré successible dans une ligne, la portion qui leur aurait été dévolue se réunit à la part déférée aux\nparents de l'autre ligne.</p>"
        },
        {
          id: "article35",
          title: "Article 35",
          content: "<p>Les parents collatéraux au-delà du sixième degré ne\n\nsuccèdent pas.</p>"
        }
      ]
    },
    {
      title: "Section 7",
      articles: [
        {
          id: "article36",
          title: "Article 36",
          content: "<p>Le conjoint survivant succède comme il est dit aux\narticles 26 et 27 de présente loi.</br></br>\nSeul le conjoint survivant contre lequel il n'existe pas de jugement de séparation de corps passé en force de chose jugée, prend\npart à la succession.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 4",
      articles: [
        {
          id: "article37",
          title: "Article 37",
          content: "<p>L'administration des Domaines qui prétend avoir\ndroit à la succession est tenue de faire apposer les scellés et de\nfaire inventaire, dans les formes prescrites pour l'acceptation des\nsuccessions sous bénéfice d'inventaire.</p>"
        },
        {
          id: "article38",
          title: "Article 38",
          content: "<p>L'administration des Domaines doit demander l'envoi en possession au tribunal de première instance du lieu d’ouverture de la succession.</br></br>\nLe tribunal statue sur sa demande trois mois après deux publications consécutives faites à dix jours d'intervalle dans un journal\nd'annonces légales et affichage au tribunal, au bureau de la souspréfecture ou de la mairie du lieu d'ouverture de la succession,\nle ministère public entendu.</br></br>\nLorsque, la vacance ayant été régulièrement déclarée, l'administration des Domaines a été nommée curateur, elle peut, avant\nde former sa demande, procéder par elle-même aux formalités\nde publicité prévues à l'alinéa précédent.</br></br>\nDans tous les cas, il sera justifié de la publicité par la production des journaux dans lesquels elle aura été faite et de l'affichage\npar un exemplaire du placard signé du directeur des Domaines\net revêtu d'un certificat du sous-préfet ou du maire du lieu d'ouverture de la succession.</p>"
        },
        {
          id: "article39",
          title: "Article 39",
          content: "<p>Si l'administration des Domaines ne remplit pas les\nformalités prescrites, l’Etat peut être condamné aux dommages\net intérêts envers les héritiers, s'il s'en représente.</p>"
        }
      ]

    {
      title: "CHAPITRE 5",
      articles: [
        {
          id: "article40",
          title: "Article 40",
          content: "<p>Toute personne peut accepter ou renoncer à une\nsuccession qui lui est échue.</p>"
        },
        {
          id: "article41",
          title: "Article 41",
          content: "<p>Lorsque celui à qui une succession est échue est décédé sans l'avoir répudiée ou sans l'avoir acceptée, expressément\nou tacitement, son héritier peut l'accepter ou la répudier de son\nchef.</br></br>\nSi les héritiers ne sont pas d’accord pour accepter ou pour\nrépudier la succession, elle est réputée acceptée sous bénéfice\nd’inventaire.</p>"
        },
        {
          id: "article42",
          title: "Article 42",
          content: "<p>La faculté d’accepter ou de répudier une succession\nse prescrit par cinq ans à compter de l’ouverture de la succession.</br></br>\nL’héritier qui n’a pris parti dans ce délai, est réputé avoir\naccepté.</br></br>\nLa prescription ne court pas tant que l’héritier a des motifs\nlégitimes d’ignorer la naissance de son droit, notamment l’ouverture de la succession.</p>"
        },
        {
          id: "article43",
          title: "Article 43",
          content: "<p>Pendant le délai de prescription prévu à l’article 42, l'héritier ne peut être contraint à prendre qualité, et il ne peut être\nobtenu contre lui de condamnation. S’il renonce à la succession,\nles frais par lui exposés légitimement, sont à la charge de la succession.</p>"
        },
        {
          id: "article44",
          title: "Article 44",
          content: "<p>Après l'expiration des délais ci-dessus, l'héritier, en\ncas de poursuite dirigée contre lui, peut demander un nouveau\ndélai, que le tribunal saisi de la contestation accorde ou refuse\nsuivant les circonstances.</p>"
        },
        {
          id: "article45",
          title: "Article 45",
          content: "<p>Les frais de poursuite, dans le cas de l'article précédent, sont à la charge de la succession, si l'héritier justifie, ou\nqu'il n'avait pas eu connaissance du décès ou que les délais ont\nété insuffisants, soit à raison de la situation des biens, soit à raison\ndes contestations survenues : s'il n'en justifie pas, les frais restent\nà sa charge personnelle. |</p>"
        }
      ]
    },
    {
      title: "Section 2",
      articles: [
        {
          id: "article46",
          title: "Article 46",
          content: "<p>Une succession peut être acceptée purement et simplement, ou sous bénéfice d'inventaire.</p>"
        },
        {
          id: "article47",
          title: "Article 47",
          content: "<p>Nul n'est tenu d'accepter une succession qui lui est\néchue.</p>"
        },
        {
          id: "article48",
          title: "Article 48",
          content: "<p>L'effet de l'acceptation remonte au jour de l'ouverture de la succession.</p>"
        },
        {
          id: "article49",
          title: "Article 49",
          content: "<p>L’acceptation peut être expresse ou tacite. Elle est\nexpresse quand on prend le titre ou la qualité d'héritier dans un\nacte authentique ou privé. Elle est tacite, quand le successible fait\nun acte qui suppose nécessairement son intention d'accepter, et\nqu'il n'aurait droit de faire qu'en sa qualité d'héritier.</p>"
        },
        {
          id: "article50",
          title: "Article 50",
          content: "<p>Les actes purement conservatoires ou de surveillance, et les actes d'administration provisoire, peuvent être\naccomplis par le successible sans emporter acceptation de la succession, si celui-ci n’y a pas pris la qualité ou le titre d’héritier.</br></br>\nSont réputés purement conservatoires notamment :</br>\n1) le paiement des frais funéraires et de dernières maladies\n\ndu défunt, des impôts dus par le défunt, des loyers et autres dettes\nsuccessorales dont le règlement est urgent ;</br>\n2) le recouvrement des fruits et revenus des biens successoraux, à charge de justifier que les fonds ont été employés à éteindre les dettes visées au 1) ou ont été déposés chez un notaire ou\nconsignés ;</br>\n3) Tacte destiné à éviter l’aggravation du passif successoral.</br></br>Sont réputés être des actes d’administration provisoire, les opérations courantes nécessaires à la continuation à court terme de\nl’activité de l’entreprise dépendant de la succession.</br></br>\nSont également réputés pouvoir être accomplis sans emporter\nacceptation tacite de la succession, le renouvellement, en tant que\nbailleur ou preneur à bail, les baux qui, à défaut, donneraient lieu\nau paiement d’une indemnité, ainsi que la mise en oeuvre des\ndécisions d'administration ou de disposition engagées par le\ndéfunt et nécessaire au bon fonctionnement de l’entreprise.</br></br>\nTout autre acte que requiert l’intérêt de la succession et que le\nsuccessible veut accomplir sans prendre le titre ou la qualité d’héritier doit être autorisé par le juge.</br></br>\nS’il existe dans la succession des objets susceptibles de dépérir\nou dispendieux à conserver, l'héritier peut, en sa qualité d'habile\nà succéder, et sans qu’on puisse en induire de sa part une acceptation, se faire autoriser par justice à procéder à la vente de ces\neffets.</br></br>\nCette vente doit être faite par commissaire de Justice, après les\naffiches et publications réglées par les lois sur la procédure.</p>"
        },
        {
          id: "article51",
          title: "Article 51",
          content: "<p>La donation, vente ou transport que fait de ses droits\nsuccessifs un des cohéritiers, soit à un tiers, soit à tous ses cohéritiers, soit à quelques-uns d’eux, emporte de sa part acceptation\nde la succession.</br></br>\nIl en est de même :</br>\n1) de la renonciation, même gratuite, que fait un des héritiers\nau profit d'un ou de plusieurs de ses cohéritiers ;</br>\n2) de la renonciation qu'il fait même au profit de tous ses cohéritiers indistinctement, lorsqu'il reçoit le prix de sa renonciation.</p>"
        },
        {
          id: "article52",
          title: "Article 52",
          content: "<p>Le majeur ne peut attaquer l'acceptation expresse\nou tacite qu'il a faite d'une succession, que dans le cas où cette\nacceptation aurait été la suite d'un dol pratiqué envers lui.</br></br>\nIl ne peut rétracter son acceptation sous prétexte de lésion,\nexcepté seulement dans le cas où la succession se trouverait\nabsorbée ou diminuée de plus de moitié, par la découverte d'un\ntestament inconnu au moment de l'acceptation.</p>"
        }
      ]
    },
    {
      title: "Section 3",
      articles: [
        {
          id: "article53",
          title: "Article 53",
          content: "<p>La renonciation à une succession ne se présume pas.</br></br>\nElle est faite au greffe du tribunal du lieu où la succession est\nouverte, sur un registre tenu à cet effet contre remise au déclarant\nd’une attestation de renonciation.</br></br>\nLe registre peut être consulté par toute personne intéressée.</p>"
        },
        {
          id: "article54",
          title: "Article 54",
          content: "<p>L'héritier qui renonce est censé n'avoir jamais été\nhér itier i =</p>"
        },
        {
          id: "article55",
          title: "Article 55",
          content: "<p>La part du renongant accroît à ses cohéritiers. S'il\nest seul, elle est dévolue au degré subséquent.</p>"
        },
        {
          id: "article56",
          title: "Article 56",
          content: "<p>L’on ne vient pas par représentation d'un héritier qui\na renoncé. Si le renonçant est seul héritier de son degré, ou si\ntous ses cohéritiers renoncent, les enfants viennent de leur chef\net succèdent par tête.</p>"
        },
        {
          id: "article57",
          title: "Article 57",
          content: "<p>Les créanciers de celui qui renonce au préjudice de\nleurs droits, peuvent se faire autoriser en justice à accepter la succession du chef de leur débiteur, en ses lieu et place.</br></br>\nDans ce cas, la renonciation n'est annulée qu'en faveur des\ncréanciers, et jusqu'à concurrence seulement de leurs créances.</br></br>Elle ne l'est pas au profit de l'héritier qui a renoncé.</p>"
        },
        {
          id: "article58",
          title: "Article 58",
          content: "<p>Tant que la prescription prévue à l’article 42 n’est\npas acquise contre lui, l’héritier peut révoquer sa renonciation en\nacceptant la succession purement et simplement, si elle n’a pas\nété déjà acceptée par un autre héritier.</br></br>\nCette acceptation rétroagit au jour de l’ouverture de la succession, sans toutefois remettre en cause les droits qui peuvent être\nacquis à des tiers sur les biens de la succession, soit par prescription, soit par actes valablement faits avec le curateur à la succession vacante.</p>"
        },
        {
          id: "article59",
          title: "Article 59",
          content: "<p>L’on ne peut renoncer à la succession d'un homme\nvivant, ni aliéner les droits éventuels qu'on peut avoir à cette succession.</p>"
        },
        {
          id: "article60",
          title: "Article 60",
          content: "<p>Les héritiers qui auraient diverti ou recelé des effets\nd'une succession, sont déchus de la faculté d'y renoncer. Ils\ndemeurent héritiers purs et simples, nonobstant leur renonciation,\nsans pouvoir prétendre à aucune part dans les objets divertis ou\nrecelés.</p>"
        }
      ]

    {
      title: "Section 4",
      articles: [
        {
          id: "article61",
          title: "Article 61",
          content: "<p>Un héritier peut déclarer qu’il n’accepte la succession que sous bénéfice d'inventaire.</br></br>\nLa déclaration est faite au greffe du tribunal du lieu où la succession est ouverte. Elle est inscrite sur le même registre que celui\ndestiné à recevoir les actes de renonciation.</p>"
        },
        {
          id: "article62",
          title: "Article 62",
          content: "<p>La déclaration est précédée ou suivie d'un inventaire\nfidèle et exact des biens de la succession.</p>"
        },
        {
          id: "article63",
          title: "Article 63",
          content: "<p>L’inventaire intervient dans le délai de six mois à\ncompter de la date de la déclaration au greffe.</br></br>\nL’inventaire est réalisé par une personne désignée comme il est\ndit à l’article 66.</p>"
        },
        {
          id: "article64",
          title: "Article 64",
          content: "<p>L'héritier qui s'est rendu coupable de recel, ou qui a\nomis, sciemment et de mauvaise foi, de comprendre dans l'in\nventaire des effets de la succession, est déchu du bénéfice d'inventaire.</br></br>Il demeure héritier pur et simple sans pouvoir prétendre à\naucune part dans les objets divertis ou recelés.</p>"
        },
        {
          id: "article65",
          title: "Article 65",
          content: "<p>L'effet du bénéfice d'inventaire est de donner à l'héritier l'avantage :</br>\n1) de n'être tenu du paiement des dettes de la succession que\njusqu'à concurrence de la valeur des biens qu'il a recueillis, même\nde pouvoir se décharger du payement des dettes en abandonnant\ntous les biens de la succession aux créanciers et aux légataires ;</br>\n2) de ne pas confondre ses biens personnels avec ceux de la\nsuccession, et de conserver contre elle le droit de réclamer le\n\npaiement de ses créances.</p>"
        }
      ]
    },
    {
      title: "Section 5",
      articles: [
        {
          id: "article66",
          title: "Article 66",
          content: "<p>Les héritiers peuvent choisir l’un ou plusieurs parmi\neux, pour administrer la succession.</br></br>\nEn cas de désaccord, un administrateur est désigné par le président du tribunal à la requête de toute partie intéressée.</br></br>\nL'administrateur désigné peut recourir à toute personne qualifiée.</p>"
        },
        {
          id: "article67",
          title: "Article 67",
          content: "<p>L'administrateur doit rendre compte de son administration aux héritiers, aux créanciers et aux légataires.</br></br>\nL'administrateur est tenu de répondre aux demandes et questions exprimées par un héritier, un créancier ou un légataire.</br></br>\nIl ne peut être contraint sur ses biens personnels qu’après avoir\nété mis en demeure de présenter son compte, et faute d'avoir\n\nsatisfait à cette obligation.</br></br>\nAprès l’apurement du compte, il ne peut être contraint sur ses\nbiens personnels que jusqu’à concurrence des sommes dont il se\ntrouve reliquataire.</p>"
        },
        {
          id: "article68",
          title: "Article 68",
          content: "<p>L'administrateur n'est tenu que des fautes graves\ndans l'administration dont il est chargé.</p>"
        },
        {
          id: "article69",
          title: "Article 69",
          content: "<p>L'administrateur ne peut vendre les meubles de la\nsuccession que par le ministère d'un commissaire de Justice, aux\nenchères, et après les affiches et pubiications accoutumées.</br></br>\nS'il les représente en nature, il n'est tenu que de la dépréciation\nou de la détérioration causée par sa négligence.</p>"
        },
        {
          id: "article70",
          title: "Article 70",
          content: "<p>L'administrateur ne peut vendre les immeubles que\ndans les formes prescrites par la loi.</br></br>\nIl est tenu d'en déléguer le prix aux créanciers hypothécaires\nqui se sont fait connaître.</p>"
        },
        {
          id: "article71",
          title: "Article 71",
          content: "<p>L'administrateur est tenu, si les créanciers ou autres\npersonnes intéressées l'exigent, de donner caution bonne et solvable de la valeur du mobilier compris dans l'inventaire, et de la\nportion du prix des immeubles non déléguée aux créanciers\nhypothécaires.</br></br>\nFaute par lui de fournir cette caution, les meubles sont vendus\net leur prix est déposé, ainsi que la portion non déléguée du prix\ndes immeubles, pour être employés à l'acquit des charges de la\ns“isuccession.</p>"
        },
        {
          id: "article72",
          title: "Article 72",
          content: "<p>S'il y a des créanciers opposants, l'administrateur ne\npeut payer que dans l'ordre et de la manière réglés par le juge.</br></br>\nS'il n'y a pas de créanciers opposants, il paye les créanciers et\nles légataires à mesure qu'ils se présentent.</p>"
        },
        {
          id: "article73",
          title: "Article 73",
          content: "<p>Les créanciers non opposants qui ne se présentent\nqu'après l'apurement du compte et le payement du reliquat, n'ont\nde recours à exercer que contre les légataires.</br></br>\nDans l'un et l'autre cas, le recours se prescrit par le laps de trois\nans, à compter du jour de l'apurement du compte et du payement\ndu reliquat.</p>"
        },
        {
          id: "article74",
          title: "Article 74",
          content: "<p>Les frais de scellés, s'il en a été apposé, d'inventaire\net de compte, sont à la charge de la succession.</p>"
        }
      ]
    },
    {
      title: "Section 6",
      articles: [
        {
          id: "article75",
          title: "Article 75",
          content: "<p>Lorsqu’après l'expiration du délai de cinq ans à\ncompter de l’ouverture de la succession, il ne se présente personne qui réclame une succession, qu'il n'y a pas d'héritiers\nconnus, ou que les héritiers connus y ont renoncé, cette succession est réputée vacante.</p>"
        },
        {
          id: "article76",
          title: "Article 76",
          content: "<p>Le tribunal dans le ressort duquel la succession est\nouverte, nomme un curateur sur la demande des personnes intéressées ou sur la réquisition du procureur de la République.</p>"
        },
        {
          id: "article77",
          title: "Article 77",
          content: "<p>Le curateur à une succession vacante est tenu, avant\ntout, d'en faire constater l'état par un inventaire et de rechercher\nles héritiers.</br></br>\nIl exerce, poursuit les droits et perçoit les deniers provenant du\nprix de vente des meubles ou immeubles. II libère les legs aux\nlégataires connus, et acquitte les dettes sur l’actif disponible suite\n\naux demandes formulées contre la succession.</br></br>\nIl verse le numéraire restant de la succession dans la caisse du\nreceveur des Domaines pour la conservation des droits, et a la\ncharge de rendre compte a qui il appartiendra.</p>"
        },
        {
          id: "article78",
          title: "Article 78",
          content: "<p>Les dispositions des sections 4 et 5 du présent chapitre, sur les formes de l'inventaire, sur le mode d'administration\net sur les comptes a rendre de la part de l'administrateur sont, ausurplus, communes au curateur.</p>"
        },
        {
          id: "article79",
          title: "Article 79",
          content: "<p>La curatelle de la succession vacante prend fin :</p><p>\n1) par l’affectation intégrale de l’actif au paiement des dettes\net a la libération des legs ;</p><p>\n2) par la réalisation de la totalité de l’actif et la consignation\ndu produit net ;</p><p>\n3) par la restitution de la succession aux héritiers dont les\ndroits sont reconnus.</p>"
        },
        {
          id: "article80",
          title: "Article 80",
          content: "<p>Lorsque la curatelle a pris fin par la réalisation de\nla totalité de l’actif et la consignation du produit net, l’adminis\ntration des Domaines doit demander l'envoi en possession au tribunal du lieu d’ ouverture de la succession.Le tribunal statue sur sa demande trois mois après deux publications consécutives faites à dix jours d'intervalle dans un journal\nd'annonces légales et affichage au bureau de la sous- préfecture\nou de la mairie du lieu d'ouverture de la succession, le ministère\npublic entendu.</br></br>\nL'administration des Domaines peut, avant de former sa\ndemande, procéder par elle-même aux formalités de publicité\nprévues à l'alinéa précédent.</br></br>\nDans tous les cas, il sera justifié de la publicité par la production des journaux d’annonces légales dans lesquels elle aura été\nfaite et de l'affichage par un exemplaire du placard signé du\ndirecteur des Domaines et revêtu d'un certificat du sous-préfet\n\nou du maire du lieu d'ouverture de la succession.</p>"
        },
        {
          id: "article81",
          title: "Article 81",
          content: "<p>Si l'administration des Domaines ne remplit pas les\nformalités prescrites, l’Etat peut être condamné aux dommages\n\n\net intéréts envers les héritiers s'il s'en représente.</p>"
        }
      ]

    {
      title: "CHAPITRE 6",
      articles: []
    },
    {
      title: "Section 1",
      articles: [
        {
          id: "article82",
          title: "Article 82",
          content: "<p>Nul ne peut être contraint à demeurer dans l'indivision et le partage peut être toujours provoqué, nonobstant prohibitions et conventions contraires.</br></br>\nToutefois, l’on peut convenir de suspendre le partage pendant\nun temps limité.</p>"
        },
        {
          id: "article83",
          title: "Article 83",
          content: "<p>L'action en partage des cohéritiers mineurs ou\nmajeurs sous tutelle et celle des cohéritiers présumés absents, est\nexercée par le représentant légal.</p>"
        },
        {
          id: "article84",
          title: "Article 84",
          content: "<p>Si les héritiers sont d'accord, le partage peut être fait\ndans la forme et par tel acte conformes aux règles en vigueur.</br></br>Toutefois, s’il y a parmi eux des mineurs ou des majeurs sous\ntutelle, même régulièrement représentés, les héritiers capables\nsont solidairement tenus des préjudices résultant du partage,\noccasionnés aux héritiers mineurs ou majeurs sous tutelle.</br></br>Toute liquidation-partage commence par un inventaire. A défaut d'inventaire, les héritiers que la loi entend protéger peuvent\nprouver la consistance de la succession par tous moyens.</p>"
        },
        {
          id: "article85",
          title: "Article 85",
          content: "<p>Tout héritier peut requérir l'apposition des scellés\ndans son intérêt ou dans l'intérêt de ses cohéritiers incapables.</br></br>Le même droit appartient aux représentants des incapables.</p>"
        },
        {
          id: "article86",
          title: "Article 86",
          content: "<p>Les créanciers peuvent requérir l'apposition des scellés en vertu d'un titre exécutoire ou d'une permission du juge.</p>"
        },
        {
          id: "article87",
          title: "Article 87",
          content: "<p>Les formalités pour la levée des scellés et la confection de l'inventaire sont réglées par les lois sur la procédure.</p>"
        },
        {
          id: "article88",
          title: "Article 88",
          content: "<p>Si l'un des cohéritiers refuse de consentir au partage, ou s'il s'élève des contestations soit sur le mode d'y procé\nder, soit sur la manière de le terminer, le tribunal prononce\ncomme en matière ordinaire ou nomme s'il y a lieu, pour les opérations de partage, un notaire, un commissaire de Justice ou toute\npersonne qualifiée dont il précise la mission et sur le rapport\nduquel il tranche les contestations.</br></br>\nIl est procédé, dans les conditions fixées par le tribunal, à l'estimation des meubles et des immeubles composant la succession.</br></br>\nEn ce qui concerne les immeubles, il doit être précisé la base\nde l'estimation et s'ils peuvent être ou non commodément partagés. Dans l'affirmative, de quelle manière et la valeur de chacune\ndes parts qu'on peut en former.</p>"
        },
        {
          id: "article89",
          title: "Article 89",
          content: "<p>Chacun des cohéritiers peut demander sa part en\nnature des meubles et immeubles de la succession.</br></br>\nNéanmoins, s'il y a des créanciers saisissants ou opposants ou,\nsi la majorité des cohéritiers juge la vente nécessaire pour l'acquit\ndes dettes ou charges de la succession, les meubles et les immeu\nbles sont vendus dans les formes prévues par le tribunal.</br></br>\nSi les immeubles ne peuvent être commodément partagés ou\nattribués, il doit également être procédé à la vente.</br></br>\nLes héritiers bénéficient d’un droit de préemption.</br></br>Ils disposent d’un délai d’un mois pour lever l’option.</br></br>\nEn cas de concours entre plusieurs héritiers, la préférence est\naccordée au plus offrant.</br></br>\nL’héritier acquéreur dispose d’un délai de trois mois pour en\npayer le prix.</p>"
        },
        {
          id: "article90",
          title: "Article 90",
          content: "<p>Chaque cohéritier fait rapport à la masse des\nsommes dont il est débiteur envers la succession.</p>"
        },
        {
          id: "article91",
          title: "Article 91",
          content: "<p>Après que les meubles et immeubles ont été estimés\net vendus, s'il y a lieu, il est procédé, dans les conditions prévues\npar le tribunal, à la formation de la masse générale et à la composition des lots.</p>"
        },
        {
          id: "article92",
          title: "Article 92",
          content: "<p>Dans la formation et la composition des lots, le morcèlement des héritages et la division des exploitations doivent\nêtre évités autant que possible.</br></br>\nChaque lot est composé, autant que possible, soit en totalité,\nsoit en partie, de meubles ou d'immeubles, de droits ou de\ncréances de valeur équivalente.</p>"
        },
        {

        fsBtn.innerHTML = '<i class="fas fa-maximize"></i>';

        header.appendChild(h3); header.appendChild(fsBtn);
        const content = document.createElement('div');
        content.className = 'article-content';
        content.innerHTML = a.content || '';
        art.appendChild(header); art.appendChild(content); sec.appendChild(art); articleEls.push(art);
      });
      wrapper.appendChild(sec);
      const chapTitle = document.createElement('div');
      chapTitle.textContent = ch.title || `Chapitre ${ci+1}`; chapTitle.style.margin='8px 0 4px'; chapTitle.style.color='#1a4177'; chapTitle.style.fontWeight='700'; toc.appendChild(chapTitle);
      const sub = document.createElement('div'); sub.className='toc-sub';
      (ch.articles||[]).forEach((a, ai) => { const link=document.createElement('a'); const id=a.id||`art_${ci}_${ai}`; link.href=`#${id}`; link.textContent=a.title||`Article ${ai+1}`; link.addEventListener('click', closeToc); sub.appendChild(link); });
      toc.appendChild(sub);
    });
  } else {
    const sec = document.createElement('section');
    sec.className = 'group';
    const h2 = document.createElement('h2');
    h2.textContent = data.title || 'Texte intégral';
    sec.appendChild(h2);
    (data.articles || []).forEach((a, ai) => {
      const art = document.createElement('div');
      art.className = 'article';
      art.id = a.id || `article_${ai}`;
      const header = document.createElement('div');
      header.className = 'article-header';
      const h3 = document.createElement('h3');
      h3.textContent = a.title || `Article ${ai+1}`;
      const fsBtn = document.createElement('button');
      fsBtn.className = 'open-fs'; fsBtn.title = 'Plein écran'; fsBtn.innerHTML = '<i class="fas fa-maximize"></i>';
      fsBtn.addEventListener('click', () => openFullscreenById(art.id));
      header.appendChild(h3); header.appendChild(fsBtn);
      const content = document.createElement('div');
      content.className = 'article-content'; content.innerHTML = a.content || '';
      art.appendChild(header); art.appendChild(content); sec.appendChild(art); articleEls.push(art);
      const link = document.createElement('a'); link.href = `#${art.id}`; link.textContent = a.title || `Article ${ai+1}`; link.addEventListener('click', closeToc); document.getElementById('tocList').appendChild(link);
    });
    wrapper.appendChild(sec);
  }
  window.__articlesOrder = articleEls.map(el => el.id);
}

function highlight(id, on){ const el = document.getElementById(id); if(!el) return; el.classList.toggle('reading', !!on); }
function speakById(id){ const el = document.getElementById(id); if(!el) return; const text = textFrom(el); if(!text) return; stopSpeaking(); const ut = new SpeechSynthesisUtterance(text); ut.lang='fr-FR'; ut.rate=1; ut.onend=()=>{ highlight(id,false); speakingId=null; now.textContent='Prêt'; }; synth.speak(ut); speakingId=id; highlight(id,true); now.textContent='Lecture : ' + (el.querySelector('.article-header h3')?.textContent || ''); }
function pauseSpeaking(){ if(synth.speaking && !synth.paused) synth.pause(); }
function resumeSpeaking(){ if(synth.paused) synth.resume(); }
function stopSpeaking(){ if(synth.speaking){ synth.cancel(); } if(speakingId){ highlight(speakingId,false); speakingId=null; } }
document.getElementById('vPlay').addEventListener('click', ()=>{ const visible = findMostVisibleArticleId() || window.__articlesOrder?.[0]; if(visible) speakById(visible); });
document.getElementById('vPause').addEventListener('click', ()=>{ if(synth.paused) resumeSpeaking(); else pauseSpeaking(); });
document.getElementById('vStop').addEventListener('click', stopSpeaking);
function findMostVisibleArticleId(){ const arts = Array.from(document.querySelectorAll('.article')); let best=null, bestArea=0; const vh = window.innerHeight; arts.forEach(a=>{ const r=a.getBoundingClientRect(); const ov=Math.max(0, Math.min(vh,r.bottom)-Math.max(0,r.top)); if(ov>bestArea){ bestArea=ov; best=a; } }); return best?.id || null; }
// Fullscreen
const fsOverlay = document.getElementById('fsOverlay'); const fsTitle = document.getElementById('fsTitle'); const fsBody = document.getElementById('fsBody'); const fsPrev = document.getElementById('fsNavPrev'); const fsNext = document.getElementById('fsNavNext'); const fsClose = document.getElementById('fsClose'); let fsCurrentIndex = -1;
function openFullscreenById(id){ const order = window.__articlesOrder || []; const idx = order.indexOf(id); if(idx === -1) return; fsCurrentIndex = idx; const el = document.getElementById(id); fsTitle.textContent = el.querySelector('.article-header h3')?.textContent || 'Article'; fsBody.innerHTML = el.querySelector('.article-content')?.innerHTML || ''; fsOverlay.classList.add('show'); fsOverlay.setAttribute('aria-hidden','false'); updateFsNav(); }
function closeFullscreen(){ fsOverlay.classList.remove('show'); fsOverlay.setAttribute('aria-hidden','true'); }
function updateFsNav(){ const order = window.__articlesOrder || []; fsPrev.style.display = fsCurrentIndex > 0 ? 'grid' : 'none'; fsNext.style.display = fsCurrentIndex < order.length - 1 ? 'grid' : 'none'; }
fsClose.addEventListener('click', closeFullscreen);
fsPrev.addEventListener('click', ()=>{ const order = window.__articlesOrder || []; if(fsCurrentIndex > 0) openFullscreenById(order[fsCurrentIndex - 1]); });
fsNext.addEventListener('click', ()=>{ const order = window.__articlesOrder || []; if(fsCurrentIndex < order.length - 1) openFullscreenById(order[fsCurrentIndex + 1]); });
renderLaw(lawData);
