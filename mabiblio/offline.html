  <!-- PWA Install Button -->
<button id="pwa-install-btn" aria-label="Installer l'application" hidden>Installer</button>
<style>
  #pwa-install-btn{
    position:fixed; right:16px; bottom:16px; z-index:9999;
    padding:10px 14px; border:none; border-radius:999px;
    background:#22c55e; color:white; font:600 14px system-ui,Segoe UI,Roboto,Arial,sans-serif;
    box-shadow:0 8px 20px rgba(34,197,94,.35);
  }
  #pwa-install-btn[hidden]{ display:none; }
  @supports (padding-bottom: env(safe-area-inset-bottom)){
    #pwa-install-btn{ bottom: calc(16px + env(safe-area-inset-bottom)); }
  }
</style>
<script>
  (function(){
    let deferredPrompt;
    const btnId = "pwa-install-btn";
    function ensureBtn(){
      let b = document.getElementById(btnId);
      if(!b){
        b = document.createElement("button");
        b.id = btnId;
        b.textContent = "Installer";
        document.body.appendChild(b);
      }
      return b;
    }
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      const btn = ensureBtn();
      btn.hidden = false;
      btn.onclick = async () => {
        btn.hidden = true;
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
      };
    });
    if (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) {
      const btn = document.getElementById(btnId);
      if(btn) btn.hidden = true;
    }
  })();
</script>

</style>

<button id="auth-fab" title="Connexion / Compte"></button>
<div class="views-badge">Vues : <span id="viewCounter">0</span></div>

<dialog id="auth-modal">
  <div class="auth-modal-head">
    <strong>Connexion</strong>
    <button class="btn btn-ghost" id="auth-close" aria-label="Fermer">✕</button>
  </div>
  <div class="auth-modal-body">
    <p class="muted">Connecte-toi pour accéder à l’admin et une meilleure expérience.</p>
    <label>Email</label>
    <input type="email" id="auth-email" placeholder="email@exemple.com" required>
    <label>Mot de passe</label>
    <input type="password" id="auth-pass" placeholder="••••••••" required>
    <div class="auth-actions">
      <button class="btn btn-primary" id="btn-login">Connexion</button>
      <button class="btn btn-ghost" id="btn-register">Créer un compte</button>
      <button class="btn btn-ghost" id="btn-logout">Déconnexion</button>
    </div>
    <div id="auth-msg" class="muted" style="margin-top:8px;"></div>
  </div>
</dialog>

<script type="module">
  import { authRegister, authLogin, authLogout } from "./assets/firebase-app.js";

  const fab = document.getElementById("auth-fab");
  const modal = document.getElementById("auth-modal");
  const closeBtn = document.getElementById("auth-close");
  const email = document.getElementById("auth-email");
  const pass = document.getElementById("auth-pass");
  const msg  = document.getElementById("auth-msg");
  const btnLogin = document.getElementById("btn-login");
  const btnRegister = document.getElementById("btn-register");
  const btnLogout = document.getElementById("btn-logout");

  function openModal(){ try{ modal.showModal(); }catch{ modal.setAttribute("open",""); } }
  function closeModal(){ modal.close?.(); modal.removeAttribute("open"); }

  fab?.addEventListener("click", openModal);
  closeBtn?.addEventListener("click", closeModal);

  async function handle(run){
    msg.textContent = "";
    try{
      await run(email.value.trim(), pass.value);
      msg.textContent = "✅ Opération réussie.";
      setTimeout(()=>{ closeModal(); }, 500);
    }catch(e){
      console.error(e);
      msg.textContent = "❌ " + (e?.message || "Erreur");
    }
  }

  btnLogin?.addEventListener("click", () => handle(authLogin));
  btnRegister?.addEventListener("click", () => handle(authRegister));
  btnLogout?.addEventListener("click", async () => {
    msg.textContent = "";
    try{ await authLogout(); msg.textContent = "✅ Déconnecté."; }catch(e){ msg.textContent = "❌ " + (e?.message||"Erreur"); }
  });
</script>


<!-- Per-card view counters -->
<style>
  .card-views-badge{
    position:absolute; top:8px; right:8px;
    background:rgba(17,24,39,.9); color:#fff;
    padding:4px 8px; border-radius:999px; font:600 12px system-ui,Segoe UI,Roboto,Arial;
    box-shadow:0 6px 14px rgba(0,0,0,.25);
    pointer-events:none;
  }
  .card-views-wrap{ position:relative; }
</style>
<script type="module">
  import { getViewCount } from "./assets/firebase-app.js";
  function basename(href){
    try{ const u = new URL(href, location.href);
         const file = u.pathname.split('/').pop() || 'index.html';
         return file.replace(/\.html$/i,''); }
    catch{ return (href.split('/').pop()||'index.html').replace(/\.html$/i,''); }
  }
  async function attachCounterTo(el, docId){
    let container = el.closest('.card, .item, .panel, .box, .article, .doc, .tile');
    if(!container){ container = el.parentElement; }
    if(container && !container.classList.contains('card-views-wrap')){
      container.classList.add('card-views-wrap');
    }
    const host = container || el;
    if(host.querySelector('.card-views-badge[data-doc="'+docId+'"]')) return;
    const badge = document.createElement('span');
    badge.className = 'card-views-badge';
    badge.dataset.doc = docId;
    badge.textContent = 'Vues: …';
    host.appendChild(badge);
    try{ const n = await getViewCount(docId);
         badge.textContent = 'Vues: ' + n; }
    catch{ badge.textContent = 'Vues: —'; }
  }
  async function initCardCounters(){
    const links = Array.from(document.querySelectorAll('[data-doc-id], a[href$=".html"]'))
      .filter(a => {
        const id = a.getAttribute('data-doc-id') || basename(a.getAttribute('href')||'');
        return id && !['index','admin','offline'].includes(id.toLowerCase());
      });
    const handled = new Set();
    for(const a of links){
      const id = a.getAttribute('data-doc-id') || basename(a.getAttribute('href')||'');
      if(!id || handled.has(id)) continue;
      handled.add(id);
      attachCounterTo(a, id);
    }
  }
  initCardCounters();
  const obs = new MutationObserver(()=>initCardCounters());
  obs.observe(document.body, { childList:true, subtree:true });
</script>
