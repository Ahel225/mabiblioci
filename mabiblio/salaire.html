<!doctype html><html lang='fr'><head><meta charset='utf-8'/>
<meta name='viewport' content='width=device-width, initial-scale=1'/>
<title>Salaire des Fonctionnaires et Agents de l'État </title>
<style>

:root{
  --indice-fg:#fff; --indice-bg:#0a7c2f; --indice-ring:rgba(10,124,47,.35);
  --grade-fg:#fff;  --grade-bg:#1f4ed8; --grade-ring:rgba(31,78,216,.35);
}
@media (prefers-color-scheme: dark){
  :root{
    --indice-fg:#fff; --indice-bg:#2ea043; --indice-ring:rgba(46,160,67,.45);
    --grade-fg:#fff;  --grade-bg:#3b82f6; --grade-ring:rgba(59,130,246,.45);
  }
}
.badge{display:inline-flex;align-items:center;gap:.35rem;padding:.25rem .6rem;border-radius:999px;
  font-weight:700;line-height:1;font-size:.9rem;color:var(--fg);background:var(--bg);
  box-shadow:0 0 0 2px var(--ring,rgba(0,0,0,.1)),0 2px 6px rgba(0,0,0,.15);
}
.badge.button{cursor:pointer;transition:transform .06s ease,filter .06s ease}
.badge.button:hover{filter:brightness(1.05)}
.badge.button:active{transform:translateY(1px) scale(.99)}
.indice-badge{--fg:var(--indice-fg);--bg:var(--indice-bg);--ring:var(--indice-ring)}
.grade-badge{--fg:var(--grade-fg);--bg:var(--grade-bg);--ring:var(--grade-ring)}
.meta{color:#6b7280;font-size:.8rem}
@media (prefers-color-scheme: dark){.meta{color:#9aa3af}}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.card{border-radius:16px;padding:.9rem;background:#0f172a;border:1px solid #1f2937}
.card h3{margin:0 0 .6rem;font-size:1rem}
.row-badges{display:flex;gap:.5rem;align-items:center;margin:.35rem 0}
.breakdown{margin:.5rem 0 0 .2rem;display:grid;grid-template-columns: 1fr auto;gap:.35rem .6rem;align-items:center}
.breakdown .label{color:#9aa3af;font-size:.85rem}
.breakdown .amount{justify-self:end;font-weight:700}
.badge.salary{--bg:#0d9488;--fg:#fff;--ring:rgba(13,148,136,.35)}
.badge.allow{--bg:#334155;--fg:#e5e7eb;--ring:rgba(51,65,85,.35);font-weight:600}
.badge.brut{--bg:#9333ea;--fg:#fff;--ring:rgba(147,51,234,.35)}
.select-sm{background:#0b1220;color:#e5e7eb;border:1px solid #1f2937;border-radius:10px;padding:.3rem .45rem;font-size:.9rem}

:root{--bg:#0b1220; --panel:#0f172a; --border:#1f2937; --text:#e5e7eb; --muted:#94a3b8; --line:#101827; --chip:#111827;}
.theme-light{--bg:#f7fafc; --panel:#ffffff; --border:#cbd5e1; --text:#0b1320; --muted:#334155; --line:#ffffff; --chip:#e2e8f0;}
.theme-light .item,.theme-light .card{background:#ffffff;}
.theme-light .badge{background:var(--chip); color:var(--text);}
*{box-sizing:border-box} body{margin:0; font-family:Inter,system-ui,Segoe UI,Roboto; background:var(--bg); color:var(--text);}
header{padding:12px 16px; border-bottom:1px solid var(--border); background:rgba(15,23,42,.95); position:sticky; top:0; z-index:10;}
h1{margin:0; font-size:18px; font-weight:700;}
.wrap{display:grid; grid-template-columns: 300px 1fr; gap:12px; padding:12px;}
@media(max-width:900px){ .wrap{grid-template-columns:1fr} }
.panel{background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:12px;}
.muted{color:var(--muted); font-size:12px;}
.item{padding:10px; border:1px solid var(--border); border-radius:12px; cursor:pointer; margin-bottom:8px; background:#0e1526;}
.item:hover{border-color:#334155;}
.chips{display:flex; gap:8px; flex-wrap:wrap;}
.badge{background:var(--chip); border:1px solid var(--border); padding:6px 10px; border-radius:9999px; font-size:12px;}
.button{cursor:pointer;}
.grid{display:grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap:12px;}
.card{border:1px solid var(--border); border-radius:14px; padding:12px; background:#0e1526;}
.controls{display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:8px;}
.controls label{font-size:12px; color:var(--muted); display:block; margin-bottom:2px;}
.controls select{width:100%; padding:6px 8px; border-radius:8px; border:1px solid var(--border); background:#0b1220; color:var(--text);}
.rows{margin-top:10px; display:grid; gap:6px;}
.line{display:flex; gap:12px; align-items:center; background:var(--line); border:1px solid var(--border); border-radius:10px; padding:8px 10px;}
.line .label{font-size:12px; color:#cbd5e1; flex:1;}
.line .amount{font-variant-numeric: tabular-nums; font-weight:700;}
.total{margin-top:8px; border-top:1px dashed var(--border); padding-top:8px;}
.total .label{font-weight:700; letter-spacing:.2px;}
/* Thème Bleu ciel */
.theme-blue-sky {
  --bg:#e6f4ff; --panel:#ffffff; --border:#90caf9;
  --text:#0d1b2a; --muted:#4a6572; --line:#bbdefb; --chip:#b3e5fc;
}
.theme-blue-sky .item, .theme-blue-sky .card { background:#ffffff; }
.theme-blue-sky header { background:#bbdefb; }

/* Thème Orange chamois */
.theme-orange {
  --bg:#fff3e0; --panel:#ffffff; --border:#ffb74d;
  --text:#3e2723; --muted:#6d4c41; --line:#ffe0b2; --chip:#ffcc80;
}
.theme-orange .item, .theme-orange .card { background:#ffffff; }
.theme-orange header { background:#ffcc80; }

/* Thème Vert émeraude */
.theme-emerald {
  --bg:#e6f9f3; --panel:#ffffff; --border:#66bb6a;
  --text:#0b3d2e; --muted:#33691e; --line:#a5d6a7; --chip:#81c784;
}
.theme-emerald .item, .theme-emerald .card { background:#ffffff; }
.theme-emerald header { background:#a5d6a7; }

/* Light theme form fields contrast */
.theme-light input[type=number], .theme-light select{
  background:#ffffff !important; color:#0b1320 !important; border-color:#cbd5e1 !important;
}
.theme-light header{ background:#ffffffee; }

.hidden{display:none}.retenues{margin-top:8px;display:none}.retenues.open{display:block}

/* Formulaires lisibles pour les thèmes clairs personnalisés */
.theme-blue-sky header input[type=number],
.theme-blue-sky header select,
.theme-blue-sky .panel input[type=number],
.theme-blue-sky .panel select,
.theme-orange  header input[type=number],
.theme-orange  header select,
.theme-orange  .panel input[type=number],
.theme-orange  .panel select,
.theme-emerald header input[type=number],
.theme-emerald header select,
.theme-emerald .panel input[type=number],
.theme-emerald .panel select{
  background:#ffffff !important;
  color:#0b1320 !important;
  border:1px solid #cbd5e1 !important;
  border-radius:10px;
}

/* Ajuste l’en-tête pour plus de contraste */
.theme-blue-sky header{ background:#bbdefb !important; }
.theme-orange  header{ background:#ffcc80 !important; }
.theme-emerald header{ background:#a5d6a7 !important; }

/* Cartes & items sur fond clair (évite le gris sombre hérité) */
.theme-blue-sky .item, .theme-blue-sky .card,
.theme-orange  .item, .theme-orange  .card,
.theme-emerald .item, .theme-emerald .card{
  background:#ffffff !important;
  border-color:#cbd5e1 !important;
}

/* Badges lisibles dans les thèmes clairs */
.theme-blue-sky .badge,
.theme-orange  .badge,
.theme-emerald .badge{
  background:#f1f5f9; color:#0b1320; border:1px solid #cbd5e1;
}

/* Formulaires lisibles pour tous les thèmes clairs personnalisés */
.theme-blue-sky header input[type=number],
.theme-blue-sky header select,
.theme-blue-sky .panel input[type=number],
.theme-blue-sky .panel select,
.theme-blue-sky .controls select,
.theme-orange  header input[type=number],
.theme-orange  header select,
.theme-orange  .panel input[type=number],
.theme-orange  .panel select,
.theme-orange  .controls select,
.theme-emerald header input[type=number],
.theme-emerald header select,
.theme-emerald .panel input[type=number],
.theme-emerald .panel select,
.theme-emerald .controls select{
  background:#ffffff !important;
  color:#0b1320 !important;
  border:1px solid #cbd5e1 !important;
  border-radius:10px;
}

/* Lisibilité des libellés et montants pour les thèmes clairs */
.theme-blue-sky .line .label,
.theme-blue-sky .muted,
.theme-orange .line .label,
.theme-orange .muted,
.theme-emerald .line .label,
.theme-emerald .muted {
  color:#0b1320 !important;
}

/* Les valeurs des montants restent en texte foncé */
.theme-blue-sky .line .amount,
.theme-orange  .line .amount,
.theme-emerald .line .amount {
  color:#0b1320 !important;
  font-weight:700;
}
</style></head>

    <option value="veuf">Veuf(ve)</option>

</span>

<span id="enfants_wrap" class="hidden" style="font-size:12px; color:var(--muted)">

  <select id="nb_enfants" style="margin-left:8px; padding:6px 10px; border-radius:8px; border:1px solid var(--border); background:#0b1220; color:var(--text)">
    <option value="0" selected>0</option>
    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
  </select>
</span>
    </label>

    <label style='font-size:12px; color:var(--muted)'>
      Thème
      <select id='theme_sel' style='margin-left:8px; padding:6px 10px; border-radius:8px; border:1px solid var(--border); background:#0b1220; color:var(--text)'>
        <option value='dark' selected>Bleu sombre</option>
        <option value='light'>Blanc</option>
        <option value='blue-sky'>Bleu ciel</option>
        <option value='orange'>Orange chamois</option>
        <option value='emerald'>Vert émeraude</option>
      </select>
    </label>
  </div>
</header>

<div class='wrap'>

// Fonction pour obtenir le nombre d'enfants pour l'allocation familiale (corrigé)
function getNbEnfantsAlloc() {
    return enfantsAllocSel ? parseInt(enfantsAllocSel.value) || 0 : 0;
}

function getAllocationFamiliale() {
    const nbEnfants = getNbEnfantsAlloc();
    return nbEnfants * 7500; // 7500 FCFA par enfant
}

// Barème ITS SUR 1 PART
function itsOnOnePart(x){
  let imp = 0;
  if (x <= 75000) imp = 0;
  else if (x <= 240000) imp = (x - 75000) * 0.16;
  else if (x <= 800000) imp = (240000 - 75000) * 0.16 + (x - 240000) * 0.21;
  else if (x <= 2400000) imp = (240000 - 75000) * 0.16 + (800000 - 240000) * 0.21 + (x - 800000) * 0.24;
  else if (x <= 8000000) imp = (240000 - 75000) * 0.16 + (800000 - 240000) * 0.21 + (2400000 - 800000) * 0.24 + (x - 2400000) * 0.28;
  else imp = (240000 - 75000) * 0.16 + (800000 - 240000) * 0.21 + (2400000 - 800000) * 0.24 + (8000000 - 2400000) * 0.28 + (x - 8000000) * 0.32;
  return imp; // pas d'arrondi ici
}

/**
 * Réduction RICF selon nombre de parts (situation + enfants)
 */
function reductionRICF(parts){
  const reductions = {
    1: 0,
    1.5: 5500,
    2: 11000,
    2.5: 16500,
    3: 22000,
    3.5: 27500,
    4: 33000,
    4.5: 38500,
    5: 44000
  };
  return reductions[parts] || 0;
}

// NOUVELLE calcITSMonthly avec quotient familial
function calcITSMonthly(indice, vp, situation, enfants, addDiff){
  // SBI officiel: indice * 233.45625 * 1.15 (+100000 si cadre santé)
  let sbi = indice * 233.45625 * 1.15;
  if (addDiff) sbi += 100000;

  // Impôt brut par barème (directement sur SBI)
  const impBrut = itsOnOnePart(sbi);

  // Parts uniquement pour la réduction RICF (crédit fixe)
  let parts = 1;
if (situation === 'marie') parts = 2;
  if (situation === 'marie' && enfants == 1) parts = 2.5;
  if (situation === 'marie' && enfants == 2) parts = 3;
  if (situation === 'marie' && enfants == 3) parts = 3.5;
  if (situation === 'marie' && enfants >= 4) parts = 4;
  if (situation !== 'marie'){
    if (enfants == 1) parts = 1.5;
    if (enfants == 2) parts = 2;
    if (enfants == 3) parts = 2.5;
    if (enfants >= 4) parts = 3.5;
  }

  const ricf = reductionRICF(parts);
  const impNet = Math.max(0, impBrut - ricf);
  return { impot_net: Math.round(impNet) };
}

const getVP = () => Number((vpGlobalInput && vpGlobalInput.value) || 233.457);
const getTransport = () => { const v = (locGlobalSel && locGlobalSel.value) || 'autre'; if (v === 'abidjan') return 20000; if (v === 'chef') return 15000; return 10000; };

function isHigherEdOrResearch(title=''){
  const t = title.toLowerCase();
  return /(assistant de l'enseignement supérieur|assistant de l'enseignement superieur|enseignant du supérieur|enseignant du superieur|université|universite|assistant chef de clinique)/.test(t)
    || /(attaché de recherche|attache de recherche|chargé de recherche|charge de recherche|maître de recherche|maitre de recherche|directeur de recherche)/.test(t);
}
function isHealthCadreSup(title=''){
  const t = title.toLowerCase();
  return /(médecin spécialiste|medecin specialiste|chirurgien-dentiste|chirurgien dentiste|vétérinaire|veterinaire|pharmacien|médecin|medecin)/.test(t);
}
function isAgentSante(title='', grade=''){
  const t = title.toLowerCase(); const g=(grade||'').toLowerCase();
  return ((/(agent d'hygiène|agent d’hygiène|agent d'hygiene)/.test(t) && /(d1|c1)/.test(g))
       || (/(aide soignant)/.test(t) && /c1/.test(g))
       || (/(auxiliaire des soins|auxiliaire des techniques sanitaires)/.test(t) && /c3/.test(g)));
}
function isMaritimeBlock(title='', family=''){
  const t=title.toLowerCase(); const f=(family||'').toLowerCase();
  return /(maritime|port|Douanes|douane|douanes|pénitentiaire|penitentiaire|eaux et forêts|eaux-et-forêts|eaux-et-forets|eaux et forets)/.test(t+' '+f)
      || /(agent servant|chef d'agrès|chef d’agrès|chef d'agres|chef de colonne|chef de garde|chef de site)/.test(t);
}
function isInformatique(title=''){
  const t=title.toLowerCase();
  return /informatique/.test(t) ||
    /(agent technique de l'informatique|technicien de l'informatique|technicien supérieur de l'informatique|ingénieur des techniques informatiques|ingénieur de l'informatique)/.test(t);
}
function isAffairesSocialesFamily(family=''){ return (family||'').toLowerCase().includes('affaires sociales'); }
function hasWordSocial(title=''){ return (title||'').toLowerCase().includes('social'); }

function normalizeGradeCode(fam, jobTitle, gradeCode){
  const t = (jobTitle||'').toLowerCase();
  if (/professeur\s+de\s+collège|professeur\s+de\s+college/.test(t)) return 'A3';
  return gradeCode;
}


function isDirectionJob(title=''){
  const t = (title||'').toLowerCase();
  return /(secrétaire de direction|secretaire de direction|secrétaire assistant de direction bilingue anglais[- ]français|secretaire assistant de direction bilingue anglais[- ]francais|attaché de direction|attache de direction)/.test(t);
}

function pickIndexTable(famName, jobTitle, grade){
  if (isHigherEdOrResearch(jobTitle)) return ENSUP.ENSEIGNEMENT_SUPERIEUR || {};
  if (isHealthCadreSup(jobTitle)) return (SANTE.CADRE_SUPERIEUR_DE_LA_SANTE || {});
  if (isAgentSante(jobTitle, grade)) return (SANTE.AGENTS_DE_SANTE || {});
  if (isAffairesSocialesFamily(famName) && !hasWordSocial(jobTitle)) return EDU;
  if ((famName||'').toLowerCase().includes('éducation') || (famName||'').toLowerCase().includes('education') || jobTitle.toLowerCase().includes('enseign')) return EDU;
  return INTER;
}

function getClassesFor(map, gradeCode){ const entry = map[gradeCode]; if (!entry) return []; return Object.keys(entry); }
function getEchelonsFor(map, gradeCode, cls){ const entry = map[gradeCode]; if (!entry) return []; const obj = entry[cls] || {}; return Object.keys(obj); }
function getIndice(map, gradeCode, cls, ech){ const entry = map[gradeCode]; if(!entry) return null; const obj = entry[cls] || {}; const val = obj[ech]; return (typeof val === 'number') ? val : null; }

function housingFor(grade, jobTitle, famName){
  const title = (jobTitle||''); const fam = (famName||'');
  if (isHealthCadreSup(title) || isHigherEdOrResearch(title)) return 90000;

  if (isMaritimeBlock(title, fam)) {if (grade === 'B3') return 80000; if (grade === 'A3') return 90000; if (['A4','A5','A6','A7'].includes(grade)) return 110000; if(grade === 'C1'||'C3') return 70000 }
  if (['D1','C1','C2','C3','B1','B3','A1','A2','A3'].includes(grade)) return 60000;
  if (grade === 'A4') return 70000;
  if (['A5','A6','A7'].includes(grade)) return 90000;
  return 60000;
}
function maritimeRisk(grade, jobTitle, famName){
  if (!isMaritimeBlock(jobTitle, famName)) return { risk:0, sujet:0 };
  if (grade === 'C1') return { risk:80000, sujet:40000 };
  if (grade === 'C3') return { risk:80000, sujet:40000 };
  if (grade === 'B3') return { risk:90000, sujet:50000 };
  if (grade === 'A3') return { risk:100000, sujet:60000 };
  if (['A4','A5','A6','A7'].includes(grade)) return { risk:125000, sujet:75000 };
  return { risk:0, sujet:0 };
}
function informaticienSpec(jobTitle){
  const t = (jobTitle||'').toLowerCase();
  if (!isInformatique(t)) return 0;
  if (/agent technique de l'informatique/.test(t)) return 15000;
  if (/technicien supérieur de l'informatique/.test(t)) return 55000;
  if (/technicien de l'informatique/.test(t)) return 25000;
  if (/ingénieur des techniques informatiques/.test(t)) return 75000;
  if (/ingénieur de l'informatique/.test(t)) return 95000;
  return 0;
}
function higherEdPrimes(jobTitle, gradeCode){
  if (!isHigherEdOrResearch(jobTitle)) return { acad:0, encad:0 };
  const t = jobTitle.toLowerCase();
  const enc = (gradeCode==='A4'||gradeCode==='A5')?50000:(gradeCode==='A6'?100000:(gradeCode==='A7'?125000:0));
  if (/(assistant|attaché de recherche|assistant chef de clinique)/.test(t)) return { acad:125000, encad:enc };
  if (/(maître assistant|maitre assistant|chargé de recherche|charge de recherche)/.test(t)) return { acad:125000, encad:enc };
  if (/(maître de conférences|maitre de conferences|maître de recherche|maitre de recherche)/.test(t)) return { acad:125000, encad:enc };
  if (/(professeur titulaire|directeur de recherche)/.test(t)) return { acad:125000, encad:enc };
  return { acad:125000, encad:0 };
}

function higherEdAnnualPrime(jobTitle, gradeCode){
  if (!isHigherEdOrResearch(jobTitle)) return 0;
  if (gradeCode==='A7') return 2500000;
  if (gradeCode==='A6') return 2500000;
  if (gradeCode==='A5') return 2200000;
  if (gradeCode==='A4') return 2000000;
  return 0;
}

function santePrimes(grade, jobTitle){
  const t = (jobTitle||'').toLowerCase();
  const isHealth = isHealthCadreSup(t) || isAgentSante(t, grade);
  if (!isHealth) return { diff:0, risque:0, para:0, special:0 };
  const base = { diff:100000, risque:50000, para:50000 };
  let special = 0;
  if (/médecin spécialiste|medecin specialiste/.test(t)){
    if (grade === 'A4') special = 150000;
    else if (grade === 'A5') special = 200000;
    else if (grade === 'A6') special = 250000;
    else if (grade === 'A7') special = 300000;
  }
  return Object.assign({}, base, { special });
}

const familiesDiv = document.getElementById('families');
const content = document.getElementById('content');

function renderFamilies(){
  familiesDiv.innerHTML = "";
  (DATA.familles||[]).forEach(f=>{
    const el = document.createElement('div');
    el.className = 'item';
    el.innerHTML = "<div class='title'>"+f.nom+"</div><div class='muted'>"+((f.grades||[]).length)+" grade(s)</div>";
    el.addEventListener('click', ()=> renderGrades(f));
    familiesDiv.appendChild(el);

}

function renderGrades(fam){
  content.className = '';
  content.innerHTML = "<h2 style='margin:0 0 8px 0'>"+fam.nom+"</h2>    <div class='muted'>Grades</div>    <div class='chips' id='grades'></div>    <div style='margin-top:12px' id='jobs'></div>";
  const grades = document.getElementById('grades');
  
  const ORDER = ['A7','A6','A5','A4','A3','B3','B2','B1','C3','C2','C1','D2','D1'];
  const sorted = (fam.grades||[]).slice().sort((g1,g2)=>{
    const i1 = ORDER.indexOf(g1.code); const i2 = ORDER.indexOf(g2.code);
    return (i1===-1?999:i1) - (i2===-1?999:i2);
  });
  sorted.forEach(g=>{
    const b = document.createElement('button');
    b.className = 'badge button';
    b.textContent = "Grade "+g.code;
    b.addEventListener('click', ()=> renderJobs(fam, g));
    grades.appendChild(b);
  });
}


function renderJobs(fam, grade){
  const jobsDiv = document.getElementById('jobs');
  jobsDiv.innerHTML = "<h3>Emplois — <span class='badge'>Grade <strong>"+grade.code+"</strong></span></h3>\
                      <div class='grid' id='grid'></div>";
  const grid = document.getElementById('grid');
  const pairs = [];
  (fam.grades||[]).forEach(g=>{
    (g.emplois||[]).forEach(name=> pairs.push({code:g.code, name}));
  });
  const list = pairs.filter(p => normalizeGradeCode(fam.nom, p.name, p.code) === grade.code);
  const seen = new Set();
  list.forEach(p=>{
    if (seen.has(p.name)) return; seen.add(p.name);
    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-emploi', p.name);
    card.setAttribute('data-grade', grade.code);
    card.setAttribute('data-famille', fam.nom);
    card.innerHTML = "<h3>"+p.name+"</h3>";
    grid.appendChild(card);
    buildCard(card, fam, grade);
  });
}

function buildCard(card, fam, grade){
  const jobTitle = card.getAttribute('data-emploi');
  const gradeCode = card.getAttribute('data-grade');
  const famName = card.getAttribute('data-famille');

  const map = pickIndexTable(famName, jobTitle, gradeCode);
  const classes = getClassesFor(map, gradeCode);
  const selCls = document.createElement('select');
  classes.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; selCls.appendChild(o); });

  const selEch = document.createElement('select');
  const firstEchs = getEchelonsFor(map, gradeCode, classes[0]||'');
  firstEchs.forEach(e=>{ const o=document.createElement('option'); o.value=e; o.textContent=e; selEch.appendChild(o); });

  const ctrls = document.createElement('div');
  ctrls.className = 'controls';
  const w1 = document.createElement('div'); w1.innerHTML = "<label>Classe</label>"; w1.appendChild(selCls);
  const w2 = document.createElement('div'); w2.innerHTML = "<label>Échelon</label>"; w2.appendChild(selEch);
  ctrls.appendChild(w1); ctrls.appendChild(w2);

  const rows = document.createElement('div');
  rows.className = 'rows';

  function addLine(label, amount, raw=false, key=null){
    const line = document.createElement('div');
    line.className = 'line';
    const l = document.createElement('div'); l.className='label'; l.textContent = label;
    const a = document.createElement('div'); a.className='amount'; a.textContent = raw ? fmtRaw(amount) : fmtMoney(amount);
    if (key) line.setAttribute('data-key', key);
    line.appendChild(l); line.appendChild(a);
    rows.appendChild(line);
  }

  const totalBox = document.createElement('div');
  totalBox.className = 'rows total';

  card.appendChild(ctrls);
  card.appendChild(rows);
  card.appendChild(totalBox);
  const btn = document.createElement('button'); btn.textContent='Voir retenues'; btn.className='badge button toggle hidden'; btn.style.marginTop='8px';
  const retenues = document.createElement('div'); retenues.className='retenues';
  card.appendChild(btn); card.appendChild(retenues);
  btn.addEventListener('click', ()=> retenues.classList.toggle('open'));
  try { onModeChange(); } catch(e){}

function recalc(){
  // 1) Sync échelons quand la classe change
  const echs = getEchelonsFor(map, gradeCode, selCls.value);
  if (selEch.options.length !== echs.length){
    selEch.innerHTML = '';
    echs.forEach(e=>{
      const o=document.createElement('option');
      o.value=e; o.textContent=e;
      selEch.appendChild(o);
    });
  }

  // 2) Calculs de base
  const indice = getIndice(map, gradeCode, selCls.value, selEch.value);
  const vp = getVP();
  const base = (indice!=null && vp>0) ? indice*vp : 0;

  const residence = base*0.15;
  const transport = getTransport();
  const logement  = housingFor(gradeCode, jobTitle, famName);

  const sante     = santePrimes(gradeCode, jobTitle);
  const mar       = maritimeRisk(gradeCode, jobTitle, famName);
  const infoSpec  = informaticienSpec(jobTitle);
  const infoQual  = isInformatique(jobTitle) ? base*0.30 : 0;
  const sup       = higherEdPrimes(jobTitle, gradeCode);
  const dir       = isDirectionJob(jobTitle) ? 20000 : 0;
  
    // Ajouter l'allocation familiale
  const allocFamiliale = getAllocationFamiliale();

  const totalBrut = base + residence + transport + logement
                  + sante.diff + sante.risque + sante.para + sante.special
                  + mar.risk + mar.sujet
                  + infoSpec + infoQual
                  + sup.acad + sup.encad
                  + dir + allocFamiliale;

  const annual = higherEdAnnualPrime(jobTitle, gradeCode);

  // 3) (Re)peindre les lignes
  rows.innerHTML = "";
  addLine('Indice', (indice ?? '—'), true);
  addLine('Salaire de base', base, false, 'salaire-base');
  addLine('Indemnité de résidence', residence);
    // Ajouter une ligne pour l'allocation familiale
  if (allocFamiliale > 0) {
    addLine('Allocation familiale', allocFamiliale);
  }
  addLine('Prime de transport', transport);
  addLine('Indemnité de logement', logement);

  if (sante.diff || sante.risque || sante.para || sante.special){
    addLine('Différentiel santé', sante.diff);
    addLine('Risque sanitaire', sante.risque);
    addLine('Paramédical', sante.para);
    if (sante.special) addLine('Spécialité', sante.special);
  }
  if (mar.risk || mar.sujet){
    addLine('Indemnité de risque', mar.risk);
    addLine('Indemnité de sujétion', mar.sujet);
  }
  if (isInformatique(jobTitle)){
    addLine('Indemnité spécifique', infoSpec);
    addLine('Prime de qualité', infoQual);
  }
  if (isHigherEdOrResearch(jobTitle)){
    addLine('Prime académique', sup.acad);
    addLine('Prime d’encadrement', sup.encad);
  }
  if (dir){
    addLine('Indemnité de direction', dir);
  }

  // 4) Totaux (toujours régénérés)
  totalBox.innerHTML = "";
  const tot = document.createElement('div'); tot.className='line';
  const l = document.createElement('div'); l.className='label'; l.textContent = 'TOTAL BRUT ESTIMÉ';
  const a = document.createElement('div'); a.className='amount'; a.textContent = fmtMoney(totalBrut);
  tot.appendChild(l); tot.appendChild(a);
  totalBox.appendChild(tot);

  // Afficher la prime annuelle si présente (note: non incluse dans le total)
  if (annual){
    const aL=document.createElement('div'); aL.className='line';
    const l2=document.createElement('div'); l2.className='label'; l2.textContent='Prime annuelle (non incluse)';
    const a2=document.createElement('div'); a2.className='amount'; a2.textContent=fmtMoney(annual);
    aL.appendChild(l2); aL.appendChild(a2);
    totalBox.appendChild(aL);
  }

  // 5) Mode NET : retenues + SALAIRE NET (unique)
  if (typeof isNetMode==='function' && isNetMode()){
    btn.classList.remove('hidden');

    // Calcul ITS + retenues
    const itsObj = calcITSMonthly
      ? calcITSMonthly(indice, vp, (statutSel&&statutSel.value)||'celibataire', (enfantsSel&&enfantsSel.value)||0, isHealthCadreSup(jobTitle))
      : {impot_net:0};
    const mugefci = (Number(indice||0) < 1000) ? (base*0.03) : 7004;
    const pension = base * 0.0833;
    const pensionCompl = base * 0.05;
    const totalRetenues = (itsObj.impot_net||0) + mugefci + pension + pensionCompl;
    const net = totalBrut - totalRetenues;

    // (Re)peindre le panneau des retenues
    retenues.innerHTML = '';
    const make = (lab, val)=>{
      const d=document.createElement('div'); d.className='line';
      const ll=document.createElement('div'); ll.className='label'; ll.textContent=lab;
      const aa=document.createElement('div'); aa.className='amount'; aa.textContent=fmtMoney(val);
      d.appendChild(ll); d.appendChild(aa); retenues.appendChild(d);
    };
    make('ITS (mensuel)', itsObj.impot_net||0);
    make('MUGEFCI', mugefci);
    make('Retenue pension', pension);
    make('Pension complémentaire', pensionCompl);
    make('Total retenues', totalRetenues);

    // 🔧 Anti-doublon : retirer toute ancienne ligne "SALAIRE NET"
    totalBox.querySelectorAll('.line').forEach(n=>{
      const lab = n.querySelector && n.querySelector('.label');
      if(lab && lab.textContent.trim().toUpperCase() === 'SALAIRE NET'){ n.remove(); }
    });

    // Ajouter "SALAIRE NET" après le total brut (dans totalBox)
    const netLine = document.createElement('div'); netLine.className='line';
    const nlab = document.createElement('div'); nlab.className='label'; nlab.textContent='SALAIRE NET';
    const namt = document.createElement('div');  namt.className='amount'; namt.textContent=fmtMoney(net);
    netLine.appendChild(nlab); netLine.appendChild(namt);
    totalBox.appendChild(netLine);

  } else {
    // Mode BRUT : masquer le panneau + retirer les éventuelles lignes "SALAIRE NET"
    btn.classList.add('hidden');
    retenues.classList.remove('open');
    retenues.innerHTML='';
    totalBox.querySelectorAll('.line').forEach(n=>{
      const lab = n.querySelector && n.querySelector('.label');
      if(lab && lab.textContent.trim().toUpperCase() === 'SALAIRE NET'){ n.remove(); }
    });
  }
}

  selCls.addEventListener('change', recalc);
  selEch.addEventListener('change', recalc);
  (vpGlobalInput||{}).addEventListener?.('input', recalc);
  (locGlobalSel||{}).addEventListener?.('change', recalc);
  (enfantsAllocSel||{}).addEventListener?.('change', recalc);

  recalc();
}

renderFamilies();
const refreshAll = ()=>{
  document.querySelectorAll('[data-emploi][data-grade]').forEach(c=>{
    const sel = c.querySelector('.controls select'); if (sel) sel.dispatchEvent(new Event('change'));
  });
};
(document.getElementById('vp_global')||{}).addEventListener?.('input', refreshAll);
(document.getElementById('loc_global')||{}).addEventListener?.('change', refreshAll);
</script>
