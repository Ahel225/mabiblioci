      title: "LIVRE 2: HABITATION DE L'IMMEUBLE",
      articles: []
    },
    {
      title: "TITRE I: MODE D'HABITATION",
      articles: []
    },
    {
      title: "Sous-titre 1: Copropriété",
      articles: [
        {
          id: "article379",
          title: "Article 379",
          content: "<p>Le présent sous-titre est applicable à la propriété des immeubles bâtis divisés par appartements, étages ou locaux dont la propriété appartenant à plusieurs personnes est repartie par lots comprenant chacun une partie privative et une quote-part des parties communes.</p><p>Il est applicable aux ensembles immobiliers bâtis verticaux ou horizontaux et aux différentes résidences constituées d'habitations contiguës ou séparées ayant des parties communes appartenant dans l'indivision à l'ensemble des copropriétaires.</p><p>Les présentes dispositions s'appliquent aux immeubles immatriculés.</p><p>Des périmètres d'habitations auquel il sera appliqué certaines dispositions de la copropriété sont déterminés par voie règlementaire.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 1: Le syndicat des copropriétaires",
      articles: [
        {
          id: "article380",
          title: "Article 380",
          content: "<p>Tous les copropriétaires d'un immeuble divisé par appartements, étages ou locaux, d'ensembles d'immeubles verticaux ou horizontaux, de résidences constituées d'habitations contiguës ou séparées, ayant des parties communes appartenant dans l'indivision à l'ensemble des copropriétaires, se trouvent de plein droit groupés dans un syndicat représentant l'ensemble des copropriétaires.</p><p>Toutes les parcelles relevant des parties communes sont la propriété exclusive des copropriétaires représentés par le syndicat des copropriétaires.</p>"
        },
        {
          id: "article381",
          title: "Article 381",
          content: "<p>Dans le cas des ensembles d'immeubles mentionnés à l'alinéa 4 de l' article 379 du présent de Code, le ministère en charge du logement veille à la mise en place de syndicats de copropriétaires dans les périmètres préalablement déterminés.</p>"
        },
        {
          id: "article382",
          title: "Article 382",
          content: "<p>Le syndicat a pour mission la conservation de l'immeuble et l'administration des parties communes.</p><p>A ce titre, il prend l'initiative de toutes actions relatives aux parties communes susceptibles de concourir à l'obtention d'un bon cadre de vie.</p><p>Il s'agit notamment :</p><ul><li>du ravalement des façades et des autres murs de toutes les parties communes;</li><li>de la préservation des réseaux d'assainissement, d'adduction d'eau et du drainage;</li><li>de l'entretien des espaces verts;</li><li>de la mise en œuvre des mesures de sécurité de pointe;</li><li>du ramassage des ordures;</li><li>de l'éclairage public et des escaliers des immeubles collectifs ;</li><li>de l'entretien des ascenseurs;</li><li>du respect des normes d'urbanisme;</li><li>du respect des règles de bon voisinage;</li><li>de l'observation des règles d'hygiènes de salubrité.</li></ul><p>Les modalités d'application de cet article sont précisées par voie règlementaire.</p>"
        },
        {
          id: "article383",
          title: "Article 383",
          content: "<p>Sont définies comme parties communes des immeubles, les parties bâties ou non bâties destinées à l'usage et à la jouissance de l'ensemble des copropriétaires ou de certains d'entre eux, notamment:</p><ul><li>le sol;</li><li>les gros œuvres de l'immeuble, les fondations, les murs porteurs et les caves quelle que soit leur profondeur;</li><li>la façade de l'immeuble;</li><li>les toits destinés à l'usage commun;</li><li>les escaliers, les passages et les corridors destinés à l'usage commun;</li><li>les loges des gardiens et des concierges;</li><li>les entrées, les sous-sols et les ascenseurs destinés à l'usage commun;</li><li>les murs et cloisons séparant deux appartements ou locaux;</li><li>les équipements communs, y compris les parties y afférentes qui traversent les parties privatives;</li><li>les coffres, les têtes de cheminée et les bouches d'aération destinés à l'usage commun.</li></ul>"
        },
        {
          id: "article384",
          title: "Article 384",
          content: "<p>Sont considérées également comme parties communes, sauf stipulations contraires dans les titres de propriété ou en cas de contradiction entre ces titres:</p><ul><li>les toitures et les balcons non affectés initialement à l'usage individuel;</li><li>les cours et les jardins;</li><li>les locaux destinés à l'usage commun.</li></ul><p>D'une manière générale, toute partie considérée comme telle ou toute partie que la nature de l'immeuble exige qu'elle soit destinée à un usage commun.</p>"
        },
        {
          id: "article385",
          title: "Article 385",
          content: "<p>Sont considérés comme droits accessoires aux parties communes, sous réserve de l'accord de l'Assemblée générale et de l'autorisation du ministre chargé de l'Urbanisme :</p><ul><li>le droit de surélévation de l'immeuble;</li><li>le droit d'édifier de nouvelles constructions dans les cours ou dans les jardins et dans leurs sous-sols;</li><li>le droit d'excavation.</li></ul>"
        }
      ]
    },
    {
      title: "CHAPITRE 2: les organes de la copropriété",
      articles: [
        {
          id: "article386",
          title: "Article 386",
          content: "<p>La copropriété comprend trois organes que sont :</p><ul><li>l'assemblée générale;</li><li>le conseil syndical;</li><li>le syndic.</li></ul>"
        }
      ]
    },
    {
      title: "Section 1: L'Assemblée générale",
      articles: [
        {
          id: "article387",
          title: "Article 387",
          content: "<p>L'Assemblée générale des copropriétaires prend les décisions relatives à l'administration et à la gestion de l'ensemble immobilier notamment:</p><ul><li>l'adoption du règlement de copropriété, les modifications dans la classification en choses et parties communes d'une part et en parties privatives d'autre part, toutes modifications, suppressions, adjonctions aux statuts et au règlement intérieur;</li><li>la destruction de l'immeuble;</li><li>les décisions relatives aux parties communes;</li><li>la détermination des charges de copropriété;</li><li>les modifications à apporter dans la liste ou la modification des charges communes;</li><li>la désignation des membres du conseil syndical;</li><li>la désignation du syndic;</li><li>la destitution du syndic;</li><li>la fixation des cotisations mensuelles ordinaires;</li><li>la fixation des cotisations spéciales pour les grosses réparations;</li><li>l'emploi des ressources du syndicat;</li><li>la fixation du salaire du syndic;</li><li>les différentes commissions et appuis divers.</li></ul><p>Ses décisions s'imposent à tous les copropriétaires ainsi qu'à tout attributaire de lot en jouissance.</p>"
        },
        {
          id: "article388",
          title: "Article 388",
          content: "<p>L'assemblée générale des copropriétaires se réunit sur convocation du conseil syndical.</p>"
        },
        {
          id: "article389",
          title: "Article 389",
          content: "<p>Les décisions prises en dehors des attributions ou des actions du syndicat des copropriétaires, sont nulles et de nuls effets. Elles exposent le syndic et le conseil syndical à des poursuites judiciaires.</p>"
        },
        {
          id: "article390",
          title: "Article 390",
          content: "<p>Tout copropriétaire d'un syndicat des copropriétaires dispose d'un droit de consultation de toute pièce comptable, de quittances ainsi que d'un droit à la communication de toute information par lui sollicitée.</p>"
        },
        {
          id: "article391",
          title: "Article 391",
          content: "<p>Section 2: Le conseil syndical</p>"
        }
      ]
    },
    {
      title: "Section 2: Le conseil syndical",
      articles: [
        {
          id: "article392",
          title: "Article 392",
          content: "<p>Le conseil syndical est constitué d'au moins trois copropriétaires à jour de leurs cotisations, désignés par l'assemblée générale, pour une durée qu'elle détermine.</p><p>La copie du procès-verbal désignant les membres du conseil syndical est transmise au ministre en charge du Logement et à la mairie de la commune.</p>"
        },
        {
          id: "article393",
          title: "Article 393",
          content: "<p>Le conseil syndical assiste le syndic et contrôle sa gestion. Il fait office de commissaire aux Comptes du syndicat des copropriétaires. Il est également chargé de suppléer le syndic en cas de démission, de décès, d'incapacité, de carence ou d'indisponibilité jusqu'à la désignation d'un nouveau syndic.</p>"
        }
      ]
    },
    {
      title: "Section 3: Le syndic",
      articles: [
        {
          id: "article394",
          title: "Article 394",
          content: "<p>Le syndic représente le syndicat des copropriétaires. Il agit en son nom et pour son compte dans le cadre de toutes les obligations que nécessite la copropriété.</p>"
        },
        {
          id: "article395",
          title: "Article 395",
          content: "<p>Le syndic est chargé :</p><ul><li>d'assurer le secrétariat de l'assemblée générale;</li><li>de donner copie du règlement de copropriété à tous les copropriétaires et à tous les locataires et de veiller au respect et à l'application dudit règlement;</li><li>d'assurer la conservation, la garde et l'entretien ainsi que la réparation de toutes les parties communes;</li><li>d'établir le budget et de tenir la comptabilité du syndicat sous le contrôle du conseil syndical;</li><li>d'engager le personnel nécessaire pour l'exécution des travaux sur avis du conseil syndical;</li><li>de la mise en œuvre des décisions de l'assemblée générale des copropriétaires;</li><li>de faire observer les règles de la copropriété;</li><li>de représenter le syndicat en justice tant en qualité de demandeur que de défendeur, même, au besoin contre certains copropriétaires.</li></ul>"
        },
        {
          id: "article396",
          title: "Article 396",
          content: "<p>Le syndic est désigné par l'assemblée générale du syndicat des copropriétaires sur la liste des syndics agréés par le ministre chargé du Logement.</p><p>La désignation du syndic est entérinée par un arrêté du ministre chargé du Logement.</p>"
        },
        {
          id: "article397",
          title: "Article 397",
          content: "<p>Les montants des cotisations des syndicats des copropriétaires, déduction faite des 30% maximum affectés à la rémunération du syndic, aux commissions et appuis divers prévus à l'article 387 ne peuvent être employés que dans le cadre des exigences de la copropriété.</p>"
        },
        {
          id: "article398",
          title: "Article 398",
          content: "<p>Les conditions d'accès à la profession de syndic sont fixées par voie règlementaire.</p>"
        },
        {
          id: "article399",
          title: "Article 399",
          content: "<p>Le syndic ne peut contracter, en cette qualité et en raison de l'exercice de ses fonctions, aucune obligation personnelle.</p><p>Le syndic engage sa responsabilité vis-à-vis du conseil syndical lorsqu'il excède ses pouvoirs, se rend coupable de faits de mauvaise gestion ou d'actes frauduleux constatés par une décision de justice devenue définitive.</p><p>Dans ces cas, son agrément lui est retiré et il est passible de poursuites pénales.</p>"
        },
        {
          id: "article400",
          title: "Article 400",
          content: "<p>Le syndic peut être démis de ses fonctions pour motif légitime par l'assemblée générale statuant à la majorité des membres présents.</p>"
        },
        {
          id: "article401",
          title: "Article 401",
          content: "<p>Le motif légitime peut être tiré d'une négligence, d'une omission, de l'inexécution d'une obligation, d'une fraude prouvée et de tout autre fait du syndic contraire à sa mission ou aux intérêts des copropriétaires.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 3: Les cotisations des copropriétaires",
      articles: [
        {
          id: "article402",
          title: "Article 402",
          content: "<p>Le taux de cotisations mensuelles des copropriétaires est déterminé par l'assemblée générale.</p>"
        },
        {
          id: "article403",
          title: "Article 403",
          content: "<p>Les copropriétaires sont tenus du paiement des charges mensuelles de copropriété. Toutefois, le montant de la cotisation peut être prélevé sur les locataires, à charge pour ceux-ci de compenser ledit montant sur le loyer au cas où le contrat de bail ne les oblige pas à payer lesdites cotisations.</p><p>Certaines charges liées à l'usage du local incombent aux locataires. Le contenu de ces différentes charges est précisé par voie règlementaire.</p>"
        },
        {
          id: "article404",
          title: "Article 404",
          content: "<p>Le recouvrement se fera soit par le syndic soit par un cabinet de recouvrement désigné par l'assemblée générale.</p><p>En cas de non-paiement des charges de copropriété, le syndic va adresser une lettre de relance au copropriétaire défaillant. S'il ne s'exécute pas, le syndic va intenter une action en recouvrement forcé de la créance.</p>"
        },
        {
          id: "article405",
          title: "Article 405",
          content: "<p>L'emploi des cotisations à des activités sociales ou contraires aux nécessités de la copropriété est formellement interdit. Il entraîne le retrait des agréments du syndic, sans préjudice des poursuites pénales contre les auteurs.</p>"
        },
        {
          id: "article406",
          title: "Article 406",
          content: "<p>Le syndic ou le conseil syndical est tenu de procéder à l'ouverture d'un compte bancaire séparé.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 4: L'arbitrage",
      articles: [
        {
          id: "article407",
          title: "Article 407",
          content: "<p>Les difficultés de toute nature, susceptibles de naître entre copropriétaires et syndicat relativement à la jouissance et à l'administration des parties communes de l'ensemble immobilier et aux conditions de jouissance des parties privatives, peuvent être soumises à l'arbitrage du ministère en charge de la Construction et du Logement dans un délai de 45 jours à compter de la demande.</p>"
        }
      ]
    },
    {
      title: "Sous-titre 2: Bail à usage d'habitation",
      articles: []
    },
    {
      title: "CHAPITRE 1: Dispositions générales",
      articles: [
        {
          id: "article408",
          title: "Article 408",
          content: "<p>Le bail à usage d'habitation est régi par les dispositions du Code civil, sous réserve des règles spéciales prévues par le présent sous-titre.</p>"
        },
        {
          id: "article409",
          title: "Article 409",
          content: "<p>Les dispositions du présent sous-titre régissent la location des immeubles ou locaux à usage d'habitation par des personnes physiques ou morales.</p>"
        },
        {
          id: "article410",
          title: "Article 410",
          content: "<p>Elle ne s'applique pas :</p><ul><li>aux immeubles ou locaux affectés à un usage commercial, administratif, industriel, agricole ou artisanal;</li><li>aux immeubles affectés à l'exercice d'une profession libérale, sauf si les parties en décident autrement dans leur convention;</li><li>aux chambres d'hôtel;</li><li>aux logements meublés ou non-meublés dans des structures d'hébergement spéciales telles que maisons de retraite, centres intégrés pour personnes âgées, centres de gériatrie, centres pour personnes handicapées.</li></ul>"
        }
      ]
    },
    {
      title: "CHAPITRE 2: Principes fondamentaux du bail",
      articles: [
        {
          id: "article411",
          title: "Article 411",
          content: "<p>Le bail est libre. Nul ne peut être contraint au bail.</p>"
        },
        {
          id: "article412",
          title: "Article 412",
          content: "<p>Le contrat de bail à usage d'habitation est un contrat intuitu personae.</p><p>Sauf dispositions légales l'y autorisant ou autorisation expresse du bailleur, le locataire ne peut céder son bail ni sous-louer ou laisser à la disposition de tiers, même à titre gratuit, les locaux loués.</p><p>Toutefois, les dispositions de l'alinéa précédent ne sont pas applicables aux ascendants et descendants directs du locataire, lorsque ce dernier continue d'honorer ses obligations contractuelles à l'égard du bailleur.</p>"
        },
        {
          id: "article413",
          title: "Article 413",
          content: "<p>Les dispositions du présent sous-titre s'appliquent aux relations entre bailleur, locataire et sous-locataire ou cessionnaire d'un bail à usage d'habitation.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 3: Conclusion du contrat de bail à usage d'habitation et fixation du loyer",
      articles: []
    },
    {
      title: "Section 1: Conclusion du contrat de bail à usage d'habitation",
      articles: [
        {
          id: "article414",
          title: "Article 414",
          content: "<p>Le contrat de bail à usage d'habitation est écrit. Il peut être conclu à durée déterminée ou à durée indéterminée.</p><p>Le contrat de bail à usage d'habitation fait obligatoirement l'objet d'enregistrement auprès de l'administration fiscale.</p><p>Le contrat de bail à usage d'habitation est enregistré conformément aux conditions et modalités prévues par le Code général des Impôts.</p><p>Le bailleur ou son représentant remet au locataire, dans le délai de trente jours calendaires, après l'accomplissement des formalités requises, un exemplaire de l'acte d'enregistrement du contrat de bail à usage d'habitation délivré par l'administration fiscale.</p>"
        },
        {
          id: "article415",
          title: "Article 415",
          content: "<p>La conclusion du contrat de bail à usage d'habitation ne peut être liée au paiement de sommes autres que celles prévues par le présent sous-titre.</p><p>Le bailleur ne peut exiger le paiement de plus de deux mois de loyers d'avance au candidat à la location, lors de la conclusion du contrat de bail à usage d'habitation.</p><p>Tout paiement de loyer d'avance autre que celui prévu par la présente loi doit faire l'objet d'une déclaration à l'Administration fiscale. La violation de cette disposition constitue une infraction fiscale telle que prévue par le Livre de Procédure fiscale.</p>"
        },
        {
          id: "article416",
          title: "Article 416",
          content: "<p>Le contrat de location peut prévoir un dépôt de garantie à la charge du locataire qui ne peut excéder deux mois de loyer pour garantir l'exécution de ses obligations en fin de contrat notamment les dégradations, les impayés ainsi que les divers manquements qui pourraient survenir de son fait.</p><p>En cas de stipulation d'une garantie locative, un état des lieux écrit et contradictoire doit être signé entre les parties, au plus tard le jour de l'entrée en jouissance des lieux par le locataire et, également, le dernier jour de location, en fin de contrat de bail à usage d'habitation.</p><p>Un état des lieux contradictoire intermédiaire pourra être réalisé en cours d'exécution du contrat, afin de permettre au bailleur de s'assurer que le locataire jouit des lieux en bon père de famille. Dans le cas contraire, le bailleur pourra mettre le locataire en demeure de procéder aux réparations que le dépôt de garantie ne pourrait couvrir.</p><p>Le dépôt de garantie n'est pas productif d'intérêt.</p><p>Cette garantie locative est remboursée au preneur dans un délai d'un mois à compter de la restitution des clés, déduction faite, le cas échéant, des sommes restant dues au bailleur et des sommes dont celui-ci pourrait être tenu, sous réserve qu'elles soient dûment justifiées.</p><p>En cas de transfert de propriété à titre gratuit ou onéreux des locaux loués, la restitution du dépôt de garantie incombe au nouveau bailleur.</p><p>En cas d'insuffisance de dépôt de garantie pour compenser les frais de réparations et les dépenses effectuées par le bailleur, celui-ci dispose d'une action en responsabilité contre le locataire.</p>"
        },
        {
          id: "article417",
          title: "Article 417",
          content: "<p>Le bailleur ne peut mettre à la charge du locataire des montants déboursés par lui-même pour l'aménagement de l'immeuble ou du local à usage d'habitation, en vue de sa location.</p><p>Ne peuvent être mis à la charge du locataire que les frais exposés pour sa propre consommation d'énergie, d'eau, de gaz ou pour l'entretien courant du logement et des parties communes, pour les menues réparations ainsi que les taxes liées à l'usage du logement.</p><p>Lorsque les charges locatives sont incorporées au loyer, le locataire doit être clairement informé du montant détaillé et total desdites charges locatives.</p><p>En cas de demande du locataire, le bailleur est tenu de lui communiquer une copie des extraits du règlement de copropriété concernant la destination de l'immeuble, la jouissance et l'usage des parties privatives et communes et précisant la quote-part afférente du lot loué pour chacune des catégories de charges.</p>"
        },
        {
          id: "article418",
          title: "Article 418",
          content: "<p>La conclusion d'un contrat de bail à usage d'habitation portant sur un immeuble ou local indivis sans le consentement de tous les co-indivisaires est nulle, sauf autorisation de la juridiction compétente.</p><p>L'action en nullité appartient à tout co-indivisaire qui n'a pas donné son consentement à la location ou à leurs ayants droit.</p>"
        },
        {
          id: "article419",
          title: "Article 419",
          content: "<p>Le recours à une agence immobilière, en vue de la conclusion d'un contrat de bail à usage d'habitation, est facultatif.</p><p>L'exercice de la profession d'agence immobilière ou de courtier en immobilier dans la conclusion du bail à usage d'habitation est soumis à agrément ou à autorisation conformément aux dispositions du présent Code.</p>"
        },
        {
          id: "article420",
          title: "Article 420",
          content: "<p>Toutes stipulations du contrat de bail destinées à priver d'effet une disposition impérative du présent sous-titre sont nulles de plein droit.</p>"
        }
      ]
    },
    {
      title: "Section 2: Du loyer",
      articles: [
        {
          id: "article421",
          title: "Article 421",
          content: "<p>Le montant du loyer est fixé en tenant compte de la valeur du marché de l'immeuble ou du local.</p>"
        },
        {
          id: "article422",
          title: "Article 422",
          content: "<p>Le loyer est payé mensuellement à une date indiquée dans le contrat de bail.</p>"
        },
        {
          id: "article423",
          title: "Article 423",
          content: "<p>Le loyer peut être révisé à la hausse ou à la baisse, tous les trois ans.</p><p>Les litiges relatifs à la révision du loyer peuvent être portés devant la juridiction compétente, conformément aux dispositions du présent sous-titre.</p>"
        },
        {
          id: "article424",
          title: "Article 424",
          content: "<p>La partie qui sollicite une augmentation ou une réduction du loyer doit préalablement notifier son intention à l'autre partie par tout moyen, au moins trois mois avant la date d'effet de ladite augmentation et après la troisième année de la conclusion du contrat de bail ou de la précédente augmentation, sous peine de nullité de la clause contractuelle consacrant ladite augmentation.</p>"
        },
        {
          id: "article425",
          title: "Article 425",
          content: "<p>Le bailleur est tenu de délivrer une quittance au locataire pour faire la preuve du paiement du loyer.</p><p>En cas de non-respect de l'obligation de délivrance de quittance de paiement de loyer par le bailleur, le locataire pourra faire la preuve du paiement du loyer par tous moyens.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 4: obligations des parties",
      articles: []
    },
    {
      title: "Section 1: Obligations du bailleur",
      articles: [
        {
          id: "article426",
          title: "Article 426",
          content: "<p>Le bailleur est obligé, sans qu'il soit besoin d'aucune stipulation particulière:</p><ul><li>de délivrer au locataire l'immeuble ou le local à usage d'habitation loué;</li><li>d'entretenir l'immeuble ou le local à usage d'habitation en état de servir à l'usage pour lequel il a été loué;</li><li>d'en faire jouir paisiblement le locataire pendant la durée du bail.</li></ul>"
        },
        {
          id: "article427",
          title: "Article 427",
          content: "<p>Le bailleur est tenu de délivrer l'immeuble ou le local à usage d'habitation en bon état de réparation de toute espèce.</p><p>Le bailleur est tenu de faire un état des lieux contradictoire de l'immeuble ou du local à usage d'habitation loué en présence du locataire ou de son représentant dûment mandaté, en début de bail.</p><p>Un état des lieux contradictoire, en présence des parties, est également fait par les parties ou leurs représentants dûment mandatés, en fin de bail.</p>"
        },
        {
          id: "article428",
          title: "Article 428",
          content: "<p>Le bailleur est tenu de remettre au locataire un logement décent ne comportant aucun risque d'atteinte à la sécurité physique, à la santé ou aux biens du locataire et de tout occupant de son chef.</p><p>Le logement donné à bail doit comporter tous les éléments le rendant conforme à un usage sain, sécurisé et paisible.</p><p>Le bailleur doit garantir au locataire tous les vices ou défauts de l'immeuble ou du local à usage d'habitation loué qui en empêchent l'usage, quand bien même le bailleur ne les aurait pas connus au moment de la conclusion du bail. S'il résulte de ces vices ou défauts quelque perte pour le locataire, le bailleur est tenu de l'indemniser.</p>"
        },
        {
          id: "article429",
          title: "Article 429",
          content: "<p>Le bailleur est également tenu de délivrer au locataire l'immeuble ou le local loué avec les équipements mentionnés au contrat de bail en bon état de fonctionnement et de le garantir des vices ou défauts affectant lesdits équipements.</p>"
        },
        {
          id: "article430",
          title: "Article 430",
          content: "<p>Le bailleur ne peut de son seul gré pendant la durée du bail ni changer la forme ou la destination de l'immeuble ou du local loué, ni en restreindre l'usage.</p>"
        },
        {
          id: "article431",
          title: "Article 431",
          content: "<p>Le bailleur est tenu d'entretenir l'immeuble ou le local loué, conformément à l'usage prévu au contrat et d'y faire à ses frais, toutes les grosses réparations, notamment celles concernant les murs porteurs ou de soutènement, les voûtes, les toitures, les poutres, les murs de clôture, les canalisations et fosses d'aisance, les puisards, les installations encastrées, les ascenseurs, les escaliers, les planchers, la vétusté de l'immeuble ou du local, le ravalement des façades de l'immeuble ou du local loué, et également tous travaux rendus nécessaires par un cas de force majeure.</p><p>Lorsque le bailleur n'effectue pas lesdites réparations, le locataire peut, après une mise en demeure infructueuse, se faire autoriser par la juridiction compétente à exécuter les réparations au frais du bailleur.</p><p>La juridiction compétente fixe le montant des réparations et les modalités de remboursement du locataire.</p><p>En cas d'urgence, le locataire est fondé à faire les travaux incombant au bailleur après l'avoir informé par tout moyen.</p><p>Le locataire peut demander en justice la résiliation du contrat de bail pour défaut des travaux incombant au bailleur. La juridiction compétente, qui prononce la résiliation du contrat de bail pour défaut de travaux incombant au bailleur, peut allouer, le cas échéant, des dommages et intérêts au locataire ou à ses ayants droit.</p><p>En l'absence des travaux de réparation incombant au bailleur, le locataire peut solliciter devant la juridiction compétente la réduction du loyer proportionnellement à l'atteinte portée à la jouissance de l'immeuble ou du local loué.</p>"
        },
        {
          id: "article432",
          title: "Article 432",
          content: "<p>Le bailleur n'est pas tenu des réparations rendues nécessaires par une utilisation anormale de la chose louée, ou par la faute du locataire.</p>"
        },
        {
          id: "article433",
          title: "Article 433",
          content: "<p>En cas de destruction totale de l'immeuble ou du local à usage d'habitation ou lorsque l'immeuble ou le local à usage d'habitation n'est plus apte à remplir la destination en vue de laquelle le contrat a été conclu, le bail est résilié de plein droit à l'égard des parties.</p><p>En cas de destruction partielle de l'immeuble ou du local à usage d'habitation, du fait d'un cas de force majeure, le locataire peut, suivant les circonstances, demander soit une diminution du prix, soit la résiliation du bail. Dans l'un ou l'autre cas, il n'y a lieu à aucun dédommagement.</p><p>En cas de destruction totale ou partielle de l'immeuble ou du local à usage d'habitation, le bailleur peut engager la responsabilité civile ou pénale du locataire, sauf pour le locataire à prouver que la destruction provient d'un cas de force majeure ou le fait du bailleur lui-même ou d'un tiers.</p>"
        },
        {
          id: "article434",
          title: "Article 434",
          content: "<p>Le bailleur ne peut, pendant la durée du bail, sans l'autorisation expresse du locataire changer la forme de l'immeuble ou du local à usage d'habitation loué.</p>"
        }
      ]
    },
    {
      title: "Section 2: Obligations du locataire",
      articles: [
        {
          id: "article435",
          title: "Article 435",
          content: "<p>Le locataire est tenu d'utiliser l'immeuble en bon père de famille, conformément aux stipulations du contrat de bail et de payer le loyer convenu.</p>"
        },
        {
          id: "article436",
          title: "Article 436",
          content: "<p>Sauf stipulation contraire, le locataire ne doit pas changer la destination de l'immeuble ou du local ou le transformer et faire des travaux d'amélioration de l'immeuble ou du local, sans l'accord écrit du bailleur.</p>"
        },
        {
          id: "article437",
          title: "Article 437",
          content: "<p>Lorsque le locataire effectue des travaux dans l'immeuble ou le local à usage d'habitation, autres que les travaux de menu entretien, sans l'accord écrit du bailleur, ce dernier peut demander:</p><ul><li>la résiliation du contrat;</li><li>la remise en l'état de l'immeuble ou du local loué;</li><li>la conservation à son profit des transformations ou améliorations effectuées sans que le locataire puisse réclamer une indemnisation.</li></ul>"
        },
        {
          id: "article438",
          title: "Article 438",
          content: "<p>A l'expiration du bail, le locataire est tenu de restituer l'immeuble ou le local loué dans l'état dans lequel il se trouvait au moment de la conclusion du contrat de bail.</p><p>En cas de transformation de l'immeuble loué, le locataire est libéré de cette obligation, lorsque le bailleur accepte de conserver les transformations effectuées.</p>"
        }
      ]
    },
    {
      title: "Chapitre 5: Renouvellement du contrat de bail à usage d'habitation",
      articles: [
        {
          id: "article439",
          title: "Article 439",
          content: "<p>Le contrat de bail à usage d'habitation qui vient à échéance est renouvelé par tacite reconduction, dans les mêmes conditions contractuelles, au bénéfice du locataire de bonne foi ou de ses ayants droit, à moins que :</p><ul><li>le bailleur déclare avoir besoin des lieux loués pour les occuper lui-même ou pour les faire occuper de manière effective par un ascendant ou descendant ou allié jusqu'au troisième degré inclusivement;</li><li>le locataire ne remplisse pas ses obligations contractuelles;</li><li>il existe d'autres motifs graves et légitimes à établir par le bailleur, à l'exclusion du transfert de propriété de l'immeuble ou du local qui ne vaut pas motif grave et légitime.</li></ul>"
        },
        {
          id: "article440",
          title: "Article 440",
          content: "<p>Le bailleur qui souhaite reprendre son immeuble ou local dans les conditions prévues à l'article 442 ci-dessous doit donner un congé au locataire, au moins trois mois avant la date de reprise indiquée par le bailleur, par acte de commissaire de justice ou par remise de courrier contre décharge.</p><p>Le bailleur qui reprend son immeuble ou local dans les conditions prévues ci-dessus est tenu de l'occuper ou d'installer les bénéficiaires de la reprise dans un délai de trois mois à compter du départ effectif du locataire.</p><p>En cas d'absence d'occupation de l'immeuble ou du local repris dans le délai imparti par le bailleur, le locataire congédié peut demander devant la juridiction compétente à le réintégrer, sauf pour le bailleur à justifier d'un motif légitime.</p>"
        },
        {
          id: "article441",
          title: "Article 441",
          content: "<p>Le bailleur ou les personnes bénéficiaires de la reprise doivent occuper l'immeuble ou le local pendant une durée minimum d'une année.</p><p>Le locataire congédié bénéficie d'une priorité de location si l'occupation de l'immeuble ou du local n'a pas duré un an, à compter de la date de reprise par le bailleur.</p>"
        }
      ]
    },
    {
      title: "Chapitre 6: Fin du contrat de bail à usage d'habitation",
      articles: [
        {
          id: "article442",
          title: "Article 442",
          content: "<p>Le contrat de bail à usage d'habitation peut être légitimement résilié avant son terme ou lorsqu'il est à durée indéterminée:</p><ul><li>en cas de force majeure;</li><li>par accord commun des parties;</li><li>en cas de manquement à ses obligations par l'une des parties;</li><li>au terme d'un préavis de trois mois notifié par écrit au bailleur par le locataire pour motif légitime;</li><li>au terme d'un congé de trois mois notifié par écrit au locataire par le bailleur qui veut exercer son droit de reprendre l'immeuble ou le local pour l'occuper lui-même ou pour le faire occuper de manière effective par un ascendant ou descendant ou allié jusqu'au troisième degré inclusivement.</li></ul>"
        },
        {
          id: "article443",
          title: "Article 443",
          content: "<p>La lettre de demande de résiliation du contrat de bail doit être écrite, motivée et accompagnée, le cas échéant, de pièces justificatives.</p><p>Elle est transmise à la partie adverse par voie de commissaire de justice ou par voie de lettre recommandée avec avis de réception ou encore par remise de courrier contre décharge ou par courrier électronique, si les parties ont accepté ce mode de transmission.</p>"
        },
        {
          id: "article444",
          title: "Article 444",
          content: "<p>La partie qui veut contester la résiliation du contrat de bail à usage d'habitation dispose, à peine de forclusion, d'un délai de trente jours calendaires, à compter de la réception de la lettre de demande de résiliation pour saisir la juridiction compétente.</p>"
        },
        {
          id: "article445",
          title: "Article 445",
          content: "<p>Lorsque le locataire manque à ses obligations contractuelles, le bailleur peut demander son expulsion forcée devant le juge des référés, après la transmission de la lettre de demande de résiliation, sans respecter le délai de contestation de la résiliation du bail prévu ci-dessus.</p><p>En cas d'expulsion forcée du locataire, celui-ci reste tenu du paiement des loyers échus du fait de son occupation de l'immeuble ou du local à usage d'habitation.</p>"
        },
        {
          id: "article446",
          title: "Article 446",
          content: "<p>Le locataire condamné à être expulsé dispose d'une action devant le juge des référés pour demander un délai de grâce et la suspension de la procédure d'expulsion.</p>"
        },
        {
          id: "article447",
          title: "Article 447",
          content: "<p>La demande de grâce n'est accordée par le juge des référés que pour un motif légitime.</p><p>Lorsque le juge des référés accorde le délai de grâce, sa décision suspend toute mesure d'expulsion, à compter de son prononcé jusqu'au terme du délai de grâce fixé, qui ne peut excéder trois mois.</p><p>A l'échéance du terme du délai de grâce fixé par le juge des référés, l'expulsion peut reprendre son cours à la diligence du bailleur ou de son représentant dûment mandaté.</p><p>Aucune prorogation du délai de grâce ne peut être accordée au locataire ou à tout occupant de son chef, à l'expiration du délai initialement fixé.</p><p>L'ordonnance du juge des référés accordant un délai de grâce n'est pas susceptible de recours.</p>"
        },
        {
          id: "article448",
          title: "Article 448",
          content: "<p>Lorsqu'un logement a été mis, même à titre gratuit, à la disposition d'une personne uniquement en raison d'un contrat de travail intervenu entre les parties, l'expulsion du salarié et de tous occupants de son chef peut être ordonnée par la juridiction compétente si l'employeur prouve que le contrat de travail a pris fin qu'il a accompli toutes les formalités requises et a payé tous les droits pour solde de tout compte audit salarié.</p><p>Au cas où l'occupant mis en demeure de libérer les lieux reste en possession du logement après la cessation de son contrat de travail, il est tenu de payer une indemnité d'occupation du logement fixée par la juridiction compétente, conformément aux dispositions du présent sous-titre.</p>"
        },
        {
          id: "article449",
          title: "Article 449",
          content: "<p>Par dérogation à l'article 1743 du Code civil, l'acquéreur d'un immeuble ou local à usage d'habitation loué en tout ou en partie ne peut expulser le locataire dont le bail en cours est antérieur à son acte d'acquisition, et qui avait été mis en possession des lieux avant eette date d'acquisition.</p><p>Toutefois, l'acquéreur d'un immeuble ou d'un local à usage d'habitation loué, qui veut l'occuper lui-même ou le faire occuper par un descendant ou ascendant ou allié jusqu'au troisième degré inclusivement, doit remettre au locataire une lettre de résiliation du contrat de bail dans les trois mois de l'acquisition de l'immeuble ou du local loué Passé le délai de trois mois, le locataire qui n'a pas reçu de lettre de résiliation de son contrat de bail continue l'occupation de l'immeuble ou du local à usage d'habitation selon les termes de son contrat, et conformément aux dispositions du présent sous-titre.</p>"
        },
        {
          id: "article450",
          title: "Article 450",
          content: "<p>En cas de décès du locataire, le contrat de bail à usage d'habitation continue jusqu'à son terme ou à durée indé terminée:</p><ul><li>au profit du conjoint ayant cohabité avec le locataire, și celui-ci paie effectivement les loyers échus</li><li>au profit du concubin ayant vécu en couple avec le locataire, si celui-ci paie effectivement les loyers échus;</li><li>au profit des descendants ou des ascendants, si ceux-ci paient effectivement les loyers échus.</li></ul><p>Au terme du contrat de bail à usage d'habitation précédemment conclu par le locataire décédé, le bailleur peut proposer un nouveau bail aux personnes ayant continué l'occupation de l'immeuble ou du local loué.</p><p>A défaut de personnes remplissant les conditions prévues ci-dessus ou à défaut de personnes désirant continuer le bail, le contrat de bail est résilié de plein droit.</p>"
        },
        {
          id: "article451",
          title: "Article 451",
          content: "<p>Lorsque le locataire abandonne l'immeuble ou le local à usage d'habitation loué sans payer les loyers échus, le bailleur fait constater l'abandon par voie de commissaire de justice et peut demander l'autorisation d'ouverture des portes au juge des référés.</p><p>En cas d'autorisation judiciaire d'ouverture des portes, le bailleur établit par voie de commissaire de justice l'inventaire des biens du locataire trouvés dans l'immeuble ou le local loué, qui les remet à un commissaire-priseur, en vue de leur vente publique.</p><p>Le bailleur peut saisir la juridiction compétente du lieu de situation de l'immeuble ou du local pour obtenir la résiliation du contrat de bail à usage d'habitation, la condamnation du locataire l'ayant abandonné au paiement des loyers échus et de dommages et intérêts, et aussi l'autorisation de vendre aux enchères publiques les biens du locataire trouvés dans l'immeuble ou le local loué.</p>"
        },
        {
          id: "article452",
          title: "Article 452",
          content: "<p>Sauf cas de force majeure, l'ancien locataire a droit à des dommages-intérêts si, dans les trois mois qui suivent son départ, les lieux ne sont pas occupés aux fins invoquées comme motif de la résiliation du bail soit dans la lettre de résiliation du bail, soit dans la requête introductive d'instance, soit dans le jugement.</p><p>Le délai de trois mois est suspendu pendant la durée des travaux de rénovation et de transformation entrepris de manière effective par le bailleur sur l'immeuble ou le local loué.</p><p>Si la juridiction compétente constate que le motif invoqué pour empêcher la prorogation légale du bail était dolosif, le locataire a droit à des dommages-intérêts qui ne peuvent être inférieurs au montant des loyers d'une année.</p>"
        },
        {
          id: "article453",
          title: "Article 453",
          content: "<p>Le locataire bénéficie d'un droit de préemption en cas de vente de l'immeuble ou du lòcal loué, à moins que celui-ci ne fasse l'objet d'une vente par adjudication publique ou qu'il ne soit cédé à un membre de la famille du bailleur, parent ou allié, jusqu'au troisième degré inclusivement.</p>"
        },
        {
          id: "article454",
          title: "Article 454",
          content: "<p>Le bailleur qui veut vendre l'immeuble ou le local loué est tenu d'adresser au locataire par tout moyen une offre de vente.</p><p>Dans l'offre de vente, le bailleur doit avertir le locataire qu'il a le droit de faire une contre-proposition.</p><p>Le locataire dispose d'un délai de sept jours calendaires pour faire éventuellement une contre-proposition et d'un délai d'un mois calendaire pour effectuer le paiement du prix de vente, sauf stipulation contraire des parties.</p><p>Le silence du locataire, à l'expiration du délai de sept jours calendaires ci-dessus, vaut refus de l'offre.</p><p>Le bailleur peut vendre l'immeuble ou le local loué à un tiers si celui-ci offre un prix supérieur à celui proposé par le locataire dûment informé.</p>"
        },
        {
          id: "article455",
          title: "Article 455",
          content: "<p>Est réputé n'être jamais intervenue :</p><ul><li>toute augmentation de loyers moins de trois années après la conclusion du contrat de bail à usage d'habitation ou après le renouvellement de ce bail;</li><li>toute révision de loyer en violation des dispositions du présent projet de loi;</li><li>toute révision du montant du dépôt de garantie décidée unilatéralement par le bailleur pendant l'exécution du contrat de bail.</li></ul>"
        },
        {
          id: "article456",
          title: "Article 456",
          content: "<p>Est réputée non écrite, toute clause du contrat de bail à usage d'habitation qui contient une stipulation portant sur le paiement de loyer d'avance ou de sommes autres que le dépôt de garantie prévu par le présent sous-titre.</p>"
        }
      ]
    },
    {
      title: "TITRE II: MESURES D'ACCOMPAGNEMENT DE L'HABITAT",
      articles: [
        {
          id: "article457",
          title: "Article 457",
          content: "<p>L'Etat met en place une structure chargée de la mise en œuvre de la politique de logement définie par le Gouvernement, en vue de favoriser l'accès au logement et l'amélioration du cadre de vie.</p><p>Cette structure est dotée de la personnalité morale et d'une autonomie financière.</p>"
        },
        {
          id: "article458",
          title: "Article 458",
          content: "<p>Les ressources propres à cette structure sont constituées des produits d'une taxe spécifique sur :</p><ul><li>les matériaux de construction importés et/ou produits sur le territoire national;</li><li>- les opérations immobilières destinées à la vente.</li></ul><p>Un décret pris en Conseil des ministres précise la portée et le niveau de ladite taxe.</p><p>En outre, cette structure dispose:</p><ul><li>des produits des cessions de ses travaux et prestations aux opérateurs du secteur;</li><li>d'une part du produit de l'impôt foncier affectée à l'Habitat;</li><li>des subventions d'équilibres pour les investissements;</li><li>des contributions des partenaires au Développement;</li><li>des produits des emprunts effectués dans les conditions prévues par les textes en vigueur;</li><li>des produits des droits et redevances de toute nature dont la perception aura été régulièrement autorisée sur les usagers par le Gouvernement;</li><li>des dons et legs;</li><li>de toutes autres taxes, surtaxes spécifiques et redevances qui pourraient être ultérieurement créées;</li><li>de toutes autres ressources extraordinaires, et plus généralement, toutes autres ressources qui pourraient lui être affectées ou résulter de son activité;</li><li>des produits issus de la valorisation foncière.</li></ul><p>Les attributions, l'organisation et le fonctionnement de cette structure sont déterminées par voie règlementaire.</p><p>Les projets engagés à l'initiative de cette structure sont éligibles au financement du Fonds de Soutien à l'Habitat (FSH), au Compte de Mobilisation pour l'Habitat (CDMH) et au Compte des Terrains urbains (CTU), conformément aux dispositions règlementaires.</p>"
        }
      ]
    },

      title: "TITRE III: AGENCES IMMOBILIÈRES, COURTIER EN IMMOBILIER",

      title: "Sous-titre 1: Dispositions générales",
      articles: [
        {
          id: "article459",
          title: "Article 459",
          content: "<p>Les dispositions du présent chapitre s'appliquent aux professionnels de l'immobilier qui, d'une manière habituelle et moyennant rétribution, se livrent ou prêtent leur concours, aux opérations portant sur les biens d'autrui et relatives à :</p><ul><li>l'achat, la vente, la location d'immeubles bâtis ou non bâtis;</li><li>l'achat, la vente, la location gérance de fonds de commerce;</li><li>la gestion immobilière;</li><li>-la gestion de syndic de groupes d'habitations en lotissement;</li><li>la gestion de syndic de copropriété.</li></ul>"
        },
        {
          id: "article460",
          title: "Article 460",
          content: "<p>Ces professionnels de l'immobilier ne peuvent établir aucun des actes relatifs aux conventions ayant pour objet de constituer, transmettre, déclarer, modifier, éteindre un droit réel immobilier ou d'en changer le titulaire, tous transfert d'impenses, tous baux d'une durée supérieure à dix ans, toutes procurations y relatives, tous actes sujets à la publicité foncière, tous actes établis en vue de la constitution, de la modification, de la dissolution et de la liquidation des sociétés civiles de construction ou d'attribution ainsi que toutes cessions de parts relatives auxdites sociétés;</p><p>ces actes doivent être conclus et passés devant notaire.</p>"
        },
        {
          id: "article461",
          title: "Article 461",
          content: "<p>Les dispositions du présent chapitre ne s'appliquent pas:</p><ul><li>aux membres des professions dont l'exercice est réglementé, tels;</li><li>les notaires;</li><li>les avocats;</li><li>⚫ les huissiers;</li><li>⚫ les administrateurs judiciaires;</li><li>les agents d'affaires;</li><li>les experts immobiliers;</li><li>⚫ les commissaires de Justice;</li><li>⚫ les architectes;</li><li>⚫ les géomètres experts;</li><li>aux personnes physiques et morales ou leur représentant qui, à titre non professionnel, se livrent ou prêtent leur concours à des opérations relatives à des biens qu'elles ont en propriété ou détiennent des droits réels divis ou indivis immobiliers;</li><li>aux promoteurs immobiliers et aménageurs fonciers;</li><li>aux personnes qui commercialisent et gèrent les immeubles des sociétés civiles immobilières, des sociétés civiles de construction ou d'attribution.</li></ul>"
        },
        {
          id: "article462",
          title: "Article 462",
          content: "<p>Les exploitants de sites internet accessibles à partir du territoire national et dont les offres concernent la location de biens immobiliers ou de locaux à usage d'habitation situés sur le territoire de la Côte d'Ivoire sont tenus d'obtenir l'agrément prévu par le présent chapitre.</p><p>Le non-respect de la présente disposition autorise l'autorité publique compétente à solliciter de la juridiction compétente le blocage de l'accès sur le territoire national au site internet contrevenant.</p><p>Toutefois, les exploitants de sites internet accessibles à partir du territoire national et dont les offres concernent exclusivement des chambres d'hôtel sont exclus de l'obligation d'obtenir l'agrément susvisé.</p>"
        },
        {
          id: "article463",
          title: "Article 463",
          content: "<p>Les activités de ces professionnels de l'immobilier sont incompatibles avec tout emploi rémunéré par une administration publique ou un établissement public.</p>"
        }

    {
      title: "Sous-titre 2 - Exercice de la profession d'Agence immobilière",
      articles: [
        {
          id: "article464",
          title: "Article 464",
          content: "<p>L'exercice de la profession d'agence immobilière est soumis aux conditions suivantes:</p><ul><li>être une personne morale régulièrement constituée conformément aux dispositions de l'Acte uniforme et de Groupement d'intérêt économique (GIE);</li><li>- avoir un capital social de deux millions au moins détenu en totalité par une ou des personnes de nationalité ivoirienne;</li><li>avoir un objet social portant sur les opérations visées à l'article 459;</li><li>être titulaire d'une attestation de régularité fiscale;</li><li>-justifier d'une garantie financière consistant en une caution prise par l'agence immobilière auprès d'une banque ou d'une compagnie d'assurance au profit du ministère en charge du Logement à hauteur d'un montant fixé par arrêté dudit ministère;</li><li>être bénéficiaire d'un agrément;</li><li>être titulaire d'une enseigne distinctive << Agence immobilière agréée >>, octroyée par la chambre professionnelle des agences immobilières agréées.</li></ul>"
        },
        {
          id: "article465",
          title: "Article 465",
          content: "<p>L'agrément d'agence immobilière est accordé par le ministre chargé du Logement après, satisfaction des conditions prescrites par les article 463 et article 464 relatives à la société candidate et à son principal dirigeant.</p>"
        },
        {
          id: "article466",
          title: "Article 466",
          content: "<p>La garantie financière s'applique à toute créance d'un client contre l'agence immobilière à l'occasion des opérations spécifiées à l'article 459.</p><p>Elle joue sur les seules justifications que la créance soit certaine, liquide et exigible sans que la banque ou la compagnie d'assurance, garant puisse opposer au créancier le bénéfice de discussion.</p><p>La banque ou la compagnie d'assurance effectue le paiement à la première réquisition du ministère en charge du Logement sur demande du ou des créanciers de l'agence immobilière.</p><p>Si plusieurs demandes sont formulées, une répartition a lieu au marc le franc dans le cas où le montant total des demandes excéderait le montant de la garantie.</p>"
        },
        {
          id: "article467",
          title: "Article 467",
          content: "<p>La personne physique, représentant légal d'une agence immobilière est désignée sous le vocable d'administrateur de biens.</p><p>Est considérée comme justifiant de l'aptitude professionnelle d'administrateur de biens, la personne physique de nationalité ivoirienne:</p><ul><li>titulaire d'une licence des professions de l'immobilier ou d'un diplôme sanctionnant des études juridiques, économiques, financières ou commerciales d'un niveau égal ou d'un diplôme supérieur, après avoir occupé un emploi ou effectué un stage d'au moins deux ans dans une agence immobilière, une étude de notaire, une société de promotion immobilière, ou ayant eu en charge la gestion du patrimoine immobilier d'une société ou d'une personne physique;</li><li>ayant occupé pendant cinq ans au moins pour les titulaires d'un Brevet de Technicien supérieur (BTS), un emploi dans une agence immobilière, une étude de notaire, une société de promotion immobilière, ou ayant eu en charge la gestion du patrimoine immobilier d'une société ou d'une personne physique.</li></ul>"
        },
        {
          id: "article468",
          title: "Article 468",
          content: "<p>L'agence immobilière doit faire figurer sur tous documents, contrats et correspondances à usage professionnel, les numéros, date de son agrément et le nom de son administrateur de biens sous peine de sanction disciplinaire.</p>"
        },
        {
          id: "article469",
          title: "Article 469",
          content: "<p>Pour remplir sa mission, l'agence immobilière doit détenir un mandat écrit de son client précisant :</p><ul><li>- l'étendue de ses pouvoirs ou missions à effectuer;</li><li>l'autorisation à recevoir les sommes ou valeurs à l'occasion de la gestion ou de la vente dont elle est chargée;</li><li>- le montant de sa rémunération ou commission.</li></ul>"
        },
        {
          id: "article470",
          title: "Article 470",
          content: "<p>L'agence immobilière est tenue d'ouvrir un compte bancaire sous sa dénomination sociale, exclusivement affecté à la réception des paiements qu'elle reçoit ou détient à l'occasion des opérations spécifiées à l'article 459.</p>"
        },
        {
          id: "article471",
          title: "Article 471",
          content: "<p>Tous les paiements faits à l'agence immobilière doivent immédiatement donner lieu à la délivrance d'un reçu.</p><p>Les montants supérieurs à cinq cent mille francs sont reçus par chèque ou par virement de banque à banque.</p>"

    {

      articles: [
        {

          content: "<p>Le courtier en immobilier est une personne physique indépendante qui accomplit les opérations portant sur les biens d'autrui et relatives à:</p><ul><li>l'achat, la vente, la location d'immeubles bâtis ou non bâtis;</li><li>l'achat, la vente, la location gérance de fonds de commerce.</li></ul>"

        {
          id: "article476",
          title: "Article 476",
          content: "<p>Sont considérées comme justifiant de l'aptitude, professionnelle de courtier en immobilier, la personne physique de nationalité ivoirienne :</p><ul><li>âgée de 21 ans révolus à moins qu'il soit un mineur émancipé;</li><li>titulaire du Baccalauréat, ou d'un niveau égal ou supérieur</li><li>n'ayant fait l'objet d'aucune condamnation définitive à une peine d'emprisonnement pour crime ou délit contre l'honneur ou la probité ou pour tentative ou complicité pour ces mêmes infractions.</li></ul>"

        {
          id: "article477",

        },
        {

    {

      articles: [
        {

          title: "Article 481",
          content: "<p>Les activités et prestations des agences immobilières et des courtiers en immobilier sont soumises à un tarif unique fixé par décret.</p>"
        },
        {
          id: "article482",
          title: "Article 482",
          content: "<p>Ces professionnels de l'immobilier sont rémunérés pour les services, prestations, missions et actes réalisés dans l'exercice de leurs activités par des honoraires ou commissions calculés suivant les règles fixées par arrêté conjoint du ministre chargé du Logement et du ministre de l'Economie et des finances.</p>"
        },
        {
          id: "article483",
          title: "Article 483",
          content: "<p>Les honoraires et commissions comprennent: La rémunération de toutes les prestations antérieures et postérieures à la conclusion de l'affaire ainsi que l'accomplissement des formalités y afférentes.</p><p>Ces prestations et formalités dont la liste est non limitative sont :</p><ul><li>- la visite d'un bien immobilier;</li><li>- la conclusion du contrat de bail avec l'accomplissement des formalités y afférentes;</li><li>l'établissement des états des lieux;</li><li>la visite de contrôle de l'état d'entretien d'un bien immobilier;</li><li>le suivi des travaux;</li><li>les réunions de chantier;</li><li>la négociation de la vente, l'établissement des attestations de réservation et de reconnaissance d'honoraires ou commissions;</li><li>la gestion immobilière;</li><li>la gestion de la copropriété et du syndic;</li></ul><p>Le remboursement des débours et de tous les frais accessoires dûment justifiés.</p>"

        {

        },
        {
          id: "article486",
          title: "Article 486",
          content: "<p>L'intervention de deux agences immobilières ou même qu'elles aient été sollicitées l'une ou toutes les deux par des courtiers immobiliers dans la conclusion d'une même affaire n'en augmente pas les honoraires qui seront rétribués, moitié pour l'agence immobilière qui a le propriétaire et l'autre moitié pour celle qui a trouvé l'acquéreur ou le locataire, à charge pour chaque agence immobilière de rémunérer les courtiers immobiliers s'il y a lieu suivant le taux défini par décret.</p>"
        },
        {
          id: "article487",
          title: "Article 487",
          content: "<p>Les honoraires dus pour une prestation non prévue par la présente tarification sont calculés par rapport à une prestation similaire ou qui présente le plus d'analogie.</p>"
        },
        {
          id: "article488",
          title: "Article 488",
          content: "<p>Le décompte d'entrée d'une location présente de manière claire et distincte :</p><ul><li>- les loyers avec la période couverte;</li><li>le dépôt de garantie ou caution de la location;</li><li>les débours;</li><li>et les honoraires ou commissions.</li></ul>"
        },
        {
          id: "article489",
          title: "Article 489",
          content: "<p>Aucun honoraire n'est dû pour une affaire déclarée nulle ou inutile par la faute de l'agence immobilière ou du courtier en immobilier.</p>"
        },
        {
          id: "article490",
          title: "Article 490",
          content: "<p>Les honoraires sont dus au courtier en immobilier si l'affaire apportée à l'agence immobilière est conclue.</p><p>Le taux de rémunération du courtier en immobilier est calculé sur les honoraires hors taxe soit sur la totalité, soit sur la moitié desdits honoraires en cas de concours entre deux agences immobilières.</p><p>L'agence immobilière rémunére le courtier en immobilier suivant les taux fixés par arrêté conjoint du ministre chargé du Logement et du ministre de l'Economie et des Finances.</p>"
        },
        {
          id: "article491",
          title: "Article 491",
          content: "<p>La rémunération du courtier en immobilier est acquise à la réalisation de l'affaire par la signature des contrats de vente ou de location.</p><p>Sa rétribution devient exigible dans les trois jours qui suivent l'encaissement des honoraires.</p>"
        },
        {
          id: "article492",
          title: "Article 492",
          content: "<p>Les honoraires des prestations non prévues au présent chapitre et compatibles avec la fonction d'agence immobilière et de courtier en immobilier sont fixés d'un commun accord par les parties.</p>"
        }
      ]
    },
    {
      title: "Sous-titre 5: De la nature des manquements et des sanctions disciplinaires et pénales",
      articles: [
        {
          id: "article493",
          title: "Article 493",
          content: "<p>Tout manquement aux lois, aux règlements et aux obligations fixées par le Code de déontologie ou toute négligence grave, commis par un professionnel des opérations mentionnées à l'article 586 dans l'exercice de ses activités, l'expose à des sanctions disciplinaires, amendes ou sanctions pénales.</p><p>La cessation des activités des professionnels des opérations mentionnée à l' article 459 ne fait pas obstacle aux poursuites donnant lieu à des sanctions pour des faits commis pendant l'exercice de leurs fonctions.</p>"
        },
        {
          id: "article494",
          title: "Article 494",
          content: "<p>Aucun agence immobilière, administrateur de biens, courtier en immobilier ne peut être sanctionné sans avoir été, au préalable, entendu par une commission de discipline créé par arrêté du ministre chargé du Logement et composée des représentants des agences immobilières et de ceux dudit ministère.</p>"
        },
        {
          id: "article495",
          title: "Article 495",
          content: "<p>Les professionnels de l'immobilier qui ne respectent pas les obligations du Code de déontologie encourent des sanctions disciplinaires suivantes :</p><ul><li>l'avertissement;</li><li>la réprimande</li><li>la suspension pour un terme maximal d'un an;</li><li>l'exclusion et le retrait de la carte professionnelle.</li></ul>"
        },
        {
          id: "article496",
          title: "Article 496",
          content: "<p>Le mode de saisine de la Commission de discipline et d'instruction des dossiers sont déterminés par arrêté du ministre chargé du Logement.</p>"
        }
      ]
    },
    {
      title: "TITRE IV: DIAGNOSTICS TECHNIQUES",

    {
      title: "Sous-titre 1: Personnes habilitées à procéder aux diagnostics techniques des locaux à usage d'habitation",
      articles: [
        {
          id: "article497",
          title: "Article 497",
          content: "<p>Le diagnostic technique immobilier porte notamment sur:</p><ul><li>la présence ou l'absence d'amiante dans l'immeuble;</li><li>la conformité du local avec les normes applicables à l'utilisation des cendres;</li><li>- la conformité des immeubles avec normes applicables à la présence de plomb:</li><li>la conformité des immeubles avec normes applicables à la présence de termites;</li><li>la conformité des immeubles avec normes applicables à la présence d'insectes ou d'animaux nuisibles.</li></ul>"
        },
        {
          id: "article498",
          title: "Article 498",
          content: "<p>Les diagnostics prévus à l'article précédent sont établis par les services d'hygiène du ministère en charge de l'hygiène ou des collectivités qui délivre un certificat de salubrité.</p><p>Les conditions d'établissement du diagnostic technique sont précisées par voie règlementaire.</p>"
        }
      ]

      title: "Sous-titre 2: Diagnostic technique amiante",
      articles: [
        {
          id: "article499",
          title: "Article 499",
          content: "<p>Tout propriétaire d'immeuble fait constituer par une personne mentionnée à l'article 498 ci-dessus et conserve un dossier intitulé \"dossier technique amiante\" comprenant toutes informations permettant de justifier de la présence ou de l'absence d'amiante dans l'immeuble.</p><p>Le contenu et la validité du \"dossier technique amiante\" sont précisés par décret.</p>"
        },
        {
          id: "article500",
          title: "Article 500",
          content: "<p>Le \"dossier technique amiante\" est tenu à jour par le propriétaire et intègre les éléments relatifs aux matériaux et produits contenant de l'amiante..</p>"
        },
        {
          id: "article501",
          title: "Article 501",
          content: "<p>Le propriétaire tient le \"dossier technique amiante\" à la disposition des occupants de l'immeuble bâti concerné.</p>"
        },
        {
          id: "article502",
          title: "Article 502",
          content: "<p>La fiche récapitulative du \"dossier technique amiante\" est communiquée par le propriétaire dans un délai d'un mois après sa constitution ou sa mise à jour aux occupants de l'immeuble bâti et, si cet immeuble comporte des locaux de travail, aux employeurs.</p>"
        },
        {
          id: "article503",
          title: "Article 503",
          content: "<p>Les modalités d'application du présent chapitre sont déterminées par décret.</p>"
        }
      ]

    {
      title: "Sous-titre 6: Diagnostics techniques en cas de vente d'immeubles ou de bail conclu sur un immeuble",
      articles: [
        {
          id: "article513",
          title: "Article 513",
          content: "<p>En cas de vente, ou de bail conclu sur tout ou partie d'un immeuble bâti, à l'exception des baux visés au sous-titre 3 du titre 2 du livre 1 relatif au bail à construction et au bail emphytéotique, un dossier de diagnostic technique global est annexé au contrat ou à la promesse de contrat.</p><p>En cas de vente publique, le dossier de diagnostic technique est annexé au cahier des charges.</p>"
        },
        {
          id: "article514",
          title: "Article 514",
          content: "<p>Le dossier de diagnostic technique global visé à l'article 513 ci-dessus comprend :</p><ul><li>le \"dossier technique amiante\", prévu aux article 499 à article 503;</li><li>le \"dossier technique cendres\", prévu aux article 504 à article 506;</li><li>le \"dossier technique saturnisme\", prévu aux article 507 à article 509;</li><li>le \"dossier technique termites\", prévu aux article 510 à article 512.</li></ul>"
        },
        {
          id: "article515",
          title: "Article 515",
          content: "<p>En l'absence, lors de la signature du contrat de vente, d'un des documents mentionnés à l'article 514 ci-dessus, le vendeur ne peut pas s'exonérer de la garantie des vices cachés correspondante.</p>"
        },
        {
          id: "article516",
          title: "Article 516",
          content: "<p>En l'absence, lors de la signature du contrat de bail, d'un des documents mentionnés à l'article 514 ci-dessus, le preneur peut demander la nullité du bail.</p>"
        },
        {
          id: "article517",
          title: "Article 517",
          content: "<p>En cas de vente de tout ou partie d'un immeuble à usage d'habitation comportant une installation intérieure de gaz réalisée depuis plus de quinze ans, un état de cette installation en vue d'évaluer les risques pouvant compromettre la sécurité des personnes est produit dans les conditions et selon les modalités prévues aux articles article 513 à article 516 ci-dessus.</p>"
        },
        {
          id: "article518",
          title: "Article 518",
          content: "<p>La même obligation que celle prévue à l'article 517 incombe en cas de vente de tout ou partie d'un immeuble à usage d'habitation comportant une installation intérieure d'électricité lorsque celle-ci a été réalisée depuis plus de quinze ans.</p>"
        }
      ]
