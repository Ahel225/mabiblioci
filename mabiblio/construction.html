    },
    {
      title: "Section 4: Raccordement aux réseaux électriques",
      articles: [
        {
          id: "article274",
          title: "Article 274",
          content: "<p>Le raccordement aux réseaux électriques s'effectue conformément aux dispositions légales et réglementaires en vigueur en la matière.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 6: Antennes réémettrices",
      articles: [
        {
          id: "article275",
          title: "Article 275",
          content: "<p>Lorsque la présence d'une construction, qu'elle soit ou non à usage d'habitation, apporte une gêne à la réception de la radiodiffusion ou de la télévision par les occupants des bâtiments voisins, son propriétaire ou les locataires, preneurs ou occupants de bonne foi ne peuvent s'opposer, sous le contrôle de la Haute Autorité de la Communication audiovisuelle, à l'installation de dispositifs de réception ou de réémission propres à établir des conditions de réception satisfaisantes.</p><p>L'exécution de cette obligation n'exclut pas la mise en jeu de la responsabilité du propriétaire résultant de l'article 1384 du Code civil.</p>"
        },
        {
          id: "article276",
          title: "Article 276",
          content: "<p>Lorsque l'édification d'une construction est susceptible, en raison de sa situation, de sa structure ou de ses dimensions, d'apporter une gêne à la réception de la radiodiffusion ou de la télévision par les occupants des bâtiments situés dans le voisinage, le constructeur est tenu de faire réaliser à ses frais, sous le contrôle de la Haute Autorité de la Communication Audiovisuelle, une installation de réception ou de réémission propre à assurer des conditions de réception satisfaisantes dans le voisinage de la construction projetée.</p><p>Le propriétaire de ladite construction est tenu d'assurer, dans les mêmes conditions, le fonctionnement, l'entretien et le renouvellement de cette installation.</p>"
        },
        {
          id: "article277",
          title: "Article 277",
          content: "<p>En cas de carence du constructeur ou du propriétaire, la Haute Autorité de la Communication Audiovisuelle peut, après mise en demeure non suivie d'effet dans un délai de trois mois, saisir le président du tribunal compétent pour obtenir l'exécution des obligations susvisées.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 7: Caractéristiques acoustiques",
      articles: [
        {
          id: "article278",
          title: "Article 278",
          content: "<p>Les contrats de louage d'ouvrage ayant pour objet la construction de bâtiments d'habitation sont réputés contenir les prescriptions légales ou réglementaires relatives aux exigences minimales requises en matière d'isolation phonique.</p><p>Les travaux de nature à satisfaire à ces exigences relèvent de la responsabilité des constructeurs d'ouvrage régie par le sous-titre 3 du titre 4 du livre 1 du présent Code.</p><p>Le vendeur ou le promoteur immobilier est garant, à l'égard du premier occupant de chaque logement, de la conformité à ces exigences pendant un an à compter de la prise de possession.</p><p>A l'issue de l'achèvement des travaux portant sur des bâtiments neufs ou sur des parties nouvelles de bâtiment existant soumis à permis de construire, le maître d'ouvrage fournit à l'autorité qui a délivré l'autorisation de construire un document attestant que la réglementation acoustique a été prise en compte par le maître d'œuvre ou, en son absence, par le maître d'ouvrage.</p><p>Les règles de construction et d'aménagement applicables aux ouvrages et locaux, autres que d'habitation, quant à leurs caractéristiques acoustiques et les catégories d'ouvrages et locaux qui sont soumis en tout ou partie aux dispositions du présent article sont fixées par voie réglementaire.</p><p>Des prescriptions relatives aux caractéristiques acoustiques peuvent être imposées aux travaux soumis à autorisation ou à déclaration préalable, ou réalisés avec l'aide de l'Etat, d'une collectivité publique ou d'un organisme assurant une mission de service public, exécutés dans des ouvrages ou locaux existants autres que d'habitation.</p>"
        },
        {
          id: "article279",
          title: "Article 279",
          content: "<p>Les caractéristiques acoustiques des équipements, ouvrages ou installations mis en place dans les bâtiments doivent être conformes aux modalités et au niveau d'exigences acoustiques prévus par voie réglementaire.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 8: Performance énergétique et environnementale et caractéristiques énergétiques et environnementales",
      articles: [
        {
          id: "article280",
          title: "Article 280",
          content: "<p>La construction et l'utilisation des immeubles doivent être conformes aux normes techniques en vigueur ou édictées en application du Code de l'environnement et du Code de l'électricité.</p>"
        },
        {
          id: "article281",
          title: "Article 281",
          content: "<p>Les produits pétroliers, gaz naturel et combustibles solides qui sont des sources d'énergies essentielles mais constituent aussi les principales sources d'émissions de dioxyde de carbone doivent faire l'objet d'une utilisation efficace, prudente, rationnelle et durable.</p>"
        },
        {
          id: "article282",
          title: "Article 282",
          content: "<p>La performance énergétique des bâtiments doit être calculée sur la base de caractéristiques thermiques et d'autres facteurs qui jouent un rôle de plus en plus important tels que les installations de climatisation, le recours à des sources d'énergies renouvelables, le refroidissement passif, la qualité de l'air intérieur, la lumière naturelle suffisante et la conception bioclimatique du bâtiment.</p>"
        },
        {
          id: "article283",
          title: "Article 283",
          content: "<p>L'utilisation des instruments harmonisés, en particulier les méthodes d'essai de calcul et des classes d'efficacité énergétique, est exigée pour le respect des exigences en matière de performance énergétique pour les systèmes techniques des bâtiments.</p>"
        },
        {
          id: "article284",
          title: "Article 284",
          content: "<p>Les bâtiments neufs doivent répondre à des exigences minimales en matière de performance énergétique adaptée aux conditions climatiques locales.</p>"
        },
        {
          id: "article285",
          title: "Article 285",
          content: "<p>Des instruments financiers doivent être mis en place ou adaptés afin d'encourager l'adoption de mesures en matière d'efficacité énergétique.</p><p>Le partenariat public privé, en faveur de bâtiments économes en énergie dans le but d'encourager les technologies vertes et le développement de systèmes, de matériaux et de systèmes constructifs économes en énergie dans les nouveaux bâtiments doit être promu.</p>"
        },
        {
          id: "article286",
          title: "Article 286",
          content: "<p>Les bâtiments publics faisant l'objet d'un concours d'architecture doivent intégrer, dans les termes de références, les principes de l'habitat bioclimatique, de l'efficacité énergétique et des énergies renouvelables intégrées au bâti.</p>"
        },
        {
          id: "article287",
          title: "Article 287",
          content: "<p>Tous les bâtiments faisant l'objet de permis de construire doivent répondre aux exigences minimales en matière de performance énergétique.</p>"
        },
        {
          id: "article288",
          title: "Article 288",
          content: "<p>Le ministère en charge de la Construction et de l'Habitat doit proposer des mesures incitatives pour faciliter l'amélioration de la performance énergétique des bâtiments.</p>"
        },
        {
          id: "article289",
          title: "Article 289",
          content: "<p>Ces mesures sont des instruments économiques, financiers, techniques, technologiques ou de toute autre nature pouvant contribuer significativement à la performance énergétique des bâtiments.</p>"

        {
          id: "article291",
          title: "Article 291",

        {
          id: "article294",
          title: "Article 294",

    {
      title: "Sous-titre 2: Dispositions communes aux normes générales de construction",
      articles: [
        {
          id: "article311",
          title: "Article 311",
          content: "<p>Les infractions aux dispositions des article 249 à article 310 sont constatées par tous officiers ou agents de police judiciaire ainsi que par tous les fonctionnaires et agents de l'Etat et des collectivités publiques commissionnés à cet effet, suivant l'autorité dont ils relèvent et assermentés.</p><p>Les procès-verbaux dressés par ces agents sont transmis le cas échéant au ministère public.</p>"
        },
        {
          id: "article312",
          title: "Article 312",
          content: "<p>L'interruption des travaux peut être ordonnée d'office par le juge d'instruction saisi des poursuites ou par le tribunal correctionnel soit sur réquisition du ministère public agissant à la requête du maire ou du fonctionnaire compétent soit, même d'office, par le juge d'instruction saisi des poursuites ou par le tribunal correctionnel.</p><p>L'autorité judiciaire statue après avoir entendu le bénéficiaire des travaux ou l'avoir dûment convoqué à comparaître dans les quarante-huit heures.</p><p>La décision judiciaire est exécutoire sur minute et nonobstant toute voie de recours.</p><p>L'autorité judiciaire peut à tout moment, d'office ou à la demande, soit du maire ou du fonctionnaire compétent, soit du bénéficiaire des travaux, se prononcer sur la mainlevée ou le maintien des mesures prises pour assurer l'interruption des travaux.</p><p>Le maire est avisé de la décision judiciaire et en assure, le cas échéant, l'exécution.</p><p>Le maire peut prendre toutes mesures de coercition nécessaires pour assurer l'application immédiate de la décision judiciaire, en procédant notamment à la saisie des matériaux approvisionnés et du matériel de chantier.</p><p>La saisie et, s'il y a lieu, l'apposition des scellés sont effectuées par l'un des agents mentionnés à l'article 311 qui dresse procès verbal.</p><p>Les pouvoirs qui appartiennent au maire, en vertu des alinéas qui précèdent, ne font pas obstacle au droit du représentant de l'Etat dans le département de prendre, dans tous les cas où il n'y aurait pas été pourvu par le maire et après une mise en demeure restée sans résultat, à l'expiration d'un délai de vingt-quatre heures, toutes les mesures prévues au présent article.</p><p>Dans ce cas, le préfet reçoit, au lieu et place du maire, les avis et notifications prévus aux alinéas 5 et 6.</p>"
        },
        {
          id: "article313",
          title: "Article 313",
          content: "<p>En cas de condamnation pour une infraction prévue à l' article 528, le tribunal, au vu des observations écrites ou après audition du fonctionnaire compétent, statue soit sur la mise en conformité des lieux ou celle des ouvrages avec les règlements, l'autorisation administrative ou la réaffectation du sol en vue du rétablissement des lieux dans leur état antérieur.</p>"
        },
        {
          id: "article314",
          title: "Article 314",
          content: "<p>Le tribunal impartit au bénéficiaire des travaux irréguliers ou de l'utilisation irrégulière du sol un délai pour l'exécution de la mise en conformité ou de réaffectation.</p><p>Il peut assortir sa décision d'une astreinte par jour de retard.</p>"
        },
        {
          id: "article315",
          title: "Article 315",
          content: "<p>Au cas où le délai n'est pas observé, l'astreinte prononcée, qui ne peut être révisée que dans le cas prévu à l'article 297, court à partir de l'expiration dudit délai jusqu'au jour où l'ordre a été complètement exécuté.</p>"
        },
        {
          id: "article316",
          title: "Article 316",
          content: "<p>Si l'exécution n'est pas intervenue dans l'année de l'expiration du délai, le tribunal peut, sur réquisition du ministère public, relever à une ou plusieurs reprises le montant de l'astreinte, même au-delà du maximum prévu ci-dessus.</p>"
        },
        {
          id: "article317",
          title: "Article 317",
          content: "<p>Le tribunal peut autoriser le reversement d'une partie des astreintes lorsque la remise en état ordonnée aura été régularisée et que le redevable établira qu'il a été empêché d'observer, par une circonstance indépendante de sa volonté, le délai qui lui a été imparti.</p>"
        },
        {
          id: "article318",
          title: "Article 318",
          content: "<p>Si, à l'expiration du délai fixé par le jugement, la mise en conformité ou la remise en état ordonnée n'est pas complètement achevée, le maire ou le fonctionnaire compétent peut faire procéder d'office à tous travaux nécessaires à l'exécution de la décision de justice aux frais et risques du bénéficiaire des travaux irréguliers ou de l'utilisation irrégulière du sol.</p><p>Au cas où les travaux porteraient atteinte à des droits acquis par des tiers sur les lieux ou ouvrages concernés, le maire ou le fonctionnaire compétent ne pourra faire procéder aux travaux mentionnés à l'alinéa précédent qu'après décision du tribunal compétent qui ordonnera, le cas échéant, l'expulsion de tous occupants.</p>"

    {
      title: "CHAPITRE I: Normes de sécurité applicables à tous les immeubles",

    {
      title: "Section 1: Dispositions générales relatives à la protection contre l'incendie",
      articles: []
    },
    {
      title: "Sous-section 1: Dispositions applicables à toutes sortes d'immeubles",
      articles: [
        {
          id: "article320",
          title: "Article 320",
          content: "<p>La disposition des locaux, les structures, les matériaux et l'équipement des bâtiments doivent permettre la protection des occupants contre l'incendie.</p><p>Les installations de sécurité doivent être conformes à la réglementation en vigueur.</p>"
        },
        {
          id: "article321",
          title: "Article 321",
          content: "<p>Les locaux qui, par leur nature ou leur destination, peuvent constituer un danger d'incendie ou d'asphyxie doivent être isolés.</p><p>Leur construction doit permettre aux occupants, en cas d'incendie, soit de d'évacuer l'immeuble sans secours extérieur, soit de recevoir de tels secours.</p>"
        }
      ]
    },
    {
      title: "Sous-section 2: Classification des matériaux de construction en fonction de leur résistance et de leur réaction aux incendies",
      articles: [
        {
          id: "article322",
          title: "Article 322",
          content: "<p>Les matériaux et éléments de construction sont classés en différentes catégories en fonction de leur comportement en cas d'incendie en fonction des deux critères suivants :</p><ul><li>la réaction au feu, c'est-à-dire la capacité de combustion du matériau et l'impact de la combustion sur le développement de l'incendie;</li><li>et</li><li>la résistance au feu, c'est-à-dire la capacité du matériau à conserver ses principales fonctions et caractéristiques malgré le développement d'un incendie.</li></ul>"
        },
        {
          id: "article323",
          title: "Article 323",
          content: "<p>La réaction au feu se détermine eu égard, d'une part, à la quantité de chaleur dégagée lors de la combustion et, d'autre part, à la présence ou l'absence de gaz ou liquides inflammables.</p><p>La classification adoptée différencie les matériaux selon leur combustibilité. Dans l'hypothèse où les matériaux ne seraient incombustibles, la classification indique le degré plus ou moins grand d'inflammabilité.</p>"
        },
        {
          id: "article324",
          title: "Article 324",
          content: "<p>La classification au point de vue de la résistance au feu est établie en tenant compte du temps pendant lequel sont satisfaites des conditions imposées relatives, soit à la résistance mécanique, soit à l'isolation thermique, soit à ces deux critères cumulés.</p>"
        },
        {
          id: "article325",
          title: "Article 325",
          content: "<p>Les différentes catégories de classification, tant en ce qui concerne la réaction au feu que la résistance au feu, sont déterminées par voie réglementaire.</p>"
        },
        {
          id: "article326",
          title: "Article 326",
          content: "<p>Classification des matériaux de construction intervenant conformément aux dispositions ci-dessus fait l'objet d'une homologation dans des conditions fixées par décret.</p>"
        },
        {
          id: "article327",
          title: "Article 327",
          content: "<p>En cas de non-respect des normes spéciales ci-dessus évoquées, les dispositions relatives aux normes générales sont applicables.</p>"
        }
      ]
    },
    {
      title: "Section 2: Bâtiments insalubres et bâtiments menaçant ruine",
      articles: []
    },
    {
      title: "Sous-section 1: Bâtiments insalubres",
      articles: [
        {
          id: "article328",
          title: "Article 328",
          content: "<p>Lorsque l'utilisation qui est faite de locaux ou installations présente un danger pour la santé ou la sécurité de leurs occupants, le représentant de l'Etat dans le département peut enjoindre à la personne qui a mis ces locaux ou installations à disposition ou à celle qui en a l'usage de rendre leur utilisation conforme.</p><p>S'il n'est pas satisfait à l'injonction dans le délai fixé, le représentant de l'Etat dans le département prend, aux frais de la personne à laquelle elle a été faite, toutes mesures nécessaires pour ce faire.</p><p>Les dispositions des article 346, article 348, et à défaut, celles de l'article 349 sont applicables.</p>"
        },
        {
          id: "article329",
          title: "Article 329",
          content: "<p>Lorsqu'un immeuble, bâti ou non, vacant ou non, attenant ou non à la voie publique, ou un groupe d'immeubles fait apparaître, soit par lui-même, soit par les conditions dans lesquelles il est occupé ou exploité, un danger imminent pour la santé ou la sécurité des occupants lié à la situation d'insalubrité de l'immeuble, le représentant de l'Etat dans le département, sur saisine du maire ou à la demande de tout locataire ou occupant de l'immeuble ou de l'un des immeubles concernés, met en demeure le propriétaire, ou l'exploitant s'il s'agit de locaux d'hébergement, de prendre les mesures propres à faire cesser ce danger dans un délai qu'il fixe.</p><p>Il peut prononcer une interdiction temporaire d'habiter. Dans ce cas, ou si l'exécution des mesures prescrites rend les locaux temporairement inhabitables, les dispositions de l'article 345 sont applicables.</p><p>Le représentant de l'Etat dans le département procède au constat des mesures prises en exécution de la mise en demeure.</p><p>Si les mesures prescrites n'ont pas été exécutées dans le délai imparti, le représentant de l'Etat dans le département procède à leur exécution d'office.</p><p>Si le propriétaire ou l'exploitant, en sus des mesures lui ayant été prescrites pour mettre fin au danger imminent, a réalisé des travaux permettant de mettre fin à toute insalubrité, le représentant de l'Etat dans le département en prend acte.</p>"
        },
        {
          id: "article330",
          title: "Article 330",
          content: "<p>Concernant les locaux et installations utilisés aux fins d'habitation mais impropres à cet objet pour des raisons d'hygiène, de salubrité ou de sécurité, le représentant de l'Etat dans le département peut, à l'intérieur d'un périmètre qu'il définit, les déclarer insalubres.</p><p>L'arrêté du représentant de l'Etat dans le département est pris après délibération du conseil municipal ou, le cas échéant, de l'organe délibérant de l'établissement public.</p><p>Cet arrêté vaut interdiction définitive d'habiter et d'utiliser les locaux et installations qu'il désigne, sous réserve des dispositions visées aux article 331 et article 332 ci-dessous.</p>"
        },
        {
          id: "article331",
          title: "Article 331",
          content: "<p>Le représentant de l'Etat dans le département avise les propriétaires, tels qu'ils figurent au livre foncier, au moins trente jours à l'avance de la décision visée à l'article 330 de la faculté qu'ils ont de produire dans ce délai leurs observations.</p><p>II avise également, dans la mesure où ils sont connus, les titulaires de droits réels immobiliers sur les locaux, les titulaires de parts donnant droit à l'attribution ou à la jouissance en propriété des locaux, les occupants et, en cas d'immeuble d'hébergement, l'exploitant.</p><p>A défaut de connaître l'adresse actuelle des personnes mentionnées au premier alinéa ou de pouvoir les identifier, la notification les concernant est valablement effectuée par affichage à la mairie de la commune ainsi que par affichage sur la façade de l'immeuble, dans le délai visé au premier alinéa.</p><p>Toute personne justifiant de l'une des qualités mentionnées au premier alinéa est, sur sa demande, entendue par le représentant de l'Etat dans le département, ou tout mandataire désigné par lui, et appelée aux visites et constatations des lieux.</p><p>Elle peut se faire représenter par un mandataire.</p><p>Le représentant de l'Etat dans le département doit transmettre le dossier au ministre chargé de la Santé.</p>"
        },
        {
          id: "article332",
          title: "Article 332",
          content: "<p>Lorsque le ministre de la Santé conclut à l'impossibilité de remédier à l'insalubrité, c'est-à-dire lorsqu'il n'existe aucun moyen technique d'y mettre fin ou lorsque les travaux nécessaires à sa résorption seraient plus coûteux que la reconstruction, le représentant de l'Etat dans le département déclare l'immeuble insalubre à titre irrémédiable, prononce l'interdiction définitive d'habiter et, le cas échéant, d'utiliser les lieux et précise la date d'effet de cette interdiction, qui ne peut être fixée au-delà d'un an.</p><p>Il peut également ordonner la démolition de l'immeuble.</p><p>Le représentant de l'Etat dans le département prescrit toutes mesures nécessaires pour empêcher l'accès et l'usage de l'immeuble au fur et à mesure de son évacuation.</p><p>Les mêmes mesures peuvent être décidées à tout moment par le maire au nom de l'Etat.</p><p>Ces mesures peuvent faire l'objet d'une exécution d'office.</p><p>Lorsque le ministre de la Santé conclut à la possibilité de remédier à l'insalubrité, le représentant de l'Etat dans le département prescrit par arrêté les mesures adéquates ainsi que le délai imparti pour leur réalisation et prononce, s'il y a lieu, l'interdiction temporaire d'habiter et, le cas échéant, d'utiliser les lieux.</p><p>L'arrêté prévu au troisième alinéa du présent article précise que la non-exécution des mesures et travaux dans le délai qu'il prescrit expose le propriétaire au paiement d'une astreinte par jour de retard.</p><p>Sans préjudice de ce qui précède, ledit arrêté précise en outre que faute pour le propriétaire de s'y conformer, le représentant de l'Etat pourra, à compter de l'expiration du délai qu'il prescrit, décider de l'interdiction définitive d'habiter et d'utiliser les locaux et installations.</p><p>Toutefois, lorsque l'immeuble ou le logement devient inoccupé et libre de location après la date de l'arrêté prévu au troisième alinéa du présent article, dès lors qu'il est sécurisé et ne constitue pas un danger pour la santé ou la sécurité des voisins, le propriétaire n'est plus tenu de réaliser les mesures prescrites dans le délai fixé par l'arrêté.</p><p>L'autorité administrative peut prescrire ou faire exécuter d'office toutes mesures nécessaires pour empêcher l'accès et l'usage du logement, faute pour le propriétaire d'y avoir procédé.</p><p>La personne tenue d'exécuter les mesures mentionnées ci-dessus peut se libérer de son obligation par la conclusion d'un bail emphytéotique ou un contrat de vente moyennant paiement d'une rente viagère, à charge pour les preneurs ou débirentiers d'exécuter les travaux prescrits: Les parties peuvent convenir que l'occupant restera dans les lieux lorsqu'il les occupait à la date de l'arrêté d'insalubrité.</p>"
        },
        {
          id: "article333",
          title: "Article 333",
          content: "<p>Le représentant de l'Etat dans le département notifie l'arrêté d'insalubrité pris en application de l'article 330, des premier, troisième et quatrième alinéa de l'article 332 aux personnes visées au premier alinéa de l'article 331.</p><p>A défaut de connaître l'adresse actuelle ou de pouvoir identifier les personnes visées au premier alinéa de l'article 331, cette notification est valablement effectuée par l'affichage de l'arrêté à la mairie de la commune où est situé l'immeuble ainsi que sur la façade de l'immeuble.</p><p>A la diligence du représentant de l'Etat dans le département et aux frais du propriétaire, l'arrêté d'insalubrité est publié au livre foncier dont dépend l'immeuble pour chacun des locaux concernés.</p><p>A compter de la notification de l'arrêté d'insalubrité, les locaux vacants ne peuvent être ni loués ni mis à disposition pour quelque usage que ce soit.</p>"

dont dépend l'immeuble pour chacun des locaux, à la diligence du propriétaire et à ses frais.</p><p>Lorsque l'arrêté de péril n'a pas été exécuté dans le délai fixé, le maire met en demeure le propriétaire d'y procéder dans un délai qu'il fixe et qui ne peut être inférieur à un mois.</p><p>Lorsque le bâtiment menaçant ruine est à usage principal d'habitation, le maire peut, sans attendre l'expiration du délai fixé par la mise en demeure, appliquer une astreinte comminatoire par jour de retard à l'encontre du propriétaire défaillant. L'astreinte court à compter de la notification de l'arrêté la prononçant et jusqu'à la complète exécution des travaux prescrits.</p><p>Le maire peut consentir à une remise de son produit lorsque les réparations, travaux ou mesures prescrits par l'arrêté de péril ont été exécutés et si le redevable établit que le non-respect du délai imposé pour l'exécution totale de ses obligations est exclusivement dû à des circonstances indépendantes de sa volonté.</p><p>L'astreinte est recouvrée au bénéfice de la commune sur le territoire de laquelle est implanté l'immeuble ayant fait l'objet de l'arrêté.</p><p>A défaut de réalisation des travaux dans le délai imparti, le maire, par décision motivée, fait procéder d'office à leur exécution.</p>"

          id: "article341",

    {

      articles: [
        {
          id: "article345",
          title: "Article 345",
          content: "<p>Pour l'application de la présente sous-section, l'occupant est:</p><ul><li>le titulaire d'un droit réel conférant l'usage;</li><li>le locataire;</li><li>le sous-locataire; ou</li><li>l'occupant de bonne foi des locaux à usage d'habitation et de locaux d'hébergement constituant son habitation principale.</li></ul>"
        },
        {
          id: "article346",
          title: "Article 346",
          content: "<p>Le loyer en principal ou toute autre somme versée en contrepartie de l'occupation cesse d'être dus pour les locaux qui font l'objet d'une mise en demeure ou d'une injonction prise en application de l'article 328 du présent Code, à compter du premier jour du mois qui suit l'envoi de la notification par le représentant de l'Etat dans le département. Les loyers ou redevances sont à nouveau dus à compter du premier jour du mois qui suit le constat de la réalisation des mesures prescrites.</p>"
        },
        {
          id: "article347",
          title: "Article 347",
          content: "<p>Pour les locaux visés par une déclaration d'insalubrité prise en application des article 330 et article 332 ou par un arrêté de péril pris en application de l' article 338, le loyer en principal ou toute autre somme versée en contrepartie de l'occupation du logement cesse d'être dû à compter du premier jour du mois qui suit l'envoi de la notification de l'arrêté ou de son affichage à la mairie et sur la façade de l'immeuble, jusqu'au premier jour du mois qui suit l'envoi de la notification ou l'affichage de l'arrêté de mainlevée.</p><p>Dans le cas où des locaux ont fait l'objet d'une mise en demeure prononcée en application de l' article 329 suivie d'une déclaration d'insalubrité prise en application de l' article 332 du même code, le loyer ou toute autre somme versée en contrepartie de l'occupation du logement cesse d'être dû à compter du premier jour du mois qui suit l'envoi de la notification de la mise en demeure ou son affichage jusqu'au premier jour du mois qui suit l'envoi de la notification ou l'affichage de l'arrêté de mainlevée de l'insalubrité.</p><p>Les loyers ou toutes autres sommes versées en contrepartie de l'occupation du logement indûment perçus par le propriétaire, l'exploitant ou la personne ayant mis à disposition les locaux sont restitués à l'occupant ou déduits des loyers dont il devient à nouveau redevable.</p><p>La durée du bail conclu sur les locaux visés à l'alinéa premier est prorogée de la durée s'écoulant entre le premier jour du mois suivant l'envoi de la notification de l'arrêté d'insalubrité ou de péril, de l'injonction, de la mise en demeure ou des prescriptions, ou leur affichage et la date du premier jour du mois suivant l'envoi de la notification de la mainlevée de l'arrêté d'insalubrité ou de péril ou du constat de la réalisation des mesures prescrites, ou leur affichage.</p><p>Lorsque les locaux sont frappés d'une interdiction définitive d'habiter et d'utiliser, les baux et contrats d'occupation ou d'hébergement poursuivent de plein droit leurs effets, exception faite de l'obligation de paiement du loyer ou de toute somme versée en contrepartie de l'occupation, jusqu'à leur terme ou jusqu'au départ des occupants et au plus tard jusqu'à la date limite fixée par la déclaration d'insalubrité ou l'arrêté de péril.</p><p>Une déclaration d'insalubrité, un arrêté de péril ou la prescription de mesures destinées à faire cesser une situation d'insécurité ne peut entraîner la résiliation de plein droit des baux et contrats d'occupation ou d'hébergement.</p><p>Le propriétaire est tenu au respect de ces obligations si le bail expire entre la date de la notification des arrêtés portant interdiction définitive d'habiter et la date d'effet de cette interdiction.</p>"

    {
      title: "Section 1: Dispositions de sécurité relatives aux établissements recevant du public",
      articles: [
        {
          id: "article348",
          title: "Article 348",
          content: "<p>Les travaux qui conduisent à la création, l'aménagement ou la modification d'un établissement recevant du public doivent être conformes aux règles de sécurité fixées par décret.</p>"
        },
        {
          id: "article349",
          title: "Article 349",
          content: "<p>Des mesures complémentaires de sauvegarde et de sécurité et des moyens d'évacuation et de défense contre l'incendie peuvent être imposés par décret, aux propriétaires, aux constructeurs et aux exploitants de bâtiments et établissements ouverts au public. Ces mesures complémentaires doivent tenir compte des besoins particuliers des personnes handicapées ou à mobilité réduite.</p>"
        },
        {
          id: "article350",
          title: "Article 350",
          content: "<p>Dans le cas où un établissement recevant du public est à usage total ou partiel d'hébergement et que le maire a prescrit, par arrêté, à l'exploitant et au propriétaire les mesures nécessaires pour faire cesser la situation d'insécurité constatée par la commission de sécurité et, le cas échéant, pour réaliser des aménagements et travaux dans un délai fixé, le maire peut, à défaut d'exécution volontaire, et après mise en demeure demeurée infructueuse, procéder d'office aux travaux nécessaires pour mettre fin à la situation d'insécurité manifeste, et voir condamner l'exploitant à lui verser une provision à valoir sur le coût des travaux. En cas de litige sur les conditions d'entrée dans l'immeuble, le juge des référés statue.</p><p>Lorsque la commune procède d'office aux travaux, elle agit en lieu et place des propriétaires, pour leur compte et à leurs frais. Sa créance est recouvrée comme en matière de contributions directes.</p><p>Le maire peut également prononcer une interdiction temporaire d'habiter ou d'utiliser les lieux applicables jusqu'à la réalisation des mesures prescrites.</p><p>L'arrêté prévu à l'alinéa 1 précise que la non-exécution des travaux qu'il prescrit dans le délai fixé expose l'exploitant et le propriétaire au paiement d'une astreinte par jour de retard.</p><p>Le propriétaire de l'immeuble et l'exploitant du fonds de commerce sont solidairement tenus au paiement de l'astreinte à compter de la notification par le maire à chacun d'entre eux de l'arrêté appliquant l'astreinte.</p><p>Si les travaux prescrits par l'arrêté prévu à l'alinéa 1 n'ont pas été exécutés dans le délai fíxé, le maire peut également, sans attendre l'expiration du délai fixé par la mise en demeure, appliquer, par arrêté, une astreinte par jour de retard à l'encontre du propriétaire et de l'exploitant défaillants. Son montant peut être progressif dans le temps et modulé dans des conditions fixées par voie réglementaire, tenant compte de l'ampleur des mesures et travaux prescrits et des conséquences de la non-exécution.</p><p>L'astreinte court à compter de la notification de l'arrêté la prononçant et jusqu'à la complète exécution des travaux prescrits. Le recouvrement des sommes est engagé par trimestre échu.</p><p>Le maire peut, lors de la liquidation du dernier terme échu, consentir une remise de son produit si les travaux prescrits par l'arrêté prévu à l'alinéa 1 ont été exécutés et si le redevable établit que le non-respect du délai imposé pour l'exécution totale de ses obligations est exclusivement dû à des circonstances indépendantes de sa volonté. Le total des sommes demandées ne peut être supérieur au montant de l'amende prévue.</p><p>L'astreinte est recouvrée au bénéfice de la commune sur le territoire de laquelle est implanté l'établissement ayant fait l'objet de l'arrêté.</p><p>A défaut pour le maire de liquider le produit de l'astreinte, de dresser l'état nécessaire à son recouvrement et de le faire parvenir au représentant de l'Etat dans le département le mois qui suit la demande émanant de celui-ci, la créance est liquidée et recouvrée par l'Etat, après prélèvement de 4% pour frais de recouvrement.</p><p>L'application de l'astreinte et sa liquidation ne font pas obstacle à l'exécution d'office par l'autorité administrative des mesures et travaux prescrits par l'arrêté prévu à l'alinéa 1.</p>"

          id: "article359",

          content: "<p>Les cabines d'ascenseurs doivent être munies:</p><ul><li>de grilles de sécurité extensible;</li><li>de porte de cabine;</li><li>d'un dispositif de protection susceptible d'assurer un niveau de protection équivalent à ceux résultants des hypothèses ci-dessus.</li></ul><p>Ces dispositifs doivent être agréés par le ministre en charge de la Construction. Les caractéristiques des cabines d'ascenseurs doivent préserver l'accessibilité de la cabine à une personne circulant en fauteuil roulant et être conformes aux dispositions du chapitre 1 du sous-titre 1 du présent titre relatives à l'accessibilité aux personnes handicapées ou à mobilité réduite.</p>"
        },
        {
          id: "article360",
          title: "Article 360",
          content: "<p>Les dispositions de la présente sous-section s'appliquent aux ascenseurs qui sont destinés à desservir de manière permanente les bâtiments et les constructions.</p><p>Ne sont pas concernés les installations à câbles, y compris les funiculaires pour le transport public ou non des personnes, les ascenseurs spécialement conçus et construits à des fins militaires ou de maintien de l'ordre, les ascenseurs équipant les puits de mine, les élévateurs de machinerie de théâtre, les ascenseurs installés dans des moyens de transport, les ascenseurs liés à une machine et exclusivement destinés à l'accès au poste de travail de celle-ci et les ascenseurs de chantier.</p>"
        },
        {
          id: "article361",
          title: "Article 361",
          content: "<p>Les conditions d'application de la présente section sont fixées par voie réglementaire.</p><p>Le décret définit les exigences essentielles en matière de sécurité et de santé à respecter pour la mise sur le marché des ascenseurs et des composants de sécurité pour ascenseurs.</p><p>Le décret définit, les exigences de sécurité à respecter, y compris par les entreprises chargées de l'entretien. Il établit la liste des dispositifs de sécurité à installer ou les mesures équivalentes, en fonction notamment des risques liés à l'installation de l'ascenseur, à son mode d'utilisation et à son environnement.</p><p>Le décret détermine les dispositions minimales à prendre pour assurer l'entretien de l'ascenseur ainsi que les modalités de leur exécution et de justification de leur mise en œuvre.</p>"
        }
      ]

        },

    {
      title: "Section 6: Sécurité des immeubles à usage d'habitation",
      articles: [
        {
          id: "article369",
          title: "Article 369",
          content: "<p>Lorsque, du fait de la carence du ou des propriétaires, des équipements communs d'un immeuble collectif à usage principal d'habitation présentent un fonctionnement défectueux ou un défaut d'entretien de nature à créer des risques sérieux pour la sécurité des occupants ou à compromettre gravement leurs conditions d'habitation, le maire de la commune peut, par arrêté, prescrire leur remise en état de fonctionnement ou leur remplacement, en fixant le délai imparti pour l'exécution de ces mesures.</p><p>L'arrêté est notifié aux propriétaires et aux titulaires de droits réels immobiliers sur les locaux. Lorsque l'immeuble est la propriété d'une société civile dont les parts donnent droit ou non à l'attribution ou à la jouissance en propriété des locaux, la notification est faite au gérant tel qu'il figure au registre du commerce où la société est immatriculée. Lorsque les mesures prescrites ne portent que sur les parties communes d'un immeuble soumis aux dispositions du sous-titre 1 du titre 1 du livre 2 relatives à la copropriété, la notification aux copropriétaires est valablement faite au syndicat des copropriétaires.</p><p>A défaut de pouvoir identifier les personnes mentionnées à l'alinéa précédent, la notification les concernant est valablement effectuée par affichage à la mairie de la commune.</p><p>En cas d'urgence ou de menace grave et imminente, le maire ordonne préalablement les mesures provisoires indispensables pour écarter ce danger.</p>"
        },
        {
          id: "article370",
          title: "Article 370",
          content: "<p>L'arrêté du maire visé à l'article 369 ci-dessus est pris à l'issue d'une procédure contradictoire dont les modalités sont définies par voie réglementaire.</p><p>Lorsque les mesures prescrites n'ont pas été exécutées dans le délai fixé, le maire met en demeure le propriétaire ou le syndicat des copropriétaires d'y procéder dans un délai qu'il fixe et qui ne peut être inférieur à un mois.</p><p>A défaut de réalisation des travaux dans le délai imparti, le maire, par décision motivée, fait procéder d'office à leur exécution.</p><p>Si l'inexécution de travaux prescrits portant sur les parties communes d'un immeuble en copropriété résulte de la défaillance de certains copropriétaires, sur décision motivée du maire, la commune peut se substituer à ceux-ci pour les sommes exigibles à la date votée par l'assemblée générale des copropriétaires. Elle est alors subrogée dans les droits et actions du syndicat à concurrence des sommes par elle versées.</p><p>L'arrêté mentionné à l'article 369 ci-dessus précise que la non-exécution des mesures et travaux dans le délai fixé expose le propriétaire au paiement d'une astreinte par jour de retard dans les conditions prévues au présent article.</p><p>Si les mesures prescrites n'ont pas été exécutées dans le délai imparti, le maire peut également, sans attendre l'expiration du délai fixé par la mise en demeure, appliquer par arrêté une astreinte par jour de retard à l'encontre du propriétaire défaillant. Son montant peut être progressif dans le temps et modulé dans des conditions fixées par voie réglementaire, tenant compte de l'ampleur des mesures et travaux prescrits et des conséquences de la non-exécution.</p><p>L'astreinte court à compter de la notification de l'arrêté la prononçant et jusqu'à la complète exécution des mesures prescrites. Le recouvrement des sommes est engagé par trimestre échu.</p><p>Le maire peut, lors de la liquidation du dernier terme échu, consentir une remise de son produit si les mesures ou travaux prescrits par l'arrêté ont été exécutés et si le redevable établit que le non-respect du délai imposé pour l'exécution totale de ses obligations est exclusivement dû à des circonstances indépendantes de sa volonté.</p><p>L'astreinte est recouvrée dans les conditions prévues par les dispositions relatives aux produits communaux au bénéfice de la commune sur le territoire de laquelle est implanté l'immeuble ayant fait l'objet de l'arrêté.</p><p>A défaut pour le maire de liquider le produit de l'astreinte, de dresser l'état nécessaire à son recouvrement et de le faire parvenir au représentant de l'Etat dans le département dans le mois qui suit la demande émanant de celui-ci, la créance est liquidée et recouvrée par l'Etat, après prélèvement de 4% pour frais de recouvrement.</p><p>L'application de l'astreinte et sa liquidation ne font pas obstacle à l'exécution d'office par l'autorité administrative des mesures et travaux prescrits par l'arrêté prévu à l' article 369 ci-dessus.</p>"
        },
        {
          id: "article371",
          title: "Article 371",
          content: "<p>En cas d'urgence ou de menace grave et imminente, la juridiction administrative, sur demande du maire, après que celui-ci en ait informé les personnes visées au deuxième alinéa de l' article 369 ci-dessus désigne un expert chargé d'examiner l'état des équipements communs dans un délai de vingt-quatre heures suivant sa désignation et de proposer des mesures de nature à mettre fin à l'imminence du danger s'il la constate.</p><p>Si le rapport de l'expert constate l'urgence ou la menace grave et imminente, le maire ordonne les mesures provisoires permettant de garantir la sécurité des occupants et, si nécessaire, l'évacuation de l'immeuble.</p><p>Dans le cas où ces mesures provisoires ne sont pas exécutées dans le délai imparti par l'arrêté, le maire peut les faire exécuter d'office et aux frais des propriétaires et des titulaires de droits réels immobiliers concernés.</p><p>Si les mesures exécutées n'ont pas permis de mettre fin aux risques sérieux pour la sécurité des occupants ou de rétablir leurs conditions d'habitation, le maire poursuit la procédure dans les conditions prévues à l'article 370 ci-dessus.</p>"
        },
        {
          id: "article372",
          title: "Article 372",
          content: "<p>Lorsque la commune se substitue aux propriétaires défaillants et fait usage des pouvoirs d'exécution d'office qui lui sont reconnus, elle agit en lieu et place des propriétaires, pour leur compte et à leurs frais.</p><p>Les frais de toute nature, résultant de l'exécution d'office ou de la substitution d'office aux propriétaires ou copropriétaires défaillants, sont avancés par la commune et recouvrés comme en matière de contributions directes. Si l'immeuble relève du statut de la copropriété, le titre de recouvrement est adressé à chaque copropriétaire pour la fraction de créance dont il est redevable.</p><p>Lorsque la commune s'est substituée à certains copropriétaires défaillants, le montant de la créance due par ceux-ci est majoré de celui des intérêts moratoires calculés au taux d'intérêt légal, à compter de la date de notification par le maire de la décision de substitution aux copropriétaires défaillants.</p><p>Les créances qui n'ont pu être recouvrées par la commune sont mises à la charge de l'Etat ou, par subrogation de celui-ci dans ses droits et obligations, d'une personne publique s'y substituant.</p>"
        },
        {
          id: "article373",
          title: "Article 373",
          content: "<p>Le maire exerce les compétences mentionnées au présent chapitre au nom de l'Etat. En cas de carence du maire, le représentant de l'Etat dans le département, peut se substituer à lui.</p>"
        },
        {
          id: "article374",
          title: "Article 374",
          content: "<p>Un décret en Conseil des ministres détermine les conditions d'application du présent chapitre de la présente sous-section et établit la liste des équipements communs visés à l'article 369 ci-dessus.</p>"
        },
        {
          id: "article375",
          title: "Article 375",
          content: "<p>Sans préjudice des dispositions prévues à la section 1 du chapitre 1 du sous-titre 2 ci-dessus relatives aux dispositions générales relatives à la protection contre l'incendie qui demeurent applicables, les règles spécifiques relatives à la protection des bâtiments d'habitation contre l'incendie sont fixées par arrêté.</p>"
        },
        {
          id: "article376",
          title: "Article 376",
          content: "<p>Lorsque, dans un local attenant ou compris dans un immeuble collectif à usage principal d'habitation, sont entreposées des matières explosives ou inflammables, soit en infraction avec les règles de sécurité qui lui sont applicables, soit dans des conditions de nature à créer des risques sérieux pour la sécurité des occupants, le maire peut mettre en demeure, par arrêté motivé, la personne responsable de la gestion ou de la jouissance du local de prendre toutes les mesures nécessaires pour se conformer aux règles de sécurité applicables ou pour mettre fin au danger dans un délai qu'il fixe.</p><p>Faute d'exécution par la personne qui y est tenue, le maire y procède d'office aux frais de celle-ci; il peut, si nécessaire, interdire l'accès du local jusqu'à la réalisation des mesures.</p>"
        },
        {
          id: "article377",
          title: "Article 377",
          content: "<p>Le propriétaire d'un logement, qu'il soit occupant du logement ou non, installe dans celui-ci au moins un détecteur de fumée normalisé et s'assure, si le logement est mis en location, de son bon fonctionnement lors de l'établissement d'un état des lieux.</p><p>L'occupant d'un logement, qu'il soit locataire ou propriétaire, veille à l'entretien et au bon fonctionnement de ce dispositif et assure son renouvellement, si nécessaire, tant qu'il occupe le logement.</p><p>L'occupant du logement notifie cette installation à l'assureur avec lequel il a conclu un contrat garantissant les dommages d'incendie.</p>"
        },
        {
          id: "article378",
          title: "Article 378",
          content: "<p>Les modalités d'application de l'article 377 ci-dessus, notamment les caractéristiques techniques du détecteur de fumée normalisé, les conditions de son installation, de son entretien, de son fonctionnement ainsi que les mesures de sécurité à mettre en œuvre par les propriétaires dans les parties communes des immeubles pour prévenir le risque d'incendie sont déterminées par voie règlementaire.</p>"
        }
      ]
    },
