    {
      title: "LIVRE 3: DISPOSITIONS PENALES ET DISPOSITIONS TRANSITOIRES ET FINALES",
      articles: []
    },
    {
      title: "TITRE I: DISPOSITIONS PENALES",
      articles: []
    },
    {
      title: "Sous-titre 1: Dispositions relatives aux infractions sur le permis de construire",
      articles: [
        {
          id: "article519",
          title: "Article 519",
          content: "<p>Sans préjudice de la procédure de démolition des constructions ou installations, est puni d'une peine d'emprisonnement d'un à six mois, quiconque entreprend, implante, modifie, démoli, ou fait entreprendre, implanter, modifier ou démolir des constructions ou installations sans autorisation préalable de l'autorité compétente.</p><p>Les architectes, entrepreneurs, bénéficiaires des travaux ou autres responsables de leur exécution sont punis des mêmes peines.</p>"
        },
        {
          id: "article520",
          title: "Article 520",
          content: "<p>Lorsque les infractions ci-dessus sont constatées dans une zone non encore aménagée ou lorsqu'il s'agit d'un établissement recevant du public, ou encore lorsqu'il s'agit d'une zone déclarée inconstructible, les peines sont l'emprisonnement de 3 mois à 12 mois.</p><p>En cas de récidive, le maximum des peines visé aux article 519 et article 520 ci-dessus est porté au double.</p>"
        },
        {
          id: "article521",
          title: "Article 521",
          content: "<p>Les infractions sont constatées par des agents assermentés ou par des officiers de police judiciaire.</p><p>Les procès-verbaux de constat peuvent être transmis directement au procureur dans les conditions fixées par voie règlementaire.</p>"
        },
        {
          id: "article522",
          title: "Article 522",
          content: "<p>Le ministère en charge de la Construction et de l'Urbanisme peut transiger avant jugement définitif, uniquement dans les cas d'infraction prévue à l'article 519 ci-dessus.</p><p>La transaction intervenue et exécutée avant jugement définitif éteint l'action publique.</p><p>Les conditions d'exercice du droit de transiger sont définies par décret pris en Conseil des ministres.</p>"
        },
        {
          id: "article523",
          title: "Article 523",
          content: "<p>Sans préjudice des peines pénales prévues aux articles article 519 et article 520 ci-dessus indiquées, des amendes administratives peuvent être infligées aux personnes ayant participé à l'exécution desdites constructions ou installations.</p><p>Les amendes administratives sont fixées selon les modalités suivantes:</p><ul><li>12 500 francs par mètre carré hors oeuvre de tous les planchers pour les bâtiments à usage d'habitation;</li><li>15 000 francs par mètre carré hors œuvre de tous les planchers pour les bâtiments à usage de bureau ou de commerce;</li><li>20 000 francs par mètre carré hors œuvre de tous les planchers pour les bâtiments industriels.</li></ul>"
        },
        {
          id: "article524",
          title: "Article 524",
          content: "<p>Sans préjudice de la démolition des constructions et installations et de la saisie de matériels, quiconque poursuit les travaux au mépris de l'arrêt des travaux ordonné par les services compétents est soumis à des amendes administratives selon les modalités suivantes:</p><ul><li>-15 000 francs par mètre carré hors œuvre de tous les planchers pour les bâtiments à usage d'habitation;</li><li>20 000 francs par mètre carré hors œuvre de tous les planchers pour les bâtiments à usage de bureau ou de commerce;</li><li>25 000 francs par mètre carré hors œuvre de tous les planchers pour les bâtiments industriels.</li></ul>"
        },
        {
          id: "article525",
          title: "Article 525",
          content: "<p>Quiconque n'observe pas la formalité d'affichage sur le terrain du panneau de chantier est soumis à une amende administrative de 100 000 francs.</p>"
        },
        {
          id: "article526",
          title: "Article 526",
          content: "<p>Le produit des amendes administratives est recouvré par les services du Guichet unique du permis de construire.</p>"
        },
        {
          id: "article527",
          title: "Article 527",
          content: "<p>Les modalités de recouvrement des amendes administratives et leur répartition sont déterminées par arrêté conjoint du ministre chargé de la Construction et de l'Urbanisme et du ministre chargé du Budget et du Portefeuille de l'Etat.</p>"
        }
      ]
    },
    {
      title: "Sous-titre 2: Dispositions relatives aux normes générales de construction et aux normes spéciales de sécurité",
      articles: [
        {
          id: "article528",
          title: "Article 528",
          content: "<p>En cas de continuation des travaux nonobstant la décision judiciaire en ordonnant l'interruption, les personnes mentionnées au premier alinéa de l'article 528 encourent un emprisonnement d'un à trois mois et une amende de 500 000 à 5 000 000 de francs.</p>"
        },
        {
          id: "article529",
          title: "Article 529",
          content: "<p>Sont punis d'une amende de 500 000 à 5 000 000 de francs, les utilisateurs du sol, les bénéficiaires des travaux ou toute autre personne responsable de l'exécution de travaux, qui méconnaissent les obligations imposées au livre 1 titre 5 sous-titre 1,2,3 de la présente loi et les règlements pris pour son application.</p><p>En cas de récidive, une peine d'emprisonnement d'un à six mois peut en outre être prononcée.</p>"
        }
      ]
    },
    {
      title: "Sous-titre 3: Coordination sécurité-protection-santé",
      articles: [
        {
          id: "article530",
          title: "Article 530",
          content: "<p>Est puni d'une amende de 500 000 à 5 000 000 de francs quiconque en qualité de maître d'ouvrage s'abstient:</p><ul><li>de désigner le coordonnateur en matière de sécurité et de santé, en méconnaissance de l'article 49;</li><li>d'établir le plan général de coordination prévu à l'article 62;</li><li>de constituer le dossier des interventions ultérieures sur l'ouvrage prévu à l'article 64.</li></ul>"
        }
      ]
    },
    {
      title: "Sous-titre 4: Sociétés de construction",
      articles: [
        {
          id: "article531",
          title: "Article 531",
          content: "<p>Est puni d'un emprisonnement de quinze jours à douze mois et d'une amende de 500 000 à 10 000 000 de francs ou de l'une de ces deux peines seulement, toute personne qui exige ou accepte un versement, un dépôt de fonds, une souscription ou une acceptation d'effets de commerce en violation des dispositions du sous-titre 1 du titre II du livre 1, du chapitre 2 du sous-titre 4 du titre I livre 1 et du chapitre 4 du sous-titre 1 du titre III du livre 1.</p>"
        },
        {
          id: "article532",
          title: "Article 532",
          content: "<p>Est puni d'un emprisonnement de quinze jours à douze mois et d'une amende de 500 000 à 5 000 000 de francs, ou de l'une de ces deux peines seulement, quiconque, tenu à la conclusion d'un contrat par application de l'article 186 ou de ' article 203, a entrepris l'exécution des travaux sans avoir conclu un contrat écrit ou sans avoir obtenu la garantie de livraison définie à l' article 190.</p>"
        },
        {
          id: "article533",
          title: "Article 533",
          content: "<p>Est puni d'un emprisonnement de quinze jours à douze mois et d'une amende de 500 000 à 5 000 000 de francs ou de l'une de ces deux peines seulement, quiconque, chargé de l'une des opérations mentionnées à l'article 502, n'aura pas conclu par écrit un contrat de sous-traitance avant l'exécution des travaux de chacun des lots de l'immeuble conformément aux dispositions de l'article 182 de la présente loi.</p>"
        }
      ]
    },
    {
      title: "Sous-titre 5: Contrat de promotion immobilière",
      articles: [
        {
          id: "article534",
          title: "Article 534",
          content: "<p>Ne peuvent participer, à quelque titre que ce soit, directement ou indirectement, pour leur compte ou celui d'autrui, à la conclusion d'un contrat de vente d'immeuble à construire ou de promotion immobilière, les personnes ayant fait l'objet d'une condamnation pénale pour les infractions suivantes :</p><ul><li>faux et usage de faux en écriture privée, de commerce ou de banque;</li><li>vol, recel, escroquerie, abus de confiance, extorsion de fonds, valeur ou signature, délits punis des peines de l'escroquerie, de l'abus de confiance ou de la banqueroute;</li><li>infraction à la législation et à la réglementation sur les stupéfiants;</li><li>détournement de deniers publics.</li></ul>"
        },
        {
          id: "article535",
          title: "Article 535",
          content: "<p>Est punie des peines prévues au Code pénal pour le détournement de fonds avec circonstances aggravantes le cas échéant au regard de la valeur de la somme détournée, quiconque exige ou accepte un versement, un dépôt de fonds, une souscription ou une acceptation d'effets de commerce en violation des article 119 à article 121, article 128, article 147, article 149 et Article 151 ou qui ayant reçu ou accepté un ou plusieurs versements dépôts ou souscription d'effets de commerce, à l'occasion de la conclusion d'un contrat de vente d'immeuble à construire ou de promotion immobilière, soumis aux dispositions des titres premier et 2 de la présente loi, aura détourné tout ou partie des sommes.</p>"
        }
      ]
    },
    {
      title: "Sous-titre 6: Assurances des travaux de construction",
      articles: [
        {
          id: "article536",
          title: "Article 536",
          content: "<p>Quiconque contrevient aux dispositions du sous-titre 4 du titre III du livre 1 relatif aux assurances de travaux de construction est puni d'un emprisonnement d'un à douze mois et d'une amende de 500 000 à 5 000 000 de francs ou de l'une de ces deux peines seulement.</p>"
        },
        {
          id: "article537",
          title: "Article 537",
          content: "<p>Les dispositions de l'article précédent ne s'appliquent pas à la personne physique construisant un logement pour l'occuper elle-même ou le faire occuper par son conjoint, ses ascendants, ses descendants ou ceux de son conjoint.</p>"
        }
      ]
    },
    {
      title: "Sous-titre 7: Bâtiments insalubres",
      articles: [
        {
          id: "article538",
          title: "Article 538",
          content: "<p>Est puni d'un à douze mois d'emprisonnement, d'une amende de 300 000 à 3 000 000 de francs, et le cas échéant, des peines complémentaires et mesures de sûreté prévues au Code pénal, quiconque:</p><ul><li>contraint un occupant à renoncer aux droits qu'il détient, de le menacer, de commettre à son égard tout acte d'intimidation ou de rendre impropres à l'habitation les lieux qu'il occupe;</li><li>perçoit un loyer ou toute autre somme en contrepartie de l'occupation du logement, y compris rétroactivement, en méconnaissance des dispositions de l'article 346;</li></ul>"
        }
      ]
    },
    {
      title: "Sous-titre 8: Bâtiments menaçant ruine",
      articles: [
        {
          id: "article539",
          title: "Article 539",
          content: "<p>Est puni d'un d'emprisonnement de trois mois à trois ans et d'une amende de 500 000 à 10 000 000 de francs, quiconque refuse d'exécuter les travaux prescrits en application des article 340 et article 341, sans motif légitime constaté après mise en demeure.</p>"
        },
        {
          id: "article540",
          title: "Article 540",
          content: "<p>Est puni d'un emprisonnement de trois mois à trois ans, d'une amende de 300 000 à 3 000 000 de francs et, le cas échéant, des peines complémentaires et mesures de sûreté prévues au Code pénal, quiconque :</p><ul><li>dégrade, détériore, détruit des locaux ou les rend impropres à l'habitation de quelque façon que ce soit dans le but d'en faire partir les occupants lorsque ces locaux sont visés par un arrêté de péril;</li><li>de mauvaise foi, ne respecte pas une interdiction d'habiter et d'utiliser des locaux prise en application de l'article 340 et l'interdiction de les louer ou mettre à disposition prévue par l'article 342.</li></ul>"
        }
      ]
    },
    {
      title: "Sous-titre 9: Etablissements recevant du public",
      articles: [
        {
          id: "article541",
          title: "Article 541",
          content: "<p>Est puni d'un emprisonnement de trois mois à trois ans et d'une amende de 500 000 à 10 000 000 de francs et, le cas échéant, des peines complémentaires et mesures de sûreté prévues au Code pénal, quiconque refuse sans motif légitime, constaté après mise en demeure, d'exécuter les travaux prescrits en application de l'alinéa 1 de l'article 466.</p>"
        },
        {
          id: "article542",
          title: "Article 542",
          content: "<p>Est puni d'un emprisonnement de quinze jours à six mois et d'une amende de 300 000 à 5 000 000 de francs et, le cas échéant, des peines complémentaires et mesures de sûreté prévues au Code pénal, quiconque loue des chambres ou locaux dans des conditions qui conduisent manifestement à leur sur occupation.</p>"
        }
      ]
    },
    {
      title: "Sous-titre 10: Dispositions applicables aux piscines",
      articles: [
        {

function renderLaw(data){
  const wrapper = document.getElementById('mainWrapper');
  wrapper.innerHTML = '';
  const toc = document.getElementById('tocList');
  toc.innerHTML = '';
  const articleEls = [];

  if (Array.isArray(data.chapters)) {
    data.chapters.forEach((ch, ci) => {
      const sec = document.createElement('section');
      sec.className = 'group';
      const h2 = document.createElement('h2');
      h2.textContent = ch.title || `Chapitre ${ci+1}`;
      sec.appendChild(h2);

      (ch.articles || []).forEach((a, ai) => {
        const art = document.createElement('div');
        art.className = 'article';
        art.id = a.id || `art_${ci}_${ai}`;

        const header = document.createElement('div');
        header.className = 'article-header';
        const h3 = document.createElement('h3');
        h3.textContent = a.title || `Article ${ai+1}`;
        const fsBtn = document.createElement('button');
        fsBtn.className = 'open-fs';
        fsBtn.title = 'Plein écran';
        fsBtn.innerHTML = '<i class="fas fa-maximize"></i>';
        fsBtn.addEventListener('click', () => openFullscreenById(art.id));
        header.appendChild(h3);
        header.appendChild(fsBtn);

        const content = document.createElement('div');
        content.className = 'article-content';
        content.innerHTML = a.content || '';

        art.appendChild(header);
        art.appendChild(content);
        sec.appendChild(art);
        articleEls.push(art);
      });

      wrapper.appendChild(sec);

      const chapTitle = document.createElement('div');
      chapTitle.textContent = ch.title || `Chapitre ${ci+1}`;
      chapTitle.style.margin = '8px 0 4px';
      chapTitle.style.color = '#1a4177';
      chapTitle.style.fontWeight = '700';
      toc.appendChild(chapTitle);
      const sub = document.createElement('div');
      sub.className = 'toc-sub';
      (ch.articles||[]).forEach((a, ai) => {
        const link = document.createElement('a');
        const id = a.id || `art_${ci}_${ai}`;
        link.href = `#${id}`;
        link.textContent = a.title || `Article ${ai+1}`;
        link.addEventListener('click', closeToc);
        sub.appendChild(link);
      });
      toc.appendChild(sub);
    });
  } else {
    const sec = document.createElement('section');
    sec.className = 'group';
    const h2 = document.createElement('h2');
    h2.textContent = data.title || 'Texte intégral';
    sec.appendChild(h2);
    (data.articles || []).forEach((a, ai) => {
      const art = document.createElement('div');
      art.className = 'article';
      art.id = a.id || `article_${ai}`;
      const header = document.createElement('div');
      header.className = 'article-header';
      const h3 = document.createElement('h3');
      h3.textContent = a.title || `Article ${ai+1}`;
      const fsBtn = document.createElement('button');
      fsBtn.className = 'open-fs';
      fsBtn.title = 'Plein écran';
      fsBtn.innerHTML = '<i class="fas fa-maximize"></i>';
      fsBtn.addEventListener('click', () => openFullscreenById(art.id));
      header.appendChild(h3);
      header.appendChild(fsBtn);
      const content = document.createElement('div');
      content.className = 'article-content';
      content.innerHTML = a.content || '';
      art.appendChild(header);
      art.appendChild(content);
      sec.appendChild(art);
      articleEls.push(art);

      const link = document.createElement('a');
      link.href = `#${art.id}`;
      link.textContent = a.title || `Article ${ai+1}`;
      link.addEventListener('click', closeToc);
      document.getElementById('tocList').appendChild(link);
    });
    wrapper.appendChild(sec);
  }
  window.__articlesOrder = articleEls.map(el => el.id);
}

// TOC controls
const tocBtn = document.getElementById('tocFloatBtn');
const tocHeaderBtn = document.getElementById('tocHeaderBtn');
const tocPanel = document.getElementById('tocPanel');
const tocOverlay = document.getElementById('tocOverlay');
function openToc(){ tocPanel.classList.add('open'); tocOverlay.classList.add('show'); }
function closeToc(){ tocPanel.classList.remove('open'); tocOverlay.classList.remove('show'); }
tocBtn.addEventListener('click', openToc);
tocHeaderBtn.addEventListener('click', openToc);
tocOverlay.addEventListener('click', closeToc);

// Voice reading
const synth = window.speechSynthesis;
let speakingId = null;
const now = document.getElementById('nowReading');
function textFrom(el){ return el.querySelector('.article-content')?.innerText?.trim() || ''; }
function highlight(id, on){ const el = document.getElementById(id); if(!el) return; el.classList.toggle('reading', !!on); }
function speakById(id){
  const el = document.getElementById(id); if(!el) return;
  const text = textFrom(el); if(!text) return;
  stopSpeaking();
  const ut = new SpeechSynthesisUtterance(text); ut.lang='fr-FR'; ut.rate=1;
  ut.onend = () => { highlight(id,false); speakingId=null; now.textContent='Prêt'; };
  synth.speak(ut); speakingId=id; highlight(id,true);
  now.textContent = 'Lecture : ' + (el.querySelector('.article-header h3')?.textContent || '');
}
function pauseSpeaking(){ if(synth.speaking && !synth.paused) synth.pause(); }
function resumeSpeaking(){ if(synth.paused) synth.resume(); }
function stopSpeaking(){ if(synth.speaking){ synth.cancel(); } if(speakingId){ highlight(speakingId,false); speakingId=null; } }
document.getElementById('vPlay').addEventListener('click', () => { const visible = findMostVisibleArticleId() || window.__articlesOrder?.[0]; if(visible) speakById(visible); });
document.getElementById('vPause').addEventListener('click', () => { if(synth.paused) resumeSpeaking(); else pauseSpeaking(); });
document.getElementById('vStop').addEventListener('click', stopSpeaking);
function findMostVisibleArticleId(){ const arts = Array.from(document.querySelectorAll('.article')); let best=null, bestArea=0; const vh = window.innerHeight; arts.forEach(a=>{ const r=a.getBoundingClientRect(); const ov=Math.max(0, Math.min(vh,r.bottom)-Math.max(0,r.top)); if(ov>bestArea){ bestArea=ov; best=a; } }); return best?.id || null; }

// Fullscreen
const fsOverlay = document.getElementById('fsOverlay');
const fsTitle = document.getElementById('fsTitle');
const fsBody = document.getElementById('fsBody');
const fsPrev = document.getElementById('fsNavPrev');
const fsNext = document.getElementById('fsNavNext');
const fsClose = document.getElementById('fsClose');
let fsCurrentIndex = -1;
function openFullscreenById(id){
  const order = window.__articlesOrder || []; const idx = order.indexOf(id); if(idx === -1) return;
  fsCurrentIndex = idx;
  const el = document.getElementById(id);
  fsTitle.textContent = el.querySelector('.article-header h3')?.textContent || 'Article';
  fsBody.innerHTML = el.querySelector('.article-content')?.innerHTML || '';
  fsOverlay.classList.add('show'); fsOverlay.setAttribute('aria-hidden','false');
  updateFsNav();
}
function closeFullscreen(){ fsOverlay.classList.remove('show'); fsOverlay.setAttribute('aria-hidden','true'); }
function updateFsNav(){ const order = window.__articlesOrder || []; fsPrev.style.display = fsCurrentIndex > 0 ? 'grid' : 'none'; fsNext.style.display = fsCurrentIndex < order.length - 1 ? 'grid' : 'none'; }
fsClose.addEventListener('click', closeFullscreen);
fsPrev.addEventListener('click', () => { const order = window.__articlesOrder || []; if(fsCurrentIndex > 0) openFullscreenById(order[fsCurrentIndex - 1]); });
fsNext.addEventListener('click', () => { const order = window.__articlesOrder || []; if(fsCurrentIndex < order.length - 1) openFullscreenById(order[fsCurrentIndex + 1]); });

// Init
renderLaw(lawData);
</script>
