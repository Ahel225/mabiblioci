const lawData = {
  title: "LOI n 2019-576 du 26 juin 2019 instituant Code de la Construction et de l'Habitat",
  subtitle: "Code de la Construction et de l'Habitat",
  chapters: [
    {
      title: "LIVRE PRELIMINAIRE - DISPOSITIONS GENERALES",

    {
      title: "TITRE I: OBJET ET CHAMP D'APPLICATION",
      articles: [
        {
          id: "article1",
          title: "Article 1",
          content: "<p>La présente loi institue le << Code de la Construction et de l'Habitat >> en Côte d'Ivoire.</p>"
        },
        {
          id: "article2",
          title: "Article 2",
          content: "<p>Le << Code de la Construction et de l'Habitat >>> a pour objet de régir toutes les activités en matière de construction et d'habitat et de logement sur l'étendue du territoire de la République de Côte d'Ivoire.</p>"
        }
      ]
    },
    {
      title: "TITRE II: DEFINITIONS",
      articles: [
        {
          id: "article3",
          title: "Article 3",
          content: "<p>Au sens de la présente loi, on entend par:</p><ul><li><strong>adjudicataire,</strong> la personne bénéficiaire du marché attribué;</li><li><strong>antépénultième,</strong> qui précède l'avant dernier;</li><li><strong>bail à usage d'habitation ou bail,</strong> le contrat qui consiste à mettre en location un immeuble ou un local servant d'habitation;</li><li><strong>bail à construction,</strong> contrat par lequel le preneur s'engage, à titre principal, à édifier des constructions sur le terrain du bailleur et à les conserver en bon état d'entretien pendant toute la durée du bail;</li><li><strong>bailleur,</strong> la personne physique ou morale, propriétaire d'un immeuble ou local à usage d'habitation, ou la personne physique ou morale dûment mandatée par elle, qui décide de le donner à bail;</li><li><strong>capacité,</strong> la capacité désigne le nombre de personnes que peut abriter à un instant t, un établissement abritant du public. Dans le cadre de ce Code, les capacités ont été alignées sur la nomenclature du Groupement des Sapeurs-Pompiers militaires de Côte d'Ivoire.</li><li><strong>caution hypothécaire,</strong> personne physique ou morale qui apporte un ou plusieurs bien(s) immobilier(s) en garantie d'un prêt contracté par une autre personne;</li><li><strong>certificat de conformité,</strong> le document délivré par la même autorité administrative attestant la conformité des travaux réalisés, au projet ayant fait l'objet du permis délivré ;</li><li><strong>cession de bail à usage d'habitation,</strong> le contrat par lequel un locataire transmet, avec l'autorisation du bailleur, son bail à usage d'habitation à une autre personne appelée cessionnaire, qui devient le nouveau locataire;</li><li><strong>cœfficient d'occupation du sol,</strong> le rapport permettant de mesurer la densité de l'occupation du sol en urbanisme;</li><li><strong>co-indivisaire,</strong> le propriétaire d'un bien indivis;</li><li><strong>colocation,</strong> le contrat par lequel deux ou plusieurs personnes prennent en location un même immeuble ou local à usage d'habitation appartenant au bailleur et sont, de par cette convention, liées solidairement envers lui;</li><li><strong>construction,</strong> l'édification de bâtiment qui sert d'habitation ou à l'exercice d'activités économiques, professionnelles ou artisanales;</li><li><strong>constructeur de l'ouvrage,</strong> tout architecte, ingénieur, entrepreneur, promoteur, technicien lié au maître de l'ouvrage, par un contrat de louage d'ouvrage ou lié par un cahier des charges déclaré conforme par les services compétents du ministère en charge de la Construction et de l'Urbanisme;</li><li>Toute personne physique ou morale qui vend, après achèvement, un ouvrage qu'elle a construit ou fait construire.</li><li><strong>Contrat de bail à usage d'habitation,</strong> le contrat par lequel, le bailleur s'oblige à faire jouir le locataire d'un immeuble ou local à usage d'habitation pendant un certain temps et moyennant un loyer que celui-ci s'oblige à lui payer;</li><li><strong>contrat de réservation,</strong> le contrat qui engage un promoteur immobilier à réserver à un futur acquéreur un logement dans son programme à construire ou en construction.</li><li><strong>dépôt de garantie,</strong> la somme d'argent demandée par le propriétaire au locataire à la signature du contrat de bail, sachant que le propriétaire conserve cette somme pendant toute la durée de la location;</li><li><strong>diagnostic technique immobilier,</strong> le diagnostic technique immobilier est le contrôle d'un local à usage d'habitation, réalisé par un service habilité, destiné à établir un bilan de l'état sanitaire du bien en vue de la préservation de la santé de ses occupants;</li><li><strong>droit de préemption,</strong> le droit reconnu d'acquérir en cas d'aliénation, la propriété d'un ou de plusieurs immeubles, ou l'acquisition de droits réels immobiliers, par préférence à tout autre acquéreur;</li><li><strong>facteur de risque,</strong> un attribut, une caractéristique, une exposition, un évènement, une condition dont la survenue est susceptible d'avoir un impact négatif sur la stabilité du bâtiment et l'intégrité physique des occupants;</li><li><strong>force majeure,</strong> un événement échappant au contrôle des parties, qui ne pouvait être raisonnablement prévu lors de la conclusion du contrat et dont les effets ne peuvent être évités par des mesures appropriées, empêche l'exécution de leur obligation;</li><li><strong>gage,</strong> un contrat par lequel une personne remet à son créancier un objet mobilier ou une valeur pour assurer l'exécution de ses engagements;</li><li><strong>garde-corps,</strong> ou rambarde, une barrière de protection placée, sur les côtés d'un escalier ouvert ou sur le pourtour d'un palier, d'un balcon, d'une mezzanine ou d'une terrasse afin de protéger d'une chute;</li><li><strong>hauteur,</strong> le niveau du sol le plus haut utilisable par les engins des services publics de secours et de lutte contre l'incendie par rapport au plancher bas du dernier niveau accessible. En règle générale, la hauteur entre deux étages varie de trois à quatre mètres ;</li><li><strong>immeuble insalubre,</strong> un immeuble dangereux pour la santé des occupants ou pour celle du voisinage du fait de son état ou de ses conditions d'occupation;</li><li><strong>immeuble menaçant ruine,</strong> un immeuble présentant un danger pour la sécurité des occupants, des voisins ou des passants en raison de son état de dégradation avancé;</li><li><strong>ingénierie,</strong> l'ensemble des prestations intellectuelles, scientifiques, technologiques ou techniques, au service d'un donneur d'ordre public ou privé, et nécessaire à l'optimisation des investissements matériels ou immatériels. Ces prestations couvrent toutes les phases de développement de l'investissement depuis les études d'identification et de faisabilité jusqu'à la mise en service, en passant par les études de détail et la supervision de la réalisation;</li><li><strong>isolation thermique,</strong> le matériau qui permet d'empêcher la chaleur ou le froid de s'échapper d'une enceinte close;</li><li><strong>locataire ou preneur,</strong> la personne physique ou morale qui prend en bail un immeuble ou local à usage d'habitation;</li><li><strong>loueur d'ouvrage,</strong> la personne liée avec le maître d'ouvrage par un contrat de louage d'ouvrage (architecte, bureau d'études, entrepreneur...) et assujettie à la responsabilité décennale des constructeurs;</li><li><strong>loyer,</strong> le prix payé mensuellement au bailleur par le locataire ou preneur d'un immeuble ou local à usage d'habitation;</li><li><strong>maître d'œuvre,</strong> la personne physique ou morale désignée par ce terme dans les documents contractuels et chargée par le maître d'ouvrage de diriger l'exécution des travaux. Il veille à la bonne exécution des ouvrages immobiliers. Il a la responsabilité de la livraison des travaux ou ouvrages immobiliers.</li><li><strong>maître d'ouvrage,</strong> la personne physique ou morale désignée par ce terme dans les documents contractuels et pour le compte de qui les travaux ou ouvrages immobiliers sont effectués. Il est le propriétaire de l'ouvrage immobilier;</li><li><strong>nantissement,</strong> la garantie en nature que le débiteur remet à un créancier;</li><li><strong>pavillon témoin,</strong> une unité d'habitation construite dans le but de simuler l'aménagement final d'une maison ou d'un appartement, généralement lors de programmes de construction de lotissements ou d'immeubles d'habitation;</li><li><strong>permis de construire,</strong> le document demandé par le maître d'ouvrage ou le maître d'œuvre, et délivré par l'autorité administrative compétente, autorisant la réalisation de l'ouvrage concerné;</li><li><strong>permis de démolir;</strong> le document délivré par la même autorité administrative autorisant la démolition de tout ou partie d'un ouvrage;</li><li><strong>permis de modifier,</strong> le document délivré par la même autorité administrative autorisant la transformation des parties d'un ouvrage;</li><li><strong>promoteur immobilier,</strong> la personne morale qui réalise des opérations d'aménagement et de construction de bâtiments, notamment de logements au profit d'accédant à la propriété foncière et/ou immobilière;</li><li><strong>restauration immobilière,</strong> l'opération d'aménagement qui consiste à sauvegarder et à mettre en valeur des immeubles et monuments défectueux;</li><li><strong>réseaux de drainage,</strong> les réseaux formés par l'ensemble des cours d'eau (ruisseaux, rivière, éventuellement fleuve) des lacs et de leurs connexions d'un bassin hydrographique donné;</li><li><strong>risque à la construction et à l'usage,</strong> la probabilité ou la possibilité de survenue d'un évènement indésirable ou d'un aléa du fait d'un facteur ou de la combinaison de plusieurs facteurs (facteurs de risques) relatifs à la construction et à l'usage du bâtiment. Le risque est caractérisé par son occurrence et sa criticité;</li><li><strong>sous-location,</strong> le contrat par lequel une personne appelée sous-locataire, convient avec le locataire, après autorisation du bailleur, de prendre en bail tout ou partie d'un immeuble ou local à usage d'habitation;</li><li><strong>syndic,</strong> une personne physique ou morale chargée de la gestion de la copropriété;</li><li><strong>travaux de ravalement,</strong> les travaux de remise à neuf du revêtement d'origine d'une façade sans toucher à la structure de l'édifice.</li></ul>"
        }
      ]
    },
    {
      title: "TITRE III: CADRE INSTITUTIONNEL",
      articles: [
        {
          id: "article4",
          title: "Article 4",
          content: "<p>Le Gouvernement élabore et met en œuvre la politique de l'Etat de Côte d'Ivoire en matière de construction et d'habitat.</p><p>La politique de l'habitat vise généralement à fournir à chaque citoyen un logement décent à un prix abordable.</p><p>Le département ministériel en charge de la construction, de l'habitat et du logement exerce pour le compte de l'Etat, l'ensemble des compétences dévolues à ce dernier dans le cadre du présent Code.</p><p>L'accès à un logement décent est un droit fondamental du citoyen garanti par l'Etat.</p>"
        },
        {
          id: "article5",
          title: "Article 5",
          content: "<p>Le ministre chargé de la Construction et de l'Habitat présente, tous les deux ans, un rapport sur la situation du logement en Côte d'Ivoire.</p><p>Ce rapport est composé:</p><ul><li>de l'évaluation de l'offre et des besoins en matière de logement;</li><li>des données sur l'évolution des loyers;</li><li>du bilan sur l'état de mise en œuvre de la politique sociale en matière de logement.</li></ul>"
        },
        {
          id: "article6",
          title: "Article 6",
          content: "<p>Les structures consultatives ci-après, seront créées par décret dans le domaine de la Construction, de l'Habitat et de l'Urbanisme :</p><ul><li>le Conseil national de la Construction, de l'Habitat et de l'Urbanisme (CNCHU);</li><li>les Commissions régionales de la Construction de l'Habitat et de l'Urbanisme: (CRCHU).</li></ul><p>Ces structures appuient les activités du ministère en charge de la Construction, de l'Habitat et de l'Urbanisme dans la mise en œuvre de la politique nationale de la Construction, de l'Habitat et de l'Urbanisme.</p>"
        }
      ]
    },
    {
      title: "LIVRE 1: CONSTRUCTION DE L'IMMEUBLE",
      articles: []
    },
    {
      title: "TITRE I: REGLES DE LA CONSTRUCTION",
      articles: []
    },
    {
      title: "Sous-titre 1: Généralités",
      articles: [
        {
          id: "article7",
          title: "Article 7",
          content: "<p>Les bâtiments sont implantés conformément au coefficient d'occupation du sol et aux reculs déterminés par les règlements particuliers d'urbanisme de la commune.</p>"
        },
        {
          id: "article8",
          title: "Article 8",
          content: "<p>En l'absence de règlement particulier d'urbanisme, le règlement général d'urbanisme est appliqué.</p>"
        },
        {
          id: "article9",
          title: "Article 9",
          content: "<p>La gestion de la construction et du cadre bâti sur l'ensemble du territoire national est basée sur le risque à la construction et à l'usage du bâtiment.</p>"
        },
        {
          id: "article10",
          title: "Article 10",
          content: "<p>Les bâtiments sont classés selon les risques à la construction et à l'usage, par décret pris en Conseil des ministres.</p><p>Selon la complexité, la classification est la suivante :</p><ul><li>classe A: bâtiments relevant du social dont les plans types sont mis à disposition par le ministère en charge de la Construction et de l'Urbanisme; ces bâtiments ne nécessitent pas de permis de construire;</li><li>classe B: bâtiment RDC ou R+1 sans sous-sol, dont la superficie est inférieure ou égale à 600 m² d'emprise du bâtiment, hauteur inférieure ou égale à 8 mètres;</li><li>classe C: bâtiment RDC ou R+1 avec un niveau de sous-sol, dont la superficie est inférieure ou égal à 600 m² d'emprise du bâtiment, hauteur inférieure ou égale à 8 mètres ;</li><li>classe D: bâtiment RDC ou R+1 sans sous-sol, dont la superficie est supérieure a 600 m² d'emprise du bâtiment, hauteur inférieure ou égale à 8 mètres;</li><li>classe E: bâtiment RDC ou R+1 avec un niveau de sous-sol, dont la superficie est supérieure à 600 m² d'emprise du bâtiment, hauteur inférieure ou égale à 8 mètres ;</li><li>classe F: bâtiment R+2 ou R+3 maximum, sans sous-sol, dont la superficie est inférieure ou égale à 600 m² d'emprise du bâtiment, de hauteur supérieure à 8 mètres et inférieure ou égale à 28 mètres;</li><li>classe G: bâtiment R+2 ou R+3 maximum, sans sous-sol, dont la superficie est supérieure à 600 m² d'emprise du bâtiment, de hauteur supérieure à 8 mètres et inférieure ou égale à 28 mètres;</li><li>classe H: bâtiment de deux niveaux de sous-sol au maximum, tout bâtiment de niveau supérieur ou égal à R+2, dont la hauteur est supérieure à 8 mètres et inférieure ou égale à 28 mètres ;</li><li>classe I: bâtiment de plus de deux niveaux de sous-sol, ou tout bâtiment de niveau supérieur ou égal à R+9, ou tout bâtiment de hauteur supérieure à 28 mètres et inférieure ou égale à 200 mètres ;</li><li>classe J: tout bâtiment de hauteur supérieure à 200 mètres;</li><li>classe K: Etablissements à caractère particulier;</li><li>classe L: Programmes immobiliers.</li></ul><p>Selon l'usage du bâtiment, la classification est la suivante :</p><ul><li>catégorie 1: administrations, banques, bureaux et archives;</li><li>catégorie 2: bâtiments d'habitation;</li><li>catégorie 3: commerce;</li><li>catégorie 4: enseignement;</li><li>catégorie 5: usine et industrie;</li><li>catégorie 6: culte et loisir;</li><li>catégorie 7: établissement pénitentiaire;</li><li>catégorie 8: santé et social;</li><li>catégorie 9: résidence temporaire</li><li>catégorie 10: stockage;</li><li>catégorie 11: monuments;</li><li>catégorie 12: installations militaires et paramilitaires;</li><li>catégorie 13: établissements spéciaux ;</li><li>catégorie 14: programmes immobiliers.</li></ul><p>Le dispositif de gestion basée sur le risque à la construction et l'usage du bâtiment est défini par voie réglementaire.</p>"
        }
      ]

    {
      title: "CHAPITRE 1: Permis de construire",
      articles: [
        {
          id: "article11",
          title: "Article 11",
          content: "<p>Le permis de construire est délivré sur une zone aménagée ou approuvée.</p><p>Toutefois, il peut être délivré sur les parcelles situées en dehors des plans de lotissement approuvés et affectés à des grands projets.</p><p>Il est délivré pour une période d'une année par le ministre chargé de l'Urbanisme qui peut déléguer son pouvoir dans les conditions prévues par décret pris en Conseil des ministres.</p>"
        },
        {
          id: "article12",
          title: "Article 12",
          content: "<p>Le permis de construire est exigé pour:</p><ul><li>la construction de tout bâtiment;</li><li>toute extension d'un bâtiment;</li><li>les travaux exécutés sur les constructions existantes, lorsqu'ils ont pour effet d'en changer la destination, d'en modifier la structure, l'aspect extérieur, le volume ou la distribution intérieure;</li><li>les reprises de gros-œuvres;</li><li>les clôtures;</li><li>tout ouvrage ayant un impact sur le paysage urbain.</li></ul>"
        },
        {
          id: "article13",
          title: "Article 13",
          content: "<p>L'obligation d'obtention préalable du permis de construire s'impose à toute personne physique ou morale.</p>"
        },
        {
          id: "article14",
          title: "Article 14",
          content: "<p>Les constructions doivent être conformes aux règles et aux normes environnementales d'urbanisme, d'architecture, de construction, d'assainissement et de drainage admises en République de Côte d'Ivoire.</p>"
        },
        {
          id: "article15",
          title: "Article 15",
          content: "<p>Les infractions aux règles de construction et d'urbanisme sont constatées par les agents assermentés qui prêtent serment devant le tribunal de Première Instance selon la formule d'assermentation suivante :</p><p><< je jure d'accomplir ma mission en toute conscience et honneur avec exactitude et probité. >></p>"
        },
        {
          id: "article16",
          title: "Article 16",
          content: "<p>Les dossiers de demande de permis de construire sont instruits par le Guichet unique du Permis de Construire suivant une procédure déterminée par décret sur proposition du ministre chargé de la Construction.</p>"
        },
        {
          id: "article17",
          title: "Article 17",
          content: "<p>Sont exemptés du permis de construire :</p><ul><li>les logements individuels et familiaux conformes à des plans-types préalablement approuvés par le ministre chargé de la Construction et de l'Urbanisme;</li><li>les travaux de ravalement;</li><li>l'installation des dispositifs publicitaires;</li><li>les constructions et travaux couverts par le secret de la défense nationale.</li></ul>"
        },
        {
          id: "article18",
          title: "Article 18",
          content: "<p>Tout projet de construction doit être dressé par un architecte agréé selon les modalités définies par décret pris en Conseil des ministres sur proposition du ministre chargé de l'Urbanisme.</p>"
        },
        {
          id: "article19",
          title: "Article 19",
          content: "<p>Le permis de construire n'est accordé que si les constructions projetées respectent les plans d'urbanisme et d'alignement, les règlements d'urbanisme, les servitudes d'hygiène et de salubrité, de sécurité publique, de caractère architectural, de conservation des sites et, d'une manière générale, les prescriptions imposées par la présente loi et les règlements.</p>"
        },
        {
          id: "article20",
          title: "Article 20",
          content: "<p>Il peut être sursis à statuer sur une demande de permis de construire pendant une période de deux années au maximum lorsque la construction projetée est incompatible avec des projets d'urbanisme non encore approuvés.</p><p>Passé ce délai, la demande est considérée comme approuvée s'il n'en a été donné aucune suite.</p>"
        },
        {
          id: "article21",
          title: "Article 21",
          content: "<p>L'annulation du permis de construire est soumise aux règles du recours pour excès de pouvoir.</p>"
        },
        {
          id: "article22",
          title: "Article 22",
          content: "<p>Les constructions et travaux exemptés du permis de construire doivent faire l'objet d'une déclaration préalable par le maître d'ouvrage auprès de la mairie ou de la sous-préfecture, sauf pour les ouvrages couverts par le secret de la défense nationale.</p><p>L'exemption ne dispense pas le maître d'ouvrage du respect des règles d'urbanisme, de construction, de sécurité et d'hygiène.</p>"
        },
        {
          id: "article23",
          title: "Article 23",
          content: "<p>Le permis de construire est périmé :</p><ul><li>si les travaux ne débutent pas dans le délai d'un an à compter de la date de délivrance;</li><li>si les travaux sont interrompus pendant au moins deux années consécutives.</li></ul>"
        },
        {
          id: "article24",
          title: "Article 24",
          content: "<p>Les règles relatives au permis de construire, les modalités de contrôle, de suivi, de réception des travaux et le certificat de conformité sont précisés par décret pris en Conseil des ministres sur proposition du ministre chargé de la Construction et de l'Urbanisme.</p>"
        },
        {
          id: "article25",
          title: "Article 25",
          content: "<p>En l'absence de toute saisine du tribunal, les constructions édifiées sans permis de construire ou en violation de ses prescriptions peuvent faire l'objet de démolition, à la charge du maître d'ouvrage, par le ministère en charge de la Construction et de l'Urbanisme ou par la structure désignée à cet effet, après notification par l'Administration d'une mise en demeure de démolition.</p>"
        },
        {
          id: "article26",
          title: "Article 26",
          content: "<p>L'Administration peut procéder de plein droit à la démolition, à la charge du maître d'ouvrage, de toute construction qui s'est poursuivie après notification d'une mise en demeure d'arrêt des travaux ou de démolition ou en violation des prescriptions de mise en conformité.</p>"
        },
        {
          id: "article27",
          title: "Article 27",
          content: "<p>La responsabilité administrative de l'Etat est engagée en cas de démolition sans motif légitime.</p>"
        },
        {
          id: "article28",
          title: "Article 28",
          content: "<p>Dans tous les cas où l'Administration a pris en charge les frais de la démolition dans les cas prévus aux articles 25 et 26 ci-dessus et lorsque le redevable ne s'est pas acquitté des amendes administratives prévues aux articles 523 et 524 ci-dessous, le ministère en charge de la Construction et de l'Urbanisme peut saisir le juge des référés pour obtenir sa condamnation, par décision exécutoire à s'acquitter desdits montants, sous astreinte comminatoire.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 2: Permis de modifier",
      articles: [
        {
          id: "article29",
          title: "Article 29",
          content: "<p>Le permis de modifier délivré par les services compétents de l'Urbanisme et de l'Habitat est exigé pour les travaux à exécuter sur les constructions existantes, lorsqu'ils ont pour effet d'en changer la destination, de modifier leur aspect extérieur ou volumétrique.</p><p>Cette obligation s'impose à tous les maîtres d'ouvrage au sens du présent Code qu'ils soient de droit public ou privé.</p>"
        }
      ]
    },

      title: "CHAPITRE 3: Permis de démolir",
      articles: [

          title: "Article 30",
          content: "<p>Quiconque désire démolir en totalité ou partie d'un bâtiment à quelque usage qu'il soit affecté, doit au préalable obtenir un permis de démolir des services compétents de l'Urbanisme et de l'Habitat.</p><p>Cette obligation s'impose à tous les maîtres d'ouvrage au sens du présent Code qu'ils soient de droit public ou privé.</p>"
        }

    {
      title: "Sous-titre 3: Contrôle des constructions",
      articles: [
        {
          id: "article31",
          title: "Article 31",
          content: "<p>La politique et les objectifs en matière de police de la construction sont mis en œuvre par le ministre de tutelle.</p>"
        },
        {
          id: "article32",
          title: "Article 32",
          content: "<p>Le ministre de tutelle s'appuie sur une plateforme chargée du contrôle et de l'investigation, dans le cadre d'une synergie d'actions avec les collectivités décentralisées.</p><p>Les modalités de création, d'organisation et de fonctionnement de cette plateforme sont précisées par décret.</p>"
        },
        {
          id: "article33",
          title: "Article 33",
          content: "<p>Le contrôle des constructions, après l'obtention du permis de construire, est effectué, par les ingénieurs-conseils, ci-après dénommés « le contrôleur des constructions ».</p><p>Le contrôleur des constructions est commis par le maître d'ouvrage.</p>"
        },
        {
          id: "article34",
          title: "Article 34",
          content: "<p>Le contrôleur des constructions exerce son rôle suivant les phases de déroulement de l'opération.</p><p>Pour ce faire, il a l'obligation de produire des rapports détaillés, datés, signés et revêtus de son sceau.</p><p>Ce rapport matérialise la validation ou non des travaux de construction.</p><p>A ce titre,</p><ul><li>il valide les plans d'exécution des constructeurs et suit leur mise en œuvre ;</li><li>il valide l'implantation conformément aux prescriptions d'urbanisme;</li><li>il réceptionne les profondeurs et les fonds de fouilles conformément aux prescriptions géotechniques;</li><li>il valide les dosages des bétons à mettre en œuvre ;</li><li>il réceptionne les coffrages et les ferraillages mis en œuvre conformément aux plans d'exécution;</li><li>il s'assure de la qualité des matériaux utilisés et veille au respect des normes;</li><li>il s'assure que chacun des constructeurs effectue de manière satisfaisante les vérifications techniques lui incombant.</li></ul><p>A la fin du chantier, il délivre une attestation de bonne exécution des travaux complétant les conditions d'obtention du certificat de conformité.</p>"
        },
        {
          id: "article35",
          title: "Article 35",
          content: "<p>Le contrôleur des constructions est tenu de faire des rapports périodiques aux services compétents du ministère en charge de la Construction.</p>"
        },
        {
          id: "article36",
          title: "Article 36",
          content: "<p>Le maître d'ouvrage doit se conformer aux recommandations du contrôleur des constructions.</p><p>Ce dernier peut faire arrêter le chantier si le maître d'ouvrage refuse de se conformer aux prescriptions qui visent à garantir la stabilité du bâtiment.</p>"
        },
        {
          id: "article37",
          title: "Article 37",
          content: "<p>Le contrôleur des constructions est responsable des malfaçons et incidents dus au mauvais contrôle de la réalisation des travaux.</p><p>Toutefois, le maître d'ouvrage demeure le responsable de la stabilité du bâtiment.</p>"
        },
        {
          id: "article38",
          title: "Article 38",
          content: "<p>Le contrôleur des constructions lié au maître de l'ouvrage par un contrat de louage d'ouvrage engage sa responsabilité dans les conditions définies au sous-titre 3, titre IV du présent livre.</p>"
        },
        {
          id: "article39",
          title: "Article 39",
          content: "<p>L'activité de contrôleur des constructions est incompatible avec l'exercice de toute activité de conception, d'exécution ou d'expertise d'un ouvrage sur le même projet.</p>"
        },
        {
          id: "article40",
          title: "Article 40",

        },
        {
          id: "article41",
          title: "Article 41",
          content: "<p>Le coût total des honoraires du contrôleur des constructions est déterminé par voie réglementaire.</p>"

    {
      title: "Sous-titre 4: Coordination sécurité et protection de la santé sur les chantiers",
      articles: []
    },
    {
      title: "CHAPITRE 1: Principes de prévention",
      articles: [
        {
          id: "article42",
          title: "Article 42",
          content: "<p>Afin d'assurer la sécurité et de protéger la santé des personnes qui interviennent sur un chantier de bâtiment ou de génie civil dans le cadre d'un marché privé, le maître d'ouvrage, le maître d'œuvre et le coordonnateur en matière de sécurité et de protection de la santé mentionné à l'article 49 ci-dessous mettent en œuvre, pendant la phase de conception, d'étude et d'élaboration du projet et pendant la réalisation de l'ouvrage, les principes généraux de prévention suivants :</p><ul><li>tenir compte de l'état d'évolution de la technique</li><li>identifier, analyser, évaluer l'occurrence et l'impact du risque;</li><li>proposer des réponses aux risques;</li><li>remplacer ce qui est dangereux par ce qui n'est pas dangereux ou par ce qui est moins dangereux;</li><li>planifier la prévention en y intégrant, dans un ensemble cohérent, la technique, l'organisation du travail, les conditions de travail, les relations sociales et l'influence des facteurs ambiants, notamment les risques liés au harcèlement moral et au harcèlement sexuel ainsi que ceux liés aux agissements sexistes;</li><li>prendre des mesures de protection collective en leur donnant la priorité sur les mesures de protection individuelle.</li></ul><p>Ces principes sont pris en compte notamment lors des choix architecturaux et techniques ainsi que dans l'organisation des opérations de chantier, en vue:</p><ul><li>de permettre la planification de l'exécution des différents travaux ou phases de travail se déroulant simultanément ou successivement;</li><li>de prévoir la durée de ces phases;</li><li>de faciliter les interventions ultérieures sur l'ouvrage.</li></ul>"
        },
        {
          id: "article43",
          title: "Article 43",
          content: "<p>Pour les opérations de bâtiment ou de génie civil entreprises par les communes ou groupements de communes de moins de 5 000 habitants, le maître d'œuvre peut se voir confier, sur délégation du maître d'ouvrage, l'application des principes généraux de prévention prévus au premier alinéa de l' article 42 ci-dessus ainsi que les règles de coordination prévues aux articles article 45 et suivants.</p>"
        },
        {
          id: "article44",
          title: "Article 44",
          content: "<p>Lorsque, sur un même site, plusieurs opérations de bâtiment ou de génie civil doivent être conduites dans le même temps par plusieurs maîtres d'ouvrage, ceux-ci se concertent afin de prévenir les risques résultant de l'interférence de ces interventions.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 2: Coordination lors des opérations de bâtiment et de génie civil",
      articles: [
        {
          id: "article45",
          title: "Article 45",
          content: "<p>Il est établi une coordination lors des opérations de bâtiments et de génie civil dans les conditions définies aux sections ci-après.</p>"
        }
      ]
    },
    {
      title: "Section 1: Déclaration préalable",
      articles: [
        {
          id: "article46",
          title: "Article 46",
          content: "<p>Lorsque la durée ou le volume prévus des travaux d'une opération de bâtiment ou de génie civil excède certains seuils déterminés par décret, le maître d'ouvrage adresse avant le début des travaux une déclaration préalable à l'autorité administrative compétente en matière de prévention des risques professionnels.</p><p>Le texte de cette déclaration, dont le contenu est précisé par arrêté ministériel, est affiché sur le chantier.</p>"
        }
      ]
    },
    {
      title: "Section 2: Mission du coordonnateur en matière de sécurité et de protection de la santé",
      articles: [
        {
          id: "article47",
          title: "Article 47",
          content: "<p>Une coordination en matière de sécurité et de santé des travailleurs est organisée pour tout chantier de bâtiment ou de génie civil où sont appelés à intervenir plusieurs travailleurs indépendants ou entreprises, entreprises sous-traitantes incluses, afin de prévenir les risques résultant de leurs interventions simultanées ou successives et de prévoir, lorsqu'elle s'impose, l'utilisation des moyens communs tels que les infrastructures, les moyens logistiques et les protections collectives.</p>"
        },
        {
          id: "article48",
          title: "Article 48",
          content: "<p>La coordination en matière de sécurité et de santé est organisée tant au cours de la conception, de l'étude et de l'élaboration du projet qu'au cours de la réalisation de l'ouvrage.</p>"
        },
        {
          id: "article49",
          title: "Article 49",
          content: "<p>Le maître d'ouvrage désigne un coordonnateur en matière de sécurité et de protection de la santé pour chacune des deux phases de conception et de réalisation ou pour l'ensemble de celles-ci.</p>"
        },
        {
          id: "article50",
          title: "Article 50",
          content: "<p>Lorsque le maître d'ouvrage désigne, pour la phase de réalisation de l'ouvrage, un coordonnateur distinct de celui de la phase de conception, d'étude et d'élaboration du projet, cette désignation intervient avant le lancement de la consultation des entreprises.</p>"
        },
        {
          id: "article51",
          title: "Article 51",
          content: "<p>La rémunération tient compte, notamment, du temps passé sur le chantier par le coordonnateur et, le cas échéant, des frais de fonctionnement occasionnés par la mise en place du collège interentreprises de sécurité, de santé et des conditions de travail, en particulier, des frais de secrétariat.</p>"
        },
        {
          id: "article52",
          title: "Article 52",
          content: "<p>Le coordonnateur veille, à ce que les principes généraux de prévention définis à l'article 42 ci-dessus soient effectivement mis en œuvre.</p><p>Il exerce ses missions sous la responsabilité du maître d'ouvrage.</p>"
        },
        {
          id: "article53",
          title: "Article 53",
          content: "<p>Le coordonnateur, au cours de la conception, de l'étude et de l'élaboration du projet de l'ouvrage :</p><ul><li>élabore le plan général de coordination visé à l'article 62 ci-dessous lorsqu'il est requis;</li><li>constitue le dossier d'intervention ultérieure sur l'ouvrage visé à l'article 64 ci-dessous;</li><li>ouvre un registre-journal de la coordination dès la signature du contrat ou de l'avenant spécifique;</li><li>définit les sujétions relatives à la mise en place et à l'utilisation des protections collectives, des appareils de levage, des accès provisoires et des installations générales, notamment les installations électriques.</li></ul><p>Il mentionne dans les pièces écrites leur répartition entre les différents corps d'état ou de métier qui interviendront sur le chantier;</p><ul><li>assure le passage des consignes et la transmission des documents mentionnés aux 1º à 4º au coordonnateur de la phase de réalisation de l'ouvrage lorsque celui-ci est différent.</li></ul>"
        },
        {
          id: "article54",
          title: "Article 54",
          content: "<p>Le coordonnateur, au cours de la réalisation de l'ouvrage:</p><ul><li>organise entre les entreprises, y compris sous-traitantes, qu'elles se trouvent ou non présentes ensemble sur le chantier, la coordination de leurs activités simultanées ou successives, les modalités de leur utilisation en commun des installations, matériels et circulations verticales et horizontales, leur information mutuelle ainsi que l'échange entre elles des consignes en matière de sécurité et de protection de la santé.</li></ul><p>A cet effet, il procède avec chaque entreprise, préalablement à l'intervention de celle-ci, à une inspection commune au cours de laquelle sont en particulier précisées, en fonction des caractéristiques des travaux que cette entreprise s'apprête à exécuter, les consignes à observer ou à transmettre et les observations particulières de sécurité et de santé prises pour l'ensemble de l'opération.</p><p>Cette inspection commune est réalisée avant la remise du plan particulier de sécurité visé à l'article 63 ci-dessous et de protection de la santé lorsque l'entreprise est soumise à l'obligation de le rédiger;</p><ul><li>veille à l'application correcte des mesures de coordination qu'il a définies ainsi que des procédures de travail qui interfèrent;</li><li>tient à jour et adapte le plan général de coordination visé à l'article 62 ci-dessous et veille à son application;</li><li>complète en tant que de besoin le dossier d'intervention ultérieure sur l'ouvrage visé à l'article 64 ci-dessous.</li></ul>"
        },
        {
          id: "article55",
          title: "Article 55",
          content: "<p>Le coordonnateur prend les dispositions nécessaires pour que seules les personnes autorisées puissent accéder au chantier.</p>"
        },
        {
          id: "article56",
          title: "Article 56",
          content: "<p>Sauf dans les cas prévus à l'article 60 ci-dessous, afin notamment d'assurer au coordonnateur l'autorité et les moyens nécessaires au bon déroulement de sa mission, le maître d'ouvrage prévoit, dès les études d'avant-projet de l'ouvrage, la coopération entre les différents intervenants dans l'acte de construire et le coordonnateur.</p><p>Les modalités pratiques de cette coopération font l'objet d'un document joint aux contrats conclus avec les différents intervenants</p>"
        },
        {
          id: "article57",
          title: "Article 57",
          content: "<p>Le maître d'ouvrage veille à ce que le coordonnateur soit associé pendant toutes les phases de l'opération à l'élaboration et à la réalisation du projet de l'ouvrage, en particulier en lui donnant accès à toutes les réunions organisées par le maître d'œuvre et en le rendant destinataire, dans un délai compatible avec l'exercice de sa mission, de toutes les études réalisées par celui-ci.</p>"
        },
        {
          id: "article58",
          title: "Article 58",
          content: "<p>Le maître d'ouvrage tient compte, lorsqu'il les estime justifiées, des observations du coordonnateur ou adopte des mesures d'une efficacité au moins équivalente.</p>"

    {
      title: "Section 3: Plan général de coordination en matière de sécurité et de protection de la santé",

        {
          id: "article62",
          title: "Article 62",
          content: "<p>Lorsque plusieurs entreprises sont appelées à intervenir sur un chantier qui, soit fait l'objet de la déclaration préalable prévue à l'article 46, soit nécessite l'exécution d'un ou de plusieurs des travaux inscrits sur une liste de travaux comportant des risques particuliers déterminée par voie réglementaire, le maître d'ouvrage fait établir par le coordonnateur un plan général de coordination en matière de sécurité et de protection de la santé.</p><p>Le plan général de coordination est un document écrit qui définit l'ensemble des mesures propres à prévenir les risques découlant de l'interférence des activités des différents intervenants sur le chantier, ou de la succession de leurs activités lorsqu'une intervention laisse subsister, après son achèvement, des risques pour les autres entreprises.</p><p>Ce plan est rédigé dès la phase de conception, d'étude et d'élaboration du projet et tenu à jour pendant toute la durée des travaux.</p>"

    {
      title: "TITRE II: SOCIETES DE CONSTRUCTION",
      articles: []
    },
    {
      title: "Sous-titre 1: Sociétés civiles constituées en vue de l'attribution d'immeuble aux associés par fractions divises",
      articles: [
        {
          id: "article75",
          title: "Article 75",
          content: "<p>Les sociétés ayant pour objet la construction ou l'acquisition d'immeubles en vue de leur division par fractions destinées à être attribuées aux associés en propriété ou en jouissance sont valablement constituées sous la forme des sociétés civiles, même si elles n'ont pas pour but de partager un bénéfice.</p>"
        },
        {
          id: "article76",
          title: "Article 76",
          content: "<p>L'objet de ces sociétés comprend la gestion et l'entretien des immeubles jusqu'à la mise en place d'une organisation différente.</p>"
        },
        {
          id: "article77",
          title: "Article 77",
          content: "<p>Les sociétés visées à l'article 75 ci-dessus sont régies par les dispositions des articles 1832 et suivants du Code civil ainsi que par les dispositions du présent chapitre.</p>"
        },
        {
          id: "article78",
          title: "Article 78",
          content: "<p>Un état descriptif de division délimite les diverses parties de l'immeuble social en distinguant celles qui sont communes de celles qui sont privatives.</p><p>S'il y a lieu, il fixe la quote-part des parties communes afférentes à chaque lot.</p><p>Les statuts divisent le droit composant le capital social en groupes et affectent à chacun d'eux l'un des lots définis par l'état descriptif de division pour être attribué au titulaire du groupe considéré.</p><p>Un règlement détermine la destination des parties réservées à l'usage exclusif de chaque associé, et, s'il y a lieu, celle des parties communes affectées à l'usage de tous les associés ou de plusieurs d'entre eux.</p><p>Si l'attribution en propriété d'une ou plusieurs fractions de l'immeuble doit emporter l'application des dispositions du sous-titre 1 du titre I du livre 2 du présent Code relatives à la copropriété, le règlement est établi en conformité de cette loi.</p><p>Lorsque l'attribution est exclusive de son application, le règlement doit organiser la gestion collective des services et des éléments d'équipements communs s'il en est prévu.</p><p>Le règlement ne peut imposer de restrictions aux droits des associés sur les parties réservées à leur jouissance exclusive, en dehors de celles qui sont justifiées par la destination de l'immeuble, par ses caractères ou par sa situation.</p><p>L'état descriptif de division, le règlement et les dispositions corrélatives des statuts doivent être adoptés avant tout commencement des travaux de construction, ou, s'il s'agit d'une société d'acquisition, avant toute entrée en jouissance des associés.</p>"
        },
        {
          id: "article79",
          title: "Article 79",
          content: "<p>Les associés sont tenus de répondre aux appels de fonds nécessités par l'acquisition, la construction ou l'aménagement de l'immeuble social en proportion de leurs droits dans le capital.</p><p>Toutefois, il peut être stipulé que les dépenses entraînées pour l'acquisition du terrain seront réparties entre les associés au prorata de la valeur de la partie dont ils ont la jouissance exclusive par rapport à la valeur globale du terrain.</p>"
        },
        {
          id: "article80",
          title: "Article 80",
          content: "<p>L'associé qui ne satisfait pas aux obligations auxquelles il est tenu envers la société en vertu de l'article 79 ci-dessus ne peut prétendre ni à entrer en jouissance de la fraction de l'immeuble à laquelle il a vocation, ni à se maintenir dans cette jouissance, ni à obtenir l'attribution en propriété de ladite fraction.</p>"
        },
        {
          id: "article81",
          title: "Article 81",
          content: "<p>Les droits sociaux appartenant à l'associé défaillant peuvent, un mois après une sommation de payer restée sans effet, être mis en vente publique sur autorisation de l'assemblée générale prise à la majorité des deux tiers du capital social et, sur deuxième convocation, à la majorité des deux tiers des droits sociaux dont les titulaires sont présents ou représentés.</p><p>Nonobstant toute disposition contraire des statuts, les parts ou actions détenues par les associés à l'encontre desquels la mise en vente est à l'ordre du jour de l'assemblée ne sont pas prises en compte pour le calcul des majorités requises.</p><p>Cette mise en vente est notifiée à l'associé défaillant et publiée dans un des journaux d'annonces légales du lieu du siège social.</p><p>Si l'associé est titulaire de plusieurs groupes de droits sociaux donnant vocation à des parties différentes de l'immeuble, chacun de ces groupes pourra être mis en vente séparément.</p><p>La vente aura lieu pour le compte et aux risques de l'associé défaillant, qui sera tenu, vis-à-vis de la société, des appels de fonds mis en recouvrement antérieurement à la vente.</p><p>Les sommes produites par l'adjudication seront affectées par privilège au paiement des sommes dont cet associé sera redevable à la société.</p><p>Ce privilège l'emporte sur toutes les sûretés réelles conventionnelles grêvant les droits sociaux du défaillant.</p><p>Si des nantissements ont été constitués sur les parts ou actions vendues en application du présent article, le droit de rétention des créanciers nantis n'est opposable ni à la société ni à l'adjudicataire des droits sociaux.</p>"
        },
        {
          id: "article82",
          title: "Article 82",
          content: "<p>Les droits des associés dans le capital social doivent être proportionnels à la valeur des biens auxquels ils ont vocation par rapport à la valeur de l'ensemble telles que lesdites valeurs résultent de la consistance, de la superficie, de la situation et des possibilités d'utilisation des biens appréciées au jour de l'affectation à des groupes de droits sociaux déterminés.</p><p>Si les statuts contiennent la clause prévue au deuxième alinéa de l'article 79 ci-dessus, les associés devront contribuer aux dépenses entraînées par l'acquisition du terrain, d'une part, et à celles afférentes aux travaux de construction, d'autre part, en proportion de la valeur des droits de chacun d'eux sur le sol et dans les ouvrages.</p><p>Si les obligations dont un associé est tenu vis-à-vis de la société en vertu de l'article 79 ci-dessus excèdent de plus du quart la contribution qui lui incombe en vertu du présent article, l'intéressé peut réclamer le remboursement de l'excédent à celui ou ceux de ses coassociés que la répartition incriminée a avantagés, mais à concurrence seulement des sommes que chacun d'eux s'est ainsi trouvé dispensé de payer à la société.</p><p>Les sommes ainsi obtenues sont versées directement au demandeur.</p><p>Si les obligations dont un associé est tenu envers la société en vertu de l' article 79 ci-dessus sont inférieures de plus du quart à la contribution qui incombe à cet associé selon le présent article, tout autre associé peut réclamer, à celui qui est avantagé, les versements dont il s'est trouvé dispensé.</p><p>Les sommes ainsi obtenues sont versées à la société et réparties par l'organe de gestion ou le liquidateur entre les associés désavantagés, en proportion des sommes excédentaires versées par ceux-ci.</p><p>Les dispositions du présent article peuvent être invoquées même après la dissolution de la société, par ou à l'encontre de tous ceux qui ont eu la qualité d'associé avant l'approbation définitive des comptes de l'opération de construction, d'acquisition ou d'aménagement, mais seulement avant l'expiration d'un délai de deux ans à compter de la dissolution de la société ou du retrait de l'associé.</p>"
        },
        {
          id: "article83",
          title: "Article 83",
          content: "<p>Les associés sont tenus de participer aux charges entraînées par les services collectifs et les éléments d'équipement communs ainsi qu'à celles relatives à la conservation, à l'entretien et à l'administration des parties communes, s'il en existe, dans les conditions prévues au sous-titre 1 du titre I du livre 2 du présent Code relatives à la copropriété.</p><p>Le règlement prévu à l'article 78 ci-dessus fixe la quote-part qui incombe à chaque lot dans chacune des catégories de charges;</p><p>à défaut, il indiquera les bases selon lesquelles la répartition est faite pour une ou plusieurs catégories de charges.</p><p>Les dispositions de l'article 80 sont applicables à l'exécution par les associés des obligations dont ils sont tenus envers la société en vertu du présent article.</p><p>Un associé peut demander au tribunal compétent de la situation de l'immeuble la révision, pour l'avenir, de la répartition des charges visées au présent article si la part correspondant à son lot est supérieure de plus d'un quart ou si la part correspondant à un autre lot est inférieure de plus d'un quart, dans l'une ou l'autre des catégories de charges, à celle qui résulterait d'une répartition conforme à l'alinéa premier ci-dessus.</p><p>Si l'action est reconnue fondée, le tribunal procède à la nouvelle répartition.</p><p>Pour les décisions concernant la gestion ou l'entretien de l'immeuble, les associés votent avec un nombre de voix proportionnel à leur participation dans les dépenses qu'entraînera l'exécution de la décision, nonobstant toute disposition contraire.</p><p>En outre, lorsque le règlement prévu à l'article 78 ci-dessus met à la charge de certains associés seulement les dépenses d'entretien d'une partie de l'immeuble ou celles d'entretien et de fonctionnement d'un élément d'équipement, seuls ces associés prennent part au vote sur les décisions qui concernent ces dépenses.</p><p>Chacun d'eux vote avec un nombre de voix proportionnel à sa participation auxdites dépenses.</p>"
        },
        {
          id: "article84",
          title: "Article 84",
          content: "<p>La société peut donner caution hypothécaire pour la garantie des emprunts contractés:</p><ul><li>par les associés, pour leur permettre de satisfaire aux appels de fonds de la société nécessaires à la réalisation de l'objet social;</li><li>par les cessionnaires des parts sociales, pour leur permettre de payer leur prix de cession, mais seulement à concurrence des appels de fonds déjà réglés à la société et, s'il y a lieu, de payer les appels de fonds qui restent encore à régler.</li></ul><p>La caution hypothécaire doit être autorisée par les statuts, avec stipulation que l'engagement de la société est strictement limité aux parties divises et indivises de l'immeuble social auxquelles le bénéficiaire du crédit aura vocation en propriété.</p><p>La saisie du gage vaut retrait de l'associé titulaire des droits sociaux correspondant aux biens saisis et ne peut être effectuée que lorsque sont réunies les conditions auxquelles un tel retrait est subordonné</p>"
        },
        {
          id: "article85",
          title: "Article 85",
          content: "<p>Le cessionnaire n'est tenu des dettes du cédant à l'égard de la société pour la période antérieure à la date de la cession que dans la mesure où cela résulte des obligations figurant à l'acte de cession ou à ses annexes.</p><p>Le cédant n'est dégagé de ses obligations personnelles à l'égard de la société que dans la mesure où celle-ci y a expressément consenti.</p>"
        },
        {
          id: "article86",
          title: "Article 86",
          content: "<p>La dissolution de la société peut, nonobstant toute disposition contraire des statuts, et même si ceux-ci ne prévoient que des attributions en jouissance, être décidée par l'assemblée générale statuant à la double majorité des deux tiers des associés et des deux tiers des voix.</p><p>L'assemblée générale désigne un ou plusieurs liquidateurs chargés de gérer pendant la période de liquidation et de procéder au partage.</p><p>Ce partage ne peut intervenir qu'après décision définitive sur les comptes de l'opération de construction dans les conditions prévues à l'antépénultième alinéa du présent article.</p><p>Il doit comporter des attributions de fractions d'immeubles et une répartition du passif conformes aux dispositions statutaires et à l'état descriptif de division.</p><p>Dans le cas où la succession d'un associé n'est pas encore liquidée, les droits et les charges propres au défunt sont attribués indivisément au nom de ses ayants droit et cette attribution n'entraîne pas de leur part acceptation de la succession ou de la donation.</p><p>Les associés qui n'ont pas satisfait aux obligations auxquelles ils sont tenus envers la société ne peuvent, conformément à l'article 80 prétendre à aucune attribution tant qu'ils ne se sont pas acquittés.</p><p>Dans ce cas, le partage est limité aux associés dont la situation est régulière.</p><p>Le liquidateur fait établir le projet de partage en la forme authentique.</p><p>Les associés sont invités, au besoin par sommation du liquidateur, à prendre connaissance du projet de partage et à l'approuver ou le contester en la forme authentique.</p><p>Les associés qui contestent alors le partage disposent d'un délai de quinze jours pour assigner le liquidateur en rectification devant le tribunal compétent du siège social.</p><p>Les attributions devenues définitives sont opposables aux associés non présents ou représentés, absents ou incapables.</p><p>La publication au fichier immobilier est faite à la diligence du liquidateur.</p><p>Sauf si les statuts ne prévoient que des attributions en jouissance, un associé peut, à tout moment, se retirer d'une société d'acquisition.</p><p>Sous la même réserve, un associé peut, de même se retirer d'une société de construction, dès qu'une assemblée générale ordinaire a constaté l'achèvement de l'immeuble, sa conformité avec les énonciations de l'état descriptif et a décidé des comptes définitifs de l'opération de construction.</p><p>A défaut de vote de l'assemblée générale, tout associé peut demander au tribunal compétent du lieu de la situation de l'immeuble de procéder aux constatations et décisions susvisées.</p><p>Le retrait est constaté par acte authentique signé par l'associé qui se retire et un représentant de l'organe de gestion ou, en cas de refus de ce dernier, par ordonnance du président du tribunal compétent, lequel est saisi et statue suivant la forme prévue pour les référés.</p><p>Les retraits entraînent de plein droit l'annulation des parts ou actions correspondant aux locaux attribués en propriété et la réduction corrélative du capital social.</p><p>L'organe de gestion constate la réduction du capital et apporte aux statuts les modifications nécessaires.</p><p>Les dispositions de l'alinéa précédent demeurent applicables après dissolution de la société.</p><p>Les pouvoirs dévolus par ledit alinéa à l'organe de gestion sont alors exercés par le ou les liquidateurs.</p><p>Pour l'application des dispositions du présent article, tout associé est réputé avoir fait élection de domicile en l'immeuble social, à moins qu'il n'ait notifié à la société une autre élection de domicile dans le ressort du tribunal compétent du lieu de situation de l'immeuble.</p><p>Sauf l'effet des sûretés réelles dont ils seraient bénéficiaires, les créanciers de la société ne peuvent exercer leurs droits, ni contre un ancien associé attributaire par voie de retrait ou de partage, ni à l'encontre de ses ayants cause, qu'après discussion préalable des biens restant appartenir à la société.</p>"
        },
        {
          id: "article87",
          title: "Article 87",
          content: "<p>Les sociétés qui ont pour objet la construction d'un immeuble sont tenues de conclure un contrat de promotion immobilière ou de confier les opérations constitutives de la promotion immobilière à leur représentant légal ou statutaire, à la condition que lesdites opérations aient été définies au préalable par un écrit portant les énonciations exigées par l'article 149 ci-dessous.</p><p>La responsabilité du représentant légal ou statutaire s'apprécie alors, quant à ces opérations, conformément à l'article 238.</p><p>Avant la conclusion du contrat de promotion immobilière ou avant l'approbation par l'assemblée générale de l'écrit comportant les énonciations exigées par l'article 149 ci-dessous, le représentant légal ou statutaire de la société ne peut exiger ou accepter des associés aucun versement, aucun dépôt, aucune souscription ni acceptation d'effets de commerce pour les opérations mentionnées audit écrit.</p><p>Aucun paiement ne peut non plus être accepté ou exigé avant la date à laquelle la créance correspondante est exigible.</p><p>Les dispositions qui précèdent ne font pas obstacle au versement par les associés souscripteurs du capital initial des sommes nécessaires au paiement des études techniques et financières du programme et à l'achat du terrain.</p><p>Lorsque de tels versements ont été effectués, les parts ou actions ne peuvent être cédées volontairement avant la conclusion du contrat de promotion immobilière ou avant l'approbation de l'écrit susvisé, si ce n'est entre associés.</p>"
        },
        {
          id: "article88",
          title: "Article 88",
          content: "<p>La cession de parts peut être précédée d'un contrat préliminaire par lequel, en contrepartie d'un dépôt de garantie, un associé s'engage à céder ses parts à un cessionnaire moyennant un prix fixé dans ledit contrat.</p><p>Le contrat préliminaire doit comporter toutes indications relatives à la constitution de la société, à la consistance et aux conditions techniques d'exécution des travaux et aux conditions financières de l'opération.</p><p>Le dépôt de garantie doit être effectué à un compte spécial ouvert au nom du réservataire dans une banque ou un établissement spécialement habilité à cet effet ou chez un notaire.</p><p>Les fonds déposés en garantie sont indisponibles, incessibles et insaisissables jusqu'à la conclusion du contrat de cession.</p><p>Ils sont restitués dans le délai de trois mois au déposant si le contrat n'est pas conclu ou si le contrat proposé fait apparaître une différence anormale par rapport aux prévisions du contrat préliminaire.</p><p>Toute autre promesse d'achat ou de cession de parts est nulle.</p>"
        },

          id: "article89",
          title: "Article 89",
          content: "<p>Les dispositions du présent chapitre sont d'ordre public.</p>"
        }

    {
      title: "Sous-titre 2: Sociétés coopératives de construction",
      articles: [
        {
          id: "article90",
          title: "Article 90",
          content: "<p>Les sociétés coopératives de construction ayant pour objet la construction d'un ou plusieurs immeubles en vue de leur division par lots ou d'un ensemble de maisons individuelles groupées à usage d'habitation ou à usage professionnel et d'habitation destinés à être attribués ou vendus aux associés sont des sociétés à capital et à opérateur variables.</p><p>L'objet de ces sociétés comprend, en outre, la gestion et l'entretien des immeubles jusqu'à la mise en place d'une organisation différente.</p><p>Elles sont régies par les dispositions de l'Acte uniforme de l'OHADA portant sur les sociétés coopératives ainsi que par les dispositions non contraires des articles du présent chapitre.</p>"
        },
        {
          id: "article91",
          title: "Article 91",
          content: "<p>Chaque société coopérative de construction doit limiter son objet à l'édification d'immeubles compris dans un même programme, comportant une ou plusieurs tranches, d'un ensemble immobilier.</p>"
        },
        {
          id: "article92",
          title: "Article 92",
          content: "<p>Une société coopérative de construction ne peut confier à un tiers la réalisation de son programme de construction qu'en vertu d'un contrat de promotion immobilière conforme au sous-titre 2 du titre II du présent livre.</p>"
        },
        {
          id: "article93",
          title: "Article 93",
          content: "<p>Une société coopérative de construction ne peut entreprendre chaque tranche du programme prévu par les statuts que si le nombre des associés est au moins égal à 20% du nombre total de logements et de locaux à usage commercial ou professionnel à construire dans la tranche considérée, et si le financement de la construction des lots non souscrits compris dans l'ensemble du programme, ainsi que leur souscription, sont garantis.</p><p>Les associés souscrivant plus de deux logements ou plus d'un local à usage commercial ou professionnel sont également tenus de fournir la garantie de financement prévue à l'alinéa précédent.</p><p>La construction d'un appartement ou d'un pavillon témoin n'est pas considérée comme entraînant l'application des conditions fixées au premier alinéa du présent article.</p>"
        },
        {
          id: "article94",
          title: "Article 94",
          content: "<p>Le transfert de propriété par la société à un associé, s'il résulte d'une convention distincte du contrat de société, s'opère conformément aux dispositions de l'article 110 ci-dessous.</p><p>Si la société n'a pas confié à un promoteur immobilier la réalisation de son programme de construction, la conclusion d'un tel contrat est obligatoire;</p><p>ce contrat doit, en outre, être conforme aux dispositions de l'article 96 ci-dessous</p><p>Si les droits privatifs des associés sont représentés par des parts ou actions donnant vocation à l'attribution d'un lot, la société est tenue:</p><ul><li>soit de conclure un contrat de promotion immobilière;</li><li>soit de confier les opérations constitutives de la promotion immobilière à son représentant légal ou statutaire, à la condition que lesdites opérations aient été définies au préalable par un écrit portant les énonciations exigées par l'article 238.</li></ul><p>La responsabilité du représentant légal ou statutaire s'apprécie alors, quant à ces opérations, conformément à l'article 146 ci-dessous du présent Code.</p>"
        },
        {
          id: "article95",
          title: "Article 95",
          content: "<p>Avant le commencement des travaux, l'assemblée générale doit en approuver les conditions techniques et financières d'exécution et déterminer le prix de chacun des locaux à édifier.</p><p>L'assemblée générale a seule le pouvoir d'approuver et de modifier les statuts, et de réduire l'importance du programme dans le cas où celui-ci doit être réalisé par tranches, à condition que cette réduction ne porte que sur des lots non souscrits.</p><p>La majorité requise pour la validité des délibérations prévues au présent article est des deux tiers au moins du nombre total des associés.</p>"
        },
        {
          id: "article96",
          title: "Article 96",
          content: "<p>Le contrat de vente prévu à l'article 94 ci-dessus doit être conclu par acte authentique et préciser:</p><ul><li>La description de l'immeuble ou de la partie de l'immeuble vendue;</li><li>son prix prévisionnel et les modalités de paiement de celui-ci;</li><li>le délai de livraison;</li><li>s'il y a lieu, les garanties et les moyens de financement prévus à l'article 93 ci-dessus.</li></ul><p>Il doit comporter, en annexe ou par référence à des documents déposés chez un notaire, les indications utiles relatives à la consistance et aux caractéristiques techniques de l'immeuble.</p><p>S'il y a un règlement de copropriété, le texte en est remis à chaque acquéreur lors de la signature du contrat.</p><p>Il doit lui être communiqué préalablement.</p><p>L'inobservation des dispositions du présent article entraîne la nullité du contrat, cette nullité ne peut être invoquée que par l'acquéreur et avant l'achèvement des travaux.</p>"
        },
        {
          id: "article97",
          title: "Article 97",
          content: "<p>Une société coopérative ne peut exiger ni accepter d'un associé, sous quelque forme que ce soit, aucun versement ou remise autres que ceux nécessaires au paiement des études techniques et financières du programme et à l'achat du terrain, avant les décisions de l'assemblée générale prévues à l' article 95 ci- dessus, premier alinéa, ni avant la signature du contrat de vente, ni avant la date à laquelle la créance de la société sur l'associé est exigible.</p><p>Toutefois, le prix du terrain peut être déposé par le vendeur en compte courant ouvert à son nom dans les livres de la société.</p><p>La société peut donner caution hypothécaire pour la garantie des emprunts contractés par les associés pour leur permettre de satisfaire aux appels de fonds de la société nécessaires à la réalisation de l'objet social.</p><p>La caution hypothécaire doit être autorisée par les statuts, avec stipulation que l'engagement de la société est strictement limité aux parties divises et indivises de l'immeuble social auxquelles le bénéficiaire du crédit aura vocation en propriété.</p>"
        },
        {
          id: "article98",
          title: "Article 98",
          content: "<p>Si les droits privatifs des associés sont représentés par des parts ou actions donnant vocation à l'attribution d'un lot, chaque associé ne peut prétendre à la propriété du lot qui lui est destiné qu'après avoir versé à la société les sommes nécessaires à la réalisation de l'objet social, proportionnellement à la valeur de son lot par rapport à la valeur de l'ensemble.</p><p>Si un associé ne satisfait pas à ses obligations, ses droits pourront, un mois après mise en demeure restée infructueuse, être mis en vente publique à la requête des représentants de la société par décision de l'assemblée générale de la société fixant la mise à prix.</p><p>L'assemblée générale se prononce selon le quorum et la majorité exigée par l'Acte uniforme OHADA (sociétés coopératives) pour les assemblées générales se prononçant sur les modifications statutaires.</p><p>Toutefois, et nonobstant toute disposition contraire des statuts, les parts ou actions détenues par les associés à l'encontre desquels la mise en vente est à l'ordre du jour de l'assemblée ne sont pas prises en compte pour le calcul des majorités requises.</p><p>La vente a lieu pour le compte de l'associé défaillant et à ses risques.</p><p>Les sommes provenant de la vente sont affectées par privilège au paiement des dettes de l'associé défaillant envers la société.</p><p>Ce privilège l'emporte sur toutes les sûretés réelles conventionnelles grevant les droits sociaux du défaillant.</p><p>Si des nantissements ont été constitués sur les parts ou actions vendues par application du présent article, le droit de rétention des créanciers nantis n'est opposable ni à la société ni à l'adjudicataire des droits sociaux.</p>"
        },
        {
          id: "article99",
          title: "Article 99",
          content: "<p>L'exclusion d'un associé ne peut être prononcée par l'assemblée générale que pour un motif sérieux et légitime et sous réserve du recours de l'intéressé devant le tribunal compétent dans le ressort de la situation de l'immeuble, dans le délai d'un mois à compter du jour où il a reçu notification de cette décision.</p><p>Le jugement sera exécutoire par provision. Les dispositions du présent alinéa ne sont pas applicables dans le cas prévu à l'article 98 ci-dessus, deuxième alinéa.</p><p>La démission ou l'exclusion d'un associé entraîne de plein droit la résolution du contrat de vente passé conformément à l'article 94 ci-dessus.</p><p>Toutefois, cette résolution est inopposable aux tiers qui, avec le consentement de la société, ont acquis des sûretés réelles du chef de l'associé sur les biens faisant l'objet du contrat résolu et ont régulièrement publié ces sûretés.</p><p>Les sommes versées par cet associé, tant au titre de la libération de ses parts sociales qu'au titre du contrat de vente de l'immeuble à construire si ce contrat a été passé, sont remboursées à cet associé, après déduction des charges et frais occasionnés à la société par la démission ou l'exclusion de l'associé.</p><p>L'appréciation du montant à rembourser peut faire l'objet d'une évaluation forfaitaire faite par les statuts.</p><p>En cas de démission ou d'exclusion d'un associé, les autres associés sont tenus, jusqu'à son remplacement, de toutes ses obligations à l'égard de la société proportionnellement à la valeur de leur lot par rapport à la valeur de l'ensemble.</p><p>Pendant l'opération de construction, les droits sociaux ne peuvent faire l'objet d'aucune cession volontaire entre vifs à titre onéreux.</p><p>Il en est de même, le cas échéant, des droits de toute nature résultant de ventes en état futur d'achèvement ou à terme.</p>"
        },
        {
          id: "article100",
          title: "Article 100",
          content: "<p>Dans le cas visé à l'article 98 ci-dessus, tout associé peut se retirer de la société et obtenir l'attribution en propriété de son lot, lorsque l'assemblée générale ordinaire a constaté l'achèvement de l'opération de construction ainsi que la conformité du ou des immeubles aux prévisions statutaires et qu'elle a statué sur les comptes définitifs.</p><p>A défaut, tout associé peut demander au tribunal compétent de constater cet achèvement et de statuer sur lesdits comptes.</p>"
        },

          id: "article101",
          title: "Article 101",
          content: "<p>Les dispositions du présent chapitre sont d'ordre public.</p>"
        }

    {
      title: "Sous-titre 3: Dispositions communes aux sociétés civiles constituées en vue de l'attribution d'immeuble aux associés par fractions divises et aux coopératives d'habitat et de construction",
      articles: [
        {
          id: "article102",
          title: "Article 102",
          content: "<p>Lorsqu'une société mentionnée à l' article 75 ou une société mentionnée à l' article 90 ci-dessus ne poursuit pas simultanément la construction de l'ensemble des logements répondant à son objet, ses statuts peuvent prévoir que les appels de fonds supplémentaires nécessaires pour la réalisation de chaque programme, y compris la participation à toutes dépenses d'intérêt commun, seront répartis entre les seuls associés ayant vocation aux logements construits dans le cadre de chacun desdits programmes.</p>"
        },
        {
          id: "article103",
          title: "Article 103",
          content: "<p>A défaut de dispositions statutaires, une assemblée spéciale des associés dont les parts ou actions donnent vocation à l'attribution de logements compris dans un même programme, convoqués, soit par le conseil d'administration ou la gérance de la société, soit par l'associé le plus diligent, peut décider, sous réserve des dispositions des alinéas suivants, que les appels de fonds visés à l'article précédent seront répartis comme il est dit audit article.</p><p>L'assemblée spéciale ne statue valablement que si les deux tiers au moins des associés ayant vocation aux logements compris dans le programme sont présents ou représentés.</p><p>Les décisions sont prises à la majorité des voix, chaque associé disposant du nombre de voix qui lui est attribué par les statuts de la société.</p><p>En outre, les décisions de l'assemblée spéciale doivent, pour être valables, être approuvées par une assemblée générale de tous les associés statuant dans les conditions de quorum et de majorité requises pour les modifications statutaires.</p><p>Cette assemblée est réunie par le conseil d'administration ou la gérance de la société dans le délai d'un mois à compter de l'assemblée spéciale;</p><p>elle apporte aux statuts des modifications correspondantes.</p><p>La répartition entre les divers associés de leurs créances ou dettes à l'égard de la société est effectuée par le conseil d'administration ou la gérance de la société.</p><p>Cette répartition ne devient définitive qu'après avoir été approuvée par une assemblée générale ordinaire des associés, qui doit être réunie par le conseil d'administration ou la gérance dans le délai d'un an à compter de l'assemblée générale extraordinaire prévue au troisième alinéa du présent article.</p>"
        },
        {
          id: "article104",
          title: "Article 104",
          content: "<p>Les membres des sociétés visées aux article 102 et article 103 ci-dessus, dont les parts ou actions donnent vocation à l'attribution de logements compris dans un même programme, peuvent, réunis en assemblée spéciale convoquée et statuant dans les conditions définies à l' article 103 ci-dessus, demander la convocation d'une assemblée générale de tous les associés à l'effet de décider:</p><ul><li>soit la dissolution de la société et la dévolution de son actif à plusieurs sociétés nouvelles constituées conformément aux dispositions des article 75 et article 90;</li><li>soit l'apport d'un ou plusieurs éléments d'actif à une ou plusieurs sociétés constituées comme il est dit ci-dessus.</li></ul><p>Dans ce cas, l'assemblée générale doit être réunie par le conseil d'administration ou la gérance de la société dans le délai d'un mois à compter de l'assemblée spéciale.</p><p>Cette assemblée générale statue dans les conditions de quorum et de majorité requises pour les modifications statutaires.</p>"
        },
        {
          id: "article105",
          title: "Article 105",
          content: "<p>Les sociétés nouvelles prennent en charge l'intégralité du passif correspondant aux divers éléments d'actif de la société ancienne qui leur est dévolu ou apporté.</p><p>Elles sont réputées, chacune en ce qui la concerne, avoir le même objet que la société ancienne dont elles assurent la continuation.</p><p>Dans le partage des titres reçus par la société ancienne, les associés reçoivent les parts ou actions des sociétés nouvelles correspondant au logement auquel ils avaient vocation.</p>"
