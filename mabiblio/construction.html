    {
      title: "TITRE III: CONTRATS SPECIAUX DE CONSTRUCTION",
      articles: []
    },
    {
      title: "Sous-titre 1: Vente d'immeubles à construire",
      articles: [
        {
          id: "article107",
          title: "Article 107",
          content: "<p>Le présent sous-titre fixe les dispositions destinées à réglementer la vente d'immeuble à construire et les contrats de réservation préliminaire dans les programmes immobiliers d'accession à la propriété ainsi que les droits et les obligations respectifs du vendeur et de l'acquéreur.</p>"
        },
        {
          id: "article108",
          title: "Article 108",
          content: "<p>Est notamment réputé vendeur d'immeuble à construire au sens du présent sous-titre toute personne physique ou morale qui, d'une manière habituelle ou occasionnelle, a acquis la libre disposition d'un terrain et accompli les formalités juridiques et financières en vue de la construction d'un immeuble ou d'un ensemble d'immeubles destiné à être vendu.</p>"
        },
        {
          id: "article109",
          title: "Article 109",
          content: "<p>Le vendeur d'immeuble à construire est un commerçant au sens des articles 2 et 3 de l'Acte uniforme de l'OHADA portant sur le droit commercial général. Il doit être immatriculé au Registre du commerce et du crédit mobilier et tenir les livres comptables imposés aux commerçants conformément aux dispositions de l'Acte uniforme OHADA portant sur le droit commercial général.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 1: Contrat de vente d'immeubles à construire",
      articles: [
        {
          id: "article110",
          title: "Article 110",
          content: "<p>La vente d'immeuble à construire est l'acte par lequel le vendeur s'engage à céder en toute propriété à l'acquéreur tout ou partie d'un immeuble à édifier dans un délai fixé par un contrat. Cette vente peut être conclue en l'état futur d'achèvement ou à terme.</p>"
        },
        {
          id: "article111",
          title: "Article 111",
          content: "<p>La vente en l'état futur d'achèvement est le contrat par lequel le vendeur transfère immédiatement à l'acquéreur ses droits sur le sol ainsi que la propriété des constructions qui y sont réalisées au jour de la signature du contrat.</p>"
        },
        {
          id: "article112",
          title: "Article 112",
          content: "<p>Les ouvrages à venir deviennent la propriété de l'acquéreur au fur et à mesure de leur exécution et celui-ci est tenu d'en payer le prix à mesure de l'avancement des travaux.</p>"
        },
        {
          id: "article113",
          title: "Article 113",
          content: "<p>Le vendeur conserve sa qualité de maître de l'ouvrage jusqu'à la livraison du bâtiment.</p>"
        },
        {
          id: "article114",
          title: "Article 114",
          content: "<p>La vente à terme est le contrat par lequel le vendeur et l'acheteur s'engagent, le premier à livrer l'immeuble ou la partie d'immeuble à céder à son achèvement, le second à en prendre possession en payant le prix convenu, à la date de livraison. Le transfert des droits sur le sol et de la propriété des constructions s'opère de plein droit par la constatation par acte notarié de l'achèvement de l'immeuble et prend effet rétroactivement au jour de la signature du contrat de vente à terme.</p>"
        },
        {
          id: "article115",
          title: "Article 115",
          content: "<p>L'immeuble vendu à terme ou en l'état futur d'achèvement est réputé achevé lorsque sont exécutés les ouvrages et sont installés les éléments d'équipement qui sont indispensables à l'utilisation, conformément à sa destination, de l'immeuble faisant l'objet du contrat. Pour l'appréciation de cet achèvement, les défauts de conformité avec les prévisions du contrat ne sont pas pris en considération lorsqu'ils n'ont pas un caractère substantiel, ni les malfaçons qui ne rendent pas les ouvrages ou éléments ci-dessus précisés impropres à leur utilisation. La constatation de l'achèvement n'emporte par elle-même ni reconnaissance de la conformité aux prévisions du contrat, ni renonciation aux droits que l'acquéreur tient de l'article 240 ci-dessous.</p>"
        },
        {
          id: "article116",
          title: "Article 116",
          content: "<p>La vente d'un immeuble à construire peut être assortie d'un mandat donné par l'acquéreur au vendeur a l'effet de passer les actes de disposition devant affecter les biens et droits vendus et indispensables à la construction du bâtiment dont tout ou partie forme l'objet de la vente. Ce mandat peut concerner les actes indispensables à la construction d'autres bâtiments désignés par le mandat s'ils doivent comporter des parties communes avec celui dont tout ou partie forme l'objet de la vente. Ce mandat doit indiquer spécialement la nature, l'objet et les conditions des actes en vue desquels il est donné. Il peut toutefois comporter le pouvoir de passer tous les actes de disposition portant sur des parties communes et qui se révéleraient nécessaires:</p><ul><li>pour satisfaire aux prescriptions d'urbanisme;</li><li>pour satisfaire aux obligations imposées par le permis de construire du bâtiment faisant l'objet de la vente ou auxquelles pourrait être subordonnée la délivrance d'un tel permis pour la construction des autres bâtiments concernés par le mandat;</li><li>pour assurer la desserte de ces immeubles ou leur raccordement avec les réseaux de distribution et les services publics.</li></ul>"
        },
        {
          id: "article117",
          title: "Article 117",
          content: "<p>Tout contrat ayant pour objet le transfert de propriété d'un immeuble ou d'une partie d'immeuble, à usage d'habitation ou à usage professionnel et d'habitation et comportant l'obligation pour l'acheteur de faire des versements ou des dépôts de fonds avant l'achèvement de la construction, doit à peine de nullité absolue:</p><ul><li>avoir la nature de l'un ou l'autre des deux contrats prévus aux articles article 111 et article 114 ci-dessus;</li><li>être établi conformément aux dispositions du présent chapitre.</li></ul>"
        },
        {
          id: "article118",
          title: "Article 118",
          content: "<p>Est obligatoirement soumis aux dispositions du présent chapitre, tout contrat ayant pour objet de procurer directement ou indirectement, des droits sur un terrain, assorti d'un mandat pour y édifier ou y faire édifier un immeuble à usage d'habitation ou à usage professionnel et d'habitation. Ce mandat peut être inclus au contrat ou en être distinct.</p>"
        },
        {
          id: "article119",
          title: "Article 119",
          content: "<p>Le contrat de vente en l'état futur d'achèvement ou de vente à terme doit être passé par acte notarié et préciser:</p><ul><li>l'origine et la nature des droits sur le sol;</li><li>la description et les superficies de l'immeuble ou de la partie d'immeuble vendu incluant les caractéristiques générales relatives à la nature des matériaux de construction et des éléments d'équipement indispensables à l'utilisation de l'immeuble à construire conformément à sa destination;</li><li>les références du permis de construire;</li><li>le prix global et forfaitaire révisable ou non révisable;</li><li>les modalités de paiement;</li><li>le cas échéant, les éventuelles modalités de révision du prix pouvant intervenir dans les conditions déterminées par le contrat;</li><li>le délai de livraison;</li><li>l'engagement du vendeur à remettre à l'acheteur l'arrêté de concession définitive correspondant à l'immeuble ou à la partie d'immeuble achetée.</li></ul><p>Toutefois, lorsque le contrat concerne seulement une partie d'immeuble, il peut ne comporter que les seules indications relatives à cette partie. Les précisions relatives à l'ensemble de l'immeuble doivent alors être consignées dans un document d'ensemble déposé au rang des minutes du notaire devant qui est passée la vente et auquel l'acte doit faire référence. Le règlement de copropriété établi par acte notarié peut être consulté à l'étude de ce notaire, et une copie doit être remise à chaque acquéreur lors de la signature du contrat. L'inobservation de l'une quelconque des dispositions du présent article entraîne la nullité relative du contrat. Cette nullité ne peut être invoquée que par l'acquéreur et ce, avant l'achèvement des travaux.</p>"
        },
        {
          id: "article120",
          title: "Article 120",
          content: "<p>Lorsque la vente porte sur un immeuble à usage d'habitation, le vendeur est tenu de faire visiter, préalablement à la vente, un logement de référence réalisé sur le site et conforme au devis descriptif.</p>"
        },
        {
          id: "article121",
          title: "Article 121",
          content: "<p>Aucun versement dans le cas d'une vente en l'état futur d'achèvement, ni aucun dépôt dans le cas d'une vente à terme autre que le dépôt de garantie intervenant lors de la souscription éventuelle du contrat préliminaire de réservation prévu à l'article 128 ci-dessous, ne doit être effectué avant la signature du contrat de vente. Toutefois, cette opération est admise dans le cas des programmes immobiliers dont les dépôts des acquéreurs sont couverts par une garantie de remboursement des apports délivrée par une banque, un établissement financier ou une compagnie d'assurances agréés en Côte d'Ivoire conforme aux dispositions de l'article 210 ci-dessous.</p>"
        },
        {
          id: "article122",
          title: "Article 122",
          content: "<p>Lorsque la vente est conclue en l'état futur d'achèvement, le contrat de vente peut stipuler que le paiement interviendra par versements échelonnés à mesure de l'avancement des travaux.</p>"
        },
        {
          id: "article123",
          title: "Article 123",
          content: "<p>Lorsque la vente est conclue à terme, le contrat de vente peut seulement stipuler l'obligation pour l'acquéreur d'effectuer des dépôts successifs à mesure de l'avancement des travaux. A défaut de garantie de remboursement des apports prévus à l' article 210 ci-dessous, les fonds déposés sont consignés dans un compte spécial ouvert au nom de l'acquéreur dans une banque ou un établissement financier agréés en Côte d'Ivoire. Les fonds déposés sont incessibles, insaisissables et indisponibles jusqu'au transfert de propriété sans préjudice de la possibilité de consignation instituée à l' article 124.</p>"
        },
        {
          id: "article124",
          title: "Article 124",
          content: "<p>Quelle que soit la forme du contrat de vente d'immeuble à construire retenu, le montant cumulé des versements ou dépôts prévus aux article 122 et article 123 ci-dessus ne peut excéder les seuils suivants du prix de vente prévisionnel éventuellement révisé :</p><ul><li>20% à l'achèvement des fondations;</li><li>60% à la mise hors d'eau ;</li><li>90% à l'achèvement des travaux.</li></ul><p>Le solde du prix doit être versé lors de la mise à disposition de l'acquéreur de l'immeuble ou de la partie d'immeuble achevé. Son montant peut toutefois être consigné en cas de contestation de la conformité de l'immeuble construit avec le contrat. En cas d'absence de garantie de remboursement des apports, aucun versement ni dépôt ne peut être effectué avant la réalisation de la condition.</p>"
        },
        {
          id: "article125",
          title: "Article 125",
          content: "<p>Le contrat peut prévoir une pénalité pour retard dans les versements ou dépôts prévus aux article 122 et article 123 ci-dessus, dans la limite de taux maximaux qui seront fixés par décret.</p>"
        },
        {
          id: "article126",
          title: "Article 126",
          content: "<p>Nonobstant toute stipulation contraire, les clauses de résolution de plein droit sanctionnant les obligations de versement ou de dépôt prévues aux article 122 et article 123 ci-dessus, ne peuvent produire effets que trois mois après la date de la sommation ou du commandement resté infructueux.</p>"
        },
        {
          id: "article127",
          title: "Article 127",
          content: "<p>La cession par l'acquéreur des droits qu'il tient d'une vente d'immeuble à construire substitue de plein droit le cessionnaire dans les obligations de l'acquéreur envers le vendeur. Tout projet de cession doit obligatoirement être signifié au vendeur par le notaire appelé à recevoir l'acte de cession. Ces dispositions s'appliquent à toute mutation entre vifs, volontaire ou forcée, ou à cause de mort.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 2: Contrat de réservation préliminaire",
      articles: [
        {
          id: "article128",
          title: "Article 128",
          content: "<p>La vente peut être précédée d'un contrat de réservation préliminaire par lequel le vendeur, en qualité de réservant, s'engage à réserver à un acquéreur, qui a la qualité de réservataire, un immeuble ou une partie d'immeuble, en contrepartie du versement par le réservataire, d'un dépôt de garantie. La vente d'immeuble à construire ne peut faire l'objet, à peine de nullité absolue, d'aucun autre acte, notamment d'une promesse d'achat ou de vente.</p>"
        },
        {
          id: "article129",
          title: "Article 129",
          content: "<p>Le contrat de réservation préliminaire mentionné à l'article 128 ci-dessus doit, à peine de nullité relative, être établi par écrit et comporter au moins les mentions suivantes :</p><ul><li>l'origine et la nature des droits sur le sol portant la construction;</li><li>la consistance de l'immeuble;</li><li>les caractéristiques générales relatives à la nature et à la qualité des matériaux de construction et des éléments d'équipement indispensables à l'utilisation de l'immeuble à construire conformément à sa destination, lesquelles doivent être conformes aux dispositions du chapitre 13 du sous-titre 1 du titre IV du présent livre relatives aux matériaux de construction;</li><li>le délai d'exécution des travaux et le délai de livraison;</li><li>la description sommaire, la superficie et la situation de l'immeuble ou de la partie d'immeuble réservée ;</li><li>le prix prévisionnel de l'immeuble ou de la partie d'immeuble réservée et les modalités de paiement;</li><li>les éventuelles modalités de révision du prix pour variations des conditions économiques pouvant intervenir dans les conditions déterminées par décret;</li><li>le cas échéant, la nature et le montant du ou des prêts sollicités par le bénéficiaire de la réservation en vue de l'acquisition ou des prêts que le réservant déclare s'engager à faire obtenir ou à transférer au réservataire;</li><li>le montant et les modalités de versement du dépôt de garantie et des apports nécessaires pour compléter le financement de l'acquisition;</li><li>la date d'expiration du délai prévu pour la réalisation de la vente par acte notarié;</li><li>l'attestation de garantie de remboursement des apports;</li><li>les références du permis de construire.</li></ul>"
        },
        {
          id: "article130",
          title: "Article 130",
          content: "<p>Le montant du dépôt de garantie constitué au moment de la conclusion du contrat de réservation préliminaire ne peut excéder 10% du prix prévisionnel de vente, si le délai de réalisation de la vente n'excède pas un an. Le pourcentage est limité à 5% lorsque le délai est compris entre un et deux ans; aucun dépôt ne peut être exigé si le délai excède deux ans.</p>"
        },
        {
          id: "article131",
          title: "Article 131",
          content: "<p>Le réservant doit notifier au réservataire le projet d'acte notarié de vente, un mois au moins avant la date prévue pour la signature de cet acte.</p>"
        },
        {
          id: "article132",
          title: "Article 132",
          content: "<p>En l'absence de la garantie de remboursement des dépôts prévue à l'article 210 ci-dessous, les fonds déposés en garantie sont inscrits à un compte spécial ouvert au nom du réservataire dans une banque ou un établissement financier agréé en Côte d'Ivoire. Il en est de même pour la partie des dépôts non couverte par la garantie éventuelle de remboursement. Les dépôts de réservataires des différentes parties composant un même immeuble ou un même ensemble immobilier peuvent être groupés dans un compte spécial comportant un sous-compte par bénéficiaire.</p>"
        },
        {
          id: "article133",
          title: "Article 133",
          content: "<p>Les fonds déposés en garantie sont indisponibles et insaisissables jusqu'à la conclusion du contrat de vente, dans la limite des sommes dues par l'acheteur. Lorsque la vente est conclue en l'état futur d'achèvement, les fonds déposés sont remis au vendeur à titre d'acompte sur le paiement du prix au jour de la signature de l'acte, dans la limite des sommes dues au titre de l'article 124 ci-dessus. Lorsque la vente est conclue à terme, les fonds déposés demeurent inscrits au compte ouvert à cet effet, auxquels viendront le cas échéant s'ajouter les dépôts successifs effectués à mesure de l'avancement des travaux, conformément à l'article 122 ci-dessus.</p>"
        },
        {
          id: "article134",
          title: "Article 134",
          content: "<p>Le dépôt de garantie est restitué, sans retenue, ni pénalité, au réservataire qui en fait la demande expresse, dans l'un des cas suivants:</p><ul><li>si le contrat de vente n'est pas conclu du fait du réservant;</li><li>si le prix excède de plus de 5% le prix prévisionnel stipulé au contrat révisé le cas échéant conformément aux dispositions du contrat de réservation préliminaire;</li><li>si le ou les prêts dont fait état le contrat de réservation préliminaire ne sont pas obtenus à hauteur du montant mentionné dans ce contrat;</li><li>si l'un des éléments d'équipement ou l'un des matériaux, prévus au contrat de réservation préliminaire, ne doit pas être réalisé ou mis en œuvre ;</li><li>si le projet d'acte de vente stipule un délai de livraison supérieur d'au moins un tiers au délai prévu au contrat de réservation préliminaire.</li></ul><p>Dans les cas prévus ci-dessus, le réservataire notifie sa demande de remboursement au réservant et au dépositaire des fonds, par lettre recommandée avec accusé de réception. Le dépositaire doit, à la condition que le réservataire justifie de l'existence de l'un des cas prévus ci-dessus, lui rembourser le dépôt de garantie dans le délai maximum d'un mois à compter du jour de la réception de la demande de remboursement.</p>"
        },
        {
          id: "article135",
          title: "Article 135",
          content: "<p>En cas de non-réalisation de la vente du seul fait du réservataire, le dépôt de garantie reste acquis au réservant à titre de dédommagement. Toutefois, le réservataire a, dans ce cas, la faculté de céder l'ensemble de ses droits et de ses obligations au titre du contrat préliminaire de réservation à un tiers, qu'il doit soumettre à l'agrément du réservant au plus tard un mois avant la date prévue pour la signature de l'acte de vente. Le réservant ne peut, en aucun cas, convenir avec le tiers présenté à son agrément d'autres termes que ceux stipulés dans le contrat de réservation signé par le réservataire qui a renoncé à la réalisation de la vente.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 3: Dispositions particulières à la vente en l'état futur d'achèvement",
      articles: [
        {
          id: "article136",
          title: "Article 136",
          content: "<p>Aucun contrat de vente en l'état futur d'achèvement ne peut être signé avant l'achèvement des fondations, y compris le plancher bas incorporé auxdites fondations et avant que le vendeur ait préalablement justifié;</p><ul><li>du paiement intégral des droits sur le sol portant la construction;</li><li>du règlement intégral des décomptes relatifs à l'ensemble des études de l'opération et aux travaux réalisés pour l'achèvement des fondations;</li><li>de la régularité de sa situation fiscale pour le dernier exercice clos;</li><li>de la constitution de la garantie de bon achèvement de l'immeuble prévue au sous-titre 1 du titre III du présent livre.</li></ul>"
        },
        {
          id: "article137",
          title: "Article 137",
          content: "<p>Après la réalisation de chacune des conditions suspensives prévues à l'article 136 ci-dessus, le contrat de vente sera exécuté, notamment par application des article 122 et article 123 ci-dessus.</p>"
        }

    {
      title: "CHAPITRE 4: Droits et devoirs respectifs du vendeur d'immeuble et de l'acquéreur",
      articles: [
        {
          id: "article138",
          title: "Article 138",
          content: "<p>Tout vendeur d'immeuble à construire doit préalablement à l'exercice de son activité bénéficier d'un agrément ministériel délivré au regard notamment des critères de compétence, d'honorabilité et de solvabilité. Cet agrément est accordé par le ministre chargé du Logement sur avis d'une Commission présidée par ledit ministre ou son représentant et composée de représentants des ministres chargés de l'Economie et des Finances, du Commerce, de la Justice, de la Sécurité et de l'Environnement.</p>"
        },
        {
          id: "article139",
          title: "Article 139",
          content: "<p>Le vendeur d'immeuble à construire est tenu de disposer d'un siège social facilement identifiable par l'acquéreur. Ce siège social doit comporter un panneau d'identification mentionnant la raison sociale, l'adresse et le numéro du registre de commerce du vendeur d'immeuble.</p>"
        },
        {
          id: "article140",
          title: "Article 140",
          content: "<p>Les programmes immobiliers établis par le vendeur doivent faire l'objet d'un agrément technique préalable à toute publicité et à toute commercialisation. Cet agrément technique est accordé par le ministre chargé du Logement après étude du dossier technique et financier du projet présenté par le vendeur. La recevabilité du dossier aux fins d'instruction suppose que le vendeur dispose:</p><ul><li>d'un terrain destiné à la réalisation du programme pour lequel un arrêté de concession provisoire lui a au moins été consenti;</li><li>soit d'un financement propre, soit d'un accord écrit d'une banque agréée ou d'un bailleur de fonds ayant un représentant agréé en Côte d'Ivoire qui lui garantit l'octroi d'un crédit immobilier;</li><li>éventuellement d'une garantie de remboursement lui permettant d'utiliser les apports garantis des acquéreurs pour compléter le financement du programme immobilier.</li></ul>"
        },
        {
          id: "article141",
          title: "Article 141",
          content: "<p>Le vendeur d'immeuble à construire est tenu, à compter de la réception des travaux, des obligations dont les architectes, entrepreneurs et autres personnes liées au maître de l'ouvrage par un contrat de louage d'ouvrage sont eux-mêmes tenus, en application des dispositions du sous-titre 3 du titre III du présent livre. Ces garanties bénéficient aux propriétaires successifs de l'immeuble. Il n'y a pas lieu à résolution de la vente ou à diminution du prix si le vendeur s'oblige à réparer les dommages définis au sous-titre 3 du titre III du présent livre à l'exception de l'article.</p>"
        },
        {
          id: "article142",
          title: "Article 142",
          content: "<p>Le vendeur d'immeuble à construire ne peut être déchargé, ni avant la réception des travaux, ni avant l'expiration d'un délai de quatre-vingt-dix jours après la prise de possession par l'acquéreur, des vices de construction ou des défauts de conformité alors apparents. Il n'y aura pas lieu à résolution du contrat ou à diminution du prix si le vendeur s'oblige à réparer le vice ou le défaut de conformité. Dans le cas contraire, l'action en résolution du contrat ou en diminution du prix devra être introduite, à peine de forclusion, dans l'année qui suit la date à laquelle le vendeur peut être déchargé des vices et défauts de conformité apparents.</p>"
        },
        {
          id: "article143",
          title: "Article 143",
          content: "<p>L'acquéreur doit honorer ses engagements vis-à-vis du vendeur en payant le prix convenu selon les modalités et l'échéancier fixé par le contrat de vente sous peine de résolution dudit contrat. Toutefois, toute clause de résolution de plein droit sanctionnant l'inobservation des obligations prévues à l'alinéa précédent ne peut produire effet qu'un mois après mise en demeure restée sans effet.</p>"
        },
        {
          id: "article144",
          title: "Article 144",
          content: "<p>En cas de décès de l'acquéreur le bénéfice du contrat de vente est transmis de plein droit à son ou ses héritiers qui doivent respecter les engagements souscrits par leur auteur.</p>"
        },
        {
          id: "article145",
          title: "Article 145",
          content: "<p>En cas de rupture volontaire du contrat de vente par l'acquéreur, le dépôt de garantie et les apports déjà constitués restent acquis au vendeur à titre de dédommagement sans que la somme des apports et du dépôt de garantie à retenir puisse excéder 5% du prix de vente éventuellement révisé. L'acquéreur peut cependant se libérer de ses engagements, sans pénalité ni retenue, en désignant un tiers acquéreur qui aura été préalablement agréé par le vendeur au plus tard un mois avant la signature du contrat de vente.</p>"
        }
      ]
    },
    {
      title: "Sous-titre 2: Promotion immobilière",
      articles: []
    },
    {
      title: "CHAPITRE 1: Contrat de promotion immobilière",
      articles: [
        {
          id: "article146",
          title: "Article 146",
          content: "<p>Le contrat de promotion immobilière est un mandat d'intérêt commun par lequel une personne physique ou morale, appelée promoteur, s'oblige envers le maître de l'ouvrage à faire procéder à la construction, pour un prix convenu et au moyen de contrats de louage d'ouvrage, d'un ou de plusieurs immeubles et à effectuer elle-même ou à faire effectuer, moyennant une rémunération convenue, tout ou partie des opérations juridiques, administratives, financières et techniques concourant à ce même objet.</p>"
        },
        {
          id: "article147",
          title: "Article 147",
          content: "<p>Tout contrat par lequel une personne physique ou morale s'oblige envers le maître de l'ouvrage à faire procéder à la construction d'un immeuble à usage d'habitation ou d'un immeuble à usage professionnel et d'habitation, en une qualité autre que celle de vendeur d'immeuble à construire ou de loueur d'ouvrage, est soumis aux dispositions du présent sous-titre.</p>"
        },
        {
          id: "article148",
          title: "Article 148",
          content: "<p>Les dispositions de l' article 147 ci-dessus ne sont pas obligatoires lorsque le maître de l'ouvrage est une personne qui construit un ou plusieurs immeubles en vue de la vente ou une société autre que celles mentionnées aux chapitres 1 et 2 du sous-titre 1 du titre I du présent livre relatifs aux sociétés civiles constituées en vue de l'attribution d'immeubles aux associés par fractions divises et aux sociétés coopératives de construction faisant construire plus de deux locaux à usage professionnel ou d'habitation. Les sociétés des chapitres 1 et 2 du sous-titre 1 du titre I du présent livre relatifs aux sociétés civiles constituées en vue de l'attribution d'immeubles aux associés par fractions divises et aux sociétés coopératives de construction qui, lors de l'achat d'une fraction de terrain sur lequel elles construiront, s'obligent à l'égard du vendeur, lequel conserve le surplus du terrain, à faire édifier pour son compte les immeubles correspondant audit surplus et à assumer la charge de leur coût ne sont pas tenues de passer un contrat de promotion avec ledit vendeur.</p>"
        },
        {
          id: "article149",
          title: "Article 149",
          content: "<p>Le contrat de promotion immobilière, tel que défini à l'article 147 ci-dessus, doit être constaté avant le commencement de son exécution, par un écrit contenant les énonciations suivantes:</p><ul><li>la situation et la superficie du terrain d'assiette de l'immeuble à construire;</li><li>l'origine et la nature des droits sur le sol;</li><li>la consistance et les caractéristiques techniques de l'immeuble à construire;</li><li>le délai d'exécution des travaux;</li><li>les devis descriptifs et les conditions techniques d'exécution des travaux;</li><li>le prix global et forfaitaire révisable ou non révisable convenu pour la construction;</li><li>les moyens et les conditions de financement de la construction et les modalités de règlement à mesure de l'avancement des travaux;</li><li>la rémunération du promoteur pour ses frais et honoraires;</li><li>la garantie apportée par le promoteur pour la bonne exécution de son mandat;</li><li>les références du permis de construire.</li></ul>"
        },
        {
          id: "article150",
          title: "Article 150",
          content: "<p>Par dérogation aux dispositions qui précèdent, le contrat peut être constaté par plusieurs actes séparés comportant chacun des énonciations limitées à une phase ou à une partie de l'ensemble des opérations à réaliser. Toutefois, aucun travail matériel, hormis ceux nécessaires aux études préliminaires, ne peut être effectué sur le terrain avant la signature des actes concernant toutes les opérations à réaliser. L'inobservation de l'une quelconque des dispositions du présent article entraîne la nullité relative du contrat de promotion immobilière. Cette nullité ne peut être invoquée que par le maître de l'ouvrage et jusqu'à l'achèvement des travaux. Elle entraîne l'inopposabilité des contrats passés par le promoteur au maître de l'ouvrage.</p>"
        },
        {
          id: "article151",
          title: "Article 151",
          content: "<p>Aucun dépôt, aucune souscription ou acceptation d'effets de commerce ni aucun versement ne peut être exigé ou accepté du maître de l'ouvrage, avant la signature du contrat de promotion immobilière. Aucun paiement ne peut, non plus, être exigé avant la date à laquelle la créance est exigible.</p>"
        },
        {
          id: "article152",
          title: "Article 152",
          content: "<p>Les modalités de règlement du prix éventuellement révisé, obligatoirement prévues par le contrat de promotion immobilière en application de l'article 149 ci-dessus, doivent stipuler que les paiements sont effectués en fonction de l'état d'avancement des travaux, justifiés conformément au contrat de promotion immobilière, dans la limite des seuils maximaux qui seront fixés par décret.</p>"
        },
        {
          id: "article153",
          title: "Article 153",
          content: "<p>Les modalités de règlement de la rémunération du promoteur, obligatoirement prévues par le contrat de promotion immobilière en application de l'article 149 ci-dessus, doivent stipuler que les paiements partiels à effectuer jusqu'à la livraison au maître de l'ouvrage de l'immeuble construit, ne peuvent excéder les seuils maximaux qui seront fixés par décret pour chacune des étapes de l'avancement des travaux. Le solde consigné par le maître de l'ouvrage lors de la livraison auprès d'un établissement financier agréé en Côte d'Ivoire désigné par le promoteur, est payable à la fin du mandat du promoteur, tel que défini à l'article 158 ci-dessous.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 2: Droits et obligations respectifs du maître de l'ouvrage et du promoteur",
      articles: [
        {
          id: "article154",
          title: "Article 154",
          content: "<p>Le mandat du promoteur tel que défini à l'article 146 ci-dessus lui donne pouvoir de conclure les contrats nécessaires à son objet, de recevoir les travaux, de liquider les marchés et de façon générale celui d'accomplir, à concurrence du prix global convenu, au nom du maître de l'ouvrage, tous les actes qu'exige la réalisation de la construction. Le promoteur immobilier est aussi habilité à procéder à la vente d'immeuble à construire pour le compte du maître de l'ouvrage et de ce fait est considéré comme vendeur d'immeubles. Les dispositions du sous-titre 1 du présent titre lui sont donc applicables. Toutefois, le promoteur n'engage le maître de l'ouvrage, par les emprunts qu'il contracte ou par les actes de disposition qu'il passe, qu'en vertu d'un mandat écrit spécial contenu dans le contrat de promotion immobilière ou dans un acte postérieur. Le maître de l'ouvrage est tenu d'exécuter les engagements contractés en son nom par le promoteur en vertu des pouvoirs que celui-ci tient de la loi, de la Convention ou de tout mandat spécial mentionné à l'alinéa précédent.</p>"
        },
        {
          id: "article155",
          title: "Article 155",
          content: "<p>Le maître de l'ouvrage est tenu d'effectuer les vesements correspondant tant à l'exécution des travaux qu'à la rémunération du promoteur, selon l'échéancier et les modalités prévus au contrat de promotion immobilière, conformément aux dispositions des article 149 et article 151 ci-dessus. Nonobstant toutes stipulations contraires, toute clause de résolution de plein droit sanctionnant l'inobservation des obligations visées à l'alinéa précédent, ne peut produire effet qu'un mois après une mise en demeure restée infructueuse.</p>"
        },
        {
          id: "article156",
          title: "Article 156",
          content: "<p>Le promoteur est garant de l'exécution des obligations mises à la charge des personnes avec lesquelles il a traité au nom du maître de l'ouvrage. Si le promoteur s'engage à exécuter lui-même une partie des opérations de construction, il est tenu, quant à ces opérations, des obligations d'un loueur d'ouvrage. Le promoteur est notamment tenu des obligations résultant des dispositions du sous-titre 3 du titre III du présent livre contractées envers le maître de l'ouvrage sans l'accord préalable écrit de celui-ci.</p>"
        },
        {
          id: "article157",
          title: "Article 157",
          content: "<p>Le promoteur ne peut se substituer un tiers dans l'exécution des obligations qu'il a contractées envers le maître de l'ouvrage sans l'accord préalable écrit de celui-ci.</p>"
        },
        {
          id: "article158",
          title: "Article 158",
          content: "<p>Le mandat du promoteur s'achève après la livraison de l'ouvrage, par la clôture des comptes de construction entre le maître de l'ouvrage et le promoteur, sans préjudice des actions en responsabilité qui peuvent être exercées par le maître de l'ouvrage à l'encontre du promoteur. Le solde consigné en application des dispositions de l' article 124 est payable dans le délai maximum d'un mois à compter de la remise au maître de l'ouvrage par le promoteur, des comptes de construction.</p>"
        },
        {
          id: "article159",
          title: "Article 159",
          content: "<p>Si avant l'achèvement de la construction, le maître de l'ouvrage cède les droits qu'il a sur l'ouvrage, le cessionnaire lui est substitué de plein droit, tant à l'actif qu'au passif, dans l'ensemble du contrat de promotion immobilière. Le cédant est garant de l'exécution des obligations mises à la charge du maître de l'ouvrage par le contrat cédé. Les mandats spéciaux donnés au promoteur se poursuivent entre celui-ci et le cessionnaire.</p>"
        },
        {
          id: "article160",
          title: "Article 160",

      title: "CHAPITRE 1: Bail à construction",
      articles: [
        {
          id: "article163",
          title: "Article 163",
          content: "<p>Le bail à construction est un contrat par lequel le preneur s'engage à titre principal, à édifier des constructions sur le terrain du bailleur et à les conserver en bon état d'entretien pendant toute la durée du bail. Il doit être consenti pour une durée de vingt-cinq ans au plus. En aucun cas, il ne peut être prorogé. Le bail à construction est consenti par ceux qui ont le droit d'aliéner et dans les mêmes conditions et formes.</p>"
        },
        {
          id: "article164",
          title: "Article 164",
          content: "<p>Les terrains du domaine privé de l'Etat et des collectivités territoriales peuvent être donnés à bail à construction.</p>"
        },
        {
          id: "article165",
          title: "Article 165",
          content: "<p>Le bail à construction confère au preneur un droit réel immobilier susceptible d'hypothèque. Il peut être saisi dans les formes prescrites pour la saisie immobilière.</p>"
        },
        {
          id: "article166",
          title: "Article 166",
          content: "<p>Le preneur peut consentir les servitudes passives indispensables à l'achèvement des constructions prévues au bail. Le preneur peut céder tout ou partie de ses droits ou les apporter en société. Les cessionnaires ou la société sont tenus des mêmes obligations que le cédant qui en reste garant jusqu'à l'achèvement de l'ensemble des constructions que le preneur s'est engagé à édifier en application de l'article 163 ci-dessus.</p>"
        },
        {
          id: "article167",
          title: "Article 167",
          content: "<p>Sauf disposition contraire prévue dans le bail, le bailleur devient propriétaire des constructions édifiées et profite des améliorations à l'expiration du bail.</p>"

        {
          id: "article168",
          title: "Article 168",
          content: "<p>Le preneur est tenu de toutes les charges, taxes et impôts relatifs tant aux constructions qu'au terrain. Il est tenu du maintien des constructions en bon état d'entretien et des réparations de toute nature. Il n'est pas obligé de reconstruire les bâtiments s'ils ont péri par cas fortuit ou force majeure ou, s'agissant des bâtiments existant au moment de la passation du bail, par un vice de construction antérieur audit bail. Il répond de l'incendie des bâtiments existants et de ceux qu'il a édifiés. Sauf stipulation contraire du bail, il peut démolir, en vue de les reconstruire, les bâtiments existants.</p>"
        },
        {
          id: "article169",
          title: "Article 169",

        {
          id: "article171",
          title: "Article 171",

        },
        {
          id: "article172",
          title: "Article 172",
          content: "<p>Les dispositions de l' article 166 sont d'ordre public.</p>"

      articles: [
        {
          id: "article186",
          title: "Article 186",
          content: "<p>Toute personne qui se charge de la construction d'un immeuble à usage d'habitation ou d'un immeuble à usage professionnel et d'habitation ne comportant pas plus de deux logements destinés au même maître de l'ouvrage d'après un plan qu'elle a proposé ou fait proposer doit conclure avec le maître de l'ouvrage un contrat soumis aux dispositions de l' article 188 ci-dessous. [cite: 763][cite_start]</p><p>Cette obligation est également imposée: [cite: 764][cite_start]</p><ul><li>à toute personne qui se charge de la construction d'un tel immeuble à partir d'un plan fourni par un tiers à la suite d'un démarchage à domicile ou d'une publicité faits pour le compte de cette personne; [cite: 765][cite_start]</li><li>à toute personne qui réalise une partie des travaux de construction d'un tel immeuble dès lors que le plan de celui-ci a été fourni par cette personne ou, pour son compte, au moyen des procédés visés à l'alinéa précédent. [cite: 766][cite_start]</li></ul><p>Cette personne est tenue des obligations dont les architectes, entrepreneurs et autres personnes liées au maître de l'ouvrage par un contrat de louage d'ouvrage sont eux-mêmes tenus, en application des dispositions du titre III du présent livre. [cite: 769]</p>"
        },
        {

        {

e l'état d'avancement des travaux; [cite: 778][cite_start]</li><li>l'indication que le maître de l'ouvrage pourra se faire assister par un architecte ou par un professionnel habilité en application des dispositions du sous-titre 3 du titre 1 du présent livre, relatives au contrôle des constructions, lors de la réception ou par tout autre professionnel de la construction titulaire d'un contrat d'assurance couvrant les responsabilités pour ce type de mission; [cite: 779][cite_start]</li><li>l'indication de l'obtention du permis de construire et des autres autorisations administratives, dont une copie est annexée au contrat; [cite: 780][cite_start]</li><li>l'indication des modalités de financement, la nature et le montant des prêts obtenus et acceptés par le maître de l'ouvrage ; [cite: 781][cite_start]</li><li>la date d'ouverture du chantier, le délai d'exécution des travaux et les pénalités prévues en cas de retard de livraison; [cite: 783][cite_start]</li><li>la référence de l'assurance de dommages souscrite par le maître de l'ouvrage, en application des dispositions du chapitre 2 du sous-titre 4 du titre 3 du présent Code relatives à l'assurance dommage obligatoire; [cite: 784][cite_start]</li><li>les justifications des garanties de remboursement et de livraison, prévue à l' article 218 ci-dessous, apportées par le constructeur, les attestations de ces garanties étant établies par le garant et annexées au contrat. [cite: 785]</li></ul>"

          title: "Article 190",
          content: "<p>Le contrat défini à l'article 186 ci-dessus peut être conclu sous les conditions suspensives suivantes : [cite: 793][cite_start]</p><ul><li>l'acquisition du terrain ou des droits réels permettant de construire si le maître de l'ouvrage bénéficie d'une promesse de vente; [cite: 794][cite_start]</li><li>l'obtention du permis de construire et des autres autorisations administratives, le maître de l'ouvrage étant tenu de préciser la date limite de dépôt de la demande; [cite: 795][cite_start]</li><li>l'obtention des prêts demandés pour le financement de la construction; [cite: 796][cite_start]</li><li>l'obtention de l'assurance de dommages; [cite: 797][cite_start]</li><li>l'obtention de la garantie de livraison. [cite: 798][cite_start]</li></ul><p>Le délai maximum de réalisation des conditions suspensives ainsi que la date d'ouverture du chantier, déterminée à partir de ce délai, sont précisés par le contrat. [cite: 801][cite_start]</p><p>Aucun versement, aucun dépôt, aucune souscription ou acceptation d'effets de commerce ne peuvent être exigés ou acceptés avant la signature du contrat défini à l'article 186 ci-dessus ni avant la date à laquelle la créance est exigible. [cite: 802][cite_start]</p><p>Le contrat peut stipuler qu'un dépôt de garantie sera effectué à un compte spécial ouvert au nom du maître de l'ouvrage par un organisme habilité. [cite: 803][cite_start]</p><p>Le montant de ce dépôt ne peut excéder 3% du prix de la construction projetée tel qu'il est énoncé au contrat. [cite: 804][cite_start]</p><p>Les fonds ainsi déposés sont indisponibles, incessibles et insaisissables jusqu'à la réalisation de toutes les conditions ; [cite: 805][cite_start]</p><p>dans ce cas, ces sommes viennent s'imputer sur les premiers paiements prévus par le contrat. [cite: 806][cite_start]</p><p>Les fonds déposés en garantie sont immédiatement restitués au maître de l'ouvrage, sans retenue ni pénalité, si toutes les conditions suspensives ne sont pas réalisées dans le délai prévu au contrat ou en cas de rétractation du maître de l'ouvrage dans un délai de dix jours à compter du lendemain de la signature de l'acte ayant pour objet la construction d'un immeuble dans les conditions de l'article 186 ci-dessus. [cite: 807][cite_start]</p><p>Le contrat peut prévoir des paiements au constructeur avant la date d'ouverture du chantier, sous réserve que leur remboursement soit garanti par un établissement habilité à cet effet. [cite: 808][cite_start]</p><p>Un décret pris en Conseil des ministres fixe la nature de la garantie et les conditions et limites dans lesquelles ces sommes sont versées. [cite: 809]</p>"

        {
          id: "article194",

          content: "<p>En application du (3ème tiret) de l' article 188 ci-dessus, à tout contrat, qu'il soit ou non assorti de conditions suspensives, doit être joint le plan de la construction à édifier, [cite: 817] [cite_start]précisant les travaux d'adaptation au sol, les coupes et élévations, les cotes utiles et l'indication des surfaces de chacune des pièces, des dégagements et des dépendances. [cite: 819][cite_start]</p><p>Un dessin d'une perspective de l'immeuble est joint au plan. [cite: 820]</p>"

        {

        {

          title: "Article 197",

          id: "article198",
          title: "Article 198",
          content: "<p>Au cas où le contrat défini à l'article 186 ci-dessus prévoit la révision du prix, celle-ci ne peut être calculée qu'en [cite: 829] [cite_start]fonction de la variation d'un indice national déterminé par voie réglementaire mesurant l'évolution du coût des facteurs de production dans le bâtiment, et, au choix des parties, selon l'une des deux modalités ci-après : [cite: 832][cite_start]</p><p>a) révision du prix d'après la variation de l'indice entre la date de la signature du contrat et la date fixée à l'article 200 ci-dessous, le prix ainsi révisé ne pouvant subir aucune variation après cette date; [cite: 833][cite_start]</p><p>b) révision sur chaque paiement dans une limite exprimée en pourcentage de la variation de l'indice défini ci-dessus entre la date de signature du contrat et la date de livraison prévue au contrat, aucune révision ne pouvant être effectuée au-delà d'une période de neuf mois suivant la date définie à l'article 200 ci-dessous lorsque la livraison prévue doit avoir lieu postérieurement à l'expiration de cette période. [cite: 834]</p>"
        },
        {
          id: "article199",
          title: "Article 199",
          content: "<p>Ces modalités doivent être portées, préalablement à la signature du contrat, à la connaissance du maître de l'ouvrage par la personne qui se charge de la construction. [cite: 835][cite_start]</p><p>Elles doivent être reproduites dans le contrat, cet acte devant en outre porter, paraphée par le maître de l'ouvrage, une clause par laquelle celui ci reconnaît en avoir été informé dans les conditions prévues ci-dessus. [cite: 836][cite_start]</p><p>La modalité choisie d'un commun accord par les parties doit figurer dans le contrat. [cite: 837][cite_start]</p><p>A défaut des mentions prévues aux deux alinéas précédents, le prix figurant au contrat n'est pas révisable. [cite: 838][cite_start]</p><p>L'indice et la limite prévus ci-dessus sont définis par décret. [cite: 839][cite_start]</p><p>Cette limite, destinée à tenir compte des frais fixes, des approvisionnements constitués et des améliorations de productivité, doit être comprise entre 60% et 80% de la variation de l'indice. [cite: 840][cite_start]</p><p>L'indice servant de base pour le calcul de la révision est le dernier indice publié au jour de la signature du contrat. [cite: 841][cite_start]</p><p>La variation prise en compte résulte de la comparaison de cet indice avec le dernier indice publié avant la date de chaque paiement ou avant celle prévue à l'article 200 ci-dessous selon le choix exprimé par les parties. [cite: 842]</p>"
        },
        {
          id: "article200",
          title: "Article 200",

        },
        {
          id: "article201",
          title: "Article 201",
          content: "<p>Le constructeur est tenu de conclure par écrit les contrats de sous-traitance avant tout commencement d'exécution des travaux à la charge du sous-traitant. [cite: 846][cite_start]</p><p>Ces contrats comportent les énonciations suivantes: [cite: 847][cite_start]</p><ul><li>la désignation de la construction ainsi que les nom et adresse du maître de l'ouvrage et de l'établissement qui apporte la garantie prévue à l'article 218 ci-dessous; [cite: 849][cite_start]</li><li>la description des travaux qui en font l'objet, conforme aux énonciations du contrat de construction; [cite: 850][cite_start]</li><li>le prix convenu et, s'il y a lieu, les modalités de sa révision; [cite: 851][cite_start]</li><li>le délai d'exécution des travaux et le montant des pénalités de retard; [cite: 852][cite_start]</li><li>les modalités de règlement du prix, qui ne peut dépasser un délai de trente jours à compter de la date du versement effectué au constructeur par le maître de l'ouvrage ou le prêteur, en règlement de travaux comprenant ceux effectués par le sous-traitant et acceptés par le constructeur; [cite: 853][cite_start]</li><li>le montant des pénalités dues par le constructeur en cas de retard de paiement. [cite: 854][cite_start]</li></ul><p>La copie des contrats de sous-traitance est adressée par le constructeur à l'établissement qui apporte la garantie prévue à l'article 218 ci-dessous dans les huit jours de leur signature. [cite: 855]</p>"
        },

      articles: [
        {
          id: "article205",
          title: "Article 205",
          content: "<p>La garantie de bon achèvement de l'immeuble et la garantie de remboursement doivent être conformes aux dispositions ci-après. [cite: 877]</p>"
        },
        {
          id: "article206",
          title: "Article 206",
          content: "<p>La garantie de bon achèvement est: [cite: 878][cite_start]</p><p>a) soit délivrée par une banque, un établissement financier ou une compagnie d'assurances agréé en Côte d'Ivoire, dans les conditions prévues à l'article 207 ci-dessous; [cite: 879][cite_start]</p><p>b) soit constituée par le vendeur, dans les conditions prévues par l'article 208 ci-dessous. [cite: 880]</p>"
        },
        {
          id: "article207",
          title: "Article 207",
          content: "<p>La garantie de bon achèvement prévue à l'article 206 ci-dessus, doit être délivrée sous la forme: [cite: 881][cite_start]</p><ul><li>soit d'une ouverture de crédit par laquelle celui qui l'a consentie s'oblige à avancer au vendeur ou à payer pour son compte les sommes nécessaires à l'achèvement de l'immeuble, sur la simple demande de l'acquéreur; [cite: 882][cite_start]</li><li>soit d'une Convention de cautionnement au terme de laquelle la caution s'oblige solidairement avec le vendeur, envers l'acquéreur, à payer lesdites sommes, en renonçant aux bénéfices de division et de discussion. [cite: 883]</li></ul>"
        },
        {
          id: "article208",
          title: "Article 208",
          content: "<p>La garantie de bon achèvement prévue à l'article 206 b) ci-dessus résulte de la justification par le vendeur des moyens d'assurer le financement intégral de la construction. [cite: 884]</p>"
        },
        {
          id: "article209",
          title: "Article 209",
          content: "<p>La justification requise du vendeur par l'article 208 devra résulter des éléments suivants qui seront pris en compte :</p><ul><li>les sommes déjà effectivement dépensées pour la construction: [cite: 885][cite_start]</li><li>les crédits confirmés des banques ou des établissements financiers faisant des opérations de crédit-immobilier; [cite: 886][cite_start]</li><li>les montants des prix de vente stipulés aux contrats de vente conclus conformément à l'article 107 pour l'immeuble ou pour l'ensemble immobilier; [cite: 888][cite_start]</li><li>les fonds propres du vendeur. [cite: 889]</li></ul>"
        },
        {
          id: "article210",
          title: "Article 210",
          content: "<p>La garantie de remboursement est délivrée par une banque, un établissement financier ou une compagnie d'assurances agréés en Côte d'Ivoire, dans les conditions exposées ci-dessous. [cite: 890]</p>"

        {
          id: "article211",

        },

        },
        {

    {
      title: "CHAPITRE 2: Garantie de bonne exécution dans les contrats de promotion immobilière",
      articles: [
        {
          id: "article214",
          title: "Article 214",
          content: "<p>La garantie de bonne exécution des obligations contractuelles du promoteur résultant de son mandat comporte l'obligation pour celui-ci de prendre à sa charge les sommes excédant le prix convenu au contrat de promotion immobilière qui seraient nécessaires à la réalisation de l'ouvrage contractuellement défini conformément à l'article 146 ci-dessus. [cite: 897][cite_start]</p><p>La garantie est donnée au maître de l'ouvrage sous la forme: [cite: 898][cite_start]</p><ul><li>soit d'une ouverture de crédit par laquelle celui qui l'a consentie s'oblige à avancer au promoteur ou à payer pour son compte les sommes définies à l'alinéa précédent, sur la simple demande du maître de l'ouvrage; [cite: 899][cite_start]</li><li>soit d'une Convention de cautionnement au terme de laquelle la caution s'oblige solidairement avec le promoteur, envers le maître de l'ouvrage, à payer lesdites sommes, en renonçant aux bénéfices de division et de discussion. [cite: 900][cite_start]</li></ul><p>Cette garantie qui devra couvrir 20% du montant initial, doit être donnée par une banque, un établissement financier ou une compagnie d'assurance agréés en Côte d'Ivoire. [cite: 901]</p>"

    {
      title: "CHAPITRE 3: Garantie de livraison dans les contrats de construction d'une maison individuelle",
      articles: [
        {
          id: "article217",
          title: "Article 217",
          content: "<p>Les dispositions du présent chapitre sont applicables aux contrats conclus conformément aux dispositions du sous-titre 4 du titre 2 du présent livre, relatives à la construction d'une maison individuelle. [cite: 910]</p>"
        },
        {
          id: "article218",
          title: "Article 218",
          content: "<p>La garantie de livraison prévue à l' article 188 (11eme tiret), à l' article 203 et à l'article 204 ci-dessus couvre le maître de l'ouvrage, à compter de la date d'ouverture du chantier, contre les risques d'inexécution ou de mauvaise exécution des travaux prévus au contrat, à prix et délais convenus. [cite: 911][cite_start]</p><p>En cas de défaillance du constructeur, le garant prend à sa charge: [cite: 912][cite_start]</p><ul><li>le coût des dépassements du prix convenu dès lors qu'ils sont nécessaires à l'achèvement de la construction, la garantie apportée à ce titre pouvant être assortie d'une franchise n'excédant pas 5% du prix convenu; [cite: 913][cite_start]</li><li>les conséquences du fait du constructeur ayant abouti à un paiement anticipé ou à un supplément de prix; [cite: 914][cite_start]</li><li>les pénalités forfaitaires prévues au contrat en cas de retard de livraison excédant trente jours, le montant et le seuil minimum de ces pénalités étant fixés par voie règlementaire. [cite: 915][cite_start]</li></ul><p>La garantie est constituée par une Convention de cautionnement solidaire donnée par un établissement de crédit, une société de financement ou une entreprise d'assurance agréée à cet effet. [cite: 916][cite_start]</p><p>Dans le cas où le garant constate que le délai de livraison n'est pas respecté ou que les travaux nécessaires à la levée des réserves formulées à la réception ne sont pas réalisés, il met en demeure sans délai le constructeur soit de livrer l'immeuble, soit d'exécuter les travaux. [cite: 917][cite_start]</p><p>Le garant est tenu à la même obligation lorsqu'il est informé par le maître de l'ouvrage des faits sus-indiqués. [cite: 918][cite_start]</p><p>Quinze jours après une mise en demeure restée infructueuse, le garant procède à l'exécution de ses obligations dans les conditions prévues au paragraphe 3 du présent article. [cite: 919][cite_start]</p><p>Au cas où, en cours d'exécution des travaux, le constructeur fait l'objet des procédures préventives et de redressement judiciaire prévus à l'Acte uniforme OHADA portant organisation des procédures collectives d'apurement du passif, le garant peut mettre en demeure le syndic de se prononcer sur l'exécution du contrat conformément à l'article 108 dudit Acte uniforme. [cite: 921][cite_start]</p><p>A défaut de réponse dans le délai de 30 jours à compter de la réception par le syndic, et sans que ce délai puisse être prorogé pour quelque raison que ce soit, le garant procède à l'exécution de ses obligations. [cite: 922][cite_start]</p><p>Il y procède également dans le cas où, malgré sa réponse positive, le syndic ne poursuit pas l'exécution du contrat dans les quinze jours qui suivent sa réponse. [cite: 923][cite_start]</p><p>Dans les cas prévus au paragraphe 2 ci-dessus et faute pour le constructeur ou le syndic de procéder à l'achèvement de la construction, le garant doit désigner sous sa responsabilité la personne qui terminera les travaux. [cite: 924][cite_start]</p><p>Toutefois, et à condition que l'immeuble ait atteint le stade du hors d'eau, le garant peut proposer au maître de l'ouvrage de conclure lui-même des marchés de travaux avec des entreprises qui se chargeront de l'achèvement. [cite: 925][cite_start]</p><p>Si le maître de l'ouvrage l'accepte, le garant verse directement aux entreprises les sommes dont il est redevable au titre du paragraphe 1 du présent article. [cite: 926][cite_start]</p><p>En cas de défaillance du constructeur, le garant est en droit d'exiger de percevoir directement les sommes correspondantes aux travaux qu'il effectue ou fait effectuer dans les conditions prévues au (5º tiret) de l'article 188 ci-dessus. [cite: 927][cite_start]</p><p>La garantie cesse lorsque la réception des travaux a été constatée par écrit et, le cas échéant, à l'expiration du délai de huit jours prévus à l' article 196 ci-dessus pour dénoncer les vices apparents ou, si des réserves ont été formulées, lorsque celles-ci ont été levées. [cite: 928]</p>"
        }
      ]

    {
      title: "Sous-titre 2: Sécurité et hygiène sur le chantier",
      articles: [
        {
          id: "article219",
          title: "Article 219",
          content: "<p>Sur le chantier de construction, des dispositions appropriées doivent être prises pour assurer la sécurité des travailleurs et celle des personnes étrangères présentes à l'intérieur et aux abords du périmètre des travaux. [cite: 930]</p>"

        {
          id: "article220",

      title: "Sous-titre 3: Responsabilité des constructeurs d'ouvrages",
      articles: [
        {
          id: "article228",

          content: "<p>Est réputé constructeur de l'ouvrage : [cite: 943][cite_start]</p><ul><li>tout architecte, ingénieur, entrepreneur, promoteur, technicien lié au maître de l'ouvrage par un contrat de louage d'ouvrage ou par un cahier des charges; [cite: 944][cite_start]</li><li>toute personne physique ou morale qui vend, après achèvement, un ouvrage qu'elle a construit ou fait construire. [cite: 945]</li></ul>"

        {
          id: "article229",
          title: "Article 229",
          content: "<p>Le maître d'ouvrage est tenu de s'attacher les services d'un constructeur. [cite: 946][cite_start]</p><p>Leur collaboration est matérialisée par un contrat. [cite: 947]</p>"

        {
          id: "article230",
          title: "Article 230",
          content: "<p>Tout constructeur d'un ouvrage est responsable, envers le maître ou l'acquéreur de l'ouvrage, des dommages, même résultant d'un vice du sol, qui compromettent la solidité de l'ouvrage ou qui l'affectent dans l'un de ses éléments constitutifs ou l'un de ses éléments d'équipement, le rendant impropre à sa destination. [cite: 948][cite_start]</p><p>Le constructeur est déchargé de cette responsabilité, s'il rapporte la preuve que les dommages proviennent d'un cas de force majeure ou sont le fait du maître de l'ouvrage. [cite: 949]</p>"

        {
          id: "article231",

        {
          id: "article232",
          title: "Article 232",
          content: "<p>L'ingénieur est responsable de la stabilité de l'édifice et des spécifications techniques. [cite: 951]</p>"

          id: "article233",
          title: "Article 233",
          content: "<p>L'entrepreneur est responsable de l'exécution des ouvrages sous le contrôle de l'architecte et de l'ingénieur. [cite: 952][cite_start]</p><p>Il a la responsabilité de la bonne exécution et de la finition des ouvrages. [cite: 953]</p>"
        },
        {
          id: "article234",
          title: "Article 234",
          content: "<p>L'initiative de la garantie décennale incombe au maître d'ouvrage. [cite: 955]</p>"
        },
        {
          id: "article235",
          title: "Article 235",
          content: "<p>L'exercice de la profession d'entrepreneur en bâtiment est soumis à l'obtention préalable d'un agrément délivré par le ministre chargé de la Construction. [cite: 956]</p>"
        }
      ]

      title: "Sous-titre 4: Assurances des travaux de construction",
      articles: []

    {
      title: "CHAPITRE 1: Assurance de responsabilité obligatoire",
      articles: [
        {
          id: "article236",
          title: "Article 236",
          content: "<p>Le constructeur est tenu de souscrire un contrat d'assurance couvrant tous les risques inhérents aux activités de construction, à l'ouverture de tout chantier de construction. [cite: 960]</p>"
        },
        {
          id: "article237",
          title: "Article 237",
          content: "<p>Le contrat d'assurance doit contenir une clause de responsabilité garantissant tout dommage résultant du fait du constructeur. [cite: 961]</p>"
        },
        {
          id: "article238",
          title: "Article 238",
          content: "<p>Quiconque fait réaliser pour le compte d'autrui des travaux de bâtiment doit être couvert par une assurance de responsabilité, garantissant tout dommage résultant de son fait. [cite: 962][cite_start]</p><p>Il en est de même lorsque les travaux de construction sont réalisés en vue de la vente. [cite: 963]</p>"
        },
        {
          id: "article239",
          title: "Article 239",
          content: "<p>Des dérogations à l'obligation d'assurance peuvent être accordées aux personnes morales de droit public à condition qu'elles aient la qualité de constructeur. [cite: 964]</p>"

    {
      title: "CHAPITRE 2: Assurance de dommage obligatoire",
      articles: [
        {
          id: "article240",
          title: "Article 240",
          content: "<p>Toute personne physique ou morale qui, agissant en qualité de propriétaire de l'ouvrage, de vendeur ou de mandataire du propriétaire de l'ouvrage, fait réaliser des travaux de construction, doit souscrire avant l'ouverture du chantier, pour son compte ou pour celui des propriétaires successifs, une assurance garantissant, en dehors de toute recherche des responsabilités, le paiement de la totalité des travaux de réparation des dommages de la nature de ceux dont sont responsables les constructeurs, au sens de l'article 228, les fabricants et importateurs ou le contrôleur technique sur le fondement du chapitre 2 du sous-titre 3 du présent livre. [cite: 967, 968][cite_start]</p><p>Toutefois, l'obligation prévue au premier alinéa ci-dessus ne s'applique ni aux personnes morales de droit public, ni aux personnes morales assurant la maîtrise d'ouvrage dans le cadre d'un contrat de partenariat conclu avec la personne publique. [cite: 969]</p>"
        },
        {
          id: "article241",
          title: "Article 241",
          content: "<p>L'assuré est tenu de procéder à la déclaration de tout sinistre relevant des hypothèses visées au premier alinéa de l'article 240 ci-dessus auprès de l'assureur. [cite: 970]</p>"
        },
        {
          id: "article242",
          title: "Article 242",
          content: "<p>L'assureur a un délai maximal de soixante jours, courant à compter de la réception de la déclaration du sinistre, pour notifier à l'assuré sa décision quant au principe de la mise en jeu des garanties prévues au contrat. [cite: 971][cite_start]</p><p>Lorsqu'il accepte la mise en jeu des garanties prévues au contrat, l'assureur présente, dans un délai maximal de quatre-vingt-dix jours, courant à compter de la réception de la déclaration du sinistre, une offre d'indemnité, revêtant le cas échéant un caractère provisionnel et destinée au paiement des travaux de réparation des dommages. [cite: 974, 975][cite_start]</p><p>En cas d'acceptation, par l'assuré, de l'offre qui lui a été faite, le règlement de l'indemnité par l'assureur intervient dans un délai de quinze jours. [cite: 976][cite_start]</p><p>Lorsque l'assureur ne respecte pas l'un des délais prévus aux deux alinéas ci-dessus ou propose une offre d'indemnité manifestement insuffisante, l'assuré peut, après l'avoir notifié à l'assureur, engager les dépenses nécessaires à la réparation des dommages. [cite: 977][cite_start]</p><p>L'indemnité versée par l'assureur est alors majorée de plein droit d'un intérêt égal au double du taux de l'intérêt légal. [cite: 978]</p>"
        },
        {
          id: "article243",
          title: "Article 243",
          content: "<p>Dans les cas de difficultés exceptionnelles dues à la nature ou à l'importance du sinistre, l'assureur peut, en même temps qu'il notifie son accord sur le principe de la mise en jeu de la garantie, proposer à l'assuré la fixation d'un délai supplémentaire pour l'établissement de son offre d'indemnité. [cite: 979][cite_start]</p><p>La proposition doit se fonder exclusivement sur des considérations d'ordre technique et être motivée. [cite: 980][cite_start]</p><p>Le délai supplémentaire prévu à l'alinéa qui précède est subordonné à l'acceptation expresse de l'assuré et ne peut excéder cent trente-cinq jours. [cite: 981]</p>"
        },
        {
          id: "article244",
          title: "Article 244",
          content: "<p>L'assurance mentionnée à l'article 240 ci-dessus garantit uniquement le paiement des réparations nécessaires lorsque : [cite: 982][cite_start]</p><ul><li>avant la réception, après mise en demeure restée infructueuse, le contrat de louage d'ouvrage conclu avec l'entrepreneur est résilié pour inexécution, par celui-ci, de ses obligations; [cite: 983][cite_start]</li><li>après la réception, après mise en demeure restée infructueuse, l'entrepreneur n'a pas exécuté ses obligations. [cite: 984]</li></ul>"
        }
      ]

    {
      title: "CHAPITRE 3: Dispositions communes",
      articles: [
        {
          id: "article245",
          title: "Article 245",
          content: "<p>Les obligations d'assurance ne s'appliquent pas à l'Etat lorsqu'il construit pour son compte. [cite: 987][cite_start]</p><p>Des dérogations totales ou partielles peuvent être accordées par l'autorité administrative aux collectivités locales et à leurs groupements, ainsi qu'aux établissements publics, justifiant de moyens permettant la réparation rapide et complète des dommages. [cite: 988][cite_start]</p><p>Ne sont pas soumis aux obligations d'assurance édictées aux chapitres 1 et 2 du présent sous-titre les ouvrages maritimes, lacustres, fluviaux, les ouvrages d'infrastructures routières, portuaires, aéroportuaires, héliportuaires, ferroviaires, les ouvrages de traitement de résidus urbains, de déchets industriels et d'effluents, ainsi que les éléments d'équipement de l'un ou l'autre de ces ouvrages. [cite: 989][cite_start]</p><p>Les voiries, les ouvrages piétonniers, les parcs de stationnement, les réseaux divers, les canalisations, les lignes ou câbles et leurs supports, les ouvrages de transport, de production, de [cite: 990] [cite_start]stockage et de distribution d'énergie, les ouvrages de stockage et de traitement de solides en vrac, de fluides et liquides, les ouvrages de télécommunications, les ouvrages sportifs non couverts, ainsi que leurs éléments d'équipement, sont également exclus des obligations d'assurance mentionnées au premier alinéa, sauf si l'ouvrage ou l'élément d'équipement est accessoire à un ouvrage soumis à ces obligations d'assurance. [cite: 991, 992][cite_start]</p><p>Ces obligations d'assurance ne sont pas applicables aux ouvrages existants avant l'ouverture du chantier, à l'exception de ceux qui, totalement incorporés dans l'ouvrage neuf, en deviennent techniquement indivisibles. [cite: 993]</p>"
        },
        {
          id: "article246",

        },
        {

    {
      title: "Sous-titre 1: Normes générales de construction",
      articles: []
    },
    {
      title: "CHAPITRE 1: Distribution et mesurage dans les immeubles de toute nature",
      articles: [
        {
          id: "article249",
          title: "Article 249",
          content: "<p>Pour les immeubles de toute nature, les caractéristiques inhérentes à la résistance et à la durabilité, à l'aération et à l'éclairement, à la hauteur des sous-plafonds, à la surface et à la disposition des pièces, aux caves et aux sous-sols, aux équipements sanitaires, à l'installation de garde-corps sont déterminées par voie règlementaire.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 2: Installations électriques intérieures",
      articles: [
        {
          id: "article250",
          title: "Article 250",
          content: "<p>Les installations électriques intérieures doivent être établies en conformité avec les règlements en vigueur et les cahiers des charges des concessionnaires.</p>"
        },
        {
          id: "article251",
          title: "Article 251",
          content: "<p>Tout distributeur d'énergie électrique est tenu d'exiger, avant de mettre sous tension une installation électrique intérieure nouvelle, la remise d'une attestation de conformité de cette installation aux règlements et normes de sécurité en vigueur pour le type d'installation considéré.</p><p>Les modalités d'établissement de cette attestation de conformité sont prévues par décret.</p>"
        },
        {
          id: "article252",
          title: "Article 252",
          content: "<p>Les matériels électriques utilisés dans les installations domestiques ou analogues doivent être conformes aux prescriptions prévues par voie règlementaire.</p>"
        }
      ]

    {
      title: "CHAPITRE 3: Accessibilité aux personnes handicapées ou à mobilité réduite",
      articles: [
        {
          id: "article253",
          title: "Article 253",
          content: "<p>Les constructions et immeubles bâtis doivent respecter les engagements et principes fondamentaux établis dans la Convention des Nations unies relative aux droits des personnes handicapées ratifiée par la République de Côte d'Ivoire le 10 janvier 2014, et notamment les dispositions de l'article 9 \"Accessibilité\".</p>"
        },
        {
          id: "article254",
          title: "Article 254",
          content: "<p>Toutes les constructions doivent prendre en compte la situation des personnes à mobilité réduite ou en situation de handicap.</p>"
        },
        {
          id: "article255",
          title: "Article 255",
          content: "<p>Tout projet de réalisation ou d'aménagement d'équipements collectifs, d'équipements recevant du public, ou d'ensemble immobilier de constructions doit faire l'objet d'une étude préalable de sécurité publique.</p>"
        },
        {
          id: "article256",
          title: "Article 256",
          content: "<p>Les modalités relatives à l'accessibilité aux personnes à mobilité réduite ou en situation de handicap prévue à l'article 254 ci-dessus sont fixées par voie réglementaire.</p>"
        },
        {
          id: "article257",
          title: "Article 257",
          content: "<p>Les établissements recevant du public situés dans un cadre bâti existant doivent être tels que toute personne handicapée puisse y accéder, y circuler et y recevoir les informations qui y sont diffusées, dans les parties ouvertes au public.</p><p>L'information destinée au public doit être diffusée par des moyens adaptés aux différents handicaps.</p><p>Les exigences relatives à l'accessibilité et aux prestations que ces établissements, en fonction de leur type et de leur catégorie, doivent fournir aux personnes à mobilité réduite et en situation de handicap sont déterminées par voie réglementaire.</p><p>Pour faciliter l'accessibilité, il peut être fait recours aux nouvelles technologies de la communication et à une signalétique adaptée.</p><p>Les établissements recevant du public dans un cadre bâti existant devront répondre à ces exigences dans un délai, fixé par voie réglementaire, qui pourra varier par type et catégorie d'établissement.</p>"
        },
        {
          id: "article258",
          title: "Article 258",
          content: "<p>Un décret définit les conditions dans lesquelles, à l'issue de l'achèvement des travaux prévus à l' article 257 ci-dessus et soumis a permis de construire, le maître d'ouvrage doit fournir à l'autorité qui a délivré ce permis un document attestant de la prise en compte des règles concernant l'accessibilité.</p><p>Ces dispositions ne s'appliquent pas pour les propriétaires construisant ou améliorant leur logement pour leur propre usage.</p>"
        },
        {
          id: "article259",
          title: "Article 259",
          content: "<p>Les travaux qui conduisent à la création, l'aménagement ou la modification d'un établissement recevant du public ne peuvent être exécutés qu'après autorisation délivrée par l'autorité administrative qui vérifie leur conformité aux règles prévues aux article 257 et article 258 ci-dessus.</p><p>Lorsque ces travaux sont soumis à permis de construire, celui-ci tient lieu de cette autorisation dès lors que sa délivrance a fait l'objet d'un accord de l'autorité administrative compétente mentionnée à l'alinéa précédent.</p><p>Toutefois, lorsque l'aménagement intérieur d'un établissement recevant du public ou d'une partie de celui-ci n'est pas connu lors du dépôt d'une demande de permis de construire, le permis de construire indique qu'une autorisation complémentaire au titre de l' article 259 du Code de la Construction et de l'Habitat devra être demandée et obtenue en ce qui concerne l'aménagement intérieur du bâtiment ou de la partie de bâtiment concernée avant son ouverture au public.</p>"
        },
        {
          id: "article260",
          title: "Article 260",
          content: "<p>L'autorité administrative peut décider la fermeture d'un établissement recevant du public qui ne répond pas aux prescriptions de l' article 257 ci-dessus.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 4: Dispositions spécifiques concernant les bâtiments d'habitation",
      articles: [
        {
          id: "article261",
          title: "Article 261",
          content: "<p>Constituent des bâtiments d'habitation au sens du présent Code les bâtiments ou parties de bâtiment abritant un ou plusieurs logements ou foyers de groupe, à l'exclusion des locaux destinés à la vie professionnelle lorsque celle-ci ne s'exerce pas au moins partiellement dans le même ensemble que la vie privée.</p><p>Un logement ou habitation comprend d'une part des pièces principales destinées au séjour ou au sommeil, éventuellement des chambres isolées, d'autre part, des pièces de service telles que cuisines, salles d'eau, cabinets d'aisance (W-C), buanderies, débarras, séchoirs, ainsi que, le cas échéant, des dégagements et des dépendances.</p>"
        },
        {
          id: "article262",
          title: "Article 262",
          content: "<p>Les règles générales de construction relatives, notamment, aux surfaces des pièces et cours, aux dimensions minimales intérieures, aux équipements sanitaires, au traitement des ordures ménagères et des eaux usées, à la disposition des pièces ou à l'isolation phonique des bâtiments d'habitation sont fixées par voie réglementaire.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 5: Raccordement des immeubles",
      articles: []
    },

      title: "Section 1: Raccordement aux réseaux de communications électroniques",
      articles: [
        {
          id: "article263",
          title: "Article 263",
          content: "<p>Les immeubles groupant plusieurs logements ou des ensembles de bureaux doivent être pourvus de gaines ou passages pour l'installation des lignes de télécommunication.</p><p>Ils doivent être également munis des dispositifs collectifs nécessaires à la réception des émissions de radiodiffusion sonore et visuelle dans les logements.</p>"
        },
        {
          id: "article264",
          title: "Article 264",
          content: "<p>Les modalités d'application de la présente section sont déterminées par voie réglementaire.</p>"
        }

    {
      title: "Section 2: Raccordement aux réseaux d'assainissement urbains",
      articles: [
        {
          id: "article265",
          title: "Article 265",
          content: "<p>Le raccordement aux égouts d'eaux usées établis sous la voie publique est obligatoire pour les immeubles y ayant accès, soit directement, soit par l'intermédiaire de voie privée ou de servitude de passages, sauf dérogation de l'autorité compétente dans les zones d'habitat évolutif désignées par voie réglementaire, dans les deux ans de la mise en place de l'égout.</p>"
        },
        {
          id: "article266",
          title: "Article 266",
          content: "<p>Les eaux usées doivent être traitées conformément à la réglementation en vigueur.</p>"
        },
        {
          id: "article267",
          title: "Article 267",
          content: "<p>Les ouvrages nécessaires pour amener les eaux usées à la partie publique du branchement sont à la charge exclusive des propriétaires.</p><p>Ils doivent être maintenus en bon état de fonctionnement par les propriétaires.</p>"

          id: "article268",
          title: "Article 268",
          content: "<p>Les immeubles non raccordés au réseau public de collecte des eaux usées sont équipés d'une installation d'assainissement non collectif dont le propriétaire assure l'entretien régulier et qu'il fait périodiquement vidanger par une personne agréée par le représentant de l'Etat, afin d'en garantir le bon fonctionnement.</p><p>Cette obligation ne s'applique ni aux immeubles abandonnés, ni aux immeubles qui, en application de la réglementation, doivent être démolis ou doivent cesser d'être utilisés, ni aux immeubles qui sont raccordés à une installation d'épuration industrielle ou agricole.</p>"
        },

        },
        {
          id: "article270",
          title: "Article 270",
          content: "<p>Les modalités d'application de la présente section sont déterminées par voie réglementaire.</p>"
        }
      ]
    },
    {
      title: "Section 3: Raccordement aux réseaux de drainage",
      articles: [
        {
          id: "article271",
          title: "Article 271",
          content: "<p>Le raccordement aux réseaux de drainage (réseaux d'eau pluviale) public est obligatoire pour les immeubles y ayant accès, soit directement, soit par l'intermédiaire de voie privée ou de servitude de passages, sauf dérogation de l'autorité compétente dans les zones d'habitat évolutif désignées par voie réglementaire, dans les deux ans de la mise en place de l'égout.</p>"
        },
        {
          id: "article272",
          title: "Article 272",
          content: "<p>Les eaux pluviales doivent être recueillies et évacuées selon la réglementation en vigueur.</p>"
        },
        {
          id: "article273",
          title: "Article 273",
          content: "<p>Les modalités d'application de la présente section sont déterminées par voie réglementaire.</p>"
        }
