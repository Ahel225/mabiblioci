<script>
const lawData = {
  title: "LOI n° 2018-862 du 19 novembre 2018 relative à l'état civil.",
  subtitle: "Loi relative à l'état civil",
  chapters: [
    {
      title: "Dispositions Générales",
      articles: [
        {
          id: "article1",
          title: "Article 1",
          content: "<p>L'état civil des citoyens est établi et prouvé par les actes de l'état civil et, exceptionnellement, par des décisions de justice ou des actes de notoriété.</p><p>Les actes de l'état civil sont les écrits par lesquels l'officier ou l'agent de l'état civil constate d'une manière authentique les principaux évènements dont dépend l'état d'une personne.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 1: Des circonscriptions, bureaux d'Etat civil et points de collecte",
      articles: [
        {
          id: "article2",
          title: "Article 2",
          content: "<p>Dans le territoire de chaque sous-préfecture, les circonscriptions d'état civil autres que les communes sont déterminées par décret.</p>"
        },
        {
          id: "article3",
          title: "Article 3",
          content: "<p>Chaque circonscription d'état civil peut comporter des bureaux d'état civil.</p><p>De même, chaque centre de santé peut comporter des bureaux d'état civil.</p><p>Des points de collecte sont également créés dans les villages, dans les centres de santé et dans tout autre lieu déterminé par décret.</p><p>Les modalités de création, d'organisation et de fonctionnement des bureaux d'état civil et des points de collecte sont fixées par décret.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 2: Des officiers, agents de l'état civil et des agents de collecte",
      articles: [
        {
          id: "article4",
          title: "Article 4",
          content: "<p>Chaque circonscription d'état civil comporte un officier de l'état civil, chaque bureau d'état civil, un agent de l'état civil.</p><p>Il peut être adjoint, à l'un et à l'autre un ou plusieurs suppléants qui sont nommés et exercent dans les mêmes conditions que les officiers et les agents titulaires.</p><p>De même, chaque point de collecte comporte un agent de collecte. Il peut lui être adjoint un ou plusieurs suppléants.</p>"
        },
        {
          id: "article5",
          title: "Article 5",
          content: "<p>Les agents de l'Etat civil et leurs suppléants exercent leurs attributions sous l'autorité des officiers de l'état civil.</p><p>Les agents de collecte et leurs suppléants exercent leurs attributions sous autorité des agents de l'état civil.</p>"
        },
        {
          id: "article6",
          title: "Article 6",
          content: "<p>Les officiers de l'état civil autres que ceux qui le sont en vertu de la loi, et les agents de l'état civil sont nommés dans les conditions définies par décret.</p><p>Ils prêtent serment avant leur prise de fonction devant le tribunal du ressort de la circonscription d'état civil dans laquelle ils sont nommés, dans les termes suivants :</p><p>«Je jure de bien et fidèlement accomplir ma mission, de m'abstenir de divulguer les informations et données dont je suis dépositaire ou dont j'ai eu connaissance à l'occasion de l'exercice de mes fonctions, et d'observer scrupuleusement, en la matière, les lois et règlements en vigueur ».</p><p>Les agents de collecte sont également désignés dans les conditions définies par décret.</p>"
        },
        {
          id: "article7",
          title: "Article 7",
          content: "<p>Les officiers et les agents de l'état civil sont seuls compétents pour recevoir les déclarations et dresser les actes de l'état civil auxquels ils confèrent l'authenticité.</p><p>Les agents de collecte sont chargés de recueillir les faits d'état civil qui surviennent dans leurs points de collecte de compétence.</p><p>Ils peuvent procéder à la déclaration des naissances et décès pour le compte des personnes habilitées à le faire dans les conditions définies par décret.</p>"
        },
        {
          id: "article8",
          title: "Article 8",
          content: "<p>Sous réserve des dispositions de l'article 37, les agents de l'état civil n'ont compétence que pour recevoir les déclarations de naissance et de décès, dresser les actes correspondants et effectuer sur les registres de l'année en cours, les transcriptions et mentions s'y rapportant.</p>"
        },
        {
          id: "article9",
          title: "Article 9",
          content: "<p>Les officiers de l'état civil sont compétents en ce qui concerne tous les actes de l'état civil.</p>"
        },
        {
          id: "article10",
          title: "Article 10",
          content: "<p>Les actes autres que ceux visés à l'article 8 sont dressés et les mariages célébrés au chef-lieu de la circonscription d'état civil, exceptionnellement au bureau d'état civil lorsque l'officier de l'état civil s'y transporte.</p>"
        },
        {
          id: "article11",
          title: "Article 11",
          content: "<p>Les officiers et agents de l'état civil ne peuvent intervenir dans un même acte en cette qualité et à un autre titre.</p>"
        },
        {
          id: "article12",
          title: "Article 12",
          content: "<p>Les officiers, les agents de l'état civil et les agents de collecte exercent leurs fonctions sous le contrôle des autorités judiciaires et sont responsables civilement, disciplinairement et pénalement des fautes et négligences qu'ils commettent dans l'exercice ou à l'occasion de leurs fonctions.</p>"
        },
        {
          id: "article13",
          title: "Article 13",
          content: "<p>Lorsque l'officier de l'état civil refuse de recevoir une déclaration comme contraire à la loi, il en avise dans les quarante-huit heures le magistrat chargé de contrôler le fonctionnement de l'état civil dans sa circonscription, lequel, jusqu'à l'expiration de la quinzaine qui suit la date de son refus, peut le requérir de dresser l'acte.</p><p>L'officier de l'état civil est tenu de déférer à ces réquisitions, transcrit celles-ci sur le registre et dresse l'acte à la suite.</p><p>Si l'acte n'a pas été dressé dans le délai de quinzaine prévu à l'alinéa premier, les parties intéressées, dans les quinze jours qui suivent son expiration, peuvent présenter requête au tribunal territorialement compétent, aux fins de voir ordonner à l'officier de l'état civil de recevoir la déclaration.</p><p>Le jugement rendu est susceptible d'appel de la part du ministère public et des parties intéressées.</p><p>Lorsque le Tribunal ou la Cour ordonne de recevoir la déclaration, l'acte est dressé, et le dispositif du jugement ou de l'arrêt, devenu définitif, transcrit à la suite.</p><p>Mention de la décision est également portée en marge de l'acte.</p>"
        },
        {
          id: "article14",
          title: "Article 14",
          content: "<p>Si le refus émane d'un agent de l'état civil, celui-ci en rend compte immédiatement à l'officier de l'état civil sous l'autorité duquel il se trouve placé.</p><p>Ledit officier de l'état civil apprécie, sous sa responsabilité, s'il y a lieu de passer outre ou de procéder comme il est dit à l'alinéa premier de l'article précédent.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 3: Des registres de l'état civil",
      articles: [
        {
          id: "article15",
          title: "Article 15",
          content: "<p>Dans chaque circonscription et dans chaque bureau d'état civil, il est tenu, en double exemplaire, des registres distincts:</p><ul><li>1º pour les naissances;</li><li>2º pour les décès;</li><li>3º pour les déclarations autres que celles qui précèdent;</li><li>4º pour les mariages.</li></ul>"
        },
        {
          id: "article16",
          title: "Article 16",
          content: "<p>Les registres sont ouverts au 1er janvier et clos au 31 décembre de chaque année.</p><p>Ils sont conformes aux modèles établis par décret. Les deux exemplaires sont côtés et paraphés, sur chaque feuille, par le président du Tribunal ou tout magistrat délégué par lui.</p><p>L'année écoulée, ils sont clos et arrêtés par l'officier ou l'agent de l'état civil sur les registres, immédiatement après le dernier acte.</p><p>A la suite de la mention de clôture, il est dressé par l'officier ou l'agent de l'état civil, une table alphabétique des actes qui y sont contenus.</p><p>Un exemplaire de chacun des registres, y compris de ceux tenus dans les bureaux d'état civil, est conservé au chef-lieu de la circonscription d'état civil.</p><p>Dans le mois qui suit la clôture, l'autre exemplaire est transmis par l'officier de l'état civil au Tribunal dans le ressort duquel est située la circonscription d'état civil pour être conservé au greffe.</p>"
        },
        {
          id: "article17",
          title: "Article 17",
          content: "<p>Les actes sont inscrits sur les registres, de suite, sans aucun blanc ni aucune surcharge.</p><p>Les raturess et les renvois sont approuvés et signés de la même manière que le corps de l'acte.</p><p>Il n'y est rien écrit par abréviation et aucune date n'y est mise en chiffre.</p><p>Les blancs qui n'ont pas été remplis lors de l'établissement de l'acte sont bâtonnés.</p>"
        },
        {
          id: "article18",
          title: "Article 18",
          content: "<p>Les procurations et autres pièces, qui doivent demeurer annexées aux actes de l'état civil, sont déposées, après qu'elles ont été paraphées par la personne qui les a produites et par l'officier ou l'agent de l'état civil, au greffe du Tribunal, avec le double des registres.</p>"
        },
        {
          id: "article19",
          title: "Article 19",
          content: "<p>Il est établi périodiquement, dans les conditions définies par décret, un relevé des tables annuelles.</p>"
        },
        {
          id: "article20",
          title: "Article 20",
          content: "<p>Les registres de l'état civil ne peuvent être communiqués au public.</p><p>Seuls peuvent en avoir communication, les magistrats chargés de surveiller la tenue de l'état civil et les agents des administrations publiques qui y sont expressément autorisés par une disposition légale ou réglementaire.</p><p>La communication se fait sans déplacement, sauf quand elle est requise par les magistrats visés à l'alinéa précédent ou ordonnée par le tribunal.</p><p>Hors les cas prévus par la présente loi, les registres ne doivent être déplacés.</p>"
        },
        {
          id: "article21",
          title: "Article 21",
          content: "<p>Les procureurs de la République sont spécialement chargés du contrôle et de la surveillance du service de l'état civil dans le ressort de leurs juridictions respectives.</p><p>Une fois par an, obligatoirement, et chaque fois qu'ils l'estiment nécessaire, les procureurs de la République procèdent à la vérification de la tenue et de la conservation des registres de l'état civil en se transportant dans les centres d'état civil de leurs ressorts.</p><p>Ils relèvent les irrégularités et les infractions qui ont pu être commises et en poursuivent la répression.</p><p>Mention de l'inspection et de sa date est également faite sur les deux registres de l'année en cours de chaque catégorie.</p><p>Un procès-verbal de chaque inspection et un rapport annuel de la tenue des registres et du contrôle sont adressés en double exemplaire au ministre de la Justice.</p><p>Les magistrats ci-dessus visés correspondent directement avec les officiers de l'état civil.</p><p>La vérification électronique des données d'état civil peut être demandée par les administrations et organismes autorisés par la loi.</p><p>Le contrôle et la surveillance de l'état civil consulaire sont du ressort de la direction centrale du ministère de la Justice en charge du contrôle de l'état civil.</p>"
        },
        {
          id: "article22",
          title: "Article 22",
          content: "<p>Tout dépositaire des registres de l'état civil est civilement responsable des altérations qui y surviennent, sauf à rapporter la preuve que ces altérations sont imputables à un tiers.</p>"
        },
        {
          id: "article23",
          title: "Article 23",
          content: "<p>Toute altération, tout faux dans les actes de l'état civil, toute inscription de ces actes faite sur une feuille volante ou autrement que sur les registres à ce destinés, donnent lieu à des dommages-intérêts aux parties, sans préjudice des sanctions pénales encourues.</p>"
        }
      ]
    },
    {
      title: "CHAPITRE 4: Des règles communes à tous les actes de l'état civil",
      articles: [
        {
          id: "article24",
          title: "Article 24",
          content: "<p>La déclaration, l'enregistrement des faits d'état civil sont obligatoires et gratuits.</p><p>Les actes de l'état civil sont rédigés dans la langue officielle.</p><p>Ils énoncent:</p><ul><li>l'année, le mois, le jour et l'heure où ils sont reçus:</li><li>les prénoms, noms, professions, domiciles et, si possible, les dates de naissance de tous ceux qui y sont dénommés:</li><li>le numéro de référence de l'acte;</li><li>le numéro national d'identification du bénéficiaire de l'acte, généré par le registre national de personnes physiques.</li></ul><p>Toutefois, en ce qui concerne les témoins, leur qualité de majeur est seule indiquée.</p>"
        },
        {
          id: "article25",
          title: "Article 25",
          content: "<p>Dans les cas où les parties intéressées ne peuvent comparaître en personne, elles se font représenter par un fondé de pouvoir muni d'une procuration spéciale et authentique.</p>"
        },
        {
          id: "article26",
          title: "Article 26",
          content: "<p>Les témoins, choisis par les parties, certifient l'identité de celles-ci et la conformité de l'acte avec leurs déclarations.</p><p>Ils doivent être majeurs, parents ou non des déclarants.</p>"
        },
        {
          id: "article27",
          title: "Article 27",
          content: "<p>Si les parties comparantes, leur fondé de pouvoir ou les témoins ne parlent pas la langue officielle, leurs déclarations sont traduites par un interprète ayant préalablement prêté devant l'officier ou l'agent de l'état civil, le serment ci-après:</p><p>« Je jure de bien et fidèlement traduire les déclarations des parties et des témoins ainsi que l'acte qui les constate ».</p><p>Mention en est faite dans l'acte.</p><p>Cette mention comporte l'indication de la langue dans laquelle la déclaration a été faite, des prénoms et nom de l'interprète, ainsi que de la prestation de serment de celui-ci.</p>"
        },
        {
          id: "article28",
          title: "Article 28",
          content: "<p>Avant de dresser l'acte, l'officier ou l'agent de l'état civil avise les parties comparantes ou leur fondé de pouvoir et les témoins, des peines prévues par la loi pour sanctionner les fausses déclarations.</p><p>L'acte établi, il leur en donne lecture et les invite, s'ils lisent la langue officielle, à en prendre connaissance avant de le signer.</p><p>Dans le cas prévu au premier alinéa de l'article précédent, la traduction de l'acte est faite par l'interprète.</p><p>Il est fait mention dans les actes, de l'accomplissement de ces formalités.</p>"
        },
        {
          id: "article29",
          title: "Article 29",
          content: "<p>Les actes sont signés par l'officier ou l'agent de l'état civil, les comparants, les témoins et l'interprète s'il y a lieu, ou mention est faite de la cause qui a empêché les comparants et les témoins de signer.</p>"
        },
        {
          id: "article30",
          title: "Article 30",
          content: "<p>Les déclarations de naissance et de décès sont reçues et les actes qui les constatent dressés par l'officier ou l'agent de l'état civil du lieu de naissance ou du décès.</p><p>Les mariages sont célébrés et les actes qui les constatent dressés par l'officier de l'état civil du lieu de la célébration.</p><p>Pour les déclarations autres que celles visées à l'alinéa premier, la compétence est déterminée par le texte particulier qui les prévoit.</p>"

          id: "article32",

        {

        },
        {
          id: "article45",
          title: "Article 45",
          content: "<p>Il est tenu dans les hôpitaux, maternités ou formations de santé publics ou privés, ainsi que dans les villages, un registre spécial sur lequel sont immédiatement inscrits, par ordre de date, les naissances qui y surviennent. La présentation dudit registre, tenu par l'agent de collecte, peut être exigée à tout moment par l'officier ou l'agent de l'état civil du lieu où est situé l'établissement sanitaire ou le village, ainsi que par les autorités administratives et judiciaires.</p>"
        },
        {
          id: "article46",
          title: "Article 46",
          content: "<p>Toute personne qui trouve un enfant nouveau-né est tenue d'en faire la déclaration à l'officier ou à l'agent de l'état civil du lieu de la découverte.</p><p>Il est dressé un procès-verbal détaillé qui, outre les indications prévues à l'article 24, énonce la date, l'heure, le lieu et les circonstances de la découverte, l'âge apparent et le sexe de l'enfant, toute particularité pouvant contribuer à son identification, ainsi que l'autorité ou la personne à laquelle il a été confié.</p><p>Ce procès-verbal dont copie est immédiatement transmise au procureur de la République, est inscrit à sa date sur le registre des naissances.</p><p>A la suite et séparément de ce procès-verbal, l'officier ou l'agent de l'état civil établit un acte tenant lieu d'acte de naissance.</p><p>En plus des énonciations contenues à l'article 24, cet acte mentionne le sexe de l'enfant ainsi que les prénoms et nom qui lui sont donnés, fixe une date de naissance pouvant correspondre à son âge apparent et désigne comme lieu de naissance celui où l'enfant a été découvert.</p><p>L'officier de l'état civil peut toujours faire déterminer par un médecin requis à cet effet, l'âge physiologique de l'enfant.</p><p>Si l'acte de naissance de l'enfant vient à être retrouvé ou si sa naissance est judiciairement déclarée, le procès-verbal de découverte et l'acte de naissance sont annulés à la requête du procureur de la République ou de toute partie intéressée.</p>"

        },
        {

          id: "article64",
          title: "Article 64",
          content: "<p>Peut être judiciairement déclaré, à la requête du procureur de la République ou des parties intéressées, le décès de tout Ivoirien disparu en Côte d'Ivoire ou hors de Côte d'Ivoire, s'il a cessé de paraître dans des circonstances mettant sa vie en danger et que son corps n'a pu être retrouvé dans un délai d'un an.</p><p>Peut être déclaré dans les mêmes conditions, le décès de tout étranger ou apatride disparu soit sur le territoire de la Côte d'Ivoire, soit à bord d'un bâtiment ou d'un aéronef ivoiriens, soit même à l'étranger, s'il avait son domicile ou sa résidence habituelle en Côte d'Ivoire.</p><p>La procédure de déclaration de décès est également applicable lorsque le décès est certain mais que le corps n'a pu être retrouvé dans le délai spécifié à l'alinéa premier du présent article.</p>"

          id: "article65",
          title: "Article 65",

        {
          id: "article66",

        },
        {
          id: "article67",

        {
          id: "article68",

        {
          id: "article69",
          title: "Article 69",
          content: "<p>Si celui dont le décès a été judiciairement déclaré reparaît postérieurement au jugement déclaratif, le procureur de la République ou tout intéressé peut poursuivre, dans les formes prévues aux articles 79 et suivants, l'annulation du jugement.</p><p>Le mariage qui a pris fin avec le jugement déclaratif demeure dissous, et s'il a été procédé à une liquidation des droits des époux, devenue définitive, les biens dévolus en partage à chacun d'eux leur restent propres.</p><p>Mention de l'annulation du jugement déclaratif est faite en marge de sa transcription.</p>"
        },
        {
          id: "article70",
          title: "Article 70",
          content: "<p>Peut être judiciairement déclaré décédé, à la requête du procureur de la République ou de toute partie intéressée, tout Ivoirien qui a cessé de paraître au lieu de son domicile ou de sa résidence, sans que l'on ait de ses nouvelles depuis dix ans.</p><p>Peut être également judiciairement déclaré le décès de tout étranger ou apatride ayant son domicile ou sa résidence habituelle en Côte d'Ivoire, qui a cessé d'y paraître, sans que l'on ait de ses nouvelles depuis dix ans.</p><p>Lorsqu'elle n'émane pas du procureur de la République, la requête doit lui être communiquée. Il peut, en cas de besoin, procéder à une enquête.</p><p>La requête aux fins de jugement déclaratif de décès est présentée dix ans après la date des dernières nouvelles, au terme de la procédure prévue par la loi sur l'état des personnes.</p><p>Le dispositif du jugement déclaratif de décès rendu est transcrit sur les registres de l'état civil du dernier domicile de l'absent, en marge de son acte de naissance et de son acte de mariage le cas échéant.</p><p>Il tient lieu d'acte de décès à l'absent.</p><p>Le décès est supposé survenu au jour du prononcé de la décision.</p><p>Le mariage de l'absent se dissout à compter du jour où le jugement déclarant l'absence est devenu définitif.</p><p>Si celui dont le décès a été judiciairement déclaré réapparait postérieurement au jugement déclaratif, le procureur de la République ou tout intéressé peut poursuivre, dans les formes prévues aux articles 79 et suivants, l'annulation du jugement.</p><p>Le mariage qui a pris fin avec le jugement déclaratif demeure dissous, et s'il a été procédé à une liquidation des droits des époux, devenue définitive, les biens dévolus en partage à chacun d'eux leur restent propres.</p><p>Mention de l'annulation du jugement déclaratif est faite en marge de sa transcription.</p>"

        {

          title: "Article 71",
          content: "<p>L'acte de mariage énonce:</p><ul><li>le numéro de référence de l'acte;</li><li>les prénoms, noms, professions, âges, dates et lieux de naissance, domiciles ou résidences des époux;</li><li>les prénoms, noms, professions et domiciles des pères et mères:</li><li>les consentements ou autorisations donnés en cas de minorité de l'un ou des deux époux:</li><li>la déclaration de se prendre pour époux et le prononcé de leur union par l'officier de l'état civil;</li><li>les prénoms, noms, professions, domiciles des témoins et leur qualité de majeurs.</li><li>l'option éventuellement faite par les époux en faveur du régime de la séparation de biens sur l'interpellation de l'officier de l'état civil, conformément à la loi relative au mariage.</li></ul><p>Il est fait mention de la célébration du mariage et du nom du conjoint en marge de l'acte de naissance de chacun des époux.</p>"

      title: "Section 1: De la rectification des actes de l'état civil",
      articles: [
        {
          id: "article79",
          title: "Article 79",
          content: "<p>La rectification des actes de l'état civil est ordonnée par le président du Tribunal dans le ressort duquel l'acte a été dressé ou transcrit.</p><p>La rectification des actes dressés ou transcrits par les agents diplomatiques et les consuls est ordonnée par le président du Tribunal de première Instance d'Abidjan.</p><p>La rectification des jugements déclaratifs ou supplétifs d'actes de naissance ou de décès est ordonnée par le Tribunal qui a rendu le jugement.</p><p>Le président ou le Tribunal territorialement compétent pour ordonner la rectification d'un acte ou d'un jugement est également compétent pour prescrire la rectification de tous les actes même dressés ou transcrits hors de son ressort, qui reproduisent l'erreur ou comportent l'omission originaire.</p><p>La requête en rectification peut être présentée par le procureur de la République ou par toute personne intéressée: le procureur de la République est tenu d'agir d'office quand l'erreur ou l'omission porte sur une indication essentielle de l'acte ou de la décision qui en tient lieu.</p><p>Lorsque la requête n'émane pas de lui, elle doit lui être communiquée.</p><p>Le procureur de la République territorialement compétent peut faire procéder à la rectification administrative des erreurs et omissions purement matérielles des actes de l'état civil; à cet effet, il donne directement les instructions utiles aux dépositaires des registres.</p>"

function renderLaw(data){
  const wrapper = document.getElementById('mainWrapper');
  wrapper.innerHTML = '';
  const toc = document.getElementById('tocList');
  toc.innerHTML = '';
  const articleEls = [];

  if (Array.isArray(data.chapters)) {
    data.chapters.forEach((ch, ci) => {
      const sec = document.createElement('section');
      sec.className = 'group';
      const h2 = document.createElement('h2');
      h2.textContent = ch.title || `Chapitre ${ci+1}`;
      sec.appendChild(h2);

      (ch.articles || []).forEach((a, ai) => {
        const art = document.createElement('div');
        art.className = 'article';
        art.id = a.id || `art_${ci}_${ai}`;

        const header = document.createElement('div');
        header.className = 'article-header';
        const h3 = document.createElement('h3');
        h3.textContent = a.title || `Article ${ai+1}`;
        const fsBtn = document.createElement('button');
        fsBtn.className = 'open-fs';
        fsBtn.title = 'Plein écran';
        fsBtn.innerHTML = '<i class="fas fa-maximize"></i>';
        fsBtn.addEventListener('click', () => openFullscreenById(art.id));
        header.appendChild(h3);
        header.appendChild(fsBtn);

        const content = document.createElement('div');
        content.className = 'article-content';
        content.innerHTML = a.content || '';

        art.appendChild(header);
        art.appendChild(content);
        sec.appendChild(art);
        articleEls.push(art);
      });

      wrapper.appendChild(sec);

      const chapTitle = document.createElement('div');
      chapTitle.textContent = ch.title || `Chapitre ${ci+1}`;
      chapTitle.style.margin = '8px 0 4px';
      chapTitle.style.color = '#1a4177';
      chapTitle.style.fontWeight = '700';
      toc.appendChild(chapTitle);
      const sub = document.createElement('div');
      sub.className = 'toc-sub';
      (ch.articles||[]).forEach((a, ai) => {
        const link = document.createElement('a');
        const id = a.id || `art_${ci}_${ai}`;
        link.href = `#${id}`;
        link.textContent = a.title || `Article ${ai+1}`;
        link.addEventListener('click', closeToc);
        sub.appendChild(link);
      });
      toc.appendChild(sub);
    });
  } else {
    const sec = document.createElement('section');
    sec.className = 'group';
    const h2 = document.createElement('h2');
    h2.textContent = data.title || 'Texte intégral';
    sec.appendChild(h2);
    (data.articles || []).forEach((a, ai) => {
      const art = document.createElement('div');
      art.className = 'article';
      art.id = a.id || `article_${ai}`;
      const header = document.createElement('div');
      header.className = 'article-header';
      const h3 = document.createElement('h3');
      h3.textContent = a.title || `Article ${ai+1}`;
      const fsBtn = document.createElement('button');
      fsBtn.className = 'open-fs';
      fsBtn.title = 'Plein écran';
      fsBtn.innerHTML = '<i class="fas fa-maximize"></i>';
      fsBtn.addEventListener('click', () => openFullscreenById(art.id));
      header.appendChild(h3);
      header.appendChild(fsBtn);
      const content = document.createElement('div');
      content.className = 'article-content';
      content.innerHTML = a.content || '';
      art.appendChild(header);
      art.appendChild(content);
      sec.appendChild(art);
      articleEls.push(art);

      const link = document.createElement('a');
      link.href = `#${art.id}`;
      link.textContent = a.title || `Article ${ai+1}`;
      link.addEventListener('click', closeToc);
      document.getElementById('tocList').appendChild(link);
    });
    wrapper.appendChild(sec);
  }
  window.__articlesOrder = articleEls.map(el => el.id);
}

// TOC controls
const tocBtn = document.getElementById('tocFloatBtn');
const tocHeaderBtn = document.getElementById('tocHeaderBtn');
const tocPanel = document.getElementById('tocPanel');
const tocOverlay = document.getElementById('tocOverlay');
function openToc(){ tocPanel.classList.add('open'); tocOverlay.classList.add('show'); }
function closeToc(){ tocPanel.classList.remove('open'); tocOverlay.classList.remove('show'); }
tocBtn.addEventListener('click', openToc);
tocHeaderBtn.addEventListener('click', openToc);
tocOverlay.addEventListener('click', closeToc);

// Voice reading
const synth = window.speechSynthesis;
let speakingId = null;
const now = document.getElementById('nowReading');
function textFrom(el){ return el.querySelector('.article-content')?.innerText?.trim() || ''; }
function highlight(id, on){ const el = document.getElementById(id); if(!el) return; el.classList.toggle('reading', !!on); }
function speakById(id){
  const el = document.getElementById(id); if(!el) return;
  const text = textFrom(el); if(!text) return;
  stopSpeaking();
  const ut = new SpeechSynthesisUtterance(text); ut.lang='fr-FR'; ut.rate=1;
  ut.onend = () => { highlight(id,false); speakingId=null; now.textContent='Prêt'; };
  synth.speak(ut); speakingId=id; highlight(id,true);
  now.textContent = 'Lecture : ' + (el.querySelector('.article-header h3')?.textContent || '');
}
function pauseSpeaking(){ if(synth.speaking && !synth.paused) synth.pause(); }
function resumeSpeaking(){ if(synth.paused) synth.resume(); }
function stopSpeaking(){ if(synth.speaking){ synth.cancel(); } if(speakingId){ highlight(speakingId,false); speakingId=null; } }
document.getElementById('vPlay').addEventListener('click', () => { const visible = findMostVisibleArticleId() || window.__articlesOrder?.[0]; if(visible) speakById(visible); });
document.getElementById('vPause').addEventListener('click', () => { if(synth.paused) resumeSpeaking(); else pauseSpeaking(); });
document.getElementById('vStop').addEventListener('click', stopSpeaking);
function findMostVisibleArticleId(){ const arts = Array.from(document.querySelectorAll('.article')); let best=null, bestArea=0; const vh = window.innerHeight; arts.forEach(a=>{ const r=a.getBoundingClientRect(); const ov=Math.max(0, Math.min(vh,r.bottom)-Math.max(0,r.top)); if(ov>bestArea){ bestArea=ov; best=a; } }); return best?.id || null; }

// Fullscreen
const fsOverlay = document.getElementById('fsOverlay');
const fsTitle = document.getElementById('fsTitle');
const fsBody = document.getElementById('fsBody');
const fsPrev = document.getElementById('fsNavPrev');
const fsNext = document.getElementById('fsNavNext');
const fsClose = document.getElementById('fsClose');
let fsCurrentIndex = -1;
function openFullscreenById(id){
  const order = window.__articlesOrder || []; const idx = order.indexOf(id); if(idx === -1) return;
  fsCurrentIndex = idx;
  const el = document.getElementById(id);
  fsTitle.textContent = el.querySelector('.article-header h3')?.textContent || 'Article';
  fsBody.innerHTML = el.querySelector('.article-content')?.innerHTML || '';
  fsOverlay.classList.add('show'); fsOverlay.setAttribute('aria-hidden','false');
  updateFsNav();
}
function closeFullscreen(){ fsOverlay.classList.remove('show'); fsOverlay.setAttribute('aria-hidden','true'); }
function updateFsNav(){ const order = window.__articlesOrder || []; fsPrev.style.display = fsCurrentIndex > 0 ? 'grid' : 'none'; fsNext.style.display = fsCurrentIndex < order.length - 1 ? 'grid' : 'none'; }
fsClose.addEventListener('click', closeFullscreen);
fsPrev.addEventListener('click', () => { const order = window.__articlesOrder || []; if(fsCurrentIndex > 0) openFullscreenById(order[fsCurrentIndex - 1]); });
fsNext.addEventListener('click', () => { const order = window.__articlesOrder || []; if(fsCurrentIndex < order.length - 1) openFullscreenById(order[fsCurrentIndex + 1]); });

// Init
renderLaw(lawData);
</script>
