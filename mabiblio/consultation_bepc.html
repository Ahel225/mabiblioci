<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détecteur BEPC Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-size: 14px; font-family: system-ui, sans-serif; }
        .header-box { background: linear-gradient(135deg, #0d6efd, #0a58ca); color: white; padding: 20px 10px; text-align: center; border-radius: 0 0 15px 15px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .btn-touch { padding: 12px; font-weight: bold; border-radius: 8px; }
        .badge-admis { background-color: #198754; color: white; padding: 6px 10px; border-radius: 6px; font-weight: bold; }
        .badge-refuse { background-color: #dc3545; color: white; padding: 6px 10px; border-radius: 6px; font-weight: bold; }
        .badge-attente { background-color: #6c757d; color: white; padding: 6px 10px; border-radius: 6px; }
        .badge-cours { background-color: #ffc107; color: #212529; padding: 6px 10px; border-radius: 6px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .table-responsive { max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="header-box mb-3">
        <h4 class="m-0">Vérificateur BEPC - DECO</h4>
        <small>Version Spéciale Mobile</small>
    </div>

    <div class="container text-dark">
        <div class="card p-3">
            <h6 class="fw-bold text-primary">1. Entrer les matricules</h6>
            
            <div class="mb-3">
                <label class="form-label text-muted small">Option A : Collez vos matricules (un par ligne)</label>
                <textarea id="textMatricules" class="form-control" rows="4" placeholder="Exemple :&#10;21881248C&#10;22327613B"></textarea>
            </div>

            <div class="mb-2">
                <label class="form-label text-muted small">Option B : Ou charger le fichier CSV</label>
                <input type="file" id="csvFile" class="form-control form-control-sm" accept=".csv">
            </div>
            
            <button id="btnCharger" class="btn btn-secondary btn-sm mt-2">Valider la liste</button>
        </div>

        <div class="card p-3">
            <h6 class="fw-bold text-primary">2. Lancer la recherche</h6>
            <div class="d-grid gap-2">
                <button id="btnStart" class="btn btn-primary btn-touch" disabled>DÉMARRER LA DÉTECTION</button>
                <button id="btnExport" class="btn btn-success btn-touch" disabled>TÉLÉCHARGER LE RÉSULTAT (CSV)</button>
            </div>

            <div class="mt-3">
                <div class="progress" style="height: 15px;">
                    <div id="progressBar" class="progress-bar progress-bar-striped" role="progressbar" style="width: 0%;">0%</div>
                </div>
                <div id="progressText" class="text-center small text-muted mt-1">En attente de matricules...</div>
            </div>
        </div>

        <div class="card p-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="fw-bold m-0 text-primary">3. Aperçu des Résultats</h6>
                <span id="totalBadge" class="badge bg-dark">Total : 0</span>
            </div>
            
            <div class="table-responsive">
                <table class="table table-sm table-striped align-middle" id="tableResultats">
                    <thead>
                        <tr>
                            <th>Matricule</th>
                            <th>Résultat</th>
                            <th>Points</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="3" class="text-center text-muted py-4">Aucun matricule validé pour le moment.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let listeCandidats = [];
        
        // Gestion du bouton de validation manuelle ou CSV
        document.getElementById('btnCharger').addEventListener('click', function() {
            const text = document.getElementById('textMatricules').value.trim();
            const fileInput = document.getElementById('csvFile').files[0];

            if (fileInput) {
                // Si un fichier CSV est fourni
                Papa.parse(fileInput, {
                    skipEmptyLines: true,
                    complete: function(results) {
                        let data = results.data;
                        if(data[0] && data[0][0] && data[0][0].includes("Tableau 1")) data.shift(); // Nettoyage de votre en-tête
                        data.shift(); // En-tête des colonnes
                        
                        listeCandidats = data.map(row => ({
                            matricule: row[0] ? row[0].trim() : '',
                            decision: 'En attente',
                            points: 'N/A'
                        })).filter(c => c.matricule !== '');

                        preparerInterface();
                    }
                });
            } else if (text) {
                // Si l'utilisateur a collé du texte directement
                let lignes = text.split('\n');
                listeCandidats = lignes.map(l => ({
                    matricule: l.trim(),
                    decision: 'En attente',
                    points: 'N/A'
                })).filter(c => c.matricule !== '');

                preparerInterface();
            } else {
                alert("Veuillez coller des matricules ou sélectionner un fichier CSV.");
            }
        });

        function __getBadgeHTML(status) {
            if (status === 'Admis') return `<span class="badge-admis">Admis</span>`;
            if (status === 'Refusé') return `<span class="badge-refuse">Refusé</span>`;
            if (status === 'Scan...') return `<span class="badge-cours">Scan...</span>`;
            return `<span class="badge-attente">En attente</span>`;
        }

        function preparerInterface() {
            document.getElementById('totalBadge').innerText = `Total : ${listeCandidats.length}`;
            document.getElementById('btnStart').disabled = listeCandidats.length === 0;
            document.getElementById('progressText').innerText = `${listeCandidats.length} candidat(s) prêt(s).`;
            
            const tbody = document.querySelector('#tableResultats tbody');
            tbody.innerHTML = '';
            listeCandidats.forEach((c, idx) => {
                let tr = document.createElement('tr');
                tr.id = `row-${idx}`;
                tr.innerHTML = `<td>${c.matricule}</td><td>${__getBadgeHTML(c.decision)}</td><td class="fw-bold">${c.points}</td>`;
                tbody.appendChild(tr);
            });
        }

        // Boucle de détection mobile via un proxy CORS
        document.getElementById('btnStart').addEventListener('click', async function() {
            this.disabled = true;
            document.getElementById('btnCharger').disabled = true;
            
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');

            // URL officielle de la DECO
            const targetBaseUrl = "https://itdeco.ci/examens/resultat/bepc/index.html";

            for (let i = 0; i < listeCandidats.length; i++) {
                let candidat = listeCandidats[i];
                candidat.decision = 'Scan...';
                let currentRow = document.getElementById(`row-${i}`);
                currentRow.cells[1].innerHTML = __getBadgeHTML('Scan...');
                currentRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                progressText.innerText = `Analyse : ${candidat.matricule} (${i+1}/${listeCandidats.length})`;

                try {
                    // Utilisation d'un proxy public pour éviter le blocage CORS sur mobile
                    // On simule l'envoi du matricule (généralement passé en paramètre GET ou POST)
                    let urlRecherche = `${targetBaseUrl}?matricule=${encodeURIComponent(candidat.matricule)}`;
                    let proxyUrl = `https://corsproxy.io/?${encodeURIComponent(urlRecherche)}`;

                    let response = await fetch(proxyUrl);
                    let htmlText = await response.text();
                    let htmlLower = htmlText.toLowerCase();

                    // --- Logique de détection demandée ---
                    if (htmlLower.includes("félicitations") || htmlLower.includes("felicitations") || htmlLower.includes("admis")) {
                        candidat.decision = "Admis";
                    } else if (htmlLower.includes("désolé") || htmlLower.includes("desole") || htmlLower.includes("refusé")) {
                        candidat.decision = "Refusé";
                    } else {
                        candidat.decision = "Refusé"; // Par défaut ou si non trouvé
                    }

                    // --- Extraction du nombre de points ---
                    let matchPoints = htmlLower.match(/(\d+)\s*(?:point|pt|pts)/);
                    if (matchPoints) {
                        candidat.points = matchPoints[1];
                    } else {
                        let matchTotal = htmlLower.match(/(?:total|score)\s*(?::)?\s*(\d+)/);
                        candidat.points = matchTotal ? matchTotal[1] : "0";
                    }

                } catch (error) {
                    // En cas de micro-coupure réseau sur le mobile
                    candidat.decision = "Erreur Réseau";
                    candidat.points = "N/A";
                }

                // Mise à jour de la ligne dans le tableau en temps réel
                currentRow.cells[1].innerHTML = __getBadgeHTML(candidat.decision);
                currentRow.cells[2].innerText = candidat.points;

                // Barre de progression
                let pct = Math.round(((i + 1) / listeCandidats.length) * 100);
                progressBar.style.width = `${pct}%`;
                progressBar.innerText = `${pct}%`;
            }

            progressText.innerHTML = `<b class="text-success">Vérification terminée !</b>`;
            document.getElementById('btnExport').disabled = false;
        });

        // Téléchargement du résultat au format CSV depuis le navigateur du téléphone
        document.getElementById('btnExport').addEventListener('click', function() {
            let formatExport = listeCandidats.map(c => ({
                'Matricule': c.matricule,
                'Resultat': c.decision,
                'Nombre de Points': c.points
            }));
            let csv = Papa.unparse(formatExport);
            let blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Resultats_BEPC_Mobile.csv";
            link.click();
        });
    </script>
</body>
</html>
