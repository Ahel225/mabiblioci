<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détecteur BEPC - Correctif Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f4f6f9; font-size: 14px; font-family: system-ui, sans-serif; color: #333; }
        .header-box { background: linear-gradient(135deg, #dc3545, #9b1c2e); color: white; padding: 20px 10px; text-align: center; border-radius: 0 0 18px 18px; }
        .card { border: none; border-radius: 14px; box-shadow: 0 4px 8px rgba(0,0,0,0.04); margin-bottom: 16px; background: white; }
        .badge-admis { background-color: #198754; color: white; padding: 6px 12px; border-radius: 6px; font-weight: bold; }
        .badge-refuse { background-color: #dc3545; color: white; padding: 6px 12px; border-radius: 6px; font-weight: bold; }
        .badge-erreur { background-color: #6c757d; color: white; padding: 6px 12px; border-radius: 6px; font-size: 11px; }
        .badge-cours { background-color: #ffc107; color: #212529; padding: 6px 12px; border-radius: 6px; animation: blink 1s infinite; font-weight: bold; }
        @keyframes blink { 50% { opacity: 0.4; } }
        .table-responsive { max-height: 320px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="header-box mb-3">
        <h4 class="m-0">Vérificateur BEPC DECO</h4>
        <small>Correctif de sécurité Mobile</small>
    </div>

    <div class="container">
        <div class="card p-3">
            <h6 class="fw-bold text-danger mb-3">1. Charger le fichier Excel (.xlsx)</h6>
            <input type="file" id="excelFile" class="form-control" accept=".xlsx, .xls">
            <button id="btnCharger" class="btn btn-secondary w-100 fw-bold btn-sm mt-3">Analyser le fichier Excel</button>
        </div>

        <div class="card p-3">
            <h6 class="fw-bold text-danger mb-2">2. Lancer la vérification</h6>
            <div class="d-grid gap-2 mt-2">
                <button id="btnStart" class="btn btn-danger py-3 fw-bold" disabled>LANCER LA VÉRIFICATION</button>
                <button id="btnExport" class="btn btn-primary py-3 fw-bold" disabled>TÉLÉCHARGER LE RÉSULTAT (.XLSX)</button>
            </div>

            <div class="mt-3">
                <div class="progress" style="height: 18px; border-radius: 10px;">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-danger" role="progressbar" style="width: 0%;">0%</div>
                </div>
                <div id="progressText" class="text-center small text-muted mt-2">Aucun fichier chargé...</div>
            </div>
        </div>

        <div class="card p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="fw-bold m-0 text-danger">3. Aperçu des Résultats</h6>
                <span id="totalBadge" class="badge bg-dark px-3 py-2">Candidats : 0</span>
            </div>
            
            <div class="table-responsive">
                <table class="table table-sm table-striped align-middle m-0" id="tableResultats">
                    <thead class="table-light sticky-top">
                        <tr>
                            <th>Matricule</th>
                            <th>Résultat</th>
                            <th>Points</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="3" class="text-center text-muted py-4">Veuillez charger votre fichier Excel.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let listeCandidats = [];
        
        document.getElementById('btnCharger').addEventListener('click', function() {
            const fileInput = document.getElementById('excelFile').files[0];
            if (!fileInput) return alert("Sélectionnez un fichier d'abord.");

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                
                let matIndex = -1;
                for (let i = 0; i < rows.length; i++) {
                    for (let j = 0; j < rows[i].length; j++) {
                        if (String(rows[i][j]).trim().toLowerCase().includes("matricule")) { matIndex = j; break; }
                    }
                    if (matIndex !== -1) { rows.splice(0, i + 1); break; }
                }

                if (matIndex === -1) return alert("Colonne 'Matricule' introuvable.");

                listeCandidats = rows.map(r => ({
                    matricule: r[matIndex] ? String(r[matIndex]).trim() : '',
                    decision: 'En attente',
                    points: 'N/A'
                })).filter(c => c.matricule !== '');

                document.getElementById('totalBadge').innerText = `Candidats : ${listeCandidats.length}`;
                document.getElementById('btnStart').disabled = false;
                document.getElementById('progressText').innerText = `${listeCandidats.length} candidats prêts.`;
                
                const tbody = document.querySelector('#tableResultats tbody');
                tbody.innerHTML = '';
                listeCandidats.forEach((c, idx) => {
                    tbody.innerHTML += `<tr id="row-${idx}"><td><b>${c.matricule}</b></td><td><span class="badge-attente">En attente</span></td><td>-</td></tr>`;
                });
            };
            reader.readAsArrayBuffer(fileInput);
        });

        document.getElementById('btnStart').addEventListener('click', async function() {
            this.disabled = true;
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');

            for (let i = 0; i < listeCandidats.length; i++) {
                let c = listeCandidats[i];
                let row = document.getElementById(`row-${i}`);
                row.cells[1].innerHTML = `<span class="badge-cours">Scan...</span>`;
                row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                try {
                    // Tentative d'envoi en POST simulé via le proxy pour forcer le site à répondre
                    let targetUrl = "https://itdeco.ci/examens/resultat/bepc/index.html";
                    let proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
                    
                    // On tente d'envoyer les paramètres requis par le formulaire de la DECO
                    let response = await fetch(proxyUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: `matricule=${encodeURIComponent(c.matricule)}&submit=Consulter`
                    });
                    
                    let html = (await response.text()).toLowerCase();

                    // Vérification stricte de la présence des indicateurs de résultats
                    if (html.includes("félicitations") || html.includes("felicitations") || html.includes("admis")) {
                        c.decision = "Admis";
                    } else if (html.includes("désolé") || html.includes("desole") || html.includes("refusé") || html.includes("refuse")) {
                        candidat.decision = "Refusé";
                    } else {
                        // Si la page récupérée est encore la page blanche du formulaire
                        c.decision = "Bloqué (Utilisez un PC)";
                    }

                    let match = html.match(/(\d+)\s*(?:point|pt)/);
                    c.points = match ? match[1] : "N/A";

                } catch (e) {
                    c.decision = "Erreur Réseau";
                }

                // Mise à jour de l'affichage
                if(c.decision === 'Admis') row.cells[1].innerHTML = `<span class="badge-admis">Admis</span>`;
                else if(c.decision === 'Refusé') row.cells[1].innerHTML = `<span class="badge-refuse">Refusé</span>`;
                else row.cells[1].innerHTML = `<span class="badge-erreur">${c.decision}</span>`;
                
                row.cells[2].innerText = c.points;

                let pct = Math.round(((i + 1) / listeCandidats.length) * 100);
                progressBar.style.width = `${pct}%`;
                progressBar.innerText = `${pct}%`;
            }

            progressText.innerHTML = `<b>Analyse terminée.</b>`;
            document.getElementById('btnExport').disabled = false;
        });

        document.getElementById('btnExport').addEventListener('click', function() {
            let ws = XLSX.utils.json_to_sheet(listeCandidats.map(c => ({
                'Matricule': c.matricule,
                'Résultat': c.decision,
                'Points': c.points
            })));
            let wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Résultats");
            XLSX.writeFile(wb, "Resultats_BEPC.xlsx");
        });
    </script>
</body>
</html>
