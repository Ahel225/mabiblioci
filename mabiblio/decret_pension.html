<script>

const lawData = {
  title: "Décret n° 2012-365 du 18 avril 2012 (Pensions CGRAE)",
  subtitle: "fixant les modalités d'application de l'ordonnance n° 2012-303 du 04 avril 2012",
  chapters: [
    {
      title: "PREAMBULE ET OBJET",
      articles: [
        {
          id: "preambule",
          title: "Préambule",
          content: "<p><strong>LE PRESIDENT DE LA REPUBLIQUE</strong></p>" +
                   "<p class='preamble-item'>Sur rapport conjoint du Ministre d'Etat, Ministre de l'Emploi, des Affaires Sociales et de la Solidarité, du Ministre de l'Economie et des Finances, du Ministre de la Fonction, Publique et de la Réforme Administrative et du Ministre auprès du Président de la République, chargé de la Défense</p>" +
                   "<p class='preamble-item'>Vu la Constitution;</p>" +
                   "<p class='preamble-item'>Vu la loi n° 99-476 du 2 août 1999 portant définition et organisation des Institutions de Prévoyance sociale;</p>" +
                   "<p class='preamble-item'>Vu l'ordonnance n° 2012-303 du 04 avril 2012 portant organisation des régimes de pensions gérés par la Caisse Générale de Retraite des Agents de l'Etat, en abrégé CGRAE;</p>" +
                   "<p class='preamble-item'>Vu le décret n° 2011-118 du 22 juin 2011 portant attributions des Membres du Gouvernement;</p>" +
                   "<p class='preamble-item'>Vu le décret n° 2012-241 du 13 mars 2012 portant nomination du Premier Ministre;</p>" +
                   "<p class='preamble-item'>Vu le décret n° 2012-242 du 13 mars 2012 portant nomination des Membres du Gouvernement,</p>" +
                   "<p class='preamble-item'>Le Conseil des Ministres entendu</p>" +
                   "<p class='decrete-text'>DECRETE</p>"
        },
        {
          id: "article1",
          title: "Article 1",
          content: "<p>Le présent décret fixe les principaux paramètres applicables aux régimes de pensions gérés par la Caisse Générale de Retraite des Agents de l'Etat, - codifiés par l'ordonnance 2012-303 du 04 avril 2012 susvisée.</p>"
        }
      ]
    },
    {
      title: "SECTION 1: REGIME GENERAL DES PENSIONS CIVILES",
      articles: [
        {
          id: "article2",
          title: "Article 2",
          content: "<p>Le nombre minimum d'années de services, prévu au quatrième point de l'article 5 de l'ordonnance, ouvrant droit à pension de retraite sans condition d'âge, est fixé à quinze (15).</p>"
        },
        {
          id: "article3",
          title: "Article 3",
          content: "<p>Les réductions d'âge prévues à l'article 6 de l'ordonnance, pour les fonctionnaires anciens combattants et les femmes fonctionnaires, sont fixées comme suit:</p><ul><li>pour le fonctionnaire ancien combattant, la réduction de la limite d'âge est égale à la moitié des périodes ouvrant droit au bénéfice des campagnes doubles;</li><li>pour les femmes fonctionnaires, la réduction de la limite d'âge est d'un (1) an par enfant né d'elles, dans la limite de trois (3) enfants nés après l'acquisition de la qualité de fonctionnaire.</li></ul>"
        },
        {
          id: "article4",
          title: "Article 4",
          content: "<p>L'âge minimum auquel il est fait référence aux points 1°, 2°, 3°, 4° et 5° de l'article 7 de l'ordonnance, est fixé à dix-huit (18) ans.</p><p>Pour le décompte final des annuités liquidables, tel que prévu à l'article 10 de l'ordonnance, la fraction de semestre égale ou supérieure à trois mois est comptée pour six (6) mois.</p><p>La fraction de semestre inférieure à trois (3) mois est négligée.</p><p>Le maximum des annuités liquidables de la pension de retraite est fixé à quarante (40).</p>"
        },
        {
          id: "article5",
          title: "Article 5",
          content: "<p>Le temps servant à la détermination de la moyenne des émoluments afférents aux emplois, grades ou échelons, tel que prévu à l'article 11 de l'ordonnance, correspond aux cinq (5) dernières années.</p><p>Le pourcentage auquel il est fait référence au premier alinéa de l'article 12 de l'ordonnance, pour la détermination de la pension de retraite, est fixé à 1,75% des émoluments de base par annuité liquidable.</p>"
        },
        {
          id: "article6",
          title: "Article 6",
          content: "<p>Le pourcentage du salaire minimum interprofessionnel garanti, auquel le montant minimum de la pension ne peut être inférieur, comme il est dit à l'article 12 alinéa 3 de l'ordonnance, est fixé à 50%.</p><p>Le nombre d'années d'anticipation par rapport à la limite d'âge statutaire auquel il est fait référence pour la jouissance de la pension à l'article 13 de l'ordonnance, est fixé à cinq (5).</p><p>Le pourcentage d'abattement par année d'anticipation que doit supporter le fonctionnaire comme il est dit à l'article 13 de l'ordonnance, est de 5%.</p>"
        },
        {
          id: "article7",
          title: "Article 7",
          content: "<p>Les pourcentages auxquels il est fait référence à l'alinéa 5 de l'article 15 de l'ordonnance, sont fixés comme suit:</p><p>Le montant cumulé de la rente et de la pension ne peut être inférieur à:</p><ul><li>50% de la dernière solde indiciaire, en cas d'invalidité imputable au service;</li><li>80% de la dernière solde indiciaire, en cas d'invalidité imputable à un acte de dévouement dans un intérêt public.</li></ul><p>Le nombre d'annuités liquidables auquel il est fait référence au dernier alinéa de l'article 15 de l'ordonnance, est fixé à 37, 5.</p>"
        },
        {
          id: "article8",
          title: "Article 8",
          content: "<p>Le pourcentage auquel il est fait référence au dernier alinéa de l'article 16 de l'ordonnance, est fixé à 25% de la moyenne des cinq (5) dernières soldes indiciaires.</p>"
        },
        {
          id: "article9",
          title: "Article 9",
          content: "<p>Le pourcentage du traitement brut de base du fonctionnaire, que ne doit pas excéder l'allocation d'invalidité, comme il est dit à l'article 19 de l'ordonnance, est fixé à 50%.</p>"
        },
        {
          id: "article10",
          title: "Article 10",
          content: "<p>Le pourcentage du taux d'invalidité consécutive à un accident, en deçà duquel l'allocation d'invalidité est suspendue conformément à l'article 23 de l'ordonnance, est fixé à 10%.</p>"
        },
        {
          id: "article11",
          title: "Article 11",
          content: "<p>Le pourcentage du taux d'incapacité retenu pour le calcul de la rente viagère visée à l'article 24 de l'ordonnance est de 100%.</p>"
        },
        {
          id: "article12",
          title: "Article 12",
          content: "<p>Le pourcentage, prévu à l'article 30 de l'ordonnance, de la pension de retraite obtenue par le fonctionnaire ou qu'il aurait obtenue le jour de son décès, auquel ont droit les conjoints survivants des fonctionnaires monogames, est fixé à 50%.</p><p>Le droit à pension du conjoint survivant est acquis à la condition que le mariage ait été contracté au moins deux (2) ans avant le décès du fonctionnaire.</p><p>Toutefois, dans le cas où il existe au moins un (1) enfant entre les deux conjoints, la condition d'antériorité du mariage par rapport au décès est ramenée à un (1) an.</p>"
        },
        {
          id: "article13",
          title: "Article 13",
          content: "<p>Concernant l'article 33 de l'ordonnance:</p><p>Le nombre d'années de jouissance anticipée de la pension de réversion dont peut profiter le conjoint survivant du fonctionnaire décédé, est fixé à cinq (5).</p><p>Le pourcentage d'abattement par année d'anticipation de jouissance de la pension de réversion que doit supporter le conjoint survivant du fonctionnaire décédé, est fixé à 5%.</p>"
        },
        {
          id: "article14",
          title: "Article 14",
          content: "<p>L'âge limite auquel il est fait référence à l'article 34 de l'ordonnance, est fixé à vingt et un (21) ans révolus.</p><p>Le pourcentage, prévu à l'article 34 de l'ordonnance, de la pension de retraite obtenue par le fonctionnaire ou qu'il aurait obtenue le jour de son décès, auquel a droit a priori chaque orphelin, est fixé à 10%.</p>"
        },
        {
          id: "article15",
          title: "Article 15",
          content: "<p>La limite à laquelle il est fait référence à l'article 35 de l'ordonnance, après le transfert du bénéfice de la pension de conjoint survivant à l'orphelin mineur le plus âgé, est fixée à 40% de la pension obtenue ou qu'aurait pu obtenir le fonctionnaire pour la totalité des orphelins restant.</p>"
        },
        {
          id: "article16",
          title: "Article 16",
          content: "<p>Le pourcentage auquel il est fait référence au premier alinéa de l'article 34 de l'ordonnance est fixé à 50%.</p><p>Le nombre d'années de services auquel il est fait référence au deuxième alinéa de l'article 46 de l'ordonnance est fixé à trente (30).</p>"
        },
        {
          id: "article17",
          title: "Article 17",
          content: "<p>Le délai mentionné au deuxième alinéa de l'article 49 de l'ordonnance est fixé à cinq (5) ans.</p><p>Le nombre d'années d'arrérages ne pouvant être excédées tel que prévu au deuxième alinéa de l'article 49 de l'ordonnance est fixé à deux (2) années.</p>"
        },
        {
          id: "article18",
          title: "Article 18",
          content: "<p>Concernant l'article 55 de l'ordonnance :</p><ul><li>Le pourcentage de retenue prévu au premier alinéa est fixé à 8,33%.</li><li>Le pourcentage de contribution employeur prévu au dernier alinéa est fixé à 16,67%.</li></ul>"
        },
        {
          id: "article19",
          title: "Article 19",
          content: "<p>Le montant annuel du traitement soumis à retenue pour pension afférent à l'indice 100, tel que prévu à l'article 58 de l'ordonnance, est fixé à deux cent quatre-vingt mille cent quarante huit (280 148) francs CFA.</p>"
        },
        {
          id: "article20",
          title: "Article 20",
          content: "<p>Concernant les Magistrats, l'assiette de calcul de l'allocation viagère, de la pension de réversion de son conjoint et celle de ses ayants droit survivants, telles que prévues à l'article 48 de l'ordonnance, est représentée par la somme du salaire de base, de l'indemnité de résidence et de la prime d'investigation, conformément aux dispositions du décret n°2006-415 du 21 décembre 2006 pris pour l'application de la loi n°94-440 du 16 août 1994, déterminant la composition, l'organisation, les attributions et le fonctionnement de la Cour Suprême, modifiée et complétée par la loi n° 97-243 du 25 avril 1997 relatif aux traitements, indemnités et avantages de toute nature alloués aux Magistrats de la Cour Suprême, et celles du décret n° 2008-15 du 11 février 2008 déterminant les traitements, indemnités et avantages de toutes natures reconnues aux Magistrats en fonction et à la retraite.</p><p>Le traitement soumis à retenues pour pension, les niveaux des indices et la valeur du point d'indice servant au calcul des différentes composantes du traitement, tels que prévus à l'article 59 de l'ordonnance, sont définis conformément aux dispositions des décrets mentionnés au précédent alinéa.</p>"
        }
      ]
    },
    {
      title: "SECTION 2: REGIME DES PENSIONS MILITAIRES",
      articles: [
        {
          id: "article21",
          title: "Article 21",
          content: "<p>Le nombre minimum d'années de services liquidables dûment validés, tel que prévu aux articles 76 (1°), 76 (2°) et 77 (1°) de l'ordonnance, est fixé à quinze (15).</p>"
        },
        {
          id: "article22",
          title: "Article 22",
          content: "<p>Le nombre d'années minimum de services liquidables dûment validés, prévu à l'article 78 de l'ordonnance, permettant au militaire rendu à la vie civile et n'ayant pas acquis droit à pension de retraite, de bénéficier d'une solde de réforme, est fixé à cinq (5).</p>"
        },
        {
          id: "article23",
          title: "Article 23",
          content: "<p>L'âge auquel il est fait référence à l'article 79 de l'ordonnance est fixé à dix-huit (18) ans révolus.</p>"
        },
        {
          id: "article24",
          title: "Article 24",
          content: "<p>Concernant l'article 82 de l'ordonnance:</p><ul><li>Le nombre minimum d'années de services liquidables dûment validés, entrainant attribution de la bonification quinquennale, est fixé à quinze (15).</li><li>Le nombre d'annuité(s) de bonifications obtenue(s) par période de cinq ans est fixé à un (1).</li><li>Le maximum d'années de bonifications pouvant être accordées est fixé à cinq (5).</li></ul>"
        },
        {
          id: "article25",
          title: "Article 25",
          content: "<p>Concernant l'article 88 de l'ordonnance:</p><p>La bonification, prévue au titre du cinquième point de l'article 83 de l'ordonnance, est de deux (2) années.</p>"
        },
        {
          id: "article26",
          title: "Article 26",
          content: "<p>Concernant l'article 89 de l'ordonnance:</p><p>La bonification prévue au sixième point de l'article 83 de l'ordonnance au titre du bénéfice pour études préliminaires, est de deux (2) années.</p>"
        },
        {
          id: "article27",
          title: "Article 27",
          content: "<p>Le maximum des annuités liquidables, tel que prévu à l'article 90 alinéa 2 de l'ordonnance, est fixé à quarante (40).</p>"
        },
        {
          id: "article28",
          title: "Article 28",
          content: "<p>Pour le décompte final des annuités liquidables, la valeur de la fraction de semestre telle qu'indiquée à l'article 90 alinéa 3 de l'ordonnance, est fixée comme suit:</p><ul><li>lorsqu'elle est égale ou supérieure à trois (3) mois, elle est comptée pour six (6);</li><li>lorsqu'elle est inférieure à trois (3) mois, elle est négligée.</li></ul>"
        },
        {
          id: "article29",
          title: "Article 29",
          content: "<p>Le nombre d'années de services servant au calcul de la moyenne de la solde budgétaire à prendre en compte pour le calcul de la pension de retraite ou de la solde de réforme, tel que stipulé au premier alinéa de l'article 91 de l'ordonnance, est fixée à cinq (5).</p>"
        },
        {
          id: "article30",
          title: "Article 30",
          content: "<p>Concernant l'article 92 de l'ordonnance:</p><ul><li>Le pourcentage prévu au premier alinéa est fixé à 1,75%.</li><li>Le pourcentage du salaire minimum interprofessionnel garanti, auquel le montant minimum de la pension ne peut être inférieur, comme il est dit à l'article 92 alinéa 3 de l'ordonnance, est fixé à 50%.</li></ul>"
        },
        {

function renderLaw(data){
  const wrapper = document.getElementById('mainWrapper');
  wrapper.innerHTML = '';
  const toc = document.getElementById('tocList');
  toc.innerHTML = '';
  const articleEls = [];

  if (Array.isArray(data.chapters)) {
    data.chapters.forEach((ch, ci) => {
      const sec = document.createElement('section');
      sec.className = 'group';
      const h2 = document.createElement('h2');
      h2.textContent = ch.title || `Chapitre ${ci+1}`;
      sec.appendChild(h2);

      (ch.articles || []).forEach((a, ai) => {
        const art = document.createElement('div');
        art.className = 'article';
        art.id = a.id || `art_${ci}_${ai}`;

        const header = document.createElement('div');
        header.className = 'article-header';
        const h3 = document.createElement('h3');
        h3.textContent = a.title || `Article ${ai+1}`;
        const fsBtn = document.createElement('button');
        fsBtn.className = 'open-fs';
        fsBtn.title = 'Plein écran';
        fsBtn.innerHTML = '<i class="fas fa-maximize"></i>';
        fsBtn.addEventListener('click', () => openFullscreenById(art.id));
        header.appendChild(h3);
        header.appendChild(fsBtn);

        const content = document.createElement('div');
        content.className = 'article-content';
        content.innerHTML = a.content || '';

        art.appendChild(header);
        art.appendChild(content);
        sec.appendChild(art);
        articleEls.push(art);
      });

      wrapper.appendChild(sec);

      const chapTitle = document.createElement('div');
      chapTitle.textContent = ch.title || `Chapitre ${ci+1}`;
      chapTitle.style.margin = '8px 0 4px';
      chapTitle.style.color = '#1a4177';
      chapTitle.style.fontWeight = '700';
      toc.appendChild(chapTitle);
      const sub = document.createElement('div');
      sub.className = 'toc-sub';
      (ch.articles||[]).forEach((a, ai) => {
        const link = document.createElement('a');
        const id = a.id || `art_${ci}_${ai}`;
        link.href = `#${id}`;
        link.textContent = a.title || `Article ${ai+1}`;
        link.addEventListener('click', closeToc);
        sub.appendChild(link);
      });
      toc.appendChild(sub);
    });
  } else {
    // Fallback for flat structure (not used here but good to keep)
    const sec = document.createElement('section');
    sec.className = 'group';
    const h2 = document.createElement('h2');
    h2.textContent = data.title || 'Texte intégral';
    sec.appendChild(h2);
    (data.articles || []).forEach((a, ai) => {
      const art = document.createElement('div');
      art.className = 'article';
      art.id = a.id || `article_${ai}`;
      const header = document.createElement('div');
      header.className = 'article-header';
      const h3 = document.createElement('h3');
      h3.textContent = a.title || `Article ${ai+1}`;
      const fsBtn = document.createElement('button');
      fsBtn.className = 'open-fs';
      fsBtn.title = 'Plein écran';
      fsBtn.innerHTML = '<i class="fas fa-maximize"></i>';
      fsBtn.addEventListener('click', () => openFullscreenById(art.id));
      header.appendChild(h3);
      header.appendChild(fsBtn);
      const content = document.createElement('div');
      content.className = 'article-content';
      content.innerHTML = a.content || '';
      art.appendChild(header);
      art.appendChild(content);
      sec.appendChild(art);
      articleEls.push(art);

      const link = document.createElement('a');
      link.href = `#${art.id}`;
      link.textContent = a.title || `Article ${ai+1}`;
      link.addEventListener('click', closeToc);
      document.getElementById('tocList').appendChild(link);
    });
    wrapper.appendChild(sec);
  }
  window.__articlesOrder = articleEls.map(el => el.id);
}

// TOC controls
const tocBtn = document.getElementById('tocFloatBtn');
const tocHeaderBtn = document.getElementById('tocHeaderBtn');
const tocPanel = document.getElementById('tocPanel');
const tocOverlay = document.getElementById('tocOverlay');
function openToc(){ tocPanel.classList.add('open'); tocOverlay.classList.add('show'); }
function closeToc(){ tocPanel.classList.remove('open'); tocOverlay.classList.remove('show'); }
tocBtn.addEventListener('click', openToc);
tocHeaderBtn.addEventListener('click', openToc);
tocOverlay.addEventListener('click', closeToc);

// Voice reading
const synth = window.speechSynthesis;
let speakingId = null;
const now = document.getElementById('nowReading');
function textFrom(el){ return el.querySelector('.article-content')?.innerText?.trim() || ''; }
function highlight(id, on){ const el = document.getElementById(id); if(!el) return; el.classList.toggle('reading', !!on); }
function speakById(id){
  const el = document.getElementById(id); if(!el) return;
  const text = textFrom(el); if(!text) return;
  stopSpeaking();
  const ut = new SpeechSynthesisUtterance(text); ut.lang='fr-FR'; ut.rate=1;
  ut.onend = () => { highlight(id,false); speakingId=null; now.textContent='Prêt'; };
  synth.speak(ut); speakingId=id; highlight(id,true);
  now.textContent = 'Lecture : ' + (el.querySelector('.article-header h3')?.textContent || '');
}
function pauseSpeaking(){ if(synth.speaking && !synth.paused) synth.pause(); }
function resumeSpeaking(){ if(synth.paused) synth.resume(); }
function stopSpeaking(){ if(synth.speaking){ synth.cancel(); } if(speakingId){ highlight(speakingId,false); speakingId=null; } }
document.getElementById('vPlay').addEventListener('click', () => { const visible = findMostVisibleArticleId() || window.__articlesOrder?.[0]; if(visible) speakById(visible); });
document.getElementById('vPause').addEventListener('click', () => { if(synth.paused) resumeSpeaking(); else pauseSpeaking(); });
document.getElementById('vStop').addEventListener('click', stopSpeaking);
function findMostVisibleArticleId(){ const arts = Array.from(document.querySelectorAll('.article')); let best=null, bestArea=0; const vh = window.innerHeight; arts.forEach(a=>{ const r=a.getBoundingClientRect(); const ov=Math.max(0, Math.min(vh,r.bottom)-Math.max(0,r.top)); if(ov>bestArea){ bestArea=ov; best=a; } }); return best?.id || null; }

// Fullscreen
const fsOverlay = document.getElementById('fsOverlay');
const fsTitle = document.getElementById('fsTitle');
const fsBody = document.getElementById('fsBody');
const fsPrev = document.getElementById('fsNavPrev');
const fsNext = document.getElementById('fsNavNext');
const fsClose = document.getElementById('fsClose');
let fsCurrentIndex = -1;
function openFullscreenById(id){
  const order = window.__articlesOrder || []; const idx = order.indexOf(id); if(idx === -1) return;
  fsCurrentIndex = idx;
  const el = document.getElementById(id);
  fsTitle.textContent = el.querySelector('.article-header h3')?.textContent || 'Article';
  fsBody.innerHTML = el.querySelector('.article-content')?.innerHTML || '';
  fsOverlay.classList.add('show'); fsOverlay.setAttribute('aria-hidden','false');
  updateFsNav();
}
function closeFullscreen(){ fsOverlay.classList.remove('show'); fsOverlay.setAttribute('aria-hidden','true'); }
function updateFsNav(){ const order = window.__articlesOrder || []; fsPrev.style.display = fsCurrentIndex > 0 ? 'grid' : 'none'; fsNext.style.display = fsCurrentIndex < order.length - 1 ? 'grid' : 'none'; }
fsClose.addEventListener('click', closeFullscreen);
fsPrev.addEventListener('click', () => { const order = window.__articlesOrder || []; if(fsCurrentIndex > 0) openFullscreenById(order[fsCurrentIndex - 1]); });
fsNext.addEventListener('click', () => { const order = window.__articlesOrder || []; if(fsCurrentIndex < order.length - 1) openFullscreenById(order[fsCurrentIndex + 1]); });

// Init
renderLaw(lawData);
</script>
