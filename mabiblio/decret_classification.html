        .container {

        header {

          margin-bottom: 20px;

        .logo {

          font-weight: 700;

        }

        }

        }

          font-weight: 600;
          cursor: pointer;
          display: inline-flex;
          align-items: center;
          gap: 8px;
          transition: all 0.2s ease;
        }
        
        .btn-primary {
          background-color: var(--primary);
          color: white;
        }
        
        .btn-secondary {
          background-color: var(--secondary);
          color: white;
        }
        
        .btn:hover {
          opacity: 0.9;
          transform: translateY(-2px);
        }

          position: relative;
          width: 250px;
          margin-right: 10px;
        }
        
        .compact-search-input {
          width: 100%;
          padding: 10px 40px 10px 15px;
          border-radius: 20px;
          border: 1px solid var(--border);
          background-color: var(--card-bg);
          color: var(--text);
          font-size: 0.9rem;
          box-shadow: var(--shadow);
          transition: all 0.3s ease;
        }
        
        .compact-search-input:focus {
          outline: none;
          border-color: var(--primary);
          width: 300px;
        }
        
        .compact-search-icon {
          position: absolute;
          right: 12px;
          top: 50%;
          transform: translateY(-50%);
          color: var(--text-muted);
          cursor: pointer;
        }
        
        .compact-search-results {
          position: absolute;
          top: 100%;
          left: 0;
          right: 0;
          background: var(--card-bg);
          border-radius: 0 0 var(--radius) var(--radius);
          box-shadow: var(--shadow);
          max-height: 300px;
          overflow-y: auto;
          z-index: 100;
          display: none;
          border: 1px solid var(--border);
          border-top: none;
        }
        
        .compact-search-results.visible {
          display: block;
        }
        
        .search-result-item {
          padding: 12px 16px;
          border-bottom: 1px solid var(--border);
          cursor: pointer;
          transition: background 0.2s ease;
        }
        
        .search-result-item:hover {
          background: rgba(0, 0, 0, 0.05);
        }
        
        .search-result-item h3 {
          margin: 0 0 4px 0;
          font-size: 1rem;
          color: var(--primary);
        }
        
        .search-result-item p {
          margin: 0;
          color: var(--text-muted);
          font-size: 0.85rem;
        }
        
        .search-result-item small {
          color: var(--text-muted);
          font-size: 0.75rem;
        }
        
        .no-results {

          text-align: center;
          color: var(--text-muted);
        }

          color: #000;
          padding: 2px 4px;
          border-radius: 3px;
        }
        
        .search-preview {

          font-size: 0.8rem;

          background-color: var(--card-bg);
          color: var(--text);
          font-size: 0.9rem;
          min-width: 200px;
        }
        
        .table-container {

          margin-top: 20px;

          font-size: 0.9rem;
          box-shadow: var(--shadow);
          border-radius: var(--radius);

          text-align: left;

        .styled-table th,

          .filters {

          }

          }

            font-size: 0.8rem;

</head>

        // Gestion du thème
        function initializeTheme() {
            const themeToggle = document.getElementById('themeToggle');
            
            function setTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
                
                const themeIcon = themeToggle.querySelector('i');
                if (theme === 'dark') {
                    themeIcon.className = 'fas fa-sun';
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i> Thème';
                } else {
                    themeIcon.className = 'fas fa-moon';
                    themeToggle.innerHTML = '<i class="fas fa-moon"></i> Thème';
                }
            }

            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            setTheme(savedTheme || (systemPrefersDark ? 'dark' : 'light'));
            
            themeToggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                setTheme(currentTheme === 'dark' ? 'light' : 'dark');
            });
        }

        // Initialisation des filtres
        function initializeFilters() {
            const familyFilter = document.getElementById('familyFilter');
            const gradeFilter = document.getElementById('gradeFilter');
            const resetButton = document.getElementById('resetFilters');

            // Remplir les filtres
            const families = [...new Set(jobs.map(job => job.famille))].sort();
            const grades = [...new Set(jobs.map(job => job.grade))].sort((a, b) => {
                const gradeOrder = ['A7', 'A6', 'A5', 'A4', 'A3', 'B3', 'B1', 'C3', 'C2', 'C1', 'D1'];
                return gradeOrder.indexOf(a) - gradeOrder.indexOf(b);
            });

            families.forEach(family => {
                const option = document.createElement('option');
                option.value = family;
                option.textContent = family;
                familyFilter.appendChild(option);
            });

            grades.forEach(grade => {
                const option = document.createElement('option');
                option.value = grade;
                option.textContent = `Grade ${grade}`;
                gradeFilter.appendChild(option);
            });

            // Événements des filtres
            familyFilter.addEventListener('change', (e) => {
                currentFamilyFilter = e.target.value;
                filterAndDisplayJobs();
            });

            gradeFilter.addEventListener('change', (e) => {
                currentGradeFilter = e.target.value;
                filterAndDisplayJobs();
            });

            resetButton.addEventListener('click', () => {
                familyFilter.value = 'all';
                gradeFilter.value = 'all';
                currentFamilyFilter = 'all';
                currentGradeFilter = 'all';
                filterAndDisplayJobs();
            });
        }

                return familyMatch && gradeMatch;
            });
            displayClassificationData();
        }

            filteredJobs.forEach(job => {
                const row = document.createElement('tr');
                
                let emploiCell = `<strong>${job.emploi}</strong>`;
                if (job.specialites && job.specialites.length > 0) {
                    emploiCell += `<ul class="specialties-list">${job.specialites.map(s => `<li>${s}</li>`).join('')}</ul>`;
                }
                
                row.innerHTML = `
                    <td>${emploiCell}</td>
                    <td><span class="family-badge">${job.famille}</span></td>
                    <td><span class="grade-badge grade-${job.grade}">${job.grade}</span></td>
                    <td>${job.recrutement || 'Néant'}</td>
                    <td>${job.promotion || 'Néant'}</td>
                `;
                
                tableBody.appendChild(row);
            });
        }

        // Initialisation de la recherche
        function initializeSearch() {
            const compactSearchInput = document.getElementById('compactSearchInput');
            const compactSearchIcon = document.querySelector('.compact-search-icon');
            
            function debounce(func, wait) {
                let timeout;
                return function executedFunction(...args) {
                    const later = () => {
                        clearTimeout(timeout);
                        func(...args);
                    };
                    clearTimeout(timeout);
                    timeout = setTimeout(later, wait);
                };
            }
            
            const performSearch = (query) => {
                if (!query.trim() || query.length < 2) {
                    return [];
                }
                
                const searchTerms = query.toLowerCase().split(/\s+/).filter(term => term.length > 0);
                const normalizedQuery = query.toLowerCase();
                
                return jobs.filter(job => {
                    const searchableText = (
                        job.emploi.toLowerCase() + ' ' + 
                        job.famille.toLowerCase() + ' ' + 
                        job.grade.toLowerCase() + ' ' + 
                        (job.recrutement || '').toLowerCase() + ' ' +
                        (job.promotion || '').toLowerCase() + ' ' +
                        (job.specialites ? job.specialites.join(' ').toLowerCase() : '')
                    );
                    
                    return searchTerms.some(term => searchableText.includes(term));
                });
            };
            
            const displaySearchResults = (results, query) => {
                const resultsContainer = document.getElementById('compactSearchResults');
                resultsContainer.innerHTML = '';
                
                if (results.length === 0) {
                    resultsContainer.innerHTML = '<div class="no-results">Aucun résultat trouvé</div>';
                    resultsContainer.classList.add('visible');
                    return;
                }
                
                results.slice(0, 10).forEach(result => {
                    const resultElement = document.createElement('div');
                    resultElement.className = 'search-result-item';
                    
                    let specialtiesText = '';
                    if (result.specialites && result.specialites.length > 0) {
                        specialtiesText = `<small>Spécialités: ${result.specialites.slice(0, 2).join(', ')}${result.specialites.length > 2 ? '...' : ''}</small>`;
                    }
                    
                    resultElement.innerHTML = `
                        <h3>${result.emploi}</h3>
                        <p>${result.famille} • Grade ${result.grade}</p>
                        ${specialtiesText}
                    `;
                    
                    resultElement.addEventListener('click', () => {
                        // Filtrer pour cet emploi spécifique
                        document.getElementById('familyFilter').value = result.famille;
                        document.getElementById('gradeFilter').value = result.grade;
                        currentFamilyFilter = result.famille;
                        currentGradeFilter = result.grade;
                        filterAndDisplayJobs();
                        
                        // Fermer les résultats de recherche
                        resultsContainer.classList.remove('visible');
                        compactSearchInput.value = '';
                        
                        // Scroller vers le tableau
                        document.querySelector('.classification-container').scrollIntoView({ 
                            behavior: 'smooth', 
                            block: 'start' 
                        });
                    });
                    
                    resultsContainer.appendChild(resultElement);
                });
                
                resultsContainer.classList.add('visible');
            };
            
            const hideSearchResults = () => {
                document.getElementById('compactSearchResults').classList.remove('visible');
            };
            
            const debouncedSearch = debounce((query) => {
                if (query.length < 2) {
                    hideSearchResults();
                    return;
                }
                
                const results = performSearch(query);
                displaySearchResults(results, query);
            }, 300);
            
            compactSearchInput.addEventListener('input', (e) => {
                debouncedSearch(e.target.value);
            });
            
            compactSearchIcon.addEventListener('click', () => {
                const query = compactSearchInput.value;
                if (query.length >= 2) debouncedSearch(query);
            });
            
            compactSearchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const query = compactSearchInput.value;
                    if (query.length >= 2) debouncedSearch(query);
                }
            });
            
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.compact-search')) {
                    hideSearchResults();
                }
            });
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    compactSearchInput.value = '';
                    hideSearchResults();
                    compactSearchInput.blur();
                }
            });
        }
    </script>
</body>
